        /* ===== Mobile tweaks (ตามคำสั่ง) ===== */

            /* ตัวอักษรในป้ายของจอทดลอง +7px (override presentation attributes) */

        /* one-line labels: hide separate value text elements */

/* shift F label */
.label-F { transform: translateX(-12px); }

/* FORCE shift label F left 12px */
.label-F, #label-F, [data-label="F"] {

}

                    กำหนดค่า g = 10 N/kg <span class="text-gray-500">(ใช้ค่าคงที่ในการทดลอง)</span>

<script>
        class FrictionSimulation {
            constructor() {
                this.boxPosition = 200;
                this.boxPositionY = 0;
                this.isMoving = false;
                this.velocity = 0;
                this.velocityX = 0;
                this.velocityY = 0;
                this.lastTime = null;
                this.animationId = null;
                this.lastTime = null;
                this.motionScale = 10; // px per (m) for visualization
                
                this.initializeElements();
                this.setupEventListeners();
                this.updateSimulation();
            }
            
            initializeElements() {
                this.forceSlider = document.getElementById('forceSlider');
                this.angleSlider = document.getElementById('angleSlider');
                this.massSlider = document.getElementById('massSlider');
                // Mobile top params (if present)
                this.massSliderM = document.getElementById('massSliderM');
this.massValueM = document.getElementById('massValueM');
this.playBtn = document.getElementById('playBtn');
                this.resetBtn = document.getElementById('resetBtn');
                
                this.forceValue = document.getElementById('forceValue');
                this.angleValue = document.getElementById('angleValue');
                this.massValue = document.getElementById('massValue');
                
                
                this.boxGroup = document.getElementById('boxGroup');
                
                // Get all label elements
                this.forceLabel = document.getElementById('forceLabel');
                this.forceValueLabel = document.getElementById('forceValueLabel');
                this.fxLabel = document.getElementById('fxLabel');
                this.fxValueLabel = document.getElementById('fxValueLabel');
                this.fyLabel = document.getElementById('fyLabel');
                this.fyValueLabel = document.getElementById('fyValueLabel');
                this.weightLabel = document.getElementById('weightLabel');
                this.weightValueLabel = document.getElementById('weightValueLabel');
                this.normalLabel = document.getElementById('normalLabel');
                this.normalValueLabel = document.getElementById('normalValueLabel');
                this.frictionLabel = document.getElementById('frictionLabel');
                this.frictionValueLabel = document.getElementById('frictionValueLabel');
                this.accelerationLabel = document.getElementById('accelerationLabel');
                this.accelerationValueLabel = document.getElementById('accelerationValueLabel');
                this.angleText = document.getElementById('angleText');
                this.angleArc = document.getElementById('angleArc');
                
            }
            
            setupEventListeners() {
                this.forceSlider.addEventListener('input', () => this.updateSimulation());
                this.angleSlider.addEventListener('input', () => this.updateSimulation());
                this.massSlider.addEventListener('input', () => this.updateSimulation());

                // Mobile duplicated sliders -> sync to main sliders
                if (this.massSliderM) {
                    this.massSliderM.addEventListener('input', () => {
                        this.massSlider.value = this.massSliderM.value;
                        this.updateSimulation();
                    });
                }

                this.playBtn.addEventListener('click', () => this.toggleAnimation());
                this.resetBtn.addEventListener('click', () => this.resetSimulation());
            }

            updateSimulation() {
                const force = parseFloat(this.forceSlider.value);
                const angle = parseFloat(this.angleSlider.value);
                const mass = parseFloat(this.massSlider.value);
                const gravity = 10;
                const muStatic = 0.5;
                const muKinetic = 0.4;
this.showComponents = true;
                
                // Update display values
                this.forceValue.textContent = `${force} N`;
                this.angleValue.textContent = `${angle}°`;
                const avs = document.getElementById('angleValueSpan');
                if (avs) avs.textContent = `${angle}°`;
                this.massValue.textContent = `${mass} kg`;

                // Sync mobile top panel (if present)
                if (this.massSliderM) {
                    this.massSliderM.value = this.massSlider.value;
                    if (this.massValueM) this.massValueM.textContent = `${mass} kg`;
}
                
                // Calculate forces
                const angleRad = (angle * Math.PI) / 180;
                const fx = force * Math.cos(angleRad);
                const fy = force * Math.sin(angleRad);
                const weight = mass * gravity;
                const normalForce = Math.max(0, weight - fy);
                const maxStaticFriction = muStatic * normalForce;
                
                // Check if object will lift off
                let isFloating = false;
                let actualFrictionForce;
                let willMove = false;
                let netForce = 0;
                let accelerationValue = 0;
                let netForceX = 0;
                let netForceY = 0;
                
                if (fy > weight) {
                    // Object lifts off - no friction
                    isFloating = true;
                    actualFrictionForce = 0;
                    willMove = true;
                    netForceX = fx;
                    netForceY = fy - weight;
                    netForce = Math.sqrt(netForceX * netForceX + netForceY * netForceY);
                    accelerationValue = netForce / mass;
                } else {
                    // Object stays on ground
                    isFloating = false;
                    netForceY = 0;
                    if (fx <= maxStaticFriction) {
                        actualFrictionForce = fx; // Static friction equals applied force
                        willMove = false;
                        netForce = 0;
                        accelerationValue = 0;
                        netForceX = 0;
                    } else {
                        actualFrictionForce = muKinetic * normalForce;
                        willMove = true;
                        netForce = fx - actualFrictionForce;
                        netForceX = netForce;
                        accelerationValue = netForce / mass;
                    }
                }
                
                // Compute acceleration components
                const ax = netForceX / mass;
                const ay = netForceY / mass;
                const aResult = Math.sqrt(ax*ax + ay*ay);

                // Update vectors
                this.updateVectors(force, angle, fx, fy, weight, normalForce, actualFrictionForce, willMove, aResult, isFloating, netForceX, netForceY);
                
                // Store values for animation
                this.currentForces = { fx, fy, actualFrictionForce, willMove, mass, acceleration: aResult, ax, ay, isFloating, netForceX, netForceY };
            }
            
            updateVectors(force, angle, fx, fy, weight, normalForce, frictionForce, willMove, accelerationValue, isFloating = false, netForceX = 0, netForceY = 0) {
                const boxCenterX = this.boxPosition + 30;
                const boxCenterY = 275 + this.boxPositionY;
                const rightEdgeX = this.boxPosition + 60;
                const rightEdgeY = boxCenterY;
                const scale = 2; // Scale factor for vector display
                
                // Applied force vector (hide if force is 0)
                const appliedForceGroup = document.getElementById('appliedForce');
                if (force > 0) {
                    appliedForceGroup.style.display = 'block';
                    const forceLength = force * scale;
                    const angleRad = (angle * Math.PI) / 180;
                    const forceEndX = rightEdgeX + forceLength * Math.cos(angleRad);
                    const forceEndY = rightEdgeY - forceLength * Math.sin(angleRad);
                    
                    const appliedForceArrow = document.querySelector('#appliedForce line');
                    appliedForceArrow.setAttribute('x1', rightEdgeX);
                    appliedForceArrow.setAttribute('y1', rightEdgeY);
                    appliedForceArrow.setAttribute('x2', forceEndX);
                    appliedForceArrow.setAttribute('y2', forceEndY);
                    
                    // Update force label position
                    const labelOffsetX = 15 * Math.cos(angleRad);
                    const labelOffsetY = 15 * Math.sin(angleRad);
                    // One-line label: F = ... N (same line)
                    this.forceLabel.setAttribute('x', forceEndX + labelOffsetX + 45);
                    this.forceLabel.setAttribute('y', forceEndY - labelOffsetY);
                    this.forceLabel.textContent = `F = ${force.toFixed(1)} N`;
                } else {
                    appliedForceGroup.style.display = 'none';
                }
                // Angle arc and text (only show if angle > 0)
                const arcPos = 'top';
if (angle > 0) {
                    const arcRadius = 26;
                    const angleRad = (angle * Math.PI) / 180;

                    const endX = rightEdgeX + arcRadius * Math.cos(angleRad);
                    const endY = (rightEdgeY - arcRadius * Math.sin(angleRad));

                    const arcPath = `M ${rightEdgeX + arcRadius} ${rightEdgeY} A ${arcRadius} ${arcRadius} 0 0 0 ${endX} ${endY}`;
                    this.angleArc.setAttribute('d', arcPath);
                    this.angleArc.setAttribute('stroke', '#9ca3af');
                    this.angleArc.setAttribute('stroke-width', '1.5');
                    this.angleArc.setAttribute('stroke-dasharray', '2,2');

                    // place θ label near the middle of the arc
                    const labelR = arcRadius + 14;
                    const lx = rightEdgeX + labelR * Math.cos(angleRad/2);
                    const ly = (rightEdgeY - labelR * Math.sin(angleRad/2));

                    this.angleText.setAttribute('x', lx);
                    this.angleText.setAttribute('y', ly);
                    this.angleText.setAttribute('fill', '#6b7280');
                    this.angleText.setAttribute('font-size', '12');
                    this.angleText.setAttribute('font-weight', '600');
                    this.angleText.textContent = `θ = ${angle.toFixed(0)}°`;
                    this.angleText.style.display = 'block';
                    this.angleArc.style.display = 'block';
                } else {
                    this.angleText.style.display = 'none';
                    this.angleArc.style.display = 'none';
                }
                
                // Force components (show if force > 0)
                const components = document.getElementById('forceComponents');
                if (force > 0 && this.showComponents) {
                    components.style.display = 'block';
                    const fxArrow = components.children[0];
                    const fyArrow = components.children[1];
                    
                    // Fx component (horizontal) - show if fx > 0 and angle > 0 and angle < 90
                    if (fx > 0 && angle > 0 && angle < 90) {
                        fxArrow.style.display = 'block';
                        fxArrow.setAttribute('x1', rightEdgeX);
                        fxArrow.setAttribute('y1', rightEdgeY);
                        fxArrow.setAttribute('x2', rightEdgeX + fx * scale);
                        fxArrow.setAttribute('y2', rightEdgeY);
                        
                        let fxLabelX = rightEdgeX + fx * scale + 35;
                        let fxLabelY = rightEdgeY - 5 + 20; // เดิม
                        if (window.innerWidth <= 1023){ fxLabelX += 15; fxLabelY += 10; } // มือถือ: ขวา 15px, ลง 10px
                        this.fxLabel.setAttribute('x', fxLabelX);
                        this.fxLabel.setAttribute('y', fxLabelY);
// ลงเพิ่มอีก 10px ตามคำสั่งล่าสุด
                        this.fxLabel.textContent = `Fx = ${fx.toFixed(1)} N`;
                        this.fxLabel.style.display = 'block';
                        this.fxValueLabel.style.display = 'none';
                    } else {
                        fxArrow.style.display = 'none';
                        this.fxLabel.style.display = 'none';
                        this.fxValueLabel.style.display = 'none';
                    }
                    
                    // Fy component (vertical) - show if fy > 0 and angle < 90 (not purely vertical)
                    if (fy > 0 && angle < 90) {
                        fyArrow.style.display = 'block';
                        fyArrow.setAttribute('x1', rightEdgeX);
                        fyArrow.setAttribute('y1', rightEdgeY);
                        fyArrow.setAttribute('x2', rightEdgeX);
                        fyArrow.setAttribute('y2', rightEdgeY - fy * scale);
                        
                        this.fyLabel.setAttribute('x', rightEdgeX + 10 - 20); // ซ้าย 20px ตามคำสั่ง
                        this.fyLabel.setAttribute('y', rightEdgeY - fy * scale - 5);
                        this.fyLabel.textContent = `Fy = ${fy.toFixed(1)} N`;
                        this.fyLabel.style.display = 'block';
                        this.fyValueLabel.style.display = 'none';
                    } else {
                        fyArrow.style.display = 'none';
                        this.fyLabel.style.display = 'none';
                        this.fyValueLabel.style.display = 'none';
                    }
                } else {
                    components.style.display = 'none';
                }
                
                // Weight vector
                const weightArrow = document.querySelector('#weight line');
                const weightStartY = boxCenterY;
                weightArrow.setAttribute('x1', boxCenterX);
                weightArrow.setAttribute('y1', weightStartY);
                weightArrow.setAttribute('x2', boxCenterX);
                weightArrow.setAttribute('y2', weightStartY + Math.min(weight * 0.8, 40));
                
                // Update weight label (one-line)
                this.weightLabel.setAttribute('x', boxCenterX);
