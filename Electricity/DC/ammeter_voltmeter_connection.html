<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>แอนนิเมชันต่อวงจรไฟฟ้าอย่างง่าย</title>
  <style>
    :root{ --bg-grad:linear-gradient(135deg,#ffffff 0%,#f5f7fb 70%); --panel:#ffffff; --outline:#d4d8e1; --text:#0f172a; --muted:#475569; --accent:#2563eb; --good:#16a34a; --warn:#f59e0b; }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg-grad);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Noto Sans Thai",sans-serif}
    .wrap{max-width:1100px;margin:24px auto;padding:16px;display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start}
    .panel{background:var(--panel);border:1px solid var(--outline);border-radius:16px;padding:14px}
    .field{margin:10px 0}
    .field label{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--muted);gap:8px}
    input[type="range"], select{width:100%}
    .btn{background:#f8fafc;border:1px solid var(--outline);border-radius:12px;padding:6px 10px;cursor:pointer;margin:4px 0}
    .btn.active{outline:2px solid var(--accent)}
    .board{position:relative;min-height:640px;background:#fff;border:1px solid var(--outline);border-radius:16px}
    svg{width:100%;height:640px}
    /* glow ของหลอด */
    .bulb-glow{position:absolute;width:220px;height:220px;border-radius:50%;pointer-events:none;mix-blend-mode:multiply;opacity:.0;transition:opacity .25s ease;background:radial-gradient(circle at 50% 50%, rgba(255,252,190,1) 0%, rgba(255,210,60,0.95) 35%, rgba(255,170,20,0.6) 60%, rgba(255,170,20,0) 80%);}  
    .glow-weak{opacity:.45} .glow-mid{opacity:.75} .glow-strong{opacity:1}
    /* คำอธิบายจุดสี */
    .legend{position:absolute;left:16px;bottom:10px;background:#fff;border:1px solid var(--outline);border-radius:12px;padding:6px 10px;display:flex;gap:14px;align-items:center}
    .legend .i,.legend .e{display:none} .legend.show-i .i{display:flex} .legend.show-e .e{display:flex}
    .dot{width:10px;height:10px;border-radius:50%} .dot.i{background:#2563eb} .dot.e{background:#f59e0b}
    /* แผงแสดงผล */
    .readouts{margin-top:8px;border-top:1px dashed var(--outline);padding-top:8px;display:grid;grid-template-columns:1fr auto;row-gap:6px;column-gap:10px}
    .readouts .k{color:var(--muted);font-size:14px}
    .readouts .v{min-width:110px;text-align:right;font-variant-numeric:tabular-nums;background:#f8fafc;border:1px solid var(--outline);border-radius:10px;padding:2px 8px}
    /* แผงสอนคำนวณ */
    .calc{display:none;margin-top:12px;grid-column:1 / -1}
    .calc.show{display:block}
    .calc .line{background:#f8fafc;border:1px solid var(--outline);border-radius:10px;padding:12px 14px;margin:6px 0;line-height:1.6}
    .teach .sec{margin:8px 0 14px}
    .teach .h{font-weight:700;margin-bottom:4px}
    .teach .f,.teach .s,.teach .a{display:block;margin-left:10px}
    .teach code{background:#f1f5f9;border:1px solid var(--outline);border-radius:6px;padding:0 6px}
  </style>
</head>
<body>
<div class="wrap">
  <!-- Control Panel -->
  <div class="panel">
    <div class="field"><label>R (Ω)<span id="Rval">10.0 Ω</span></label><input id="R" type="range" min="0" max="100" step="0.1" value="10"></div>
    <div class="field"><label>E (V)<span id="Eval">6.0 V</span></label><input id="E" type="range" min="0" max="24" step="0.1" value="6"></div>
    <div class="field"><label>r (Ω)<span id="rval">1.0 Ω</span></label><input id="r" type="range" min="0" max="20" step="0.1" value="1"></div>
    <div class="field"><label>t (s)<span id="Tval">10.0 s</span></label><input id="T" type="range" min="0" max="120" step="0.1" value="10"></div>
    <button class="btn" id="switchBtn">🔌 สวิตซ์: <b>ปิด</b></button>
    <button class="btn" id="flowBtn">ทิศทาง: <b>กระแสไฟฟ้า</b></button>
    <button class="btn" id="vmBtn">โวลต์มิเตอร์</button>
    <button class="btn" id="amBtn">แอมมิเตอร์</button>
    <div class="field">
      <label>โหมดหน่วย
        <span style="flex:1"></span>
      </label>
      <select id="unitSelect">
        <option value="std">มาตรฐาน (A,V,W,J,s)</option>
        <option value="milli">มิลลิ (mA,mW,mJ)</option>
        <option value="time">เวลา (นาที, kJ)</option>
      </select>
    </div>
    <button class="btn" id="detailBtn">แสดงวิธีการคำนวณ</button>
    <div class="readouts">
      <div class="k">กระแส I</div><div class="v" id="Ival">0.0 A</div>
      <div class="k">แรงดันคร่อมหลอด</div><div class="v" id="Vval">0.0 V</div>
      <div class="k">แรงดันคร่อมขั้วเซล</div><div class="v" id="VtermVal">0.0 V</div>
      <div class="k">กำลังที่หลอด</div><div class="v" id="Pval">0.0 W</div>
      <div class="k">พลังงานที่หลอดในเวลา t</div><div class="v" id="Wval">0.0 J</div>
    </div>
  </div>

  <!-- Circuit Board (ขวาบน) -->
  <div class="board">
    <div class="bulb-glow" id="bulbGlow" style="left:calc(50% - 110px);top:-10px;"></div>
    <svg viewBox="0 0 900 640">
      <!-- ลวดหลักบน/ขวา/ล่าง (เว้นซ้ายสำหรับสวิตซ์ให้เป็นช่องว่างได้) -->
      <polyline points="150,100 750,100" stroke="#000" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="750,100 750,380" stroke="#000" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="750,380 540,380" stroke="#000" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
      <polyline points="360,380 150,380" stroke="#000" stroke-width="8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

      <!-- หลอดไฟกึ่งกลางด้านบน -->
      <g id="lamp" transform="translate(450,100)">
        <line x1="-50" y1="0" x2="-38" y2="0" stroke="#4b5563" stroke-width="6"/>
        <line x1="38" y1="0" x2="50" y2="0" stroke="#4b5563" stroke-width="6"/>
        <circle cx="0" cy="0" r="35" fill="#fff" stroke="#475569" stroke-width="3"/>
        <text id="lampLabel" x="-70" y="-46">หลอดไฟ R=<tspan id="lampR">10.0</tspan>Ω</text>
      </g>

      <!-- สวิตซ์ด้านซ้าย: ลวดดำสองท่อน + ใบมีดสีส้ม -->
      <g id="switch" style="cursor:pointer">
        <line x1="150" y1="100" x2="150" y2="190" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <line x1="150" y1="290" x2="150" y2="380" stroke="#000" stroke-width="8" stroke-linecap="round"/>
        <line id="switchBlade" x1="150" y1="190" x2="172" y2="238" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
        <text x="160" y="178" font-size="14" fill="#334155">สวิตซ์</text>
      </g>

      <!-- แบตเตอรี่: กรอบเส้นปะสีเทาอ่อน + ขั้วยาว/สั้น (มีช่องว่างขาวระหว่างกลาง) -->
      <g id="battery" transform="translate(450,380)">
        <rect x="-90" y="-42" width="180" height="84" rx="12" fill="#f3f4f6" stroke="#4b5563" stroke-dasharray="6 6" stroke-width="2"/>
        <line x1="-18" y1="-28" x2="-18" y2="28" stroke="#111827" stroke-width="6"/>
        <line x1="18" y1="-16" x2="18" y2="16" stroke="#111827" stroke-width="6"/>
        <text x="-50" y="-34" fill="#16a34a" font-size="30" font-weight="800">+</text>
        <text x="14" y="-34" fill="#ef4444" font-size="30" font-weight="800">−</text>
        <text x="-38" y="62" fill="#334155" font-size="14">แบตเตอรี่</text>
        <text id="Elabel" x="-84" y="82" fill="#0f172a" font-size="13">E = 6.0 V</text>
        <text id="rlabel" x="20" y="82" fill="#0f172a" font-size="13">r = 1.0 Ω</text>
      </g>

      <!-- โวลต์มิเตอร์: สายฟ้าบาง + วงกลม V พื้นขาวทับเส้นล่าง -->
      <g id="vm" visibility="hidden">
        <polyline points="412,110 412,200 488,200 488,110" stroke="#2563eb" stroke-width="3" fill="none" stroke-linejoin="round"/>
        <circle cx="450" cy="200" r="26" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
        <text x="441" y="206" fill="#2563eb">V</text>
        <text id="vmRead" x="520" y="206" fill="#0f172a">0.0 V</text>
      </g>

      <!-- แอมมิเตอร์ -->
      <g id="am" visibility="hidden">
        <circle cx="300" cy="100" r="24" fill="#fff" stroke="#16a34a" stroke-width="2"/>
        <text x="292" y="105" fill="#16a34a">A</text>
        <text id="amRead" x="244" y="88">0.0 A</text>
      </g>

      <!-- ป้ายทิศทาง -->
      <text id="labelI" x="130" y="88" fill="#2563eb">กระแสไฟฟ้า</text>
      <text id="labelE" x="170" y="398" fill="#f59e0b" visibility="hidden">กระแสอิเล็กตรอน</text>

      <!-- เม็ดกระแส -->
      <g id="charges"></g>
    </svg>
    <div class="legend" id="legend">
      <div class="i"><span class="dot i"></span><span>กระแสไฟฟ้า</span></div>
      <div class="e"><span class="dot e"></span><span>กระแสอิเล็กตรอน</span></div>
    </div>
  </div>

  <!-- แสดงวิธีการคำนวณ -->
  <div class="panel calc" id="detailPanel">
    <div class="line" id="detailBody">(กดปุ่ม "แสดงวิธีการคำนวณ" เพื่อแสดง/ซ่อน และดูวิธีคิดเป็นขั้นตอน)</div>
  </div>
</div>
<script>
// ===== ช่วยเลือก element =====
const $=id=>document.getElementById(id);
const els={
  R:$("R"),E:$("E"),r:$("r"),T:$("T"), unitSelect:$("unitSelect"),
  Rval:$("Rval"),Eval:$("Eval"),rval:$("rval"),Tval:$("Tval"), lampR:$("lampR"),
  switchBtn:$("switchBtn"),flowBtn:$("flowBtn"), vmBtn:$("vmBtn"),amBtn:$("amBtn"),
  vm:$("vm"),am:$("am"), vmRead:$("vmRead"),amRead:$("amRead"),
  bulbGlow:$("bulbGlow"), labelI:$("labelI"),labelE:$("labelE"),legend:$("legend"),
  charges:$("charges"), switchBlade:$("switchBlade"), switchGrp:$("switch"),
  Ival:$("Ival"),Vval:$("Vval"),Pval:$("Pval"),VtermVal:$("VtermVal"),Wval:$("Wval"),
  detailBtn:$("detailBtn"),detailPanel:$("detailPanel"),detailBody:$("detailBody"),
  Elabel:$("Elabel"),rlabel:$("rlabel")
};

// ===== state =====
let isClosed=false;           // เริ่ม: วงจรขาด
let electronFlow=false;       // โหมดทิศทาง (false=กระแสไฟฟ้า, true=อิเล็กตรอน)
let showVM=false, showAM=false, showDetail=false;
let unitMode='std';           // 'std' | 'milli' | 'time'

// ===== utils =====
const fmt1 = x => (Math.abs(x)<1e-6?0:x).toFixed(1);
function fmtUnit(val, unit){
  if(unitMode==='milli'){
    if(unit==='A') return (val*1000).toFixed(1)+' mA';
    if(unit==='W') return (val*1000).toFixed(1)+' mW';
    if(unit==='J') return (val*1000).toFixed(1)+' mJ';
    if(unit==='s') return val.toFixed(1)+' s';
  }
  if(unitMode==='time'){
    if(unit==='s') return (val/60).toFixed(1)+' min';
    if(unit==='J') return (val/1000).toFixed(1)+' kJ';
    if(unit==='A') return val.toFixed(1)+' A';
    if(unit==='W') return val.toFixed(1)+' W';
  }
  return val.toFixed(1)+' '+unit;
}

function updateLabels(){
  els.Rval.textContent = fmt1(+els.R.value)+' Ω';
  els.Eval.textContent = fmt1(+els.E.value)+' V';
  els.rval.textContent = fmt1(+els.r.value)+' Ω';
  els.Tval.textContent = fmtUnit(+els.T.value,'s');
  els.lampR.textContent = fmt1(+els.R.value);
  els.Elabel.textContent = 'E = '+fmt1(+els.E.value)+' V';
  els.rlabel.textContent = 'r = '+fmt1(+els.r.value)+' Ω';
}

function calc(){
  const R=+els.R.value, E=+els.E.value, r=+els.r.value, t=+els.T.value;
  let I=0, VR=0, P=0, Vterm=E, W=0;
  if(isClosed && R+r>0){ I=E/(R+r); VR=I*R; P=I*I*R; Vterm=E - I*r; W=P*t; }
  els.vmRead.textContent = fmt1(VR)+' V';
  els.amRead.textContent = fmtUnit(I,'A');
  els.Ival.textContent = fmtUnit(I,'A');
  els.Vval.textContent = fmt1(VR)+' V';
  els.VtermVal.textContent = fmt1(Vterm)+' V';
  els.Pval.textContent = fmtUnit(P,'W');
  els.Wval.textContent = fmtUnit(W,'J');

  // ความสว่างหลอด
  const glow=els.bulbGlow; const level=Math.min(1,P/4);
  glow.classList.remove('glow-weak','glow-mid','glow-strong');
  if(level>0.66) glow.classList.add('glow-strong');
  else if(level>0.33) glow.classList.add('glow-mid');
  else if(level>0.05) glow.classList.add('glow-weak');

  // สอนคำนวณแบบละเอียด
  if(showDetail){
    const teach = `
      <div class="teach">
        <div class="sec">
          <div class="h">1) กระแสไฟฟ้า I</div>
          <span class="f">สูตร: <code>I = E / (R + r)</code></span>
          <span class="s">แทนค่า: <code>I = ${fmt1(E)} / (${fmt1(R)} + ${fmt1(r)})</code></span>
          <span class="a">ตอบ: <b>${fmtUnit(I,'A')}</b></span>
        </div>
        <div class="sec">
          <div class="h">2) ความต่างศักย์ตกคร่อมหลอด V_R</div>
          <span class="f">สูตร: <code>V_R = I · R</code></span>
          <span class="s">แทนค่า: <code>V_R = ${fmt1(I)} · ${fmt1(R)}</code></span>
          <span class="a">ตอบ: <b>${fmt1(VR)} V</b></span>
        </div>
        <div class="sec">
          <div class="h">3) ความต่างศักย์คร่อมขั้วเซลล์ V_term</div>
          <span class="f">สูตร: <code>V_term = E − I · r</code></span>
          <span class="s">แทนค่า: <code>V_term = ${fmt1(E)} − ${fmt1(I)} · ${fmt1(r)}</code></span>
          <span class="a">ตอบ: <b>${fmt1(Vterm)} V</b></span>
        </div>
        <div class="sec">
          <div class="h">4) กำลังไฟฟ้าสูญเสียในหลอด P_R</div>
          <span class="f">สูตร: <code>P_R = I² · R</code></span>
          <span class="s">แทนค่า: <code>P_R = ${fmt1(I)}² · ${fmt1(R)}</code></span>
          <span class="a">ตอบ: <b>${fmtUnit(P,'W')}</b></span>
        </div>
        <div class="sec">
          <div class="h">5) พลังงานในช่วงเวลา t</div>
          <span class="f">สูตร: <code>W_R = P_R · t</code></span>
          <span class="s">แทนค่า: <code>W_R = ${fmtUnit(P,'W')} · ${els.Tval.textContent}</code></span>
          <span class="a">ตอบ: <b>${fmtUnit(W,'J')}</b></span>
        </div>
      </div>`;
    els.detailBody.innerHTML = teach;
  }
  return I;
}

function renderSwitch(){
  if(isClosed){
    els.switchBtn.innerHTML='🔌 สวิตซ์: <b>เปิด</b>';
    els.switchBtn.classList.add('active');
    els.switchBlade.setAttribute('x1','150'); els.switchBlade.setAttribute('y1','190');
    els.switchBlade.setAttribute('x2','150'); els.switchBlade.setAttribute('y2','290');
  }else{
    els.switchBtn.innerHTML='🔌 สวิตซ์: <b>ปิด</b>';
    els.switchBtn.classList.remove('active');
    els.switchBlade.setAttribute('x1','150'); els.switchBlade.setAttribute('y1','190');
    els.switchBlade.setAttribute('x2','172'); els.switchBlade.setAttribute('y2','238');
  }
}
function renderFlow(){
  if(electronFlow){
    els.flowBtn.innerHTML='ทิศทาง: <b>กระแสอิเล็กตรอน</b>';
    els.labelI.setAttribute('visibility','hidden');
    els.labelE.setAttribute('visibility','visible');
    els.legend.classList.remove('show-i'); els.legend.classList.add('show-e');
  }else{
    els.flowBtn.innerHTML='ทิศทาง: <b>กระแสไฟฟ้า</b>';
    els.labelI.setAttribute('visibility','visible');
    els.labelE.setAttribute('visibility','hidden');
    els.legend.classList.remove('show-e'); els.legend.classList.add('show-i');
  }
}
function renderMeters(){
  els.vm.setAttribute('visibility', showVM ? 'visible' : 'hidden');
  els.am.setAttribute('visibility', showAM ? 'visible' : 'hidden');
  els.vmBtn.classList.toggle('active', showVM);
  els.amBtn.classList.toggle('active', showAM);
}

// ===== เส้นทางรอบลูป
const loopPath=[{x:150,y:380},{x:150,y:100},{x:750,y:100},{x:750,y:380},{x:150,y:380}];
const segLens=[]; let totalLen=0;
const segLen=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
function prepPath(){ segLens.length=0; totalLen=0; for(let i=0;i<loopPath.length-1;i++){const L=segLen(loopPath[i],loopPath[i+1]); segLens.push(L); totalLen+=L;} }
function pointAt(s){ for(let i=0;i<segLens.length;i++){ if(s<=segLens[i]){ const a=loopPath[i], b=loopPath[i+1]; const u= segLens[i]===0?0: s/segLens[i]; return {x:a.x+(b.x-a.x)*u, y:a.y+(b.y-a.y)*u}; } s-=segLens[i]; } return {x:loopPath[0].x,y:loopPath[0].y}; }

// ===== เม็ดกระแส
const N=28; const dots=[];
function createCharges(){ els.charges.innerHTML=''; dots.length=0; for(let i=0;i<N;i++){ const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('r','4'); c.setAttribute('fill','#2563eb'); els.charges.appendChild(c); dots.push({el:c, t:i/N}); } }

// ===== แอนิเมชันหลัก
let last=performance.now();
function animate(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  const I=calc();
  let speed = isClosed ? Math.min(260, 60 + Math.abs(I)*260) : 0; // px/s
  if(electronFlow) speed*=-1; // ทวนทิศทางเมื่อแสดงอิเล็กตรอน
  for(const d of dots){
    d.t=(d.t+(speed*dt)/totalLen)%1; if(d.t<0) d.t+=1;
    const s=d.t*totalLen; const p=pointAt(s);
    d.el.setAttribute('cx',p.x); d.el.setAttribute('cy',p.y);
    d.el.setAttribute('fill', electronFlow? '#f59e0b' : '#2563eb');
    d.el.setAttribute('opacity', isClosed? 0.95 : 0.15);
  }
  requestAnimationFrame(animate);
}

// ===== events =====
[els.R,els.E,els.r,els.T].forEach(inp=> inp.addEventListener('input', ()=>{updateLabels(); calc();}));
els.switchBtn.addEventListener('click',()=>{ isClosed=!isClosed; renderSwitch(); calc(); });
els.switchGrp.addEventListener('click',()=>{ isClosed=!isClosed; renderSwitch(); calc(); });
els.flowBtn.addEventListener('click',()=>{ electronFlow=!electronFlow; renderFlow(); });
els.vmBtn.addEventListener('click',()=>{ showVM=!showVM; renderMeters(); });
els.amBtn.addEventListener('click',()=>{ showAM=!showAM; renderMeters(); });
els.unitSelect.addEventListener('change',()=>{ unitMode = els.unitSelect.value; updateLabels(); calc(); });
els.detailBtn.addEventListener('click',()=>{ showDetail=!showDetail; els.detailPanel.classList.toggle('show', showDetail); calc(); if(showDetail){ els.detailPanel.scrollIntoView({behavior:'smooth', block:'start'});} });

// ===== init =====
updateLabels(); renderSwitch(); renderFlow(); renderMeters();
prepPath(); createCharges(); calc(); requestAnimationFrame(animate);
</script>
</body>
</html>
