<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>วงจรไฟฟ้า: กระแส vs อิเล็กตรอน</title>
<!-- Lite version: removed สูตรสำคัญ / แบบฝึกหัด and embedded base64 images to reduce file size; lab + mission retained. -->
<style>
  :root{
    --bg-page:#f8fafc;
    --wireStroke:#000000;
    --batteryBody:#1d4ed8;
    --batteryTop:#cfcfcf;
    --bulbBorder:#000000;
    --bulbGlassOff:#ffffff;

    --zoomFrame:#000000;
    --wireInside:#9ca3af;
    --wireEdge:#4b5563;
    --dashLine:#ffffffaa;

    --electronFill:#f97316;
    --electronStroke:#7c2d12;

    --plusFill:#38bdf8;
    --plusStroke:#075985;

    --panelBg:#1e293b;
    --panelText:#f8fafc;
    --btnOn:#10b981;
    --btnOff:#ef4444;
    --btnMode:#3b82f6;
    --btnInfo:#fdba74; /* ส้มอ่อน */

    --electronColorCircuit:#f97316;
    --currentColorCircuit:#38bdf8;

    --arrowBlue:#1e3a8a;
  }

  body{
    margin:0;
    padding:16px;
    background:var(--bg-page);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans Thai",sans-serif;
    color:#0f172a;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }

  .layout{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    max-width:1000px;
    width:100%;
  }

  /* จอคอม: ให้วงจรอยู่ซ้าย แผงควบคุมไปขวา */
  @media(min-width:800px){
    .layout{
      flex-direction:row;
      align-items:flex-start;
      justify-content:center;
    }
    .sceneWrap{   order:1; }
    .controlCard{ order:2; }
  }

  @media(max-width:799px){
    .sceneWrap{   order:1; gap:8px; }
    .controlCard{ order:2; }
    .layout{ gap:15px; max-width:100%; width:100%; }
  }

  .controlCard{
    background:var(--panelBg);
    color:var(--panelText);
    border-radius:12px;
    padding:16px 20px;
    min-width:260px;
    box-shadow:0 12px 24px #0002;
    font-size:14px;
  }
  .row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-top:15px;
    flex-wrap:wrap;
  }
  button{
    appearance:none;
    border:0;
    border-radius:10px;
    padding:8px 12px;
    font-size:15px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    line-height:1.2;
  }
  #toggleBtn{ min-width:80px; }
  #modeBtn{
    background:var(--btnMode);
    min-width:140px;
  }
  #infoBtn{
    background:var(--btnInfo);
    color:#000;
    font-weight:600;
  }

  .statusGroup{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    width:100%;
  }
  .statusText{
    font-size:13px;
    font-weight:500;
    min-height:1.2em;
    text-align:right;
    width:100%;
  }

  .sliderRow{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:4px;
    width:100%;
    margin-top:15px;
    color:#fff;
    font-size:13px;
  }
  .sliderRow label{ font-weight:500; }
  .sliderRow input[type=range]{
    width:100%;
    cursor:pointer;
  }
  .sliderValueText{
    font-size:12px;
    text-align:right;
    width:100%;
    color:#cbd5e1;
  }

  .sceneWrap{
    flex:1;
    max-width:700px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
  }

  .circuitTitle{
    font-size:18px;
    font-weight:700;
    text-align:center;
    margin-bottom:4px;
    color:#1e3a8a;
  }

  .circuitBox{
    width:100%;
    max-width:680px;
    position:relative;
  }

  .bulbGlow{
    position:absolute;
    width:100px;
    height:100px;
    left:calc(50% - 110px);
    top:-30px;
    border-radius:50%;
    pointer-events:none;
    mix-blend-mode:screen;
    filter:blur(35px);
    opacity:0;
    box-shadow:0 0 70px 35px #fff200;
    background:#fff200;
    transform:scale(0.5);
    transform-origin:center;
    transition:opacity 0.08s linear, transform 0.08s linear;
  }

  .zoomFrame{
    background:var(--zoomFrame);
    border-radius:16px;
    box-shadow:0 20px 40px #0006;
    padding:24px;
    width:70%;
    max-width:700px;
    margin:0 auto;
    position:relative;
    color:#fff;
  }
  .zoomTitle{
    font-size:15px;
    font-weight:600;
    margin-bottom:8px;
    color:#e5e7eb;
    text-align:left;
  }
  .zoomWireBox{
    background:var(--wireInside);
    border-radius:8px;
    border:2px solid var(--wireEdge);
    box-shadow:inset 0 0 10px #0007;
    width:100%;
    height:200px;
    position:relative;
    overflow:hidden;
  }
  .dashMid{
    position:absolute;
    left:50%;
    top:10%;
    bottom:10%;
    border-left:2px dashed var(--dashLine);
    pointer-events:none;
  }
  .zoomCaption{
    font-size:14px;
    text-align:center;
    margin-top:12px;
    line-height:1.4;
    color:#fff;
  }

  .electron{
    position:absolute;
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--electronFill);
    border:2px solid var(--electronStroke);
    color:#000;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    user-select:none;
    pointer-events:none;
    box-shadow:0 0 6px var(--electronFill);
  }

  .plusCharge{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--plusFill);
    border:2px solid var(--plusStroke);
    color:#000;
    font-size:12px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    line-height:1;
    user-select:none;
    pointer-events:none;
    box-shadow:0 0 6px var(--plusFill);
  }

  .footerNote{
    font-size:13px;
    color:#475569;
    text-align:center;
    margin-top:4px;
  }
  .footerNote a{
    color:#1e3a8a;
    font-weight:600;
    text-decoration:underline;
  }

  .overlayBg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:stretch;
    justify-content:center;
    padding:0;
    z-index:9999;
  }
    .overlayCard{
    background:#e2e8f0; /* เทาอมฟ้า */
    border:2px solid #fb923c; /* กรอบส้ม */
    border-radius:16px;
    width:min(920px, 100%);
    height:100%;
    max-width:920px;
    color:#0f172a;
    box-shadow:0 30px 60px #0009;
    position:relative;
    padding:20px 20px 180px; /* เว้นล่างอย่างน้อย 120px + safe-area */
    font-size:14px;
    line-height:1.6;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
  }
  .overlayHeader{
    font-weight:900;
    font-size:16px;
    color:#1e3a8a;
    margin-bottom:12px;
  }
  .overlaySection{ margin-bottom:10px; }
  .overlaySectionTitle{
    font-weight:900;
    color:#1e3a8a;
    margin-bottom:6px;
    font-size:14px;
  }
  .closeBtn{
    position:absolute;
    top:8px;
    right:8px;
    background:#ef4444;
    border:0;
    border-radius:8px;
    color:#fff;
    font-size:13px;
    font-weight:600;
    padding:4px 8px;
    cursor:pointer;
    line-height:1.2;
  }

  #blueArrow{
    transform-box:fill-box;
    transform-origin:center;
    transform:scale(1.5);
  }

  @media(max-width:800px){
    .electron{
      width:11px;
      height:11px;
      border-width:1.5px;
      font-size:11px;
    }
    .plusCharge{
      width:13px;
      height:13px;
      border-width:1.5px;
      font-size:12px;
    }
    .zoomWireBox{
      height:120px;
    }
  }

  .controlCol{
    display:flex;
    flex-direction:column;
    gap:12px;
    min-width:260px;
  }

  .btnResetInline{
    background:#9ca3af; /* เทา */
    color:#111827;
    font-weight:800;
    border:1px solid #6b7280;
  }

  .btnMissionInline{
    background:#ffffff; /* ขาว */
    color:#111827;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
    border:1px solid #f9a8d4;
  }

  .btnMission{
    background:#ffffff; /* ขาว */
    color:#111827;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
    border:1px solid #f9a8d4;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
  }

  .missionIcon{
    display:inline-flex;
    align-items:center;
    justify-content:center;
  }

  .missionCard{
    background:#0b1220;
    color:#f8fafc;
    border:1px solid #334155;
    border-radius:12px;
    padding:12px 12px 14px;
    box-shadow:0 12px 24px #0003;
    font-size:14px;
  }

  .missionRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }

  .missionCloseTop{
    background:#ef4444;
    color:#fff;
    border:0;
    border-radius:10px;
    padding:8px 12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
  }

  .missionBody{
    margin-top:10px;
    border-top:1px solid #334155;
    padding-top:10px;
  }

  .missionStep{
    font-size:13px;
    font-weight:800;
    color:#e2e8f0;
    margin-bottom:6px;
  }

  .missionTask{
    font-size:14px;
    font-weight:600;
    margin-bottom:8px;
    color:#f1f5f9;
  }

  .missionQ{
    font-size:14px;
    margin-bottom:10px;
    color:#f8fafc;
  }

  .missionChoices{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
  }

  .choiceBtn{
    background:#111827;
    color:#f8fafc;
    border:1px solid #334155;
    border-radius:10px;
    padding:10px 12px;
    text-align:left;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
  }
  .choiceBtn:hover{ filter:brightness(1.08); }

  .missionFeedback{
    min-height:1.4em;
    font-size:13px;
    font-weight:700;
    margin:6px 0 10px;
  }
  .missionFeedback.good{ color:#22c55e; }
  .missionFeedback.bad{ color:#f87171; }

  .missionHintWrap{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:12px;
  }
  .missionHintBtn{
    background:#9ca3af;
    color:#111827;
    border:0;
    border-radius:10px;
    padding:8px 12px;
    font-size:14px;
    font-weight:800;
    cursor:pointer;
    width:max-content;
  }
  .missionHintText{
    background:#0f172a;
    border:1px dashed #64748b;
    border-radius:10px;
    padding:10px 12px;
    color:#e5e7eb;
    line-height:1.5;
    font-size:13px;
  }

  .missionActions{
    display:flex;
    justify-content:flex-end;
  }
  .missionNextBtn{
    background:#bbf7d0; /* เขียวอ่อน */
    color:#14532d;
    border:1px solid #86efac;
    border-radius:10px;
    padding:10px 12px;
    font-size:14px;
    font-weight:900;
    cursor:pointer;
  }


  /* แบบฝึกหัด (ปุ่มสีเขียวอ่อน) */
  .btnQuizInline{
    background:#bbf7d0;
    color:#14532d;
    font-weight:900;
    border:1px solid #86efac;
    display:flex;
    align-items:center;
    gap:8px;
  }

  /* Overlay แบบฝึกหัด (มาตรฐานเพจ: โทนเขียวอ่อน + เว้นล่าง 120px) */
  .quizOverlayBg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:stretch;
    justify-content:center;
    padding:0;
    z-index:10000;
  }
  .quizOverlayCard{
    background:#f0fdf4;
    border:2px solid #86efac;
    border-radius:16px;
    width:min(980px, 100%);
    height:100%;
    max-width:980px;
    color:#0f172a;
    box-shadow:0 30px 60px #0009;
    position:relative;
    padding:18px 18px 160px; /* เว้นล่าง >=120px */
    overflow:auto;
    -webkit-overflow-scrolling:touch;
  }
  .quizHeader{
    font-weight:900;
    font-size:18px;
    color:#1e3a8a;
    margin:2px 0 12px;
  }
  .quizSub{
    color:#0f172a;
    background:#ffffff;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:10px 12px;
    line-height:1.5;
    margin-bottom:12px;
  }
  .quizQCard{
    background:#ffffff;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:12px 12px;
    margin:10px 0 12px;
  }
  .quizQTitle{
    font-weight:900;
    color:#1e3a8a;
    margin-bottom:8px;
  }
  .quizImg{
    width:100%;
    max-width:520px;
    height:auto;
    border-radius:12px;
    border:1px solid #e5e7eb;
    display:block;
    margin:8px 0 10px;
  }
  .choices{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:8px;
  }
  .choiceRow{
    display:flex;
    gap:10px;
    align-items:flex-start;
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:10px 10px;
    background:#f9fafb;
  }
  .choiceRow input{ margin-top:3px; }
  .choiceKey{ font-weight:900; min-width:22px; }
  .choiceText{
    flex:1;
    min-width:0;
    overflow-wrap:anywhere;
    word-break:break-word;
  }

  .quizFooterBar{
    position:fixed;
    left:0; right:0;
    bottom:0;
    padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    background:rgba(240,253,244,0.96);
    border-top:1px solid #bbf7d0;
    display:none;
    z-index:10001;
  }
  .quizFooterInner{
    max-width:980px;
    margin:0 auto;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
  }
  .checkBtn{
    background:#22c55e;
    color:#ffffff;
    border:0;
    border-radius:14px;
    padding:12px 14px;
    font-weight:900;
    cursor:pointer;
    min-width:160px;
  }
  .scoreBox{ font-weight:900; color:#0f172a; }

  .solutionWrap{
    margin-top:10px;
    display:none;
    background:#ffffff;
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:10px 12px;
  }
  .solTitle{ font-weight:900; color:#0f172a; margin-bottom:6px; }
  .solAns{ font-weight:900; color:#dc2626; margin-bottom:6px; }
  .solStep{
    line-height:1.55;
    overflow-wrap:anywhere;
    word-break:break-word;
  }
  .mathBlock{ overflow:auto; }

  /* มือถือ: ย้ายแผงควบคุม+ภารกิจ ลงใต้จอทดลอง และทำสวิตช์ให้กดง่ายขึ้น */
  @media (max-width: 820px){
    #mobileTopTitle{display:block;}
    .layout{ flex-direction:column; }
    .sceneWrap{ order:1; }
    .controlCol{ order:2; width:100%; min-width:0; }
    .controlCard, .missionCard{ width:100%; }

    #toggleBtn, .toggleBtn{
      min-height:48px;
      padding:12px 14px;
      touch-action:manipulation;
    }
  }


  /* ปุ่มปิด: ลอย fixed มุมขวาบน (สูตรสำคัญ + แบบฝึกหัด) */
  .overlayCard .closeBtn,
  .quizOverlayCard .closeBtn{
    position:fixed !important;
    top: calc(10px + env(safe-area-inset-top));
    right: 10px;
    z-index: 10050;
  }

</style>


</head>
<body>

<div class="layout">

  <div class="controlCol">
    <div class="controlCard">
    <div class="row">
      <div>สวิตช์วงจร</div>
      <button id="toggleBtn" style="background:var(--btnOff);">OFF</button>
    </div>

    <div class="row">
      <div>โหมดแสดง</div>
      <button id="modeBtn">โหมดอิเล็กตรอน</button>
    </div>

    <div class="sliderRow">
      <label for="densitySlider">
        ความหนาแน่นอิเล็กตรอนอิสระในสายไฟ
      </label>
      <input id="densitySlider" type="range" min="1" max="100" value="60"/>
      <div class="sliderValueText">
        หนาแน่นปานกลาง
      </div>
    </div>

    <div class="row statusGroup">
      <div class="statusText">
        หลอดไฟ: <span id="lampStatusText">ดับ</span>
      </div>
      <div class="statusText">
        สถานะในลวดตัวนำ: <span id="flowStatusText">สุ่มช้าๆ (ไม่มีทิศรวม)</span>
      </div>
    </div>

    
<div class="row" style="justify-content:flex-end;margin-top:16px; gap:10px;">
  <button id="resetBtn" class="btnResetInline" type="button">รีเซ็ต</button>

  <button id="missionOpenBtn" class="btnMissionInline" type="button">
    <span class="missionIcon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <circle cx="12" cy="12" r="9" fill="none" stroke="#ec4899" stroke-width="2"/>
        <circle cx="12" cy="12" r="5" fill="none" stroke="#ec4899" stroke-width="2"/>
        <circle cx="12" cy="12" r="1.6" fill="#ec4899"/>
      </svg>
    </span>
    ภารกิจ
  </button>
</div>

    </div>

    <div class="missionCard" id="missionCard" aria-live="polite">
      <div class="missionRow">
        <button id="missionBtn" class="btnMission" type="button" title="ภารกิจ">
          <span class="missionIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18">
              <circle cx="12" cy="12" r="9" fill="none" stroke="#ec4899" stroke-width="2"/>
              <circle cx="12" cy="12" r="5" fill="none" stroke="#ec4899" stroke-width="2"/>
              <circle cx="12" cy="12" r="1.6" fill="#ec4899"/>
            </svg>
          </span>
          ภารกิจ
        </button>
        <button id="missionCloseTop" class="missionCloseTop" type="button">ปิด</button>
      </div>

      <div id="missionBody" class="missionBody" style="display:none;">
        <div class="missionStep" id="missionStepText">ภารกิจที่ 1</div>
        <div class="missionTask" id="missionTaskText"></div>
        <div class="missionQ" id="missionQText"></div>

        <div class="missionChoices" id="missionChoices"></div>

        <div class="missionFeedback" id="missionFeedback"></div>

        <div class="missionHintWrap">
          <button id="missionHintBtn" class="missionHintBtn" type="button">Hint</button>
          <div id="missionHintText" class="missionHintText" style="display:none;"></div>
        </div>

        <div class="missionActions">
          <button id="missionNextBtn" class="missionNextBtn" type="button">ภารกิจถัดไป</button>
        </div>
      </div>
    </div>

  </div>

  <div class="sceneWrap">

    <div class="circuitTitle">กระแสไฟฟ้าที่ไหลผ่านตัวนำ</div>

    <div class="circuitBox">
      <svg id="circuitSVG" viewBox="0 0 700 300" style="width:100%;height:auto;">
        <path d="M120 90 H220"
              stroke="var(--wireStroke)" stroke-width="6" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M220 90 H300"
              stroke="var(--wireStroke)" stroke-width="6" fill="none"
              stroke-linecap="round"/>
        <path d="M300 90 H400"
              stroke="var(--wireStroke)" stroke-width="6" fill="none"
              stroke-linecap="round"/>
        <path d="M440 90 H520"
              stroke="var(--wireStroke)" stroke-width="6" fill="none"
              stroke-linecap="round"/>

        <path id="loopPath"
              d="M520 90 V230 H120 V90"
              stroke="var(--wireStroke)" stroke-width="6" fill="none"
              stroke-linecap="round" stroke-linejoin="round"/>

        <rect x="220" y="80" width="80" height="50" rx="6"
              fill="#6b6b6b" stroke="#000" stroke-width="3"/>
        <circle id="bulbGlass" cx="260" cy="60" r="40"
              fill="var(--bulbGlassOff)" stroke="var(--bulbBorder)" stroke-width="5"/>

        <line id="orangeSwitch"
              x1="400" y1="90" x2="440" y2="90"
              stroke="#f97316" stroke-width="8"
              stroke-linecap="round"
              style="transform-origin:400px 90px; cursor:pointer;" />

        <rect x="500" y="140" width="50" height="80" rx="4"
              fill="var(--batteryBody)" stroke="#000" stroke-width="3"/>
        <rect x="500" y="130" width="50" height="15" rx="2"
              fill="var(--batteryTop)" stroke="#000" stroke-width="2"/>
        <text x="525" y="140" text-anchor="middle"
              font-family="sans-serif" font-size="18" font-weight="700"
              fill="#ffffff">+</text>
        <text x="525" y="225" text-anchor="middle"
              font-family="sans-serif" font-size="18" font-weight="700"
              fill="#ffffff">−</text>

        <rect x="250" y="215" width="80" height="30"
              fill="none"
              stroke="#1e1e1e"
              stroke-width="2"
              stroke-dasharray="6,6"
              stroke-linecap="round"
              stroke-linejoin="round" />

        <path id="blueArrow"
              d="M280 255 L280 270 L270 270 L290 290 L310 270 L300 270 L300 255 Z"
              fill="var(--arrowBlue)" stroke="var(--arrowBlue)" stroke-width="2"
              stroke-linejoin="round" stroke-linecap="round"/>

        <text x="320" y="285"
              font-family="system-ui, -apple-system, 'Noto Sans Thai', sans-serif"
              font-size="16" font-weight="600"
              fill="var(--arrowBlue)">Zoom</text>

        <g id="circuitDotsGroup"></g>
      </svg>

      <div id="bulbGlow" class="bulbGlow"></div>
    </div>

    <div class="zoomFrame">
      <div class="zoomWireBox" id="wireBox">
        <div class="dashMid"></div>
      </div>
      <div class="zoomCaption">
        แบบจำลองการเคลื่อนที่ของอิเล็กตรอนอิสระในตัวนำไฟฟ้า
      </div>
    </div>

  </div>

</div>

<div class="footerNote">
  ศึกษาเพิ่มเติมที่
  <a href="https://www.facebook.com/resolvephysics/" target="_blank" rel="noopener noreferrer">
    เพจคลายปมฟิสิกส์
  </a>
</div>

<script>
(function(){
  const toggleBtn      = document.getElementById('toggleBtn');
  const modeBtn        = document.getElementById('modeBtn');
  const densitySlider  = document.getElementById('densitySlider');
  const sliderValueText= document.querySelector('.sliderValueText');

  const lampStatusText = document.getElementById('lampStatusText');
  const flowStatusText = document.getElementById('flowStatusText');
  const bulbGlass      = document.getElementById('bulbGlass');
  const bulbGlow       = document.getElementById('bulbGlow');
  const orangeSwitch   = document.getElementById('orangeSwitch');

  const wireBox        = document.getElementById('wireBox');
  const circuitDotsGroup = document.getElementById('circuitDotsGroup');


  // ===== ภารกิจ (แสดงใต้แผงควบคุม) =====
  const missionCard     = document.getElementById('missionCard');
  const missionBtn      = document.getElementById('missionBtn');
  const missionOpenBtn  = document.getElementById('missionOpenBtn');
  const resetBtn       = document.getElementById('resetBtn');
  const missionCloseTop = document.getElementById('missionCloseTop');
  const missionBody     = document.getElementById('missionBody');
  const missionStepText = document.getElementById('missionStepText');
  const missionTaskText = document.getElementById('missionTaskText');
  const missionQText    = document.getElementById('missionQText');
  const missionChoices  = document.getElementById('missionChoices');
  const missionFeedback = document.getElementById('missionFeedback');
  const missionHintBtn  = document.getElementById('missionHintBtn');
  const missionHintText = document.getElementById('missionHintText');
  const missionNextBtn  = document.getElementById('missionNextBtn');

  const missions = [
    {
      step: 1,
      task: "สับสวิตช์ ON แล้วสังเกตการเคลื่อนที่ในสายไฟ",
      q: "ประจุที่เคลื่อนที่ในสายไฟ (ตัวนำโลหะ) คือประจุอะไร?",
      choices: [
        {t:"A) ประจุบวก", ok:false},
        {t:"B) อิเล็กตรอน (ประจุลบ)", ok:true},
        {t:"C) โปรตอน", ok:false},
      ],
      hint: "ในโลหะ “ผู้พาประจุ” ที่เคลื่อนได้อิสระคืออิเล็กตรอน (−) ส่วนไอออนบวกอยู่ประจำตำแหน่งในโครงผลึก"
    },
    {
      step: 2,
      task: "ปรับสไลเดอร์ “ความหนาแน่นอิเล็กตรอนอิสระในสายไฟ” ให้มากขึ้น",
      q: "ถ้าความหนาแน่นอิเล็กตรอนอิสระมากขึ้น กระแสไฟฟ้าจะเป็นอย่างไร?",
      choices: [
        {t:"A) กระแสลดลง", ok:false},
        {t:"B) ไม่เปลี่ยน", ok:false},
        {t:"C) กระแสเพิ่มขึ้น", ok:true},
      ],
      hint: "เมื่อมีผู้พาประจุจำนวนมากขึ้น (n มากขึ้น) ปริมาณประจุที่ไหลผ่านหน้าตัดต่อเวลาเพิ่มขึ้น → กระแส I เพิ่มขึ้น"
    }
  ];

  let missionOpen = false;
  let missionIndex = 0;

  function openMission(){
    missionOpen = true;
    missionBody.style.display = "block";
    renderMission();
    missionCard.scrollIntoView({behavior:"smooth", block:"nearest"});
  }
  function closeMission(){
    missionOpen = false;
    missionBody.style.display = "none";
    missionFeedback.textContent = "";
    missionFeedback.className = "missionFeedback";
    missionHintText.style.display = "none";
  }
  function renderMission(){
    const m = missions[missionIndex];
    missionStepText.textContent = `ภารกิจที่ ${m.step}`;
    missionTaskText.textContent = m.task;
    missionQText.textContent = m.q;

    missionChoices.innerHTML = "";
    missionFeedback.textContent = "";
    missionFeedback.className = "missionFeedback";
    missionHintText.textContent = m.hint;
    missionHintText.style.display = "none";

    m.choices.forEach((c, idx)=>{
      const b = document.createElement("button");
      b.type = "button";
      b.className = "choiceBtn";
      b.textContent = c.t;
      b.addEventListener("click", ()=>{
        if(c.ok){
          missionFeedback.textContent = "ถูกต้อง ✅";
          missionFeedback.className = "missionFeedback good";
        }else{
          missionFeedback.textContent = "ยังไม่ถูก ลองใหม่หรือกด Hint ได้ครับ";
          missionFeedback.className = "missionFeedback bad";
        }
      });
      missionChoices.appendChild(b);
    });

    missionNextBtn.textContent = (missionIndex < missions.length-1) ? "ภารกิจถัดไป" : "จบภารกิจ";
  }

  missionBtn?.addEventListener("click", ()=> missionOpen ? closeMission() : openMission());
  missionOpenBtn?.addEventListener("click", ()=> missionOpen ? closeMission() : openMission());
  missionCloseTop?.addEventListener("click", closeMission);

  missionHintBtn?.addEventListener("click", ()=>{
    missionHintText.style.display = (missionHintText.style.display==="none") ? "block" : "none";
  });

  missionNextBtn?.addEventListener("click", ()=>{
    if(missionIndex < missions.length-1){
      missionIndex++;
      renderMission();
    }else{
      closeMission();
    }
  });

  let isOn = false;
  let modeElectron = true;
  let densityFactor = 0.6;

  function rand(min,max){ return min + Math.random()*(max-min); }

  /* ===== ประจุบวก: กระจายเป็น 3 โซน ซ้าย-กลาง-ขวา ให้ทั่วจอซูม ===== */
  let plusCharges = [];
  function initPlusCharges(){
    const TARGET_PLUS = 24;
    const rect = wireBox.getBoundingClientRect();
    const minDist = 26;
    plusCharges = [];
    [...wireBox.querySelectorAll('.plusCharge')].forEach(n=>n.remove());

    const colW = rect.width / 3;
    let tries = 0;

    for(let i=0;i<TARGET_PLUS;i++){
      const col = i % 3; // 0=ซ้าย 1=กลาง 2=ขวา
      let placed = false;

      while(!placed && tries < 5000){
        tries++;
        const xMin = col * colW + 20;
        const xMax = (col+1) * colW - 40;
        const x = rand(xMin, xMax);
        const y = rand(20, rect.height - 40);

        let ok = true;
        for(const p of plusCharges){
          const dx = p.x - x;
          const dy = p.y - y;
          if(dx*dx + dy*dy < minDist*minDist){
            ok = false;
            break;
          }
        }

        if(ok){
          const el = document.createElement('div');
          el.className = 'plusCharge';
          el.textContent = '+';
          wireBox.appendChild(el);
          plusCharges.push({el,x,y});
          el.style.left = x + 'px';
          el.style.top  = y + 'px';
          placed = true;
        }
      }
      if(tries>=5000) break;
    }
  }

  /* ===== อิเล็กตรอนในกล่องซูม ===== */
  let electrons = [];
  function getBounds(){
    const r = wireBox.getBoundingClientRect();
    return {
      left:8, top:8,
      right:r.width-8,
      bottom:r.height-8,
      w:r.width-16,
      h:r.height-16
    };
  }

  function rebuildElectrons(){
    const targetCount = Math.max(4, Math.round(30 * densityFactor));
    electrons.forEach(e => e.el.remove());
    electrons = [];

    const b = getBounds();
    for(let i=0;i<targetCount;i++){
      const el = document.createElement('div');
      el.className = 'electron';
      el.textContent = '−';
      wireBox.appendChild(el);

      electrons.push({
        el,
        x:rand(b.left+10, b.right-30),
        y:rand(b.top+10,  b.bottom-30),
        vx:rand(-20,20),
        vy:rand(-20,20),
        speedLeft: 60+Math.random()*25
      });

      el.style.left = electrons[i].x+'px';
      el.style.top  = electrons[i].y+'px';
    }
  }

  function repelElectrons(dt){
    const repelStrength = 100;
    const minDist = 20;
    for(let i=0;i<electrons.length;i++){
      for(let j=i+1;j<electrons.length;j++){
        const a=electrons[i], b=electrons[j];
        const dx=a.x-b.x, dy=a.y-b.y;
        const dist2=dx*dx+dy*dy;
        if(dist2 < minDist*minDist && dist2>0){
          const dist=Math.sqrt(dist2);
          const ux=dx/dist, uy=dy/dist;
          const push = repelStrength*dt;
          a.vx += ux*push; a.vy += uy*push;
          b.vx -= ux*push; b.vy -= uy*push;
        }
      }
    }
  }

  let segmentsCW = [], segmentsCCW = [];
  function buildCircuitPaths(){
    const ptsCW = [
      {x:520,y:230},{x:120,y:230},
      {x:120,y:90},
      {x:300,y:90},
      {x:440,y:90},
      {x:520,y:90},
      {x:520,y:230}
    ];
    segmentsCW = [];
    for(let i=0;i<ptsCW.length-1;i++){
      const a=ptsCW[i], b=ptsCW[i+1];
      const dx=b.x-a.x, dy=b.y-a.y;
      const len=Math.hypot(dx,dy);
      segmentsCW.push({x1:a.x,y1:a.y,x2:b.x,y2:b.y,len});
    }

    const ptsCCW = [
      {x:520,y:90},{x:440,y:90},
      {x:300,y:90},{x:120,y:90},
      {x:120,y:230},
      {x:520,y:230},
      {x:520,y:90}
    ];
    segmentsCCW = [];
    for(let i=0;i<ptsCCW.length-1;i++){
      const a=ptsCCW[i], b=ptsCCW[i+1];
      const dx=b.x-a.x, dy=b.y-a.y;
      const len=Math.hypot(dx,dy);
      segmentsCCW.push({x1:a.x,y1:a.y,x2:b.x,y2:b.y,len});
    }
  }
  buildCircuitPaths();

  function totalLen(segments){
    return segments.reduce((acc,s)=>acc+s.len,0);
  }
  function posAlong(segments, s){
    let rem = s;
    for(const seg of segments){
      if(rem<=seg.len){
        const t=rem/seg.len;
        return {
          x: seg.x1+(seg.x2-seg.x1)*t,
          y: seg.y1+(seg.y2-seg.y1)*t
        };
      }
      rem-=seg.len;
    }
    const last=segments[segments.length-1];
    return {x:last.x2,y:last.y2};
  }

  let circuitDots = [];
  let loopOffset = 0;
  function rebuildCircuitDots(){
    while(circuitDotsGroup.firstChild){
      circuitDotsGroup.firstChild.remove();
    }
    circuitDots = [];
    const count = Math.max(4, Math.round(80 * densityFactor));
    for(let i=0;i<count;i++){
      const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute('r', 2.5);
      c.setAttribute('fill', 'orange');
      c.setAttribute('opacity', '0');
      circuitDotsGroup.appendChild(c);
      circuitDots.push({ el:c, phase: i / count });
    }
  }

  function lerpColor(c1, c2, t){
    const r1=parseInt(c1.slice(1,3),16);
    const g1=parseInt(c1.slice(3,5),16);
    const b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16);
    const g2=parseInt(c2.slice(3,5),16);
    const b2=parseInt(c2.slice(5,7),16);
    const r=Math.round(r1+(r2-r1)*t);
    const g=Math.round(g1+(g2-g1)*t);
    const b=Math.round(b1+(b2-b1)*t);
    return `rgb(${r},${g},${b})`;
  }

  function applyLampBrightness(){
    if(isOn){
      const glassColor = lerpColor("#ffffff","#fff200", densityFactor);
      bulbGlass.setAttribute('fill', glassColor);
      const scaleVal = 0.5 + 0.8*densityFactor;
      const glowOpac = 0.15 + 0.85*densityFactor;
      bulbGlow.style.opacity   = glowOpac.toFixed(2);
      bulbGlow.style.transform = `scale(${scaleVal.toFixed(2)})`;
    }else{
      bulbGlass.setAttribute('fill', getComputedStyle(document.documentElement).getPropertyValue('--bulbGlassOff').trim());
      bulbGlow.style.opacity   = "0";
      bulbGlow.style.transform = "scale(0.5)";
    }
  }

  let lastT=null;
  function step(ts){
    if(lastT==null) lastT=ts;
    const dt=(ts-lastT)/1000;
    lastT=ts;

    const bounds=getBounds();

    if(isOn){
      electrons.forEach(obj=>{
        obj.x -= obj.speedLeft * dt;
        if(obj.y < bounds.top+15) obj.y = bounds.top+15;
        if(obj.y > bounds.bottom-30) obj.y = bounds.bottom-30;
        if(obj.x < bounds.left-20){
          obj.x = bounds.right+10;
          obj.y = rand(bounds.top+20, bounds.bottom-30);
        }
        obj.el.style.left = obj.x+'px';
        obj.el.style.top  = obj.y+'px';
      });
      flowStatusText.textContent='อิเล็กตรอนไหลจากขั้วลบ → ขั้วบวก อย่างต่อเนื่อง';
    }else{
      repelElectrons(dt);

      electrons.forEach(obj=>{
        obj.x += obj.vx*dt;
        obj.y += obj.vy*dt;

        if(obj.x < bounds.left){
          obj.x = bounds.left; obj.vx *= -0.6;
        }
        if(obj.x > bounds.right-16){
          obj.x = bounds.right-16; obj.vx *= -0.6;
        }
        if(obj.y < bounds.top){
          obj.y = bounds.top; obj.vy *= -0.6;
        }
        if(obj.y > bounds.bottom-16){
          obj.y = bounds.bottom-16; obj.vy *= -0.6;
        }
      });

      for(let i=0;i<electrons.length;i++){
        for(let j=i+1;j<electrons.length;j++){
          const a=electrons[i], c=electrons[j];
          const dx=a.x-c.x, dy=a.y-c.y;
          const dist2=dx*dx+dy*dy;
          const minD=18;
          if(dist2<minD*minD){
            const tmpvx=a.vx; a.vx=c.vx; c.vx=tmpvx;
            const tmpvy=a.vy; a.vy=c.vy; c.vy=tmpvy;
          }
        }
      }

      electrons.forEach(obj=>{
        obj.el.style.left = obj.x+'px';
        obj.el.style.top  = obj.y+'px';
      });

      flowStatusText.textContent='สุ่มช้าๆ (ไม่มีทิศรวม)';
    }

    const segs = modeElectron ? segmentsCW : segmentsCCW;
    const L = totalLen(segs);
    const speedWire = 100;
    loopOffset = (loopOffset + speedWire*dt) % L;

    for(const dot of circuitDots){
      if(!isOn){
        dot.el.setAttribute('opacity','0');
        continue;
      }
      if(Math.random() > densityFactor){
        dot.el.setAttribute('opacity','0');
        continue;
      }
      const s = (dot.phase * L + loopOffset) % L;
      const pos = posAlong(segs, s);
      dot.el.setAttribute('cx', pos.x);
      dot.el.setAttribute('cy', pos.y);
      dot.el.setAttribute('fill', modeElectron ? 'var(--electronColorCircuit)' : 'var(--currentColorCircuit)');
      dot.el.setAttribute('opacity','1');
    }

    requestAnimationFrame(step);
  }

  function renderStateUI(){
    if(isOn){
      toggleBtn.textContent='ON';
      toggleBtn.style.background='var(--btnOn)';
      lampStatusText.textContent='ติด';
      orangeSwitch.style.transform='rotate(0deg)';
    }else{
      toggleBtn.textContent='OFF';
      toggleBtn.style.background='var(--btnOff)';
      lampStatusText.textContent='ดับ';
      orangeSwitch.style.transform='rotate(-35deg)';
    }
    modeBtn.textContent = modeElectron ? 'โหมดอิเล็กตรอน' : 'โหมดกระแสไฟฟ้า';
    applyLampBrightness();
  }

  function toggleCircuit(){
    isOn=!isOn;
    loopOffset=0;
    renderStateUI();
  }

  toggleBtn.addEventListener('click', toggleCircuit);
  orangeSwitch.addEventListener('pointerdown', toggleCircuit);

  modeBtn.addEventListener('click',()=>{
    modeElectron=!modeElectron;
    renderStateUI();
  });

  densitySlider.addEventListener('input',()=>{
    const val = parseInt(densitySlider.value,10);
    densityFactor = val/100;
    if(densityFactor < 0.34){
      sliderValueText.textContent = "หนาแน่นน้อย (กระแสน้อย หลอดสว่างน้อย)";
    }else if(densityFactor < 0.67){
      sliderValueText.textContent = "หนาแน่นปานกลาง";
    }else{
      sliderValueText.textContent = "หนาแน่นมาก (กระแสสูง หลอดสว่างมาก)";
    }
    rebuildElectrons();
    rebuildCircuitDots();
    renderStateUI();
  });


  function resetAll(){
    // คืนค่าเริ่มต้นของวงจร
    isOn = false;
    modeElectron = true;
    densitySlider.value = "60";
    densityFactor = 0.6;

    // คืนค่าเริ่มต้นของภารกิจ (กลับไปภารกิจที่ 1)
    missionIndex = 0;
    closeMission();

    // สร้างใหม่ตามค่าเริ่มต้น
    rebuildElectrons();
    rebuildCircuitDots();
    renderStateUI();
  }
  resetBtn?.addEventListener("click", resetAll);

  window.addEventListener('load', ()=>{
    initPlusCharges();
    rebuildElectrons();
    rebuildCircuitDots();
    renderStateUI();
    requestAnimationFrame(step);
  });

})();
</script>

</body>
