<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>แท่งแม่เหล็ก + เข็มทิศ — Interactive Preview</title>
<style>
  :root{
    --ink:#0f172a; --muted:#64748b; --accent:#2563eb; --line:#e5e7eb; --bg:#ffffff;
    --north:#ef4444; --south:#3b82f6; --needle:#111827; --panel:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif}
  header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:10px 14px}
  header h1{margin:0;font-size:18px}
  .wrap{display:grid;grid-template-columns:1fr;gap:12px;padding:12px;max-width:1200px;margin:0 auto}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .toolbar > *{margin:2px 0}
  button, .chip{appearance:none;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;cursor:pointer}
  button:hover{background:#f8fafc}
  .chip{cursor:default}
  .board{position:relative;background:#ffffff;border:1px solid var(--line);border-radius:16px;min-height:520px;overflow:hidden}
  canvas{display:block;width:100%;height:100%}
  .tagline{font-size:13px;color:var(--muted);text-align:center}
  .tagline a{color:var(--accent);text-decoration:none}
  .legend{position:absolute;left:10px;top:10px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1px solid var(--line);border-radius:12px;padding:8px 10px;font-size:12px}
  .legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}
  .badge .n{width:10px;height:10px;background:var(--north);border-radius:2px}
  .badge .s{width:10px;height:10px;background:var(--south);border-radius:2px}
  .hint{position:absolute;right:10px;top:10px;font-size:12px;color:#334155;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:12px;padding:6px 10px}
</style>
</head>
<body>
  <header>
    <h1>แท่งแม่เหล็ก + เข็มทิศ (ลากได้ • เข็มหมุนตามสนาม)</h1>
  </header>
  <div class="wrap">
    <div class="toolbar">
      <span class="badge" title="ขั้วของแท่งแม่เหล็ก">
        <span class="n"></span> N &nbsp;|&nbsp; <span class="s"></span> S
      </span>
      <label style="display:inline-flex;align-items:center;gap:8px">
        <input id="toggleField" type="checkbox" checked /> แสดงเวกเตอร์สนาม
      </label>
      <label style="display:inline-flex;align-items:center;gap:8px">
        ความแรงสนาม (สเกลคำนวณ)
        <input id="strength" type="range" min="0.3" max="2" step="0.1" value="1" />
      </label>
      <button id="addCompass">+ เพิ่มเข็มทิศ</button>
      <button id="reset">รีเซตตำแหน่ง</button>
      <button id="rotL" title="หมุนแท่งแม่เหล็กซ้าย (Q)">⟲ หมุนซ้าย</button>
      <button id="rotR" title="หมุนแท่งแม่เหล็กขวา (E)">⟳ หมุนขวา</button>
      <span class="chip">ลากได้: แท่งแม่เหล็ก & เข็มทิศ</span>
    </div>

    <div class="board" id="board">
      <canvas id="cv"></canvas>
      <div class="legend">
        <div><span class="dot" style="background:var(--north)"></span> ขั้ว N</div>
        <div><span class="dot" style="background:var(--south)"></span> ขั้ว S</div>
        <div style="margin-top:6px">เข็มทิศจะชี้ไปตามทิศของ <b>B</b> ณ ตำแหน่งนั้น</div>
      </div>
      <div class="hint">แตะ/ลากได้บนมือถือ • ปุ่ม Q/E หมุนแท่งแม่เหล็ก ✋</div>
    </div>

    <div class="tagline">ศึกษาเพิ่มเติมได้ที่เพจ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener">คลายปมฟิสิกส์</a></div>
  </div>

<script>
(function(){
  const board = document.getElementById('board');
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const toggleField = document.getElementById('toggleField');
  const strength = document.getElementById('strength');
  const addCompassBtn = document.getElementById('addCompass');
  const resetBtn = document.getElementById('reset');
  const rotL = document.getElementById('rotL');
  const rotR = document.getElementById('rotR');

  function fitCanvas(){
    const r = window.devicePixelRatio || 1;
    const rect = board.getBoundingClientRect();
    const w = rect.width, h = Math.max(520, rect.height || 520);
    cv.width = Math.floor(w * r);
    cv.height = Math.floor(h * r);
    cv.style.width = w + 'px';
    cv.style.height = h + 'px';
    ctx.setTransform(r,0,0,r,0,0);
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  const state = {
    magnet:{ x: 380, y: 280, length: 220, thickness: 40, angle: 0, q: 1 },
    compasses: [ { x: 700, y: 260, angle: 0, targetAngle: 0 } ],
    dragging: null,
    pointerId: null,
    dragOffset: {x:0,y:0},
  };

  const TAU = Math.PI*2;
  function rot(x,y,ang){ const c=Math.cos(ang), s=Math.sin(ang); return {x: x*c - y*s, y: x*s + y*c}; }
  function polePositions(m){ const half = m.length/2; const a = rot(half,0,m.angle); const b = rot(-half,0,m.angle); return [ {x:m.x+a.x, y:m.y+a.y}, {x:m.x+b.x, y:m.y+b.y} ]; }
  function sub(v,w){ return {x:v.x-w.x, y:v.y-w.y}; }
  function mul(v,k){ return {x:v.x*k, y:v.y*k}; }
  function len(v){ return Math.hypot(v.x,v.y); }
  function angleOf(v){ return Math.atan2(v.y, v.x); }
  function wrap(a){ while(a>Math.PI) a-=TAU; while(a<-Math.PI) a+=TAU; return a; }

  function B_at(p){
    const m = state.magnet; const k = 150 * parseFloat(strength.value);
    const [N,S] = polePositions(m);
    const q = m.q;
    const vN = sub(p,N); let dN = Math.max(16, len(vN));
    const vS = sub(p,S); let dS = Math.max(16, len(vS));
    const BN = mul(vN,  (q)/(dN*dN*dN));
    const BS = mul(vS, (-q)/(dS*dS*dS));
    return mul({x:BN.x+BS.x,y:BN.y+BS.y}, k);
  }

  function drawMagnet(m){
    const r = m.thickness/2, L = m.length;
    ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.angle);
    ctx.lineWidth = 1.2; ctx.strokeStyle = '#111827';
    ctx.beginPath(); ctx.rect(-L/2, -r, L, m.thickness); ctx.stroke();
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--south');
    ctx.fillRect(-L/2, -r, L/2, m.thickness);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--north');
    ctx.fillRect(0, -r, L/2, m.thickness);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 16px system-ui, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('S', -L/4, 0);
    ctx.fillText('N',  L/4, 0);
    ctx.restore();
  }

  function drawCompass(c, small=false){
    const R = small?8:22;
    ctx.save(); ctx.translate(c.x,c.y);
    if(!small){
      ctx.beginPath(); ctx.lineWidth=1.2; ctx.strokeStyle='#334155'; ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.arc(0,0,R+6,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    ctx.rotate(c.angle);
    const arrowLen = R*0.9, arrowWidth = small?2:6;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(arrowLen, -arrowWidth); ctx.lineTo(arrowLen+3, 0); ctx.lineTo(arrowLen, arrowWidth); ctx.closePath();
    ctx.fillStyle= small? '#666' : getComputedStyle(document.documentElement).getPropertyValue('--north'); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-arrowLen, -arrowWidth); ctx.lineTo(-arrowLen-3, 0); ctx.lineTo(-arrowLen, arrowWidth); ctx.closePath();
    ctx.fillStyle= small? '#aaa' : getComputedStyle(document.documentElement).getPropertyValue('--south'); ctx.fill();
    ctx.fillStyle='#111827'; ctx.beginPath(); ctx.arc(0,0,small?1:3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function drawField(){
    if(!toggleField.checked) return;
    const step = 60; const w = cv.width/(window.devicePixelRatio||1), h = cv.height/(window.devicePixelRatio||1);
    ctx.save();
    for(let y=step; y<h; y+=step){
      for(let x=step; x<w; x+=step){
        const p = {x,y}; const B = B_at(p); const a = angleOf(B);
        drawCompass({x,y,angle:a}, true);
      }
    }
    ctx.restore();
  }

  function hitMagnet(pt){
    const m = state.magnet; const v = sub(pt, {x:m.x,y:m.y});
    const c=Math.cos(-m.angle), s=Math.sin(-m.angle); const lx = v.x*c - v.y*s; const ly = v.x*s + v.y*c;
    return (lx>=-m.length/2 && lx<=m.length/2 && ly>=-m.thickness/2 && ly<=m.thickness/2);
  }
  function hitCompass(pt){
    const R=28; for(let i=state.compasses.length-1;i>=0;i--){ const c = state.compasses[i]; if(Math.hypot(pt.x-c.x, pt.y-c.y) <= R) return i; } return -1;
  }

  board.addEventListener('pointerdown', (e)=>{
    const rect = cv.getBoundingClientRect(); const p = {x: e.clientX-rect.left, y: e.clientY-rect.top};
    state.pointerId = e.pointerId; board.setPointerCapture(state.pointerId);
    if(hitMagnet(p)){ state.dragging = {type:'magnet'}; state.dragOffset = sub(p, {x:state.magnet.x,y:state.magnet.y}); }
    else { const idx = hitCompass(p); if(idx>=0){ state.dragging = {type:'compass', idx}; state.dragOffset = sub(p, {x:state.compasses[idx].x,y:state.compasses[idx].y}); } else { state.dragging=null; } }
  });
  board.addEventListener('pointermove', (e)=>{
    if(state.pointerId===null || !state.dragging) return; const rect = cv.getBoundingClientRect();
    const p = {x: e.clientX-rect.left, y: e.clientY-rect.top}; const target = {x:p.x-state.dragOffset.x, y:p.y-state.dragOffset.y};
    if(state.dragging.type==='magnet'){ state.magnet.x = target.x; state.magnet.y = target.y; }
    else if(state.dragging.type==='compass'){ const c = state.compasses[state.dragging.idx]; c.x = target.x; c.y = target.y; }
  });
  function endDrag(){ if(state.pointerId!==null){ try{board.releasePointerCapture(state.pointerId);}catch{} state.pointerId=null; } state.dragging=null; }
  board.addEventListener('pointerup', endDrag);
  board.addEventListener('pointercancel', endDrag);

  addCompassBtn.addEventListener('click', ()=>{
    const w = cv.width/(window.devicePixelRatio||1), h=cv.height/(window.devicePixelRatio||1);
    state.compasses.push({ x: Math.min(w-60, 60 + Math.random()*(w-120)), y: Math.min(h-60, 60 + Math.random()*(h-120)), angle:0, targetAngle:0 });
  });
  resetBtn.addEventListener('click', ()=>{
    const w = cv.width/(window.devicePixelRatio||1), h=cv.height/(window.devicePixelRatio||1);
    state.magnet = { x: w*0.35, y: h*0.5, length:220, thickness:40, angle:0, q:1 };
    state.compasses = [ { x: w*0.7, y: h*0.5, angle:0, targetAngle:0 } ];
  });
  rotL.addEventListener('click', ()=>{ state.magnet.angle -= Math.PI/18; });
  rotR.addEventListener('click', ()=>{ state.magnet.angle += Math.PI/18; });
  document.addEventListener('keydown', (e)=>{ if(e.key==='q' || e.key==='Q') state.magnet.angle -= Math.PI/36; if(e.key==='e' || e.key==='E') state.magnet.angle += Math.PI/36; });

  function frame(){
    ctx.clearRect(0,0,cv.width,cv.height);
    drawField();
    drawMagnet(state.magnet);
    for(const c of state.compasses){
      const B = B_at(c); const a = angleOf(B);
      c.targetAngle = a;
      const da = wrap(c.targetAngle - c.angle);
      c.angle += da*0.15;
      drawCompass(c);
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
