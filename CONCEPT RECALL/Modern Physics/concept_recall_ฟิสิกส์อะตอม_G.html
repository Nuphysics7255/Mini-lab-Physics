function openSummary() {
  const done = answers.filter(v => v !== null).length;
  if (done !== questions.length) return;
  const correct = answers.reduce((sum, ans, i) => sum + ((ans === questions[i].answer) ? 1 : 0), 0);
  const wrong = questions.length - correct;
  const mistakenTopics = Object.entries(topicStats)
    .filter(([_, stat]) => stat.wrong > 0)
    .sort((a,b) => b[1].wrong - a[1].wrong);

  let reviewHtml = '';
  if (mistakenTopics.length) {
    reviewHtml = mistakenTopics.map(([topic]) => {
      const info = topicConceptMap[topic] || { concept: topic, text: 'ทบทวนแนวคิดหลักและความสัมพันธ์ของสมการในหัวข้อนี้อีกครั้ง' };
      return `
      <div class="summary-mini-card">
        <h5>${info.concept}</h5>
        <div style="line-height:1.75">${info.text}</div>
      </div>
    `;
    }).join('');
  } else {
    reviewHtml = `<div class="summary-mini-card"><h5>ภาพรวม</h5><div>ตอบถูกครบทุกข้อ ดีมาก ✨</div></div>`;
  }

  const uniqueConcepts = [];
  wrongTopics.forEach(item => {
    const info = topicConceptMap[item.topic] || { concept: item.topic, text: item.explain };
    if (!uniqueConcepts.some(x => x.concept === info.concept)) uniqueConcepts.push(info);
  });

  const conceptHtml = uniqueConcepts.length ? uniqueConcepts.map(info => `
    <div class="summary-mini-card">
      <h5>${info.concept}</h5>
      <div style="line-height:1.75">${info.text}</div>
    </div>
  `).join('') : `<div class="summary-mini-card"><h5>ภาพรวมแน่นดีแล้ว</h5><div>สามารถต่อยอดไปโจทย์คำนวณได้เลย</div></div>`;

  const formulaHtml = formulaCards.map(item => `
    <div class="formula-item">
      <div class="formula-item-title">${item.title}</div>
      <div class="formula-item-math">${item.math}</div>
      <div class="formula-item-desc">${item.desc}</div>
    </div>
  `).join('');

  document.getElementById('summaryContent').innerHTML = `
    <h3 class="modal-title">📊 สรุปผล — ฟิสิกส์อะตอม</h3>
    <p class="modal-sub">คะแนนรวม <strong>${correct} / ${questions.length}</strong> &nbsp;|&nbsp; ตอบผิด <strong>${wrong}</strong> ข้อ</p>

    <div class="summary-card-block">
      <h4>สรุปภาพรวม</h4>
      <div style="line-height:1.8">
        เนื้อหาบทนี้เชื่อมกันเป็นลำดับจากการเกิดควอนตัมของพลังงาน → แบบจำลองโบร์ของระดับพลังงาน → สเปกตรัมของอะตอม → โฟโตอิเล็กทริก → เดอบรอยล์
      </div>
    </div>

    <div class="summary-card-block">
      <h4>หมวดที่ควรทบทวน</h4>
      ${reviewHtml}
    </div>

    <div class="summary-card-block">
      <h4>สูตรที่เกี่ยวข้องมากที่สุด</h4>
      <div class="formula-grid">${formulaHtml}</div>
    </div>

    <div class="summary-card-block">
      <h4>วิเคราะห์ Concept ที่ควรทบทวน</h4>
      ${conceptHtml}
    </div>

    <div class="summary-card-block">
      <h4 class="warning-title">❗ จุดที่ต้องระวัง</h4>
      <div style="line-height:1.85">
        1) ความเข้มของแสงเกี่ยวกับจำนวนโฟตอน ไม่ใช่พลังงานต่อโฟตอน<br>
        2) สถานะกระตุ้นที่ 1 คือ \\(n=2\\) และสถานะกระตุ้นที่ 3 คือ \\(n=4\\)<br>
        3) สเปกตรัมสว่าง = คายพลังงาน, สเปกตรัมมืด = ดูดกลืนพลังงาน<br>
        4) \\(E_{k(\\max)}\\) ไม่ได้เป็นพลังงานของอิเล็กตรอนทุกตัว แต่เป็นค่าสูงสุด<br>
        5) จุดตัดแกนของกราฟ \\(V_s\\) กับ \\(f\\) ใช้หา \\(W\\) ได้จาก \\(-W/e\\)
      </div>
    </div>

    <div class="summary-card-block">
      <h4>กำลังใจท้ายบท</h4>
      <div style="line-height:1.8">ทุกครั้งที่กดผิดคือข้อมูลที่ทำให้เราเก่งขึ้น ลองทดลองเพิ่มใน Lab แล้วกลับมาลองตอบใหม่ เรากำลังพัฒนาได้ดีมาก</div>
    </div>

    <div style="margin-top:16px; display:flex; justify-content:center;">
      <button class="restart-main-btn" onclick="restartQuiz()">🔄 เริ่มใหม่</button>
    </div>
  `;
  document.getElementById('summaryModal').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
  rerenderMath();
}

function closeSummary() {
  document.getElementById('summaryModal').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function restartQuiz() {
  answers = Array(questions.length).fill(null);
  wrongTopics = [];
  topicStats = {};
  currentIndex = 0;
  closeSummary();
  updateProgress();
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIndex > 0) {
    currentIndex--;
    renderQuestion();
    window.scrollTo({top:0, behavior:'smooth'});
  }
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
    window.scrollTo({top:0, behavior:'smooth'});
  }
});
document.getElementById('centerBtn').addEventListener('click', openPicker);
document.getElementById('pickerClose').addEventListener('click', closePicker);
document.getElementById('labCloseBtn').addEventListener('click', closeLab);
document.getElementById('summaryBtn').addEventListener('click', openSummary);
document.getElementById('summaryCloseBtn').addEventListener('click', closeSummary);
document.getElementById('overlay').addEventListener('click', () => {
  closePicker();
  closeLab();
  closeSummary();
});

window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closePicker();
    closeLab();
    closeSummary();
  }
});

updateProgress();
renderQuestion();
</script>
