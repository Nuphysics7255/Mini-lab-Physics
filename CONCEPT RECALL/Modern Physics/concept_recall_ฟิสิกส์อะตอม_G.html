<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concept Recall — ฟิสิกส์อะตอม</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)'], ['$', '$']],
    displayMath: [['\\[','\\]']]
  },
  svg: {
    fontCache: 'global'
  },
  options: {
    skipHtmlTags: ['script','noscript','style','textarea','pre']
  }
};
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<style>
  :root {
    --bg: #f7fbff;
    --card: #ffffff;
    --line: #d9e6f2;
    --text: #16324f;
    --muted: #5a728c;
    --blue: #63b3ff;
    --blue-deep: #2593ff;
    --orange: #ffe8bf;
    --orange-line: #f0c97a;
    --green: #eaf8e5;
    --green-strong: #1f9d3a;
    --green-soft: #dff4d7;
    --red: #d92929;
    --gray-soft: #eef2f6;
    --gray-choice: #eef1f4;
    --shadow: 0 10px 30px rgba(22,50,79,.08);
    --radius: 22px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Sarabun", "Noto Sans Thai", system-ui, sans-serif;
    background: linear-gradient(180deg, #f7fbff 0%, #eef6ff 100%);
    color: var(--text);
    overflow-x: hidden;
  }
  .container {
    width: min(960px, calc(100vw - 24px));
    margin: 0 auto;
    padding: 18px 0 190px;
  }
  .hero {
    text-align: center;
    margin-bottom: 14px;
  }
  .hero-title-row {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: nowrap;
  }
  .hero-atom {
    width: 52px;
    height: 52px;
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: linear-gradient(180deg, #eef7ff 0%, #d9edff 100%);
    border: 1px solid #b8daf7;
    box-shadow: 0 6px 18px rgba(29,111,209,.12);
  }
  .hero-atom svg {
    width: 34px;
    height: 34px;
    stroke: #1d6fd1;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .hero h1 {
    margin: 8px 0 0;
    color: #1d6fd1;
    font-size: clamp(1.7rem, 2vw + 1rem, 2.45rem);
    line-height: 1.1;
    font-weight: 800;
  }
  .hero h2 {
    margin: 4px 0 0;
    color: #2c4d73;
    font-size: clamp(1.05rem, 1.3vw + .7rem, 1.35rem);
    font-weight: 700;
  }
  .progress-wrap {
    background: rgba(255,255,255,.82);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 10px;
    z-index: 20;
    backdrop-filter: blur(10px);
  }
  .progress-head {
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    color: var(--muted); font-weight: 700; font-size: .98rem;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 12px; background: #e7eef6; border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #7cc4ff 0%, #3299ff 100%);
    border-radius: 999px;
    transition: width .35s ease;
  }
  .card {
    margin-top: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .pill-row {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    margin-bottom: 12px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    font-weight: 800;
    border: 1px solid var(--line);
    background: #f3f8ff;
    color: #245f9b;
    min-height: 42px;
  }
  .pill.qno { background: #e9f4ff; }
  .pill.topic { background: #f7fbff; color: #2d4f75; }
  .question-text {
    font-size: clamp(1.07rem, 1.2vw + .8rem, 1.28rem);
    line-height: 1.75;
    font-weight: 700;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .illustration {
    margin-top: 14px;
    text-align: center;
  }
  .illustration img {
    width: min(100%, 560px);
    max-width: 100%;
    height: auto;
    border-radius: 18px;
    border: 1px solid #d7e1ec;
    background: white;
  }
  .choice-list {
    display: grid;
    gap: 12px;
    margin-top: 18px;
  }
  .choice {
    width: 100%;
    border: 1px solid #dbe6f0;
    background: #fff;
    border-radius: 20px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr);
    gap: 12px;
    align-items: start;
    cursor: pointer;
    text-align: left;
    box-shadow: 0 4px 12px rgba(10,34,60,.04);
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
  }
  .choice:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(10,34,60,.08); }
  .choice-key {
    width: 42px; height: 42px; border-radius: 14px;
    display:grid; place-items:center;
    font-weight: 800; font-size: 1rem;
    background: #edf5ff; color: #2472c8; border: 1px solid #d5e7fb;
    flex-shrink: 0;
  }
  .choice-text {
    min-width: 0;
    font-size: 1.02rem;
    line-height: 1.7;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .choice.correct {
    background: var(--green-soft);
    border-color: #9cd3a7;
  }
  .choice.wrong {
    background: var(--gray-choice);
    border-color: #cfd8e1;
  }
  .choice.correct .choice-key {
    background: #d2efcf; color: #1e8f35; border-color: #8ccd98;
  }
  .choice.wrong .choice-key {
    background: #dde4ea; color: #5b6b77; border-color: #c7d0d8;
  }
  .choice.locked {
    cursor: default;
    transform: none !important;
  }
  .feedback {
    margin-top: 16px;
    border-radius: 22px;
    padding: 16px;
    border: 1px solid var(--line);
    background: #fbfdff;
  }
  .feedback-title {
    font-weight: 800;
    font-size: 1.06rem;
    margin-bottom: 8px;
  }
  .feedback-title.ok { color: var(--green-strong); }
  .feedback-title.no { color: var(--red); }
  .feedback p {
    margin: 8px 0 0;
    line-height: 1.75;
    font-size: 1rem;
    overflow-wrap: break-word;
    word-break: break-word;
  }
  .mini-lab-trigger {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 999px;
    border: 1px solid var(--orange-line);
    background: var(--orange);
    color: #8a5a00;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(175,120,20,.1);
  }
  .summary-btn {
    position: fixed;
    left: 50%;
    bottom: calc(132px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 65;
    min-width: min(420px, calc(100vw - 34px));
    padding: 16px 28px;
    border-radius: 999px;
    border: 1px solid #a9c894;
    background: #e7f5df;
    color: #216c34;
    font-weight: 800;
    font-size: 1.08rem;
    box-shadow: 0 10px 26px rgba(49,95,27,.14);
    cursor: pointer;
    display: none;
    text-align: center;
  }
  .nav-bar {
    position: fixed;
    left: 50%;
    bottom: max(14px, env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(940px, calc(100vw - 24px));
    display: grid;
    grid-template-columns: 1fr minmax(150px, 390px) 1fr;
    gap: 12px;
    z-index: 40;
    align-items: center;
    padding: 14px;
    border-radius: 30px;
    background: rgba(255,255,255,.72);
    border: 1px solid #dce8f1;
    box-shadow: 0 12px 28px rgba(7,31,58,.08);
    backdrop-filter: blur(10px);
  }
  .nav-btn, .nav-center {
    min-height: 70px;
    border-radius: 24px;
    border: 1px solid #c7d9e8;
    box-shadow: none;
  }
  .nav-btn {
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    background: #b9d8ee;
    border-color: #b7d0e2;
  }
  .nav-btn svg {
    width: 30px; height: 30px;
    fill: white;
  }
  .nav-btn:disabled {
    opacity: .45; cursor: not-allowed;
    background: #d8e6f0;
  }
  .nav-center {
    display:flex; align-items:center; justify-content:center;
    background: #d8e1ea;
    border-color: #bccedd;
    color: #24486c;
    font-weight: 800;
    font-size: clamp(1.1rem, 1vw + .7rem, 1.55rem);
    cursor:pointer;
  }
  .picker-sheet {
    position: fixed;
    inset: auto 10px 84px 10px;
    max-width: 760px;
    margin: 0 auto;
    background: rgba(255,255,255,.98);
    border: 1px solid var(--line);
    border-radius: 24px;
    box-shadow: 0 18px 50px rgba(7,31,58,.16);
    padding: 12px;
    z-index: 45;
    display: none;
  }
  .picker-head {
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding: 6px 6px 12px;
    font-weight: 800;
    color: #2a537c;
  }
  .picker-close {
    border:none; background:#eef5fb; color:#31597c; width:40px; height:40px;
    border-radius:14px; cursor:pointer; font-size: 1.1rem; font-weight: 800;
  }
  .picker-list {
    display:grid; gap:8px; max-height: 50vh; overflow:auto; padding-right: 4px;
  }
  .picker-item {
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:12px;
    padding: 10px 12px; border-radius: 16px; border: 1px solid #e0e8f1; background:#fff;
    cursor:pointer;
  }
  .picker-item.active { border-color:#7db9f3; background:#f2f8ff; }
  .picker-item.done .picker-no, .picker-item.done .picker-title { color:#a7b2bc; }
  .picker-no { font-weight: 800; min-width: 52px; }
  .picker-title { overflow-wrap:anywhere; }
  .picker-circle {
    width: 18px; height: 18px; border-radius: 999px; border: 2px solid #b9c6d3;
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(10,20,30,.42);
    display:none; z-index: 60;
  }
  .lab-modal, .summary-modal {
    position: fixed; inset: 0;
    background: #f7fbff;
    z-index: 70; display: none;
    overflow-y: auto;
    padding: max(16px, env(safe-area-inset-top)) 14px 140px;
  }
  .modal-topbar {
    position: sticky; top: 0; z-index: 5;
    display:flex; justify-content:flex-end; gap:10px; flex-wrap: wrap;
    padding: 6px 0 12px;
    background: linear-gradient(180deg, rgba(247,251,255,.97), rgba(247,251,255,.9));
    backdrop-filter: blur(10px);
  }
  .top-pill {
    display:inline-flex; align-items:center; gap:8px;
    padding: 10px 14px; border-radius: 999px; font-weight: 800;
    border:1px solid #d7e6f5; background:#fff; color:#245173; box-shadow: var(--shadow);
  }
  .top-pill.orange { background: var(--orange); border-color: var(--orange-line); color: #8a5a00; }
  .top-pill.green { background: #edf8ea; border-color: #bddbb0; color: #246a34; }
  .top-pill.close { background: #fff; width: 48px; justify-content:center; padding-inline: 0; }
  .modal-card {
    width:min(960px, 100%); margin: 0 auto; background:#fff;
    border:1px solid var(--line); border-radius: 28px; padding: 18px; box-shadow: var(--shadow);
  }
  .modal-title {
    color:#1d6fd1; font-size: clamp(1.3rem, 1.4vw + 1rem, 1.8rem); font-weight: 800; margin: 0 0 6px;
  }
  .modal-sub {
    color: var(--muted); line-height: 1.75; margin: 0 0 18px;
  }
  .lab-grid {
    display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px;
  }
  .lab-box {
    border:1px solid #dde8f2; border-radius: 22px; padding: 16px; background:#fbfdff;
  }
  .lab-box h4 {
    margin:0 0 10px; color:#28557c; font-size:1.05rem;
  }
  .range-row { display:grid; gap:8px; margin-top: 10px; }
  input[type="range"] { width: 100%; }
  .result-line {
    background:#fff; border:1px solid #dde8f2; border-radius:16px; padding:10px 12px; margin-top:8px; line-height:1.7;
    overflow-wrap:anywhere;
  }
  .note {
    margin-top:10px; padding: 12px 14px; border-radius: 16px; background:#fffaf0; border:1px solid #f1d79c; color:#7a5700; line-height:1.7;
  }
  .summary-card-block {
    border:1px solid #dbe7f2; border-radius: 20px; padding: 14px; background:#fff; margin-top: 12px;
  }
  .summary-card-block h4 { margin:0 0 8px; color:#1f5f9e; font-size:1.05rem; }
  .summary-overview { background: linear-gradient(180deg, #f8fbff 0%, #eef6ff 100%); border-color:#cfe2fb; }
  .summary-review { background: linear-gradient(180deg, #f6fcf6 0%, #eef9ee 100%); border-color:#cfe9c7; }
  .summary-formulas { background: linear-gradient(180deg, #fffaf1 0%, #fff4df 100%); border-color:#f0d5a6; }
  .summary-concepts { background: linear-gradient(180deg, #f8f6ff 0%, #f0ebff 100%); border-color:#d9cdfd; }
  .summary-warning { background: linear-gradient(180deg, #fff7f7 0%, #ffefef 100%); border-color:#f6c3c3; }
  .summary-encourage { background: linear-gradient(180deg, #f7fbf7 0%, #ecf8ef 100%); border-color:#c9e8d0; }
  .summary-mini-card {
    border:1px solid #dce8f3; border-radius:16px; padding:12px 14px; background:rgba(255,255,255,.82); margin-top:10px;
    box-shadow: 0 4px 10px rgba(18,61,105,.04);
  }
  .summary-mini-card h5 { margin:0 0 6px; font-size:1rem; color:#244f7d; }
  .warning-title { color: var(--red) !important; display:flex; align-items:center; gap:10px; }
  .warning-badge {
    width:34px; height:34px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center;
    border:2px solid #ff8c8c; background:#fff; color:#e53935; font-weight:900; box-shadow:0 4px 10px rgba(229,57,53,.12);
  }
  .summary-topbar {
    position: fixed; top: max(10px, env(safe-area-inset-top)); right: 14px; left:auto; z-index: 90;
    display:flex; justify-content:flex-end; gap:10px; flex-wrap: nowrap; padding:0; background:transparent; backdrop-filter:none;
  }
  .summary-card-main { margin-top: 56px; }
  .formula-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-top: 6px;
  }
  .formula-item {
    border:1px solid #d9e7f4;
    border-radius: 18px;
    background: linear-gradient(180deg, #fafdff 0%, #f3f8fe 100%);
    padding: 14px;
    box-shadow: 0 6px 14px rgba(18,61,105,.05);
  }
  .formula-item-title {
    font-weight: 800;
    color:#245f9b;
    margin-bottom: 8px;
  }
  .formula-item-math {
    background:#fff;
    border:1px solid #dce8f3;
    border-radius: 14px;
    padding: 10px 12px;
    margin-bottom: 8px;
    overflow-x: auto;
  }
  .formula-item-desc {
    line-height: 1.7;
    color:#35597f;
  }
  .restart-main-btn {
    cursor:pointer;
    min-width: min(360px, calc(100vw - 40px));
    padding: 16px 28px;
    border-radius: 999px;
    border: 1px solid #8cc4f2;
    background: linear-gradient(180deg, #89c8f8 0%, #69b6ef 100%);
    color: #ffffff;
    font-weight: 800;
    font-size: 1.14rem;
    box-shadow: 0 10px 26px rgba(26,100,165,.18);
  }
  .footer-link {
    margin-top:18px; text-align:center; font-weight:700;
  }
  .footer-link a { color:#1f6fd1; text-decoration: underline; }
  @media (max-width: 780px) {
    .container { width: calc(100vw - 16px); padding-bottom: 200px; }
    .card { padding: 15px; border-radius: 22px; }
    .question-text { font-size: 1.03rem; }
    .choice { grid-template-columns: 42px minmax(0,1fr); padding: 12px; border-radius: 18px; }
    .choice-key { width: 38px; height: 38px; border-radius: 12px; }
    .lab-grid { grid-template-columns: 1fr; }
    .summary-btn { right: auto; left: 50%; transform: translateX(-50%); bottom: calc(126px + env(safe-area-inset-bottom)); text-align:center; }
    .summary-topbar { right: 12px; top: calc(8px + env(safe-area-inset-top)); }
    .summary-card-main { margin-top: 64px; }
    .nav-bar { grid-template-columns: 1fr 140px 1fr; gap:8px; width: calc(100vw - 12px); }
  }

  @media (max-width: 700px) {
    .hero-title-row { gap: 10px; }
    .hero-atom { width: 44px; height: 44px; }
    .hero-atom svg { width: 28px; height: 28px; }
    .nav-bar {
      width: calc(100vw - 16px);
      grid-template-columns: 1fr minmax(108px, 160px) 1fr;
      gap: 10px;
      padding: 10px;
      border-radius: 24px;
    }
    .nav-btn, .nav-center { min-height: 56px; border-radius: 18px; }
    .nav-btn svg { width: 24px; height: 24px; }
    .summary-btn {
      min-width: calc(100vw - 28px);
      bottom: calc(118px + env(safe-area-inset-bottom));
      padding: 14px 20px;
    }
    .restart-main-btn { min-width: calc(100vw - 32px); }
  }


  .lab-frame-shell {
    display:grid;
    gap:14px;
  }
  @media (max-width: 780px) {
    .lab-frame-shell {
      gap: 10px;
    }
  }
  .lab-modal.desktop-full {
    padding-left: 18px;
    padding-right: 18px;
  }
  .modal-card.lab-modal-wide {
    width: min(1500px, calc(100vw - 36px));
    max-width: none;
    padding: 18px;
  }
  .mission-card {
    position: relative;
    border: 1px solid #f0cfaa;
    background: #fff7eb;
    color: #9a6500;
    border-radius: 20px;
    padding: 14px 48px 14px 16px;
    line-height: 1.75;
    box-shadow: 0 4px 12px rgba(154,101,0,.08);
  }
  .mission-card strong {
    color: #8b4d00;
  }
  .mission-close {
    position:absolute;
    top:10px;
    right:10px;
    width:34px;
    height:34px;
    border:none;
    border-radius:999px;
    background:#fff;
    color:#9a6500;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(154,101,0,.12);
  }
  .lab-iframe-wrap {
    border:1px solid #dde8f2;
    border-radius: 22px;
    background:#fff;
    overflow:hidden;
    box-shadow: 0 8px 20px rgba(18,61,105,.08);
  }
  .lab-iframe {
    width:100%;
    min-height: min(82vh, 980px);
    height: 82vh;
    border:0;
    display:block;
    background:#fff;
  }
  @media (min-width: 981px) {
    .modal-card.lab-modal-wide {
      padding: 20px 20px 24px;
    }
    .lab-iframe {
      min-height: calc(100vh - 220px);
      height: calc(100vh - 220px);
    }
  }
  .lab-note {
    color: var(--muted);
    line-height: 1.7;
    font-size: .98rem;
  }
  @media (max-width: 780px) {
    .lab-modal.desktop-full {
      padding-left: 12px;
      padding-right: 12px;
      padding-top: max(12px, env(safe-area-inset-top));
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
    }
    .modal-card.lab-modal-wide {
      width: min(960px, 100%);
      padding: 14px;
      border-radius: 22px;
    }
    .modal-title {
      margin-bottom: 2px;
      font-size: clamp(1.1rem, 2.8vw + .85rem, 1.45rem);
    }
    .mission-card {
      font-size: 12px;
      padding: 11px 42px 11px 13px;
      border-radius: 18px;
      line-height: 1.65;
    }
    .mission-close {
      width: 32px;
      height: 32px;
      top: 8px;
      right: 8px;
    }
    .lab-iframe-wrap {
      border-radius: 18px;
    }
    .lab-iframe {
      min-height: calc(100dvh - 112px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      height: calc(100dvh - 112px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    }
  }

</style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="hero-title-row">
        <span class="hero-atom" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <circle cx="24" cy="24" r="2.8" fill="#1d6fd1" stroke="none"></circle>
            <ellipse cx="24" cy="24" rx="16" ry="7.2"></ellipse>
            <ellipse cx="24" cy="24" rx="16" ry="7.2" transform="rotate(60 24 24)"></ellipse>
            <ellipse cx="24" cy="24" rx="16" ry="7.2" transform="rotate(-60 24 24)"></ellipse>
          </svg>
        </span>

function renderQuestion() {
  const q = questions[currentIndex];
  const card = document.getElementById('questionCard');
  const letters = ['A','B','C','D','E'];
  const userAns = answers[currentIndex];
  let imageHtml = '';
  if (q.image && images[q.image]) {
    imageHtml = `<div class="illustration"><img src="${images[q.image]}" alt="รูปประกอบข้อ ${currentIndex+1}"></div>`;
  }
  let labBtnHtml = '';
  if (q.lab) {
    labBtnHtml = `<button class="mini-lab-trigger" onclick="openLab('${q.lab}', ${currentIndex})">🔬 Mini Lab</button>`;
  }
  const choicesHtml = q.choices.map((choice, idx) => {
    let cls = 'choice';
    if (userAns !== null) {
      cls += ' locked';
      if (idx === q.answer) cls += ' correct';
      else if (idx === userAns) cls += ' wrong';
    }
    return `
      <button class="${cls}" onclick="selectChoice(${idx})" ${userAns !== null ? 'disabled' : ''}>
        <div class="choice-key">${letters[idx]}</div>
        <div class="choice-text">${choice}</div>
      </button>`;
  }).join('');

  let feedbackHtml = '';
  if (userAns !== null) {
    const correct = userAns === q.answer;
    feedbackHtml = `
      <div class="feedback">
        <div class="feedback-title ${correct ? 'ok' : 'no'}">${correct ? '✅ ตอบถูก' : '❌ ยังสับสนจุดนี้'}</div>
        <p><strong>Hint:</strong> ${q.hint}</p>
        <p><strong>วิเคราะห์ Concept ที่ควรทบทวน:</strong> ${q.explain}</p>
      </div>`;
  }

  card.innerHTML = `
    <div class="pill-row">
      <div class="pill qno">🧠 ข้อ ${currentIndex + 1}</div>
      <div class="pill topic">${q.topic}</div>
    </div>
    <div class="question-text">${q.prompt}</div>
    ${imageHtml}
    ${labBtnHtml}
    <div class="choice-list">${choicesHtml}</div>
    ${feedbackHtml}
  `;
  document.getElementById('centerBtn').textContent = `ข้อ ${currentIndex + 1}`;
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === questions.length - 1;
  renderPicker();
  rerenderMath();
}

function selectChoice(idx) {
  if (answers[currentIndex] !== null) return;
  answers[currentIndex] = idx;
  const q = questions[currentIndex];
  const correct = idx === q.answer;
  if (!topicStats[q.topic]) topicStats[q.topic] = {wrong:0, total:0};
  topicStats[q.topic].total += 1;
  if (!correct) {
    topicStats[q.topic].wrong += 1;
    wrongTopics.push({
      index: currentIndex + 1,
      topic: q.topic,
      prompt: q.prompt,
      explain: q.explain
    });
  }
  updateProgress();
  renderQuestion();
}

function updateProgress() {
  const done = answers.filter(v => v !== null).length;
  const correct = answers.reduce((sum, ans, i) => sum + ((ans !== null && ans === questions[i].answer) ? 1 : 0), 0);
  const percent = (done / questions.length) * 100;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('progressText').textContent = `ทำแล้ว ${done} / ${questions.length} ข้อ`;
  document.getElementById('scoreText').textContent = `คะแนน ${correct}`;
  document.getElementById('summaryBtn').style.display = done === questions.length ? 'block' : 'none';
}

function renderPicker() {
  const list = document.getElementById('pickerList');
  list.innerHTML = questions.map((q, i) => {
    const done = answers[i] !== null;
    const active = i === currentIndex;
    return `
      <button class="picker-item ${done ? 'done' : ''} ${active ? 'active' : ''}" onclick="goToQuestion(${i})">
        <div class="picker-no">ข้อ ${i+1}</div>
        <div class="picker-title">${q.topic}</div>
        <div class="picker-circle"></div>
      </button>
    `;
  }).join('');
}

function goToQuestion(i) {
  currentIndex = i;
  closePicker();
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

function openPicker() {
  document.getElementById('pickerSheet').style.display = 'block';
}
function closePicker() {
  document.getElementById('pickerSheet').style.display = 'none';
}

function rerenderMath() {
  if (window.MathJax && window.MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(() => null);
  }
}

        ถ้า <b>Eแสง = w</b> → อิเล็กตรอนหลุดแต่ <b>Ek(max) = 0</b><br/>

  <!-- ===== Popup: สูตรสำคัญ ===== -->
  <div class="overlay" id="formulaOverlay" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="formulaTitle">
      <header>
        <h3 id="formulaTitle">สูตรสำคัญ & หลักการ</h3>
        <button class="close-btn" id="closeFormula">ปิด</button>
      </header>
      <div class="content">
        <span class="pill">Photoelectric Effect</span>
        <div style="margin-top:8px;color:var(--sheet-muted)">
          เมื่อแสง (โฟตอน) ตกกระทบผิวโลหะ พลังงานของโฟตอนจะถ่ายเทให้กับอิเล็กตรอนเป็นแบบ “ครั้งละ 1 ต่อ 1”
          หากพลังงานโฟตอนไม่พอเอาชนะแรงยึดเหนี่ยว (ฟังก์ชันงาน w) อิเล็กตรอนจะไม่หลุดออกมา
        </div>

        <div class="formula">
          <b>สูตรหลัก:</b> <br/>
          <b>Ek(max) = Eแสง − w</b><br/>
          <small>
            โดยที่: Ek(max) = พลังงานจลน์สูงสุดของอิเล็กตรอนที่ถูกปลดปล่อย (หน่วย eV),<br/>
            Eแสง = พลังงานโฟตอน (eV), w = ฟังก์ชันงานของโลหะ (eV)
          </small>
        </div>

        <div class="grid-two">
          <div>
            <h4 style="margin:8px 0 6px 0">เมื่อไรอิเล็กตรอนจะ “หลุด”?</h4>
            <ul style="margin:0 0 8px 16px;color:var(--sheet-muted)">
              <li>ถ้า <b>Eแสง &gt; w</b> → หลุด และมีพลังงานจลน์เหลือ: <b>Ek(max) = Eแสง − w</b></li>
              <li>ถ้า <b>Eแสง = w</b> → หลุด “พอดี” แต่ <b>Ek(max)=0</b></li>
              <li>ถ้า <b>Eแสง &lt; w</b> → ไม่หลุด</li>
            </ul>
          </div>
          <div>
            <h4 style="margin:8px 0 6px 0">หมายเหตุ: ทำไมต้องมีคำว่า “max” ?</h4>
            <div style="color:var(--sheet-muted)">
              อิเล็กตรอนในโลหะไม่ได้อยู่ผิวหน้าเหมือนกันทั้งหมด บางตัวอยู่ “ลึก” ต้องใช้พลังงานมากกว่าจะหลุด
              ดังนั้นพลังงานจลน์ที่ได้จริงของอิเล็กตรอนส่วนใหญ่จะน้อยกว่า หรือเท่ากับค่า <b>Ek(max)</b> ซึ่งเป็น “ค่าสูงสุด”
              ที่เกิดกับอิเล็กตรอนที่สูญเสียพลังงานให้น้อยที่สุด (เช่นอยู่ใกล้ผิว)
            </div>
          </div>
        </div>

        <div class="formula">
          <b>ความสัมพันธ์กับความถี่/ความยาวคลื่น</b><br/>
          Eแสง = h f = (hc)/λ  &nbsp; (เมื่อ h = ค่าคงที่พลังค์, c = ความเร็วแสง, f = ความถี่, λ = ความยาวคลื่น)
        </div>

        <div style="text-align:right;margin-top:8px">
          <button class="close-btn" id="closeFormula2">ปิด</button>
        </div>
      </div>

  <!-- ===== Popup: กราฟ Ek(max)–f ===== -->
  <div class="overlay" id="graphOverlay" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="graphTitle">
      <header>
        <h3 id="graphTitle">กราฟ Ek(max)–f (พลังงานจลน์สูงสุด vs ความถี่)</h3>
        <button class="close-btn" id="closeGraph">ปิด</button>
      </header>
      <div class="content" id="graphContent">
        <div class="pill">เส้นตรงตามสมการ Ek(max) = (h/e)·f − w</div>
        <div class="graph-layout">
          <div class="graph-main">
            <canvas id="graphCanvas" width="900" height="420" style="width:100%;height:auto;border:1px dashed #bae6fd;border-radius:12px;background:#fff"></canvas>
          </div>
          <div class="graph-side">
            <div class="formula">
              <div style="font-weight:800;margin-bottom:6px">ตั้งค่า</div>
              <label style="display:block;font-size:13px;color:var(--sheet-muted)">w (eV)</label>
              <input id="graph_w_input" type="number" step="0.01" min="0" value="2.30"
                     style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#0f172a;font-weight:700">
              <div style="margin-top:10px;color:var(--sheet-muted);font-size:14px;line-height:1.6">
                <div>ความชัน (m): <b id="slopeVal">—</b> <small>eV/THz</small></div>
                <div>จุดตัดแกน f (ความถี่ขีดเริ่ม f₀): <b id="f0Val">—</b> <small>THz</small></div>
                <div>จุดตัดแกนEk(max): <b id="yintVal">—</b> <small>eV</small></div>
              </div>
            </div>
            <div class="formula">
              <div style="font-weight:800;margin-bottom:6px">สรุปสูตร (กรณีหน่วยพลังงาน eV)</div>
              <div>Ek(max) = (h/e)·f − w</div>
              <div>slope(m)=h/e<small>(คงที่)ไม่ขึ้นกับชนิดโลหะ</div>
              </div>f₀ = w /(h/e)</div>
              <div></b>จุดตัดแกนตั้ง</b>:<b>Ek(max) = −w (eV)</b></div>
              <div style="margin-top:6px;color:#334155">
              <div><b>หมายเหตุ</b><div>
 ถ้าพลังงานอยู่ในหน่วย J <br>สูตรคือ </b>Ek(max) = hf − w 
                <br>slope = h และ f₀ = w/h
              </div>
            </div>
            <div class="formula">
              <div><b>อธิบาย:</b></div>
              <div style="color:#334155;font-size:14px;margin-top:6px">
                • จุดตัดแกน f: f₀ เป็นค่าความถี่ขีดเริ่มที่อิเล็กตรอนหลุดพอดี Ek(max)=0<br>
                • ส่วนที่  Ek(max) &lt; 0 แสดงเป็น <b>เส้นปะ</b> เพื่อให้เห็นแนวโน้มเชิงเส้น
              </div>
            </div>
            <div style="text-align:right"><button class="close-btn" id="closeGraph2">ปิด</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  // ===== ค่าคงที่ฟิสิกส์ =====
  const h=6.62607015e-34, q=1.602176634e-19, me=9.10938356e-31, c=299792458;

  // ===== DOM หลัก =====
  const canvas=document.getElementById('stage'),ctx=canvas.getContext('2d');
  const metalPreset=document.getElementById('metalPreset'),
        workInput=document.getElementById('work'),
        adjustModeSel=document.getElementById('adjustMode'),
        freqNum=document.getElementById('freqNum'),
        lambdaNum=document.getElementById('lambdaNum'),
        ENum=document.getElementById('ENum'),
        photonCountInput=document.getElementById('photonCount');
  const emitBtn=document.getElementById('emit'),
        playBtn=document.getElementById('play'),
        resetBtn=document.getElementById('reset'),
        toggleThemeBtn=document.getElementById('toggleTheme');

  // Popups
  const formulaOverlay=document.getElementById('formulaOverlay');
  const openFormula=document.getElementById('openFormula');
  const closeFormula=document.getElementById('closeFormula');
  const closeFormula2=document.getElementById('closeFormula2');

  const quizOverlay=document.getElementById('quizOverlay');
  const openQuiz=document.getElementById('openQuiz');
  const closeQuiz=document.getElementById('closeQuiz');
  const quizContent=document.getElementById('quizContent');

  // Graph
  const graphOverlay = document.getElementById('graphOverlay');
  const openGraph = document.getElementById('openGraph');
  const closeGraph = document.getElementById('closeGraph');
  const closeGraph2 = document.getElementById('closeGraph2');
  const graphCanvas = document.getElementById('graphCanvas');
  const gctx = graphCanvas.getContext('2d');
  const graph_w_input = document.getElementById('graph_w_input');
  const slopeVal = document.getElementById('slopeVal');
  const f0Val = document.getElementById('f0Val');
  const yintVal = document.getElementById('yintVal');

  // HUD
  const hud={f:document.getElementById('hud_f'),
             lambda:document.getElementById('hud_lambda'),
             E:document.getElementById('hud_E'),
             w:document.getElementById('hud_w'),
             Ek:document.getElementById('hud_Ek'),
             status:document.getElementById('hud_status')};
  const metalLabel=document.getElementById('metalLabel');

  // เวที
  const W=canvas.width,H=canvas.height;
  const metal={x:90,y:H*0.15,w:220,h:H*0.7};
  const lightSource={x:W*0.75,y:80};
  const lightDir={x:-1,y:0.6};
  const lightSpeed=360;

  // สถานะ
  let electrons=[],freeElectrons=[],photons=[],impacts=[],running=true,lastCalc={EeV:0,Ek_eV:0,pColor:'#fff',f_THz:750,lambda_nm:0};

  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function fmt(x,d=3){if(!isFinite(x))return '—';return Number(x).toLocaleString(undefined,{maximumFractionDigits:d});}
  function photonColorFromF(f){
    const nm=(c/f)*1e9; let color='#ffffff';
    if(nm>=380&&nm<=780){
      if(nm<450) color='#8b5cf6';
      else if(nm<520) color='#60a5fa';
      else if(nm<590) color='#22c55e';
      else if(nm<620) color='#f59e0b';
      else if(nm<700) color='#f97316';
      else color='#ef4444';
    }
    return color;
  }

  function setSingleElectron(){
    electrons.length=0; freeElectrons.length=0;
    const x=metal.x+metal.w/2, y=metal.y+metal.h/2;
    electrons.push({x,y,r:7});
  }

  function setFromFreqTHz(fTHz, from){
    fTHz = clamp(fTHz, 200, 1600);
    const f = fTHz*1e12;
    const EeV = (h*f)/q;
    const lambda_nm = (c/f)*1e9;

    if(from!=='freqNum')   freqNum.value   = Math.round(fTHz);
    if(from!=='lambdaNum') lambdaNum.value = Math.round(clamp(lambda_nm,187,1500));
    if(from!=='ENum')      ENum.value      = EeV.toFixed(3);

    calcAll(f, EeV, lambda_nm);
  }
  function setFromLambdaNm(lambda_nm, from){
    lambda_nm = clamp(lambda_nm, 187, 1500);
    const f = c/(lambda_nm*1e-9);
    const fTHz = f/1e12;
    const EeV = (h*f)/q;

    if(from!=='lambdaNum') lambdaNum.value = Math.round(lambda_nm);
    if(from!=='freqNum')   freqNum.value   = Math.round(clamp(fTHz,200,1600));
    if(from!=='ENum')      ENum.value      = EeV.toFixed(3);

    calcAll(f, EeV, lambda_nm);
  }
  function setFromEnergyEV(EeV, from){
    EeV = Math.max(0, Number(EeV)||0);
    const f = (EeV*q)/h;
    const fTHz = f/1e12;
    const lambda_nm = (c/f)*1e9;

    if(from!=='ENum')      ENum.value      = EeV.toFixed(3);
    if(from!=='freqNum')   freqNum.value   = Math.round(clamp(fTHz,200,1600));
    if(from!=='lambdaNum') lambdaNum.value = Math.round(clamp(lambda_nm,187,1500));

    calcAll(f, EeV, lambda_nm);
  }

  function calcAll(f, EeV, lambda_nm){
    if(f==null){
      const fTHz=Number(freqNum.value);
      f=fTHz*1e12; EeV=(h*f)/q; lambda_nm=(c/f)*1e9;
    }

    const w_eV = Number(workInput.value||0);
    const Ek_eV = Math.max(0, EeV - w_eV);

    lastCalc={...lastCalc,EeV,Ek_eV,pColor:photonColorFromF(f),f_THz:f/1e12,lambda_nm};

    hud.f.textContent=\`\${fmt(f/1e12,2)} THz\`;
    hud.lambda.textContent=\`\${fmt(lambda_nm,2)} nm\`;
    hud.E.textContent=\`\${fmt(EeV,3)} eV\`;
    hud.w.textContent=\`\${fmt(w_eV,3)} eV\`;
    hud.Ek.textContent=\`\${fmt(Ek_eV,3)} eV\`;
    hud.status.textContent=(EeV<w_eV)?'E<w: ไม่ปลดปล่อย':(Math.abs(EeV-w_eV)<1e-9?'E=w: Ek(max)=0':'E>w: Ek(max)=E-w');

    // ตำแหน่งป้าย w ทางขวาของโลหะ ห่าง 30px ที่ความสูง 0.7
    metalLabel.textContent=\`โลหะ (w = \${fmt(w_eV,3)} eV)\`;
    metalLabel.style.left = (metal.x + metal.w + 30) + 'px';
    metalLabel.style.top  = (metal.y + metal.h*0.7) + 'px';
  }

  function drawBrushedMetalRect(x,y,w,h){
    const g = ctx.createLinearGradient(x, y, x+w, y);
    g.addColorStop(0.0,  '#aeb5bd');
    g.addColorStop(0.25, '#e6eaee');
    g.addColorStop(0.5,  '#c7cdd3');
    g.addColorStop(0.75, '#f1f4f7');
    g.addColorStop(1.0,  '#aeb5bd');
    ctx.fillStyle=g;
    ctx.fillRect(x,y,w,h);

    ctx.save();
    ctx.globalAlpha=0.20;
    ctx.strokeStyle='rgba(0,0,0,.35)';
    for(let yy=y+2; yy<y+h; yy+=3){
      ctx.beginPath();
      ctx.moveTo(x, yy + Math.sin(yy*0.05)*0.6);
      ctx.lineTo(x+w, yy + Math.cos(yy*0.05)*0.6);
      ctx.stroke();
    }
    ctx.restore();

    ctx.save();
    const g2 = ctx.createLinearGradient(x,y,x,y+h);
    g2.addColorStop(0,'rgba(255,255,255,.35)');
    g2.addColorStop(0.08,'rgba(255,255,255,0)');
    g2.addColorStop(0.92,'rgba(0,0,0,0)');
    g2.addColorStop(1,'rgba(0,0,0,.20)');
    ctx.fillStyle=g2;
    ctx.fillRect(x,y,w,h);
    ctx.restore();

    ctx.strokeStyle='rgba(0,0,0,.35)';
    ctx.lineWidth=1;
    ctx.strokeRect(x+0.5,y+0.5,w-1,h-1);
  }

  function createPhotons(n){
    for(let i=0;i<n;i++){
      const x=lightSource.x+(Math.random()-0.5)*80,
            y=lightSource.y+(Math.random()-0.5)*40,
            dir={...lightDir};
      const mag=Math.hypot(dir.x,dir.y); dir.x/=mag; dir.y/=mag;
      const speed=lightSpeed*(0.9+Math.random()*0.2);
      const vx=dir.x*speed, vy=dir.y*speed;
      const angle=Math.atan2(vy,vx);
      photons.push({x,y,angle,len:30,amp:6,color:lastCalc.pColor,vx,vy,hit:false});
    }
  }

  function addImpact(x,y,color){ impacts.push({x,y,color,t:0,ttl:0.35}); }

  function tryEmitElectron(p, now){
    if(p.x>metal.x && p.x<metal.x+metal.w && p.y>metal.y && p.y<metal.y+metal.h){
      p.hit=true;
      const EeV = lastCalc.EeV, w = Number(workInput.value||0);
      addImpact(p.x, p.y, p.color);
      if(EeV<w) return;
      const EkJ = (EeV - w)*q;
      const v=Math.sqrt(2*EkJ/me);
      const vpx=clamp((v/1e6)*30,60,900);
      freeElectrons.push({x:metal.x+metal.w+2,y:p.y,r:7,vx:vpx,vy:(Math.random()-0.5)*20,emittedAt: now});
    }
  }

  function drawMetal(){ drawBrushedMetalRect(metal.x,metal.y,metal.w,metal.h); }

  function drawLightSource(){
    ctx.save();
    ctx.translate(lightSource.x,lightSource.y);
    ctx.rotate(Math.atan2(lightDir.y,lightDir.x));
    ctx.fillStyle='#1f2937'; ctx.fillRect(-20,-8,40,16);
    ctx.fillStyle='#94a3b8'; ctx.fillRect(20,-10,14,20);
    ctx.fillStyle='rgba(255,255,200,.25)';
    ctx.beginPath();
    ctx.moveTo(34,-20); ctx.lineTo(160,-56); ctx.lineTo(160,56); ctx.lineTo(34,20);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawPhotonPacket(p){
    const {x,y,angle,len,amp,color}=p;
    ctx.save(); ctx.translate(x,y); ctx.rotate(angle);
    ctx.globalCompositeOperation='lighter';
    ctx.shadowColor=color; ctx.shadowBlur=18;

    ctx.beginPath();
    const k= (Math.PI*2)/10;
    for(let s=-len/2; s<=len/2; s+=2){
      const yy = Math.sin(s*k)*amp, xx = s;
      if(s===-len/2) ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy);
    }
    ctx.strokeStyle=color; ctx.lineWidth=3; ctx.stroke();
    ctx.beginPath(); ctx.arc(len/2, 0, 2.6, 0, Math.PI*2); ctx.fillStyle=color; ctx.fill();

    ctx.restore(); ctx.globalCompositeOperation='source-over';
  }

  function drawImpacts(dt){
    impacts.forEach(im=>{
      im.t += dt;
      const life = Math.min(1, im.t/im.ttl);
      const alpha = (1-life);
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle=im.color;
      ctx.fillStyle=im.color;
      ctx.globalAlpha = 0.4*alpha;
      ctx.beginPath();
      ctx.arc(im.x, im.y, 10+life*16, 0, Math.PI*2);
      ctx.stroke();
      ctx.beginPath();
      ctx.globalAlpha = 0.6*alpha;
      ctx.arc(im.x, im.y, 2.2, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    impacts = impacts.filter(im=>im.t < im.ttl);
  }

  function drawPhotons(dt, now){
    for(const p of photons){
      if(!p.hit){ p.x+=p.vx*dt; p.y+=p.vy*dt; }
      drawPhotonPacket(p);
      if(!p.hit) tryEmitElectron(p, now);
    }
    photons=photons.filter(p=>!p.hit && p.x>-50 && p.x<W+50 && p.y>-50 && p.y<H+50);
  }
  function drawFreeElectrons(dt){
    for(const e of freeElectrons){
      e.x+=e.vx*dt; e.y+=e.vy*dt;
      ctx.beginPath(); ctx.fillStyle='#fb923c';
      ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#111'; ctx.font='12px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('e',e.x,e.y);
    }
    freeElectrons=freeElectrons.filter(e=>e.x<W+60 && e.y>0 && e.y<H);
  }

  function drawBadge(text, x, y){
    ctx.font='700 28px ui-sans-serif, system-ui, "Noto Sans Thai"';
    ctx.textBaseline='middle';
    const padX=14, h=40, w=ctx.measureText(text).width + padX*2, r=12;
    let x0 = clamp(x, 0, W - w - 2), y0 = clamp(y, 0, H - h - 2);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x0+r,y0);
    ctx.arcTo(x0+w,y0,x0+w,y0+h,r);
    ctx.arcTo(x0+w,y0+h,x0,y0+h,r);
    ctx.arcTo(x0,y0+h,x0,y0,r);
    ctx.arcTo(x0,y0,x0+w,y0,r);
    ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--badge-fill') || 'rgba(2,6,23,.82)';
    ctx.fill();
    ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--badge-stroke') || 'rgba(148,163,184,.28)';
    ctx.lineWidth=2; ctx.stroke();
    ctx.shadowColor='rgba(0,0,0,.25)'; ctx.shadowBlur=10; ctx.shadowOffsetY=4;
    ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--ink') || '#e5e7eb';
    ctx.fillText(text, x0+padX, y0+h/2);
    ctx.restore();
  }
  function drawFloatingTags(now){
    let leadPhoton=null;
    for(const p of photons){ if(!leadPhoton || p.x < leadPhoton.x) leadPhoton=p; }
    if(leadPhoton){
      const txt=\`Eแสง = \${fmt(lastCalc.EeV,3)} eV\`;
      const badgeX = leadPhoton.x + 14;
      const badgeY = leadPhoton.y - 20 - 40;
      drawBadge(txt, badgeX, badgeY);
    }

    const READY_DELAY = 0.7;
    let leadElec=null;
    for(const e of freeElectrons){
      if(now - (e.emittedAt||0) >= READY_DELAY){
        if(!leadElec || e.x > leadElec.x) leadElec=e;
      }
    }
    if(leadElec){
      const txt=\`Ek(max) = \${fmt(lastCalc.Ek_eV,3)} eV\`;
      const badgeX = leadElec.x + 14;
      const badgeY = leadElec.y - 20 - 40;
      drawBadge(txt, badgeX, badgeY);
    }
  }

  // ===== แบบฝึกหัด =====
  const QUIZ = [
    { q: "กำหนด w = 2.30 eV ถ้า Eแสง = 2.00 eV จะเกิดอะไรขึ้น?",
      choices: ["อิเล็กตรอนหลุดด้วย Ek(max) = 0.30 eV", "อิเล็กตรอนไม่หลุด", "อิเล็กตรอนหลุดแต่ Ek(max)=0", "ข้อมูลไม่พอ"],
      ans: 1, why: "เพราะ Eแสง < w จึงไม่สามารถเอาชนะแรงยึดเหนี่ยวได้ อิเล็กตรอนไม่หลุด" },
    { q: "กำหนด w = 2.30 eV ถ้า Eแสง = 2.30 eV จะได้ผลอย่างไร?",
      choices: ["ไม่หลุด", "หลุดและ Ek(max)=0", "หลุดและ Ek(max)=0.46 eV", "ขึ้นกับจำนวนโฟตอน"],
      ans: 1, why: "เมื่อ Eแสง = w อิเล็กตรอนหลุดพอดีโดยไม่มีพลังงานจลน์คงเหลือ (Ek(max)=0)" },
    { q: "กำหนด w = 2.30 eV ถ้า Eแสง = 3.10 eV ค่า Ek(max) เท่ากับเท่าไร?",
      choices: ["0.80 eV", "1.20 eV", "3.10 eV", "0 eV"],
      ans: 0, why: "Ek(max) = Eแสง − w = 3.10 − 2.30 = 0.80 eV" },
    { q: "เหตุผลที่ใช้คำว่า Ek(max) แทน Ek คืออะไร?",
      choices: ["เพื่อให้ดูเท่เฉยๆ", "เพราะอิเล็กตรอนทุกตัวได้พลังงานเท่ากัน", "เพราะบางอิเล็กตรอนอยู่ลึก สูญเสียพลังงานมากกว่า จึงได้ Ek น้อยกว่า", "เพราะขึ้นกับจำนวนโฟตอน"],
      ans: 2, why: "อิเล็กตรอนที่อยู่ลึกต้องใช้พลังงานมากกว่าในการหลุด ทำให้ Ek จริงของมันน้อยกว่าค่าสูงสุด" }
  ];

  function renderQuiz(){
    const thaiChoices = ['ก','ข','ค','ง'];
    const wrap = document.createElement('div');
    wrap.innerHTML = \`
      <div class="pill">ทดสอบความเข้าใจ</div>
      <p style="color:var(--sheet-muted);margin:8px 0 12px 0">เลือกคำตอบที่ถูกต้องที่สุดในแต่ละข้อ</p>
      \${QUIZ.map((it,idx)=>\`
        <div class="qcard" data-q="\${idx}">
          <h4>ข้อที่ \${idx+1}. \${it.q}</h4>
          <div class="choices">
            \${it.choices.map((c,i)=>\`
              <label class="choice">
                <input type="radio" name="q\${idx}" value="\${i}"/>
                <span>\${thaiChoices[i]}. \${c}</span>
              </label>
            \`).join('')}
          </div>
          <div class="explain" id="exp\${idx}" style="display:none"></div>
        </div>
      \`).join('')}
      <button class="submit-quiz" id="submitQuizBtn">ตรวจคำตอบ</button>
      <div class="result-box" id="quizResult" style="display:none"></div>
      <div style="text-align:right;margin-top:8px"><button class="close-btn" id="closeQuiz2">ปิด กลับสู่หน้าแรก</button></div>
    \`;
    quizContent.innerHTML = '';
    quizContent.appendChild(wrap);

    document.getElementById('submitQuizBtn').onclick = () => {
      let score=0;
      QUIZ.forEach((it,idx)=>{
        const sel = quizContent.querySelector('input[name="q'+idx+'"]:checked');
        const ans = sel ? Number(sel.value) : -1;
        const correct = ans===it.ans;
        if(correct) score++;

        const exp = document.getElementById('exp'+idx);
        exp.style.display='block';
        exp.innerHTML = '<b>เฉลย:</b> '+it.choices[it.ans]+'<br/><small>'+it.why+'</small>';

        const card = quizContent.querySelector('.qcard[data-q="'+idx+'"]');
        card.style.borderColor = correct ? '#86efac' : '#fecaca';
        card.style.background = correct ? '#ecfdf5' : '#fff7ed';
      });
      const result = document.getElementById('quizResult');
      result.style.display='block';
      result.textContent = 'คะแนนของคุณ: '+score+' / '+QUIZ.length;
    };

    document.getElementById('closeQuiz2').onclick = () => hideOverlay(quizOverlay);
  }

  // ====== ลูปอนิเมชันหลัก ======
  let last=performance.now();
  function loop(nowMs){
    const now = nowMs/1000;
    const dt=Math.min(0.05,(nowMs-last)/1000); last=nowMs;
    if(running){
      ctx.clearRect(0,0,W,H);
      drawLightSource();
      drawMetal();
      drawPhotons(dt, now);
      drawFreeElectrons(dt);
      drawImpacts(dt);
      drawFloatingTags(now);
    }
    requestAnimationFrame(loop);
  }

  function applyPreset(wev){ workInput.value = (+wev).toFixed(2); calcAll(); }
  metalPreset.onchange = () => { if(metalPreset.value!=='custom') applyPreset(parseFloat(metalPreset.value)); };
  workInput.oninput = () => calcAll();

  adjustModeSel.onchange = () => {
    const mode = adjustModeSel.value;
    freqNum.disabled   = mode!=='f';
    lambdaNum.disabled = mode!=='lambda';
    ENum.disabled      = mode!=='E';
  };

  freqNum.oninput   = () => { if(!freqNum.disabled)   setFromFreqTHz(Number(freqNum.value), 'freqNum'); };
  lambdaNum.oninput = () => { if(!lambdaNum.disabled) setFromLambdaNm(Number(lambdaNum.value), 'lambdaNum'); };
  ENum.oninput      = () => { if(!ENum.disabled)      setFromEnergyEV(Number(ENum.value), 'ENum'); };

  emitBtn.onclick = ()=> createPhotons(Number(photonCountInput.value));
  playBtn.onclick = ()=> running=!running;

  // ✅ รีเซ็ตค่าเริ่มต้น
  function resetToDefaults(){
    photons=[]; freeElectrons=[]; impacts=[];
    workInput.value = '2.30';
    adjustModeSel.value = 'E';
    freqNum.disabled = true;
    lambdaNum.disabled = true;
    ENum.disabled = false;
    photonCountInput.value = '1';
    setFromEnergyEV(3.000, 'ENum');
    setSingleElectron();
  }
  resetBtn.onclick = resetToDefaults;

  // Toggle Theme
  toggleThemeBtn.onclick = () => {
    document.body.classList.toggle('light');
  };

  // Popups
  function showOverlay(el){ el.classList.add('show'); el.setAttribute('aria-hidden','false'); }
  function hideOverlay(el){ el.classList.remove('show'); el.setAttribute('aria-hidden','true'); }
  openFormula.onclick = ()=> showOverlay(formulaOverlay);

  openQuiz.onclick = ()=>{ renderQuiz(); showOverlay(quizOverlay); };
  closeQuiz.onclick = ()=> hideOverlay(quizOverlay);

  // ===== กราฟ Ek–f =====
  const h_over_e = h/q;              // eV·s
  const m_per_THz = h_over_e * 1e12; // eV/THz

  function drawEkf(){
    const Wg = graphCanvas.width, Hg = graphCanvas.height;
    const L=70, R=20, T=20, B=60;
    const fMin = 0, fMax = 1600;
    const w_eV = Number(graph_w_input.value||0);
    const EkMin = -Math.max(1, w_eV*1.2);
    const EkMax = Math.max(2, m_per_THz*fMax - w_eV);
    const x2px=f => L + (f - fMin) * (Wg-L-R)/(fMax - fMin);
    const y2px=Ek => (Hg - B) - (Ek - EkMin) * (Hg - T - B)/(EkMax - EkMin);

    // clear
    gctx.clearRect(0,0,Wg,Hg);

    // axes
    gctx.strokeStyle = '#cbd5e1'; gctx.lineWidth = 1; gctx.beginPath();
    const yZero = y2px(0);
    gctx.moveTo(L, yZero); gctx.lineTo(Wg-R, yZero);
    gctx.moveTo(x2px(0), T); gctx.lineTo(x2px(0), Hg-B); gctx.stroke();

    // ticks
    gctx.fillStyle = '#334155'; gctx.font = '12px ui-sans-serif';
    for(let f=0; f<=fMax; f+=200){
      const x=x2px(f); gctx.beginPath(); gctx.moveTo(x, yZero-4); gctx.lineTo(x, yZero+4); gctx.stroke();
      gctx.fillText(String(f), x-10, yZero+18);
    }
    const EkStep = Math.max(0.5, Math.round((EkMax - EkMin)/10*2)/2);
    for(let Ek=EkMin; Ek<=EkMax; Ek+=EkStep){
      const y=y2px(Ek); gctx.beginPath(); gctx.moveTo(L-4, y); gctx.lineTo(L+4, y); gctx.stroke();
      gctx.fillText(Ek.toFixed(1), L-44, y+4);
    }

    // labels
    gctx.font = '13px ui-sans-serif';
    gctx.fillText('f (THz)', Wg/2 - 20, Hg - 20);
    gctx.save(); gctx.translate(18, Hg/2); gctx.rotate(-Math.PI/2); gctx.fillText('Ek (eV)', -26, 0); gctx.restore();

    // solid line for Ek>=0
    gctx.lineWidth = 2; gctx.strokeStyle = '#0ea5e9'; gctx.beginPath(); let started=false;
    for(let f=fMin; f<=fMax; f+=2){
      const Ek = m_per_THz*f - w_eV;
      if(Ek>=0){
        const x=x2px(f), y=y2px(Ek);
        if(!started){ gctx.moveTo(x,y); started=true; } else gctx.lineTo(x,y);
      }
    }
    gctx.stroke();

    // dashed line for Ek<0
    gctx.beginPath(); gctx.setLineDash([8,6]); started=false;
    for(let f=fMin; f<=fMax; f+=2){
      const Ek = m_per_THz*f - w_eV;
      if(Ek<0){
        const x=x2px(f), y=y2px(Ek);
        if(!started){ gctx.moveTo(x,y); started=true; } else gctx.lineTo(x,y);
      }
    }
    gctx.strokeStyle = '#60a5fa'; gctx.stroke(); gctx.setLineDash([]);

    // threshold f0
    const f0 = w_eV / m_per_THz;
    const x0 = x2px(f0);
    gctx.strokeStyle='#ef4444'; gctx.setLineDash([6,6]); gctx.beginPath(); gctx.moveTo(x0, T); gctx.lineTo(x0, Hg-B); gctx.stroke(); gctx.setLineDash([]);
    gctx.fillStyle='#ef4444'; gctx.fillText(\`f₀ ≈ \${f0.toFixed(1)} THz\`, x0+6, T+16);

    // y intercept at f=0 is -w
    const yint = -w_eV;
    const yintPx = y2px(yint);
    gctx.fillStyle='#16a34a';
    gctx.fillText(\`y-intercept ≈ \${(-w_eV).toFixed(2)} eV\`, L+8, yintPx-8);
    gctx.beginPath(); gctx.arc(x2px(0), yintPx, 4, 0, 2*Math.PI); gctx.fill();

    // slope annotation
    gctx.fillStyle = '#075985';
    gctx.fillText(\`m ≈ \${m_per_THz.toFixed(6)} eV/THz\`, Wg-220, T+16);

    // HUD values
    slopeVal.textContent = m_per_THz.toFixed(6);
    f0Val.textContent = f0.toFixed(2);
    yintVal.textContent = (-w_eV).toFixed(2);
  }

  // Graph bindings
  function openGraphSheet(){ drawEkf(); showOverlay(graphOverlay); }
  openGraph.onclick = () => openGraphSheet();
  closeGraph.onclick = () => hideOverlay(graphOverlay);
  closeGraph2.onclick = () => hideOverlay(graphOverlay);
  graph_w_input.oninput = () => drawEkf();

  // ปุ่มลอยบนมือถือ
  const mEmit = document.getElementById('mEmit');
  const mPlay = document.getElementById('mPlay');
  const mReset = document.getElementById('mReset');
  const mFormula = document.getElementById('mFormula');
  const mQuiz = document.getElementById('mQuiz');
  const mGraph = document.getElementById('mGraph');
  if(mEmit) mEmit.onclick = () => emitBtn.click();
  if(mPlay) mPlay.onclick = () => playBtn.click();
  if(mReset) mReset.onclick = () => resetBtn.click();
  if(mFormula) mFormula.onclick = () => openFormula.click();
  if(mQuiz) mQuiz.onclick = () => openQuiz.click();
  if(mGraph) mGraph.onclick = () => openGraph.click();

  // เริ่มต้น
  resetToDefaults();
  requestAnimationFrame(loop);
})();
<\/script>
</body>

<label><input name="q1" type="radio" value="B"/> ไม่หลุด (ไม่เกิดโฟโตอิเล็กตรอน)</label>
<label><input name="q1" type="radio" value="C"/> หลุดแต่ Ek=0</label>
<label><input name="q1" type="radio" value="D"/> ขึ้นกับความเข้ม</label>
</div>
<div class="res"></div>
</div>
<div class="q" data-ans="A" data-explain="Ek(max)=E−w=3.00−2.30=0.70 eV ⇒ Vₛ=−Ek=−0.70 V">
<div><b>ข้อที่ 2.</b> w=2.30 eV, E=3.00 eV → V<sub>s</sub> เท่าไร?</div>
<div class="choices">
<label><input name="q2" type="radio" value="A"/> −0.70 V</label>
<label><input name="q2" type="radio" value="B"/> −3.00 V</label>
<label><input name="q2" type="radio" value="C"/> +0.70 V</label>
<label><input name="q2" type="radio" value="D"/> 0 V</label>
</div>
<div class="res"></div>
</div>
<div class="q" data-ans="A" data-explain="ความเข้ม↑ = จำนวนโฟตอน/วินาที↑ ⇒ e⁻/วินาที↑ ⇒ I↑ แต่ไม่เปลี่ยน Vₛ">
<div><b>ข้อที่ 3.</b> เพิ่มความเข้มแสง ผลต่อกระแส?</div>
<div class="choices">
<label><input name="q3" type="radio" value="A"/> I เพิ่ม</label>
<label><input name="q3" type="radio" value="B"/> |V<sub>s</sub>| เพิ่ม</label>
<label><input name="q3" type="radio" value="C"/> Ek(max) เพิ่ม</label>
<label><input name="q3" type="radio" value="D"/> ไม่เปลี่ยน</label>
</div>
<div class="res"></div>
</div>
<div class="q" data-ans="B" data-explain="f สูงขึ้น ⇒ E=hf สูงขึ้น ⇒ Ek(max) สูงขึ้น ⇒ ต้องใช้ |Vₛ| มากขึ้นจึงหยุดได้">
<div><b>ข้อที่ 4.</b> ความถี่สูงขึ้น (ความเข้มคงเดิม) ผลคือ?</div>
<div class="choices">
<label><input name="q4" type="radio" value="A"/> I อิ่มตัว↑</label>
<label><input name="q4" type="radio" value="B"/> |V<sub>s</sub>|↑</label>
<label><input name="q4" type="radio" value="C"/> |V<sub>s</sub>|↓</label>
<label><input name="q4" type="radio" value="D"/> I=0</label>
</div>
<div class="res"></div>
</div>
<div class="actions" style="display:flex;gap:10px;margin-top:10px;position:sticky;bottom:0;background:#fff;border-top:1px solid var(--panel-border);padding:10px 0">
<button id="checkQuiz">ตรวจคำตอบ</button>
<button class="ghost" id="clearQuiz">ล้าง</button>
<div id="scoreBox" style="margin-left:auto;font-weight:800"></div>
</div>
<div style="display:flex;justify-content:flex-end;margin-top:10px">
<button class="close-footer" id="closeQuizFooter">ปิด (กลับสู่หน้าแรก)</button>
</div>
</div>
</div>
</div>
</div>
<script>
(()=> {
  const $=id=>document.getElementById(id);

  // ===== Constants =====
  const h_eVs=4.135667696e-15, c=2.99792458e8;
  const METER_SCALE_UA_PER_HITS_PER_SEC = 0.10;
  const METER_WINDOW_SEC = 0.5;
  const RETURN_ZERO_SPEED = 0.55;

  // ===== Canvas / UI =====
  const cv=$('cv'), ctx=cv.getContext('2d');
  const ui={mode:$('mode'),E:$('E'),fTHz:$('fTHz'),lam:$('lambdaNm'),
            metalPreset:$('metalPreset'),w:$('w'),V:$('V'),
            intensitySel:$('intensitySel'),pulse:$('pulse'),reset:$('reset'),
            hE:$('hE'),hf:$('hf'),hlam:$('hlam'),hW:$('hW'),hEk:$('hEk'),
            hV:$('hV'),hVs:$('hVs'),hI:$('hI'),hS:$('hS'),
            btnBg:$('btnBg')};

  const legendEl=$('legend');

  // ===== Geometry =====
  const W=cv.width,H=cv.height;
  const tube={x:W*0.06,y:H*0.10,w:W*0.88,h:H*0.70,r:16};
  const L={x:tube.x+34,y:tube.y+38,w:16,h:tube.h-76};
  const R={x:tube.x+tube.w-50,y:tube.y+38,w:16,h:tube.h-76};
  const lamp={x:Math.max(tube.x+120,tube.x+tube.w-120-250),y:tube.y-6};

  // ===== Dynamics / limits =====
  const VISUAL_WAVES_PER_SEC_MAX=20, MAX_VISUAL_WAVES_ONSCREEN=80, MAX_ELECTRONS=140;
  const VMAX=560, ACCEL_SCALE=14, DECEL_STOP=90;

  // ===== State =====
  let photons=[], electrons=[];
  let meterSmoothI=0;
  let visualAcc=0;
  let hitsAnodeTimes=[];
  let lightMode=false;

  // ===== Utils =====
  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);}
  function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
  function energyColor(E){const nm=1240/Math.max(E,0.01); if(nm<450)return'#8b5cf6'; if(nm<495)return'#60a5fa'; if(nm<570)return'#22c55e'; if(nm<590)return'#f59e0b'; if(nm<620)return'#f97316'; return'#ef4444';}
  function hexToRGB(hex){hex=hex.replace('#',''); const n=parseInt(hex,16); return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};}
  const rate=()=>+ui.intensitySel.value||0;
  const getVar=(name,fallback)=>getComputedStyle(document.documentElement).getPropertyValue(name).trim()||fallback;

  // ===== Conversions + HUD =====
  function setMode(){const m=ui.mode.value; ui.E.disabled=(m!=='E'); ui.fTHz.disabled=(m!=='f'); ui.lam.disabled=(m!=='λ');}
  function syncFromE(){const E=+ui.E.value||0; const fTHz=E/h_eVs/1e12; const lam=1240/Math.max(E,1e-9); ui.fTHz.value=Math.round(fTHz)||''; ui.lam.value=Math.round(lam)||'';}
  function syncFromF(){const fTHz=+ui.fTHz.value||0; const E=h_eVs*(fTHz*1e12); const lam=(c/(fTHz*1e12))*1e9; ui.E.value=isFinite(E)?E.toFixed(3):''; ui.lam.value=isFinite(lam)?Math.round(lam):'';}
  function syncFromLam(){const lam=+ui.lam.value||0; const E=1240/Math.max(lam,1e-9); const fTHz=(E/h_eVs)/1e12; ui.E.value=E.toFixed(3); ui.fTHz.value=Math.round(fTHz)||'';}
  function hud(){const E=+ui.E.value||0,w=+ui.w.value||0,V=+ui.V.value||0,Ek=Math.max(0,E-w),Vs=-Ek,fTHz=+ui.fTHz.value||0,lam=+ui.lam.value||0;
    $('hE').textContent=E.toFixed(3)+' eV'; $('hf').textContent=fTHz?fTHz.toFixed(0)+' THz':'—'; $('hlam').textContent=lam?lam.toFixed(0)+' nm':'—';
    $('hW').textContent=w.toFixed(2)+' eV'; $('hEk').textContent=Ek.toFixed(2)+' eV'; $('hV').textContent=(V>=0?'+':'')+V.toFixed(2)+' V';
    $('hVs').textContent=Vs.toFixed(2)+' V'; $('hI').textContent=rate()+' photons/s';
    $('hS').textContent=(E<=w)?'E≤w ไม่ปล่อย':(Math.abs(V-Vs)<1e-6?'V=Vs — หยุด(ไม่หลุด)':
                     (V<Vs?'V<Vs วกกลับ':'V>Vs วิ่งถึงขวา')); }

  // ===== Battery + wires + meter + lamp =====
  function drawWires(rightPlus){
    const mid=tube.y+tube.h+24;
    const cx=(L.x+L.w/2+R.x+R.w/2)/2;
    const long=12, short=8, lx=cx-18, rx=cx+18;
    const plus={x:rightPlus?rx:lx, y:mid+(rightPlus?long:short)+2};
    const minus={x:rightPlus?lx:rx, y:mid+(rightPlus?short:long)+2};
    const fromL={x:L.x+L.w/2,y:L.y+L.h};
    const fromR={x:R.x+R.w/2,y:R.y+R.h};

    function wire(a,b,color){
      ctx.strokeStyle=color; ctx.lineWidth=3;
      ctx.beginPath(); const my=(a.y+b.y)/2;
      ctx.moveTo(a.x,a.y); ctx.bezierCurveTo(a.x,my,b.x,my,b.x,b.y); ctx.stroke();
    }
    if(rightPlus){ wire(fromR, plus, getVar('--wire-red','#ef4444')); wire(fromL, minus, getVar('--wire-blue','#67e8f9')); }
    else{ wire(fromR, minus, getVar('--wire-blue','#67e8f9')); wire(fromL, plus, getVar('--wire-red','#ef4444')); }
  }

  function drawBatteryAndLabels(){
    const V=+ui.V.value||0, rightPlus=(V>=0);
    const mid=tube.y+tube.h+24, cx=(L.x+L.w/2+R.x+R.w/2)/2;
    const long=12, short=8, lx=cx-18, rx=cx+18;
    ctx.strokeStyle='#93c5fd'; ctx.lineWidth=2;
    if(rightPlus){ line(lx,mid-short,lx,mid+short); line(rx,mid-long,rx,mid+long); }
    else{ line(lx,mid-long,lx,mid+long); line(rx,mid-short,rx,mid+short); }

    drawWires(rightPlus);

    ctx.fillStyle=getVar('--label','#111'); ctx.font=graphFont(12,17);
    ctx.fillText('V = '+(V>=0?'+':'')+V.toFixed(2)+' V', cx-28, mid+20);
    if(rightPlus){ ctx.fillText('−',L.x-12,L.y-6); ctx.fillText('+',R.x+R.w+6,R.y-6); }
    else{ ctx.fillText('+',L.x-12,L.y-6); ctx.fillText('−',R.x+R.w+6,R.y-6); }
  }

  function drawMicroA(){
    const now=performance.now()/1000;
    hitsAnodeTimes = hitsAnodeTimes.filter(t=> now - t <= METER_WINDOW_SEC);
    const hitsPerSec = hitsAnodeTimes.length / METER_WINDOW_SEC;
    const IuA_meas = hitsPerSec * METER_SCALE_UA_PER_HITS_PER_SEC;

    if (IuA_meas <= 1e-6) {
      meterSmoothI += (0 - meterSmoothI) * RETURN_ZERO_SPEED;
      if (Math.abs(meterSmoothI) < 0.002) meterSmoothI = 0;
    } else {
      meterSmoothI += 0.2 * (IuA_meas - meterSmoothI);
    }

    const x=W-210,y=tube.y+tube.h-86,w=170,h=88;
    ctx.fillStyle=getVar('--meter-face','#f8fafc'); ctx.strokeStyle=getVar('--meter-stroke','rgba(0,0,0,.15)'); ctx.lineWidth=1.5;
    ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);

    const cx=x+w/2, cy=y+h-10, r=54, Imax=2.0;
    const span = 0.7*Math.PI;
    const a0   = -Math.PI/2;

    ctx.beginPath(); ctx.arc(cx,cy,r,a0,a0+span); ctx.strokeStyle='#94a3b8'; ctx.lineWidth=2; ctx.stroke();

    for(let i=0;i<=10;i++){
      const t=a0 + span*(i/10);
      const x1=cx+r*Math.cos(t), y1=cy+r*Math.sin(t);
      const x2=cx+(r-8)*Math.cos(t), y2=cy+(r-8)*Math.sin(t);
      ctx.strokeStyle='#94a3b8'; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
    ctx.fillStyle='#475569'; ctx.font=graphFont(11,16);
    ctx.fillText('0', cx-4, cy-r+12);

    const frac=Math.max(0,Math.min(1,meterSmoothI/Imax));
    const ang=a0 + span*frac;
    const nx=cx+(r-12)*Math.cos(ang), ny=cy+(r-12)*Math.sin(ang);
    ctx.strokeStyle='#ef4444'; ctx.lineWidth=2.8; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(nx,ny); ctx.stroke();
    ctx.fillStyle=getVar('--label','#111'); ctx.beginPath(); ctx.arc(cx,cy,3,0,2*Math.PI); ctx.fill();
    ctx.fillStyle=getVar('--label','#111'); ctx.font=graphFont(12,17); ctx.fillText('μA', cx-10, y+18);
  }

  function drawLamp(){
    const tx=L.x+L.w/2, ty=L.y+L.h*0.5, ang=Math.atan2(ty-lamp.y, tx-lamp.x);
    ctx.save(); ctx.translate(lamp.x,lamp.y); ctx.rotate(ang);
    ctx.fillStyle='#334155'; ctx.fillRect(-20,-8,40,16);
    ctx.fillStyle='#cbd5e1'; ctx.fillRect(20,-10,14,20);
    const E=+ui.E.value||0, col=energyColor(E), rgb=hexToRGB(col);
    const alpha = (rate()<=5)?0.15: (rate()<=10?0.23:0.33);
    const grad = ctx.createLinearGradient(34,0,220,0);
    grad.addColorStop(0,\`rgba(\${rgb.r},\${rgb.g},\${rgb.b},\${alpha})\`);
    grad.addColorStop(1,\`rgba(\${rgb.r},\${rgb.g},\${rgb.b},0)\`);
    ctx.fillStyle=grad; ctx.beginPath();
    ctx.moveTo(34,-20); ctx.lineTo(220,-86); ctx.lineTo(220,86); ctx.lineTo(34,20); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawScene(){
    ctx.strokeStyle=getVar('--tube-line','rgba(255,255,255,.9)'); ctx.lineWidth=3; rr(tube.x,tube.y,tube.w,tube.h,tube.r); ctx.stroke();
    ctx.fillStyle=getVar('--left-elec','rgba(148,163,184,.95)'); ctx.fillRect(L.x,L.y,L.w,L.h);
    ctx.fillStyle=getVar('--right-elec','rgba(147,197,253,.95)'); ctx.fillRect(R.x,R.y,R.w,R.h);
    drawBatteryAndLabels();
    drawMicroA();
    drawLamp();
  }

  // ===== Photons & emission =====
  function spawnPhotonOne(){
    const E=+ui.E.value||0, col=energyColor(E);
    const yAim=L.y+8+Math.random()*(L.h-16);
    const dx=(L.x+L.w/2)-lamp.x, dy=yAim-lamp.y, m=Math.hypot(dx,dy)||1, ux=dx/m, uy=dy/m;
    const p={x:lamp.x,y:lamp.y,vx:ux*560,vy:uy*560,col,px:lamp.x,py:lamp.y,hit:false};
    photons.push(p);
  }
  function spawnPhotons(n){for(let i=0;i<n;i++) spawnPhotonOne();}
  function photonHitsLeft(p){
    const x0=p.px,y0=p.py,x1=p.x,y1=p.y;
    if(x1!==x0){
      const t=(L.x - x0)/(x1 - x0), y=y0+t*(y1-y0);
      if(t>=0 && t<=1 && y>=L.y && y<=L.y+L.h){ p.hitY=y; return true; }
      const t2=((L.x+L.w)-x0)/(x1-x0), y2=y0+t2*(y1-y0);
      if(t2>=0 && t2<=1 && y2>=L.y && y2<=L.y+L.h){ p.hitY=y2; return true; }
    }
    if(y1!==y0){
      const t3=(L.y-y0)/(y1-y0), x=x0+t3*(x1-x0);
      if(t3>=0 && t3<=1 && x>=L.x && x<=L.x+L.w){ p.hitY=L.y; return true; }
      const t4=((L.y+L.h)-y0)/(y1-y0), x2=x0+t4*(x1-x0);
      if(t4>=0 && t4<=1 && x2>=L.x && x2<=L.x+L.w){ p.hitY=L.y+L.h; return true; }
    }
    return false;
  }
  function emitElectronAt(y){
    const E=+ui.E.value||0, w=+ui.w.value||0, V=+ui.V.value||0;
    if(E<=w) return;
    const Ek0=E-w, Vs=-(Ek0);
    if (Math.abs(V - Vs) < 1e-6) return;
    const v0=Math.min(Math.sqrt(Ek0)*95, VMAX*0.7);
    electrons.push({x:L.x+L.w+1,y, vx:v0, vy:(Math.random()-0.5)*5.5, Ek0});
  }
  function stepPhoton(p,dt){
    p.px=p.x; p.py=p.y; p.x+=p.vx*dt; p.y+=p.vy*dt;
    ctx.save(); ctx.translate(p.x,p.y); const ang=Math.atan2(p.vy,p.vx); ctx.rotate(ang);
    ctx.globalCompositeOperation='lighter'; ctx.shadowColor=p.col; ctx.shadowBlur=6;
    ctx.strokeStyle=p.col; ctx.lineWidth=1.8; const len=16, amp=3.6; ctx.beginPath();
    for(let s=-len/2;s<=len/2;s+=2){ const yy=Math.sin((s+p.x*0.08)*0.7)*amp, xx=s; if(s===-len/2)ctx.moveTo(xx,yy); else ctx.lineTo(xx,yy); }
    ctx.stroke(); ctx.restore(); ctx.globalCompositeOperation='source-over';
    if(!p.hit && photonHitsLeft(p)){ p.hit=true; emitElectronAt(Math.max(L.y+4, Math.min(p.hitY, L.y+L.h-4))); }
  }

  // ===== Electrons =====
  function stepElectrons(dt){
    const V=+ui.V.value||0;
    for(const e of electrons){
      const Ek_eff=e.Ek0 + V;
      if(Ek_eff>0){
        e.vx=Math.max(Math.abs(e.vx + ACCEL_SCALE*V*dt), 0);
      }else if(Math.abs(Ek_eff)<1e-6){
        e.vx = (e.vx>0)?Math.max(0,e.vx-DECEL_STOP*dt):Math.min(0,e.vx+DECEL_STOP*dt);
      }else{
        e.vx=-Math.max(Math.abs(e.vx - ACCEL_SCALE*Math.max(0.6,Math.abs(V))*dt), 0);
      }
      e.vx=Math.max(-VMAX, Math.min(VMAX, e.vx));
      e.x+=e.vx*dt; e.y+=e.vy*dt; e.y=Math.max(L.y+3, Math.min(L.y+L.h-3, e.y));
      if(e.vx>=0 && e.x>=R.x-2){ e.x=R.x-2; e.hit='anode'; }
      if(e.vx<=0 && e.x<=L.x+L.w+2){ e.x=L.x+L.w+2; e.hit='cathode'; }
    }
    const now=performance.now()/1000;
    for(const e of electrons){ if(e.hit==='anode'){ hitsAnodeTimes.push(now); } }
    electrons = electrons.filter(e=>!e.hit && e.x>tube.x-60 && e.x<tube.x+tube.w+60 && e.y>tube.y-10 && e.y<tube.y+tube.h+10);
    if(electrons.length>MAX_ELECTRONS) electrons.splice(0, electrons.length-MAX_ELECTRONS);

    ctx.fillStyle='#fb923c';
    for(const e of electrons){ ctx.beginPath(); ctx.arc(e.x,e.y,5.2,0,2*Math.PI); ctx.fill(); }
  }

  // ===== Loop =====
  function drawAll(){ ctx.clearRect(0,0,W,H); drawScene(); hud(); legendEl.classList.toggle('light', lightMode); }
  let lastTime=performance.now();
  function loop(now){
    const dt=Math.min(0.033,(now-lastTime)/1000); lastTime=now;
    visualAcc += Math.min(rate(), VISUAL_WAVES_PER_SEC_MAX)*dt;
    while(visualAcc>=1){ spawnPhotonOne(); visualAcc-=1; }
    if(photons.length>MAX_VISUAL_WAVES_ONSCREEN) photons.splice(0, photons.length-MAX_VISUAL_WAVES_ONSCREEN);
    drawAll();
    photons.forEach(p=>stepPhoton(p,dt));
    photons=photons.filter(p=>!p.hit && p.x>tube.x-120 && p.x<tube.x+tube.w+120 && p.y>tube.y-120 && p.y<tube.y+tube.h+120);
    stepElectrons(dt);
    requestAnimationFrame(loop);
  }

  // ===== Events =====
  function onMode(){setMode(); if(ui.mode.value==='E')syncFromE(); else if(ui.mode.value==='f')syncFromF(); else syncFromLam(); hud();}
  ui.mode.onchange=onMode;
  ui.E.oninput = ()=>{ if(ui.mode.value==='E') { syncFromE(); hud(); } };
  ui.fTHz.oninput = ()=>{ if(ui.mode.value==='f') { syncFromF(); hud(); } };
  ui.lam.oninput = ()=>{ if(ui.mode.value==='λ') { syncFromLam(); hud(); } };
  ui.metalPreset.onchange=()=>{ if(ui.metalPreset.value!=='custom'){ ui.w.value=(+ui.metalPreset.value).toFixed(2); hud(); drawVFIfOpen(); } };
  ['w','V','intensitySel'].forEach(id=> $(id).addEventListener('input', ()=>{hud(); drawVFIfOpen();}));

  ui.pulse.onclick=()=>{ const n=Math.max(1, Math.min(20, +ui.intensitySel.value||1)); spawnPhotons(n); };
  ui.reset.onclick=()=>{ 
    photons.length=0; electrons.length=0; hitsAnodeTimes.length=0; meterSmoothI=0;
    ui.mode.value='E'; setMode(); ui.E.value='3.000'; syncFromE(); ui.metalPreset.value='custom'; ui.w.value='2.30';
    ui.V.value='3.0'; ui.intensitySel.value='5'; visualAcc=0; hud(); spawnPhotons(6);
  };

  ui.btnBg.onclick=()=>{ lightMode=!lightMode; document.body.classList.toggle('light-stage', lightMode); };

  // ===== Modal controls =====
  const modF=$('modalFormula'), modG=$('modalGraphs'), modQ=$('modalQuiz');
  $('btnFormula').onclick=()=>{modF.style.display='flex'};
  $('btnGraphs').onclick=()=>{modG.style.display='flex'; drawIV_A(); drawVF(); setGraphTab('IV');};
  $('btnQuiz').onclick=()=>{modQ.style.display='flex'};
  document.querySelectorAll('[data-close]').forEach(b=> b.onclick=(e)=> e.target.closest('.backdrop').style.display='none');
  [modF,modG,modQ].forEach(m=> m.addEventListener('click',e=>{ if(e.target===m) m.style.display='none'; }));
  const closeQuizFooter = document.getElementById('closeQuizFooter'); if(closeQuizFooter){ closeQuizFooter.onclick=()=>{ modQ.style.display='none'; }; }

  // ===== Graphs: I–V =====
  const iv=$('iv'), gIV=iv.getContext('2d');

  const isMobileView = ()=> window.matchMedia('(max-width: 980px)').matches;
  const graphFont = (desktopPx, mobilePx)=> \`\${isMobileView()?mobilePx:desktopPx}px system-ui\`;
  const graphCanvasFont = (desktopPx, mobilePx)=> \`\${isMobileView()?(mobilePx+5):desktopPx}px system-ui\`;

  const Wiv=iv.width, Hiv=iv.height, padiv=50;
  const Vmin=-2.2, Vmax=5.0, Imax=5.0;
  const xIV = V => padiv + (V - Vmin)/(Vmax - Vmin)*(Wiv-2*padiv);
  const yIV = I => Hiv-padiv - (I/Imax)*(Hiv-2*padiv);

  function axesIV(){
    gIV.clearRect(0,0,Wiv,Hiv);
    gIV.lineWidth=1; gIV.strokeStyle=getVar('--grid','rgba(2,6,23,0.06)');
    for(let V=Math.ceil(Vmin); V<=Math.floor(Vmax); V+=1){
      const xx=xIV(V); gIV.beginPath(); gIV.moveTo(xx,padiv); gIV.lineTo(xx,Hiv-padiv); gIV.stroke();
    }
    for(let I=0; I<=Imax; I+=1){
      const yy=yIV(I); gIV.beginPath(); gIV.moveTo(padiv,yy); gIV.lineTo(Wiv-padiv,yy); gIV.stroke();
    }
    gIV.strokeStyle=getVar('--axis','#0f172a'); gIV.lineWidth=1.4; gIV.beginPath(); gIV.moveTo(padiv,Hiv-padiv); gIV.lineTo(Wiv-padiv,Hiv-padiv); gIV.stroke();
    const x0=xIV(0); gIV.strokeStyle=getVar('--axis-bold','#000'); gIV.lineWidth=2; gIV.beginPath(); gIV.moveTo(x0,padiv); gIV.lineTo(x0,Hiv-padiv); gIV.stroke();
    gIV.fillStyle=getVar('--label','#111'); gIV.font=graphCanvasFont(12,17);
    gIV.fillText('V (V)', Wiv-padiv-28, Hiv-padiv+35);
    gIV.save(); gIV.translate(padiv-31, padiv+2); gIV.rotate(-Math.PI/2); gIV.fillText('I (μA)', 0,0); gIV.restore();
    gIV.fillStyle=getVar('--label','#0f172a'); gIV.font=graphCanvasFont(11,16);
    for(let V=Math.ceil(Vmin); V<=Math.floor(Vmax); V+=1){ gIV.fillText(String(V), xIV(V)-6, Hiv-padiv+18); }
    for(let I=0; I<=Imax; I+=1){ gIV.fillText(String(I), padiv-24, yIV(I)+4); }
  }

  function curveIV(Isat, Vs, color){
    gIV.strokeStyle=color; gIV.lineWidth=2.6; gIV.beginPath();
    const N=320, k=10; // curvature factor
    for(let i=0;i<=N;i++){
      const V=Vmin + (i/N)*(Vmax-Vmin);
      const I = (V < Vs) ? 0 : Isat * (1 - Math.exp(-(V-Vs)*k));
      const xx=xIV(V), yy=yIV(Math.min(Isat, Math.max(0, I)));
      if(i===0) gIV.moveTo(xx,yy); else gIV.lineTo(xx,yy);
    }
    gIV.stroke();
  }
  function dashedVsIV(Vs,color){ gIV.setLineDash([6,6]); gIV.strokeStyle=color; gIV.lineWidth=1.6; gIV.beginPath(); gIV.moveTo(xIV(Vs), padiv); gIV.lineTo(xIV(Vs), Hiv-padiv); gIV.stroke(); gIV.setLineDash([]); }
  function legendsIV(items){ let lx=Wiv-260, ly=padiv+12; items.forEach(([t,c])=>{ gIV.fillStyle=c; gIV.fillRect(lx,ly-6,24,4); gIV.fillStyle=getVar('--label','#111'); gIV.fillText(t,lx+32,ly); ly+=20;}); }

  function drawIV_A(){
    axesIV();
    const Vs=-0.7, I1=4.0, I2=2.2;
    dashedVsIV(Vs,'rgba(34,197,94,.7)');
    curveIV(I1,Vs,'#2563eb'); // ความเข้มมาก
    curveIV(I2,Vs,'#16a34a'); // ความเข้มน้อย
    $('captionIV').innerHTML='เคส A: f เท่ากัน => V<sub>s</sub> เท่ากัน (เส้นปะสีเขียว) แต่ความเข้มต่างกัน=>I<sub>อิ่มตัว</sub> ต่างกัน(แสงที่มีความเข้มมากจะทำให้เกิดกระแสไฟฟ้าได้มาก) ';
    legendsIV([["ความเข้มสูง (ฟ้า)",'#2563eb'],["ความเข้มน้อย (เขียว)",'#16a34a']]);
  }

  function drawIV_B(){
    axesIV();
    const I=3.0, VsBlue=-1.0, VsGreen=-0.3; // ฟ้าต้อง |Vs| มากกว่า
    dashedVsIV(VsBlue,'rgba(59,130,246,.8)'); dashedVsIV(VsGreen,'rgba(34,197,94,.8)');
    curveIV(I,VsBlue,'#2563eb');
    curveIV(I,VsGreen,'#16a34a');
    $('captionIV').innerHTML='เคส B: ความเข้มเท่ากัน => I<sub>อิ่มตัว</sub> เท่ากัน แต่ fต่างกัน=> V<sub>s</sub>ต่างกัน (ฟ้า≈−1.0V, เขียว≈−0.3V) ';
    legendsIV([["ความถี่ 1 (ฟ้า)",'#2563eb'],["ความถี่ 2 (เขียว)",'#16a34a']]);
  }

  $('tabA').onclick=()=>{ $('tabA').classList.add('active'); $('tabB').classList.remove('active'); drawIV_A(); };
  $('tabB').onclick=()=>{ $('tabB').classList.add('active'); $('tabA').classList.remove('active'); drawIV_B(); };

  // ===== Graphs: |Vs|–f =====
  const vf=$('vf'), gVF=vf.getContext('2d');
  const W2=vf.width, H2=vf.height, pad2=50;
  function xVF(fTHz,fmax){ return pad2 + (fTHz)/(fmax) * (W2-2*pad2); }
  function yVF(Vs,Vmax){ return H2-pad2 - (Vs/Vmax) * (H2-2*pad2); }
  function drawVF(){
    const w=+ui.w.value||2.3;        // w ปัจจุบัน
    const fmaxTHz=1200;
    const slope_V_per_THz = h_eVs*1e12;    // V/THz
    const f0_THz = (w / h_eVs) / 1e12;
    const Vmax = Math.max(1.0, slope_V_per_THz*fmaxTHz - w + 0.5);

    // axes
    gVF.clearRect(0,0,W2,H2);
    gVF.strokeStyle=getVar('--axis','#0f172a'); gVF.lineWidth=1.4;
    gVF.beginPath(); gVF.moveTo(pad2, H2-pad2); gVF.lineTo(W2-pad2, H2-pad2); gVF.stroke();
    gVF.beginPath(); gVF.moveTo(pad2, H2-pad2); gVF.lineTo(pad2, pad2); gVF.stroke();
    gVF.fillStyle=getVar('--label','#111'); gVF.font=graphCanvasFont(12,17);
    gVF.fillText('f (THz)', W2-pad2-36, H2-pad2+35);
    gVF.save(); gVF.translate(pad2-31, pad2+17); gVF.rotate(-Math.PI/2); gVF.fillText('|Vₛ| (V)', 0, 0); gVF.restore();

    // line
    gVF.strokeStyle='#2563eb'; gVF.lineWidth=2.4; gVF.beginPath();
    let started=false; const N=400;
    for(let i=0;i<=N;i++){
      const fTHz = (i/N)*fmaxTHz;
      const Vs = Math.max(0, slope_V_per_THz*fTHz - w);
      const x=xVF(fTHz,fmaxTHz), y=yVF(Vs,Vmax);
      if(!started){ gVF.moveTo(x,y); started=true; } else gVF.lineTo(x,y);
    }
    gVF.stroke();

    // threshold f0 dashed
    const x0=xVF(f0_THz,fmaxTHz);
    gVF.setLineDash([6,6]); gVF.strokeStyle='rgba(34,197,94,.7)'; gVF.lineWidth=1.6;
    gVF.beginPath(); gVF.moveTo(x0, pad2); gVF.lineTo(x0, H2-pad2); gVF.stroke();
    gVF.setLineDash([]);
    gVF.fillStyle='#166534'; gVF.fillText('f₀', x0-8, H2-pad2+26);

    // caption
    const slopeVHz = h_eVs;
    $('captionVF').innerHTML = \`|V<sub>s</sub>| = h·f − w  (ใช้ h หน่วย eV·s) · <br><b>ความชัน = h/e = \${slopeVHz.toExponential(3)} V/Hz ≈ \${(slope_V_per_THz).toFixed(4)} V/THz,  </b><br><b>f₀ = w/h ≈ \${f0_THz.toFixed(1)} THz (เมื่อ w = \${w.toFixed(2)} eV)\`;
  }

  function drawVFIfOpen(){ if(document.getElementById('secVF').style.display!=='none'){ drawVF(); } }
  function setGraphTab(which){
    if(which==='IV'){ $('secIV').style.display='block'; $('secVF').style.display='none'; $('tabIV').classList.add('active'); $('tabVF').classList.remove('active'); drawIV_A(); }
    else{ $('secIV').style.display='none'; $('secVF').style.display='block'; $('tabVF').classList.add('active'); $('tabIV').classList.remove('active'); drawVF(); }
  }
  $('tabIV').onclick=()=> setGraphTab('IV');
  $('tabVF').onclick=()=> setGraphTab('VF');

  // Quiz logic
  const scoreBox=$('scoreBox');
  $('checkQuiz').onclick=()=>{
    let score=0, total=0;
    document.querySelectorAll('.quiz .q').forEach((q)=>{
      total++;
      const ans=q.getAttribute('data-ans');
      const explain=q.getAttribute('data-explain')||'';
      const chosen=(q.querySelector('input[type=radio]:checked')||{}).value;
      const res=q.querySelector(' .res');
      if(!chosen){ res.innerHTML='<span style="color:#b91c1c;font-weight:700">ยังไม่เลือกคำตอบ</span>'; return; }
      if(chosen===ans){ score++; res.innerHTML='<span style="color:#166534;font-weight:700">ถูกต้อง</span><br><small style="color:#0f172a">'+explain+'</small>'; }
      else{ res.innerHTML='<span style="color:#b91c1c;font-weight:700">ยังไม่ถูก</span><br><small style="color:#0f172a">เฉลย: '+ans+' — '+explain+'</small>'; }
    });
    scoreBox.textContent = \`คะแนน: \${score} / \${total}\`;
  };
  $('clearQuiz').onclick=()=>{
    document.querySelectorAll('.quiz input[type=radio]').forEach(i=> i.checked=false);
    document.querySelectorAll('.quiz .res').forEach(r=> r.textContent='');
    scoreBox.textContent='';
  };

  // Boot
  function onAnyChange(){ hud(); drawVFIfOpen(); }
  ['w'].forEach(id=> $(id).addEventListener('input', onAnyChange));
  setMode(); syncFromE(); hud();
  spawnPhotons(6);
  requestAnimationFrame(loop);
})();
<\/script>
</body>
</html>
`
};

function getLabConfig(type, qIndex) {
  const base = LAB_IFRAME_CONFIGS[type];
  if (!base) return null;
  const q = (typeof qIndex === 'number' && questions[qIndex]) ? questions[qIndex] : null;
  return {
    ...base,
    mission: q && q.labMission ? q.labMission : base.mission,
    labNi: q && q.labNi ? q.labNi : base.labNi,
    labNf: q && q.labNf ? q.labNf : base.labNf
  };
}

function renderIframeLab(type, qIndex) {
  const cfg = getLabConfig(type, qIndex);
  if (!cfg) return '';
  return `
    <div class="lab-frame-shell">
      <h3 class="modal-title">${cfg.title}</h3>
      ${cfg.subtitle ? `<p class="modal-sub">${cfg.subtitle}</p>` : ``}

        <iframe
          id="labIframe"

          title="${cfg.title}"
          sandbox="allow-scripts allow-same-origin allow-forms allow-modals"
          referrerpolicy="no-referrer"
        ></iframe>
      </div>
    </div>
  `;
}

      cfg.setup(iframe, cfg);
    } catch (e) {}

function updatePhotonLab() {
  const f = Number(document.getElementById('freqRange').value);
  const h = 6.63e-34;
  const E = h * f * 1e14;
  const eV = E / 1.602e-19;
  document.getElementById('freqVal').textContent = f.toFixed(1);
  document.getElementById('photonResult').innerHTML =
    `พลังงานโฟตอน = \\(hf = ${E.toExponential(3)}\\ \\text{J}\\) <br>หรือประมาณ \\(${eV.toFixed(2)}\\ \\text{eV}\\)`;
  rerenderMath();
}

function syncBohrRanges(source) {
  const niEl = document.getElementById('niRange');
  const nfEl = document.getElementById('nfRange');
  let ni = Number(niEl.value);
  let nf = Number(nfEl.value);
  if (nf >= ni) {
    if (source === 'ni') nf = Math.max(1, ni - 1);
    else ni = Math.min(6, nf + 1);
  }
  niEl.value = ni;
  nfEl.value = nf;
  updateBohrLab();
}

function updateBohrLab() {
  const ni = Number(document.getElementById('niRange').value);
  const nf = Number(document.getElementById('nfRange').value);
  document.getElementById('niVal').textContent = ni;
  document.getElementById('nfVal').textContent = nf;
  const Ei = -13.6/(ni*ni);
  const Ef = -13.6/(nf*nf);
  const dE = Ei - Ef;
  const lambdaNm = 1240/Math.abs(dE);
  document.getElementById('bohrResult').innerHTML =
    `\\(E_i = ${Ei.toFixed(3)}\\ \\text{eV}\\), \\(E_f = ${Ef.toFixed(3)}\\ \\text{eV}\\)<br>
     \\(\\Delta E = E_i - E_f = ${dE.toFixed(3)}\\ \\text{eV}\\)<br>
     ความยาวคลื่นโฟตอน \\(\\lambda \\approx ${lambdaNm.toFixed(1)}\\ \\text{nm}\\)`;
  rerenderMath();
}

function updatePhotoLab() {
  const f = Number(document.getElementById('photoFreq').value);
  document.getElementById('photoFreqVal').textContent = f.toFixed(1);
  const Vs = (-2) + (5/12)*f;
  document.getElementById('photoResult').innerHTML =
    `จากกราฟสมมติ \\(V_s \\approx -2 + \\frac{5}{12}f\\) เมื่อ \\(f\\) อยู่ในหน่วย \\(10^{14}\\ \\text{Hz}\\)<br>
     ได้ \\(V_s \\approx ${Vs.toFixed(2)}\\ \\text{V}\\) และ \\(E_{k(\\max)} = eV_s\\)`;
  rerenderMath();
}
