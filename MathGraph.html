<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mini Lab : สมการคณิตศาสตร์และกราฟ</title>
  <style>
    :root{
      --blue:#2f6fd6;--dark:#123d70;--soft-blue:#edf3fb;--line:#d8e3ef;
      --text:#1f2d3d;--shadow:0 10px 24px rgba(28,55,90,.13);
    }
    *{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{
      margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#f7fbff 0%,#eef5ff 100%);
      color:var(--text);padding:14px 12px calc(80px + env(safe-area-inset-bottom));
    }
    .wrap{max-width:1120px;margin:0 auto}
    header{text-align:center;margin:4px 0 12px}
    header h1{margin:0;color:var(--blue);font-size:clamp(24px,3.6vw,42px);font-weight:900;line-height:1.12}
    header h2{margin:4px 0 0;color:#204d7c;font-size:clamp(19px,2.8vw,32px);font-weight:900;line-height:1.12}
    .top-card,.panel,.graph-card,.info-card{
      background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:14px;
    }
    .top-card{margin-bottom:12px}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
    .tab{
      border:1.5px solid #bcd2ec;background:#fff;color:#285985;border-radius:17px;
      font-weight:900;font-size:16px;padding:11px 8px;cursor:pointer;transition:.15s;
    }
    .tab.active{background:#dceeff;border-color:#71a7db;color:#123d70}
    .grid{display:flex;flex-direction:column;gap:12px}
    .desktop-layout{display:flex;flex-direction:column;gap:12px}
    .right-column{display:flex;flex-direction:column;gap:12px}
    .panel h3,.graph-card h3,.info-card h3{margin:0 0 10px;color:var(--dark);font-size:25px;font-weight:900}
    .equationBox{
      background:var(--soft-blue);border:1px solid #cddff4;border-radius:19px;padding:12px;margin-bottom:10px;
      text-align:center;font-size:22px;font-weight:900;color:var(--dark);min-height:60px;
      display:flex;align-items:center;justify-content:center;white-space:nowrap;
    }
    .controls-list{display:grid;gap:10px}
    .control{
      display:grid;grid-template-columns:48px 42px minmax(120px,1fr) 42px 74px;gap:8px;align-items:center;
      padding:10px;border:1px solid #e1e8f2;border-radius:18px;background:#fafcff;
    }
    .control label{font-weight:900;color:#315d89;font-size:20px;text-align:center}
    .control button{height:42px;border:0;border-radius:14px;background:#e7eef6;color:#315d89;font-size:25px;font-weight:900;cursor:pointer}
    .control input[type=number]{
      height:42px;border:1px solid #cbd9ea;border-radius:14px;text-align:center;font-size:15px;font-weight:900;color:#1f3f66;width:100%;
    }
    .control input[type=range]{
      width:100%;accent-color:#2f6fd6;touch-action:none;cursor:pointer;
    }
    .control .desc{grid-column:1 / -1;font-size:12px;color:#5b728d;font-weight:800}
    .hint{font-size:16px;line-height:1.55;background:#fff8ea;border:1px solid #efd4a8;color:#704600;border-radius:18px;padding:10px;margin-top:10px}
    .graph-box{width:100%;overflow:hidden}
    canvas{
      width:100%;height:auto;max-height:min(56vh,520px);background:#fff;border:1px solid #d7e2ef;
      border-radius:20px;display:block;touch-action:none;
    }
    .info-card{margin-top:0;line-height:1.65;font-size:16px}
    .info-card ul{margin:6px 0 0;padding-left:22px}
    .footer-link{
      position:static;margin:16px auto 0;width:max-content;max-width:95%;
      background:rgba(255,255,255,.92);border:1px solid #d8e3ef;border-radius:999px;
      padding:8px 14px;box-shadow:0 8px 22px rgba(40,75,120,.12);font-weight:800;text-align:center;
    }
    .footer-link a{color:#2f6fd6;text-decoration:underline}

    @media(min-width:861px){
      .desktop-layout{
        display:grid;
        grid-template-columns:minmax(0,1fr) 360px;
        gap:14px;
        align-items:start;
      }
      .right-column{
        display:flex;
        flex-direction:column;
        gap:12px;
      }
      .graph-card,.panel,.info-card{margin:0}

      .control{
        grid-template-columns:44px 42px 74px 42px;
      }
      .control input[type=range]{
        display:none;
      }
      canvas{max-height:min(62vh,560px)}
    }

    @media(max-width:860px){
      body{padding:10px 8px calc(70px + env(safe-area-inset-bottom))}
      .grid{grid-template-columns:1fr}
      .desktop-layout{display:flex;flex-direction:column;gap:12px}
      .tabs{grid-template-columns:1fr}
      .top-card,.panel,.graph-card,.info-card{border-radius:21px;padding:12px}
      .panel h3,.graph-card h3,.info-card h3{font-size:25px}
      .equationBox{font-size:21px}
      .control{grid-template-columns:42px 38px 66px 38px minmax(100px,1fr);gap:7px;padding:9px}
      .control label{font-size:19px}
      .control button{height:39px;font-size:24px}
      .control input[type=number]{height:39px;font-size:14px}
      canvas{max-height:36vh}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header><h1>Mini Lab</h1><h2>สมการคณิตศาสตร์และกราฟ</h2></header>

    <section class="top-card">
      <div class="tabs">
        <button class="tab active" data-mode="line">📈 สมการเส้นตรง</button>
        <button class="tab" data-mode="parabola">🟦 พาราโบลา</button>
        <button class="tab" data-mode="hyperbola">🔁 ไฮเพอร์โบลา</button>
      </div>
    </section>

    <main class="desktop-layout">
      <section class="graph-card">
        <h3>📊 กราฟ</h3>
        <div class="graph-box"><canvas id="graph" width="780" height="520"></canvas></div>
      </section>

      <div class="right-column">
        <section class="panel">
          <h3>⚙️ ปรับค่าตัวเลข</h3>
          <div class="equationBox" id="eqBox"></div>
          <div id="controls" class="controls-list"></div>
          <div class="hint" id="hintBox"></div>
        </section>

        <section class="info-card">
          <h3>📘 แนวคิดสำคัญ</h3>
          <div id="concept"></div>
        </section>
      </div>
    </main>

    

    <div class="footer-link">ศึกษาเพิ่มเติมที่ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener">เพจคลายปมฟิสิกส์</a></div>
  </div>

<script>
const canvas=document.getElementById('graph'),ctx=canvas.getContext('2d');
const eqBox=document.getElementById('eqBox'),controlsEl=document.getElementById('controls'),hintBox=document.getElementById('hintBox'),conceptEl=document.getElementById('concept');
let mode='line';
const state={line:{m:1,b:0.5},parabola:{a:1,h:0,k:0},hyperbola:{a:4,h:0,k:0}};
const config={
  line:{
    controls:[['m','m ความชัน',-5,5,0.1],['b','b จุดตัดแกน y',-5,5,0.1]],
    eq:s=>`y = ${termCoeff(s.m)}x ${signed(s.b)}`,
    y:(x,s)=>s.m*x+s.b,
    hint:'เส้นตรงมีรูปทั่วไป y = mx + b โดย m คือความชัน และ b คือจุดที่กราฟตัดแกน y',
    concept:'<ul><li><b>m</b> ควบคุมความชันของกราฟ</li><li><b>b</b> ทำให้กราฟเลื่อนขึ้นหรือลงทั้งเส้น</li><li>เมื่อ <b>m เป็นลบ</b> กราฟจะลาดลงจากซ้ายไปขวา</li></ul>'
  },
  parabola:{
    controls:[['a','a ความโค้ง',-3,3,0.1],['h','h เลื่อนซ้าย-ขวา',-5,5,0.1],['k','k เลื่อนขึ้น-ลง',-5,5,0.1]],
    eq:s=>`y = ${termCoeff(s.a)}(x ${signed(-s.h)})² ${signed(s.k)}`,
    y:(x,s)=>s.a*Math.pow(x-s.h,2)+s.k,
    hint:'พาราโบลาใช้รูป y = a(x-h)² + k จุดยอดอยู่ที่ (h,k)',
    concept:'<ul><li><b>a > 0</b> กราฟหงายขึ้น</li><li><b>a < 0</b> กราฟคว่ำลง</li><li><b>(h,k)</b> คือจุดยอดของพาราโบลา</li></ul>'
  },
  hyperbola:{
    controls:[['a','a ตัวคูณ',-8,8,0.1],['h','h เลื่อนซ้าย-ขวา',-5,5,0.1],['k','k เลื่อนขึ้น-ลง',-5,5,0.1]],
    eq:s=>`y = ${fmt(s.a)} / (x ${signed(-s.h)}) ${signed(s.k)}`,
    y:(x,s)=>s.a/(x-s.h)+s.k,
    hint:'ไฮเพอร์โบลาใช้รูป y = a/(x-h) + k มีเส้นกำกับแนวดิ่ง x = h และแนวนอน y = k',
    concept:'<ul><li><b>x = h</b> เป็นเส้นกำกับแนวดิ่ง</li><li><b>y = k</b> เป็นเส้นกำกับแนวนอน</li><li>กราฟเข้าใกล้เส้นกำกับ แต่ไม่ตัดเส้นกำกับ</li></ul>'
  }
};
function fmt(v){if(Math.abs(v)<1e-9)return'0';const r=Math.round(v*10)/10;return Number.isInteger(r)?String(r):String(r)}
function termCoeff(v){if(Math.abs(v-1)<1e-9)return '';if(Math.abs(v+1)<1e-9)return '-';return fmt(v)}
function signed(v){if(Math.abs(v)<1e-9)return'+ 0';return v>=0?`+ ${fmt(v)}`:`- ${fmt(Math.abs(v))}`}
function round(v){return Math.round(v*10)/10}
function buildControls(){
  const s=state[mode]; controlsEl.innerHTML='';
  config[mode].controls.forEach(([key,label,min,max,step])=>{
    const row=document.createElement('div'); row.className='control';
    row.innerHTML=`
      <label>${key}</label>
      <button class="minus">−</button>
      <input class="num" type="number" min="${min}" max="${max}" step="${step}" value="${s[key]}">
      <button class="plus">+</button>
      <input class="range" type="range" min="${min}" max="${max}" step="${step}" value="${s[key]}">
      <div class="desc">${label}</div>`;
    const minus=row.querySelector('.minus'), plus=row.querySelector('.plus'), range=row.querySelector('.range'), num=row.querySelector('.num');
    const setVal=(v)=>{
      v=Math.max(Number(min),Math.min(Number(max),round(Number(v))));
      if(Number.isNaN(v)) return;
      s[key]=v; range.value=v; num.value=v; update();
    };
    minus.onclick=()=>setVal(s[key]-step);
    plus.onclick=()=>setVal(s[key]+step);
    range.oninput=()=>setVal(range.value);
    num.oninput=()=>setVal(num.value);
    controlsEl.appendChild(row);
  });
}
function setMode(next){
  mode=next;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  buildControls(); update();
}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
function mapX(x){return canvas.width/2+x*42}
function mapY(y){return canvas.height/2-y*42}
function drawGrid(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.lineWidth=1;ctx.strokeStyle='#edf2f7';ctx.font='18px system-ui';ctx.fillStyle='#789';
  for(let x=-9;x<=9;x++){const px=mapX(x);ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,canvas.height);ctx.stroke();if(x!==0)ctx.fillText(x,px-5,mapY(0)+23)}
  for(let y=-6;y<=6;y++){const py=mapY(y);ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(canvas.width,py);ctx.stroke();if(y!==0)ctx.fillText(y,mapX(0)+10,py+6)}
  ctx.strokeStyle='#8aa6c1';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,mapY(0));ctx.lineTo(canvas.width,mapY(0));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mapX(0),0);ctx.lineTo(mapX(0),canvas.height);ctx.stroke();
  ctx.fillStyle='#43627f';ctx.font='bold 20px system-ui';ctx.fillText('x',canvas.width-24,mapY(0)-10);ctx.fillText('y',mapX(0)-28,22);
}
function drawAsymptotes(s){
  if(mode!=='hyperbola')return;
  ctx.save();ctx.setLineDash([8,7]);ctx.strokeStyle='#d94141';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(mapX(s.h),0);ctx.lineTo(mapX(s.h),canvas.height);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,mapY(s.k));ctx.lineTo(canvas.width,mapY(s.k));ctx.stroke();
  ctx.setLineDash([]);ctx.fillStyle='#d94141';ctx.font='bold 19px system-ui';
  ctx.fillText(`x = ${fmt(s.h)}`,mapX(s.h)+8,32);ctx.fillText(`y = ${fmt(s.k)}`,canvas.width-100,mapY(s.k)-10);ctx.restore();
}
function drawGraph(){
  const s=state[mode],fn=config[mode].y;drawGrid();drawAsymptotes(s);
  ctx.strokeStyle='#2f6fd6';ctx.lineWidth=5;ctx.beginPath();
  let started=false;
  for(let px=0;px<=canvas.width;px++){
    const x=(px-canvas.width/2)/42;
    if(mode==='hyperbola'&&Math.abs(x-s.h)<0.04){started=false;continue}
    const y=fn(x,s),py=mapY(y);
    if(!Number.isFinite(y)||py<-1000||py>canvas.height+1000){started=false;continue}
    if(!started){ctx.moveTo(px,py);started=true}else ctx.lineTo(px,py);
  }
  ctx.stroke();drawSpecialPoints(s,fn);
}
function drawDot(x,y,label,color='#d94141'){
  const px=mapX(x),py=mapY(y);if(px<0||px>canvas.width||py<0||py>canvas.height)return;
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(px,py,7,0,Math.PI*2);ctx.fill();
  ctx.font='bold 19px system-ui';ctx.fillStyle=color;ctx.fillText(label,px+10,py-10);
}
function drawSpecialPoints(s,fn){
  if(mode==='line')drawDot(0,fn(0,s),`(0, ${fmt(fn(0,s))})`);
  else if(mode==='parabola')drawDot(s.h,s.k,`จุดยอด (${fmt(s.h)}, ${fmt(s.k)})`);
}
function update(){
  const c=config[mode],s=state[mode];
  eqBox.textContent=c.eq(s);hintBox.textContent=c.hint;conceptEl.innerHTML=c.concept;drawGraph();
}
buildControls();update();
</script>
</body>
</html>
