<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Rocket Motion – Continuous + Graphs (No Air Drag) v2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  canvas{ background:#f0f9ff; display:block; margin:auto; border-radius:12px; }
  .mono{ font-variant-numeric: tabular-nums; }
  .btn{ background:#2563eb; color:#fff; padding:0.55rem 0.95rem; border-radius:0.75rem; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
  .btn:hover{ background:#1d4ed8; }
  .btn-gray{ background:#475569; color:#fff; padding:0.55rem 0.95rem; border-radius:0.75rem; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
  .btn-gray:hover{ background:#334155; }
  .btn-green{ background:#059669; color:#fff; padding:0.55rem 0.95rem; border-radius:0.75rem; box-shadow:0 2px 6px rgba(0,0,0,0.12); }
  .btn-green:hover{ background:#047857; }
  .panel{ max-width:1000px; margin-inline:auto; }
  .card{ background:rgba(255,255,255,0.8); border:1px solid rgba(148,163,184,0.45); border-radius:14px; padding:12px; box-shadow:0 2px 10px rgba(15,23,42,0.06); }
  #simCanvas{ width:min(760px,100%); height:auto; }
  #vtCanvas,#ytCanvas{ width:100%; height:auto; }

  /* Desktop layout: controls on the right of the simulation */
  .layout-shell{ max-width:1000px; margin-inline:auto; }
  @media (min-width: 768px){
    .layout-shell{ display:flex; gap:14px; align-items:flex-start; }
    .layout-left{ flex:1 1 auto; }
    .layout-right{ width:340px; position:sticky; top:12px; }
    .layout-right .panel{ margin-top:0 !important; }
  }


/* === Desktop spacing fix: pull buttons up directly under controls === */
@media (min-width: 768px){
  .layout-right{
    align-self: flex-start;
  }
  .layout-right .panel,
  .layout-right .card{
    margin-bottom: 0 !important;
  }
  .layout-right .panel + .panel,
  .layout-right .card + .panel,
  .layout-right .panel + .card,
  .layout-right .card + .card{
    margin-top: 8px !important;
  }
}


/* === Mobile layout fix: Settings above canvas === */
@media (max-width: 767px){
  .layout-shell{
    display: flex;
    flex-direction: column;
  }
  .layout-right{
    order: 1;
    position: static;
    width: 100%;
  }
  .layout-left{
    order: 2;
  }
  .layout-right .panel,
  .layout-right .card{
    width: 100%;
  }
}

</style>
</head>
<body class="p-3 bg-gradient-to-br from-white to-blue-50 text-slate-900">

<h1 class="text-xl md:text-2xl font-bold text-center mb-2">🚀 <span class="text-blue-700">การเคลื่อนที่ของจรวด (ไม่คิดแรงต้านอากาศ)</span></h1>



<div class="layout-shell">
  <div class="layout-left">
    <div class="panel mt-3">
  <canvas id="simCanvas" width="760" height="540"></canvas>
</div>
  </div>
  <div class="layout-right">
    <div class="panel card">
  <div class="flex flex-wrap gap-3 justify-center items-end">
    <label>
      <span class="text-sm">ความสูงฐาน (m)</span><br>
      <input id="baseHeight" type="number" value="0" min="0" step="0.1" class="border p-2 w-24 rounded">
    </label>
    <label>
      <span class="text-sm">a ช่วงมีเชื้อเพลิง (m/s²)</span><br>
      <input id="acc" type="number" value="10" min="0" max="20" step="0.1" class="border p-2 w-32 rounded">
    </label>
    <label>
      <span class="text-sm">เวลาเชื้อเพลิงหมด (s)</span><br>
      <input id="fuelTime" type="number" value="5" min="0.1" step="0.1" class="border p-2 w-24 rounded">
    </label>
  </div>
</div>
    <div class="panel mt-3">
  <div class="card">
    <div class="flex flex-wrap gap-3 justify-center items-center">
      <button id="playPauseBtn" class="btn">▶ เล่น</button>
      <button id="resetBtn" class="btn-gray">🔄 รีเซ็ต</button>
      <button id="graphBtn" class="btn-green">📈 กราฟ</button>
    </div>
  </div>
</div>
  </div>
</div>



<div id="graphPanel" class="panel mt-3 hidden">
  <div class="card">
    <h2 class="font-semibold mb-2">กราฟการเคลื่อนที่</h2>
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <canvas id="vtCanvas" width="640" height="320"></canvas>
        <div class="text-center text-sm mt-1 mono">v (m/s) กับ t (s)</div>
      </div>
      <div>
        <canvas id="ytCanvas" width="640" height="320"></canvas>
        <div class="text-center text-sm mt-1 mono">y (m) กับ t (s)</div>
      </div>
    </div>
    <div class="text-xs mt-2 text-slate-600">*สีแดง = ช่วงมีเชื้อเพลิง, สีเขียว = ช่วงเชื้อเพลิงหมด</div>
  </div>
</div>


<div class="panel mt-2 text-xs text-slate-600 text-center">
  *หมายเหตุ: สเกลอาจไม่สมจริง, ไม่คิดขนาดของจรวด และไม่คิดผลของแรงต้านอากาศ
</div>

<p class="panel text-sm mt-3 text-center">
  ศึกษาเพิ่มเติมที่เพจ
  <a href="https://www.facebook.com/resolvephysics" class="text-blue-700 underline" target="_blank" rel="noopener">คลายปมฟิสิกส์</a>
</p>

<script>
(() => {
  const g = 9.8;

  const canvas = document.getElementById('simCanvas');
  const ctx = canvas.getContext('2d');

  const vtCanvas = document.getElementById('vtCanvas');
  const ytCanvas = document.getElementById('ytCanvas');
  const vtCtx = vtCanvas.getContext('2d');
  const ytCtx = ytCanvas.getContext('2d');

  const playBtn = document.getElementById('playPauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const graphBtn = document.getElementById('graphBtn');

  const graphPanel = document.getElementById('graphPanel');
  // ===== Audio + FX (no sound button; sound plays automatically after user gesture) =====
  // Sound style: use the SAME whoosh/boom implementation as the reference file provided by the user.
  let audioCtx = null, masterGain = null, whooshNode = null, whooshGain = null;

  let flashOn = false;
  let flashT = 0; // seconds
  const FLASH_DUR = 0.28;

  function ensureAudio(){
    try{
      if(!audioCtx){
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = AC ? new AC() : null;
        if(audioCtx){
          masterGain = audioCtx.createGain();
          masterGain.gain.value = 1;
          masterGain.connect(audioCtx.destination);
        }
      }
      if(audioCtx && audioCtx.state === 'suspended'){
        audioCtx.resume().catch(()=>{});
      }
    }catch(e){
      // If audio is unavailable, silently ignore (simulation still works).
    }
  }

  function playBoom(){
    if(!audioCtx || !masterGain) return;
    const now = audioCtx.currentTime;

    const dur = 0.8;
    const n = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    const ch = buf.getChannelData(0);

    for(let i=0;i<n;i++){
      ch[i] = (Math.random()*2-1) * Math.exp(-i/(audioCtx.sampleRate*0.35));
    }

    const src = audioCtx.createBufferSource();
    src.buffer = buf;

    const bp = audioCtx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 900;
    bp.Q.value = 0.6;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.8, now + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

    src.connect(bp).connect(gain).connect(masterGain);
    src.start(now);
    src.stop(now + dur);

    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(140, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.6);

    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.0001, now);
    og.gain.exponentialRampToValueAtTime(0.4, now + 0.03);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);

    osc.connect(og).connect(masterGain);
    osc.start(now);
    osc.stop(now + 0.7);
  }

  function startWhoosh(){
    if(!audioCtx || !masterGain || whooshNode) return;

    const dur = 1;
    const n = Math.floor(audioCtx.sampleRate * dur);

    const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    const ch = buf.getChannelData(0);
    for(let i=0;i<n;i++) ch[i] = (Math.random()*2-1);

    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;

    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 600;

    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 2400;

    whooshGain = audioCtx.createGain();
    whooshGain.gain.value = 0.15;

    src.connect(hp).connect(lp).connect(whooshGain).connect(masterGain);
    src.start();
    whooshNode = src;
  }

  function stopWhoosh(){
    if(whooshNode){
      try{ whooshNode.stop(); }catch(e){}
      try{ whooshNode.disconnect(); }catch(e){}
      whooshNode = null;
    }
    if(whooshGain){
      try{ whooshGain.disconnect(); }catch(e){}
      whooshGain = null;
    }
  }

  // Wrapper names used by the simulation
  function startEngine(){ startWhoosh(); }
  function stopEngine(){ stopWhoosh(); }
  function boom(){ playBoom(); }

  function triggerImpactFX(){
    // flash
    flashOn = true;
    flashT = 0;
    // sound
    boom();
  }



  // ===== State =====
  let running=false, animId=null;

  let h0=0, a1=10, tFuel=5;
  let t=0, y=0, v=0, dt=0.02;

  // fixed scale (so base doesn't "shrink" mid-run)
  let scaleS = 1;

  // markers
  let started=false;
  let fuelOutMarked=false, tFuelOut=0, yFuelOut=0, vFuelOut=0;
  let apexMarked=false, tApex=0, yApex=0;

  // data
  let traj=[];             // all
  let pathFuel=[];         // red path (powered, ascent line)
  let pathCoastUp=[];      // green path after fuel-out until apex (ascent line)
  let pathCoastDown=[];    // green path on descent (descent line)

  // lane offsets
  const DESCENT_SHIFT = 15; // px to the right from ascent line

  // Smoke particles (during powered ascent)
  let smoke = []; // {x,y,r,vx,vy,life}
  function emitSmoke(cx, yWorld){
    const ys = worldYtoScreenY(yWorld);
    const x = cx + (Math.random()*6-3);
    const y = ys + 14 + (Math.random()*4);
    smoke.push({
      x, y,
      r: 6 + Math.random()*6,
      vx: (Math.random()*0.6-0.3),
      vy: 0.9 + Math.random()*0.8,
      life: 0.9 + Math.random()*0.6
    });
    if(smoke.length > 220) smoke.splice(0, smoke.length-220);
  }
  function updateSmoke(dtSec){
    for(const p of smoke){
      p.x += p.vx*60*dtSec;
      p.y += p.vy*60*dtSec;
      p.r += 0.7*60*dtSec;
      p.life -= dtSec;
    }
    smoke = smoke.filter(p=>p.life>0);
  }
  function drawSmoke(){
    if(smoke.length===0) return;
    ctx.save();
    for(const p of smoke){
      const a = Math.max(0, Math.min(1, p.life));
      ctx.globalAlpha = 0.35 * a;
      ctx.fillStyle = '#64748b';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }


  const clamp=(x,lo,hi)=>Math.min(hi,Math.max(lo,x));

  function xAsc(){ return canvas.width/2; }
  function xDesc(){ return canvas.width/2 + DESCENT_SHIFT; }

  function computeFixedScale(){
    // Predict ymax analytically so the top never goes out of the canvas and scaling stays constant.
    // v0=0
    const vFuel = a1 * tFuel;
    const yFuel = h0 + 0.5 * a1 * tFuel * tFuel;
    const yApexPred = yFuel + (vFuel*vFuel) / (2*g);
    // add some headroom
    const yTopRef = yApexPred + 10;
    const usable = canvas.height - 95;
    scaleS = usable / Math.max(30, (yTopRef + 20));
  }

  function groundY(){ return canvas.height - 55; }
  function worldYtoScreenY(yw){ return groundY() - yw * scaleS; }

  function clear(){ ctx.clearRect(0,0,canvas.width,canvas.height); }

  function drawGround(){
    ctx.strokeStyle='#94a3b8'; ctx.lineWidth=2;
    const yg=worldYtoScreenY(0);
    ctx.beginPath(); ctx.moveTo(20,yg); ctx.lineTo(canvas.width-20,yg); ctx.stroke();
  }

  // Base pedestal grows with h0 (and stays consistent because scaleS is fixed)
  function drawBasePedestal(){
    const baseW=70;
    const yg=worldYtoScreenY(0);
    const yTop=worldYtoScreenY(h0);
    const h=Math.max(0, yg-yTop);
    ctx.fillStyle='rgba(107,114,128,0.35)';
    ctx.fillRect(xAsc()-baseW/2, yTop, baseW, h);
    ctx.fillStyle='rgba(107,114,128,0.55)';
    ctx.fillRect(xAsc()-baseW/2, yg-10, baseW, 10);
  }

  // small pad on top of pedestal
  function drawLaunchPadTop(){
    const padW=70, padH=8;
    const yTop=worldYtoScreenY(h0);
    ctx.fillStyle='#e5e7eb';
    ctx.fillRect(xAsc()-padW/2, yTop+6, padW, padH);
    ctx.fillStyle='rgba(107,114,128,0.25)';
    ctx.fillRect(xAsc()-padW/2, yTop+6+padH-2, padW, 2);
  }

  // Rocket (half size) with orientation support
  function drawRocketSolid(cx, yWorld, color='#6b7280', flame=false, pointingDown=false){
    const ys=worldYtoScreenY(yWorld);
    const bodyW=10, bodyH=20, noseH=9;
    ctx.fillStyle=color;

    if(!pointingDown){
      ctx.fillRect(cx-bodyW/2, ys-bodyH, bodyW, bodyH);
      ctx.beginPath();
      ctx.moveTo(cx-bodyW/2, ys-bodyH);
      ctx.lineTo(cx+bodyW/2, ys-bodyH);
      ctx.lineTo(cx, ys-bodyH-noseH);
      ctx.closePath(); ctx.fill();

      if(flame){
        ctx.fillStyle='rgba(255,0,0,0.90)';
        ctx.beginPath(); ctx.moveTo(cx-bodyW/2, ys); ctx.lineTo(cx+bodyW/2, ys); ctx.lineTo(cx, ys+12); ctx.closePath(); ctx.fill();
        ctx.fillStyle='rgba(255,160,0,0.85)';
        ctx.beginPath(); ctx.moveTo(cx-bodyW/2+2, ys); ctx.lineTo(cx+bodyW/2-2, ys); ctx.lineTo(cx, ys+9); ctx.closePath(); ctx.fill();
      }
    } else {
      ctx.fillRect(cx-bodyW/2, ys, bodyW, bodyH);
      ctx.beginPath();
      ctx.moveTo(cx-bodyW/2, ys+bodyH);
      ctx.lineTo(cx+bodyW/2, ys+bodyH);
      ctx.lineTo(cx, ys+bodyH+noseH);
      ctx.closePath(); ctx.fill();
    }
  }

  function drawRocketDashed(cx, yWorld, stroke='rgba(100,116,139,0.85)', dash=[6,6]){
    const ys=worldYtoScreenY(yWorld);
    const bodyW=10, bodyH=20, noseH=9;
    ctx.save();
    ctx.strokeStyle=stroke; ctx.lineWidth=2; ctx.setLineDash(dash);
    ctx.strokeRect(cx-bodyW/2, ys-bodyH, bodyW, bodyH);
    ctx.beginPath(); ctx.moveTo(cx-bodyW/2, ys-bodyH); ctx.lineTo(cx+bodyW/2, ys-bodyH); ctx.lineTo(cx, ys-bodyH-noseH); ctx.closePath(); ctx.stroke();
    ctx.restore();
  }

  function drawDashedPath(points, color, xLine, dash=[7,7]){
    if(points.length<2) return;
    ctx.save();
    ctx.setLineDash(dash);
    ctx.strokeStyle=color;
    ctx.lineWidth=2.2;
    ctx.beginPath();
    ctx.moveTo(xLine, worldYtoScreenY(points[0].y));
    for(let i=1;i<points.length;i++) ctx.lineTo(xLine, worldYtoScreenY(points[i].y));
    ctx.stroke();
    ctx.restore();
  }

  function drawApexLine(){
    if(!apexMarked) return;
    const ys=worldYtoScreenY(yApex);
    ctx.save();
    ctx.setLineDash([5,7]);
    ctx.strokeStyle='rgba(148,163,184,0.55)';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(40,ys); ctx.lineTo(canvas.width-40,ys); ctx.stroke();
    ctx.restore();
  }

  function drawArrow(x,y1,y2,color){
    ctx.save();
    ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,y1); ctx.lineTo(x,y2); ctx.stroke();
    const dir=Math.sign(y2-y1)||1;
    const head=8;
    ctx.beginPath();
    ctx.moveTo(x,y2);
    ctx.lineTo(x-6, y2-dir*head);
    ctx.lineTo(x+6, y2-dir*head);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawAccelerationOverlay(cx, isFuel){
    const ys=worldYtoScreenY(y);
    const leftX=cx-30;
    const rightX=cx+30;
    ctx.font = '14px system-ui, sans-serif';

    if(isFuel){
      drawArrow(leftX, ys+18, ys-22, '#ef4444'); // up (red) on left
      ctx.fillStyle='#ef4444';
      ctx.fillText(`a₁ = ${a1.toFixed(1)} m/s²`, leftX-62, ys-28);
    }else{
      drawArrow(rightX, ys-22, ys+22, '#16a34a'); // down (green) on right
      ctx.fillStyle='#16a34a';
      ctx.fillText('a₂ = g', rightX+10, ys-2);
    }
  }

  function drawFuelOutMarker(){
    if(!fuelOutMarked) return;
    // dashed gray rocket at fuel-out (on ascent line)
    drawRocketDashed(xAsc(), yFuelOut, 'rgba(100,116,139,0.85)', [6,6]);

    // label on LEFT side of rocket (red text)
    const ys=worldYtoScreenY(yFuelOut);
    ctx.fillStyle='#dc2626';
    ctx.font = '14px system-ui, sans-serif';
    ctx.textAlign='right';
    ctx.fillText('เชื้อเพลิงหมด', xAsc()-14, ys-10);
    ctx.textAlign='left';
  }

  function drawStartGhost(){
    if(!started) return;
    // ghost rocket at start position (semi-transparent so dashed red path can be seen)
    ctx.save();
    ctx.globalAlpha = 0.35;
    drawRocketSolid(xAsc(), h0, '#9ca3af', false, false);
    ctx.restore();
  }

  // ===== Graphs =====
  function drawAxes(ctx2,w,h,xLabel,yLabel,yMin,yMax,xMax){
    ctx2.fillStyle='#ffffff'; ctx2.fillRect(0,0,w,h);
    const left=46,right=w-10,top=12,bottom=h-34,W=right-left,H=bottom-top;
    if(!isFinite(yMin)||!isFinite(yMax)||yMin===yMax){ yMin=-1; yMax=1; }
    const pad=(yMax-yMin)*0.08||1; yMin-=pad; yMax+=pad;
    const yToPix=(yv)=>bottom-((yv-yMin)/(yMax-yMin))*H;
    const xToPix=(xv)=>left+(xv/Math.max(1e-9,xMax))*W;

    ctx2.strokeStyle='#e5e7eb'; ctx2.lineWidth=1;
    for(let i=0;i<=5;i++){
      const val=yMin+(yMax-yMin)*(i/5), yy=yToPix(val);
      ctx2.beginPath(); ctx2.moveTo(left,yy); ctx2.lineTo(right,yy); ctx2.stroke();
      ctx2.fillStyle='#374151'; ctx2.font='13px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx2.fillText((val>=0?'+':'')+val.toFixed(1), 6, yy+4);
    }

    ctx2.strokeStyle='#111827'; ctx2.lineWidth=1.5;
    ctx2.beginPath(); ctx2.moveTo(left,top); ctx2.lineTo(left,bottom); ctx2.stroke();

    const y0=(0>=yMin&&0<=yMax)?yToPix(0):bottom;
    ctx2.beginPath(); ctx2.moveTo(left,y0); ctx2.lineTo(right,y0); ctx2.stroke();

    const xTicks=6;
    for(let i=0;i<=xTicks;i++){
      const xv=xMax*(i/xTicks), xx=xToPix(xv);
      ctx2.beginPath(); ctx2.moveTo(xx,y0-4); ctx2.lineTo(xx,y0+4); ctx2.stroke();
      ctx2.fillStyle='#111827'; ctx2.font='12px ui-monospace, SFMono-Regular, Menlo, monospace';
      ctx2.fillText(xv.toFixed(0), xx-4, bottom+16);
    }

    ctx2.fillStyle='#111827'; ctx2.font='12px system-ui, sans-serif';
    ctx2.fillText(xLabel, w/2-18, h-10);
    ctx2.save(); ctx2.translate(14, h/2+10); ctx2.rotate(-Math.PI/2); ctx2.fillText(yLabel,0,0); ctx2.restore();
    return {left,right,top,bottom,W,H,xToPix,yToPix,xMax};
  }

  function plotSegment(ctx2, seg, map, color){
    if(seg.length<2) return;
    ctx2.save(); ctx2.strokeStyle=color; ctx2.lineWidth=2.5;
    ctx2.beginPath(); ctx2.moveTo(map.xToPix(seg[0].t), map.yToPix(seg[0].val));
    for(let i=1;i<seg.length;i++) ctx2.lineTo(map.xToPix(seg[i].t), map.yToPix(seg[i].val));
    ctx2.stroke(); ctx2.restore();
  }

  function showGraphs(){
    graphPanel.classList.remove('hidden');
    if(traj.length<2){
      drawAxes(vtCtx, vtCanvas.width, vtCanvas.height, 't (s)', 'v (m/s)', -1, 1, 10);
      drawAxes(ytCtx, ytCanvas.width, ytCanvas.height, 't (s)', 'y (m)', -1, 1, 10);
      return;
    }

    const tMax=traj[traj.length-1].t;
    const vVals=traj.map(p=>p.v);
    const yVals=traj.map(p=>p.y);
    const vMin=Math.min(...vVals), vMax=Math.max(...vVals);
    const yMin=Math.min(...yVals,0), yMaxLocal=Math.max(...yVals,1);

    const mapV=drawAxes(vtCtx, vtCanvas.width, vtCanvas.height, 't (s)', 'v (m/s)', vMin, vMax, tMax);
    const mapY=drawAxes(ytCtx, ytCanvas.width, ytCanvas.height, 't (s)', 'y (m)', yMin, yMaxLocal, tMax);

    const vFuelSeg=traj.filter(p=>p.t<=tFuel).map(p=>({t:p.t,val:p.v}));
    const vCoastSeg=traj.filter(p=>p.t>=tFuel).map(p=>({t:p.t,val:p.v}));
    const yFuelSeg=traj.filter(p=>p.t<=tFuel).map(p=>({t:p.t,val:p.y}));
    const yCoastSeg=traj.filter(p=>p.t>=tFuel).map(p=>({t:p.t,val:p.y}));

    plotSegment(vtCtx, vFuelSeg, mapV, '#ef4444');
    plotSegment(vtCtx, vCoastSeg, mapV, '#16a34a');
    plotSegment(ytCtx, yFuelSeg, mapY, '#ef4444');
    plotSegment(ytCtx, yCoastSeg, mapY, '#16a34a');
  }

  // ===== Simulation =====
  function readInputs(){
    h0=clamp(parseFloat(document.getElementById('baseHeight').value)||0,0,1e9);
    a1=clamp(parseFloat(document.getElementById('acc').value)||0,0,20);
    tFuel=Math.max(0.1, parseFloat(document.getElementById('fuelTime').value)||5);
  }

  function drawFrame(){
    clear();
    drawGround();
    drawBasePedestal();
    drawLaunchPadTop();

    // Draw start ghost first (transparent), then draw paths on top of it
    drawStartGhost();

    // Paths: red (powered) stays; green continues up to apex on ascent line, and continues down on descent line.
    drawDashedPath(pathFuel, '#ef4444', xAsc(), [7,7]);
    drawDashedPath(pathCoastUp, '#16a34a', xAsc(), [7,7]);
    drawDashedPath(pathCoastDown, '#16a34a', xDesc(), [7,7]);

    drawApexLine();
    drawFuelOutMarker();
const isFuel = (t <= tFuel);
    const isDescending = apexMarked && (v < 0);
    const cx = isDescending ? xDesc() : xAsc();
    const flame = isFuel;

    // Smoke (powered ascent)
    drawSmoke();

    drawRocketSolid(cx, y, '#6b7280', flame, isDescending);
    if(started && y>0){
      drawAccelerationOverlay(cx, isFuel);
    }
  }

  function reset(){
    stopEngine();
      if(animId) cancelAnimationFrame(animId);
    animId=null; running=false; started=false;

    stopEngine();
    flashOn=false; flashT=0;

    readInputs();
    computeFixedScale(); // lock scale for the whole run

    t=0; y=h0; v=0; dt=0.02;

    fuelOutMarked=false; tFuelOut=tFuel; yFuelOut=h0; vFuelOut=0;
    apexMarked=false; tApex=0; yApex=0;

    traj=[];
    pathFuel=[];
    pathCoastUp=[];
    pathCoastDown=[];
    smoke=[];

    graphPanel.classList.add('hidden');
    playBtn.textContent='▶ เล่น';
    drawFrame();
  }

  function stepPhysics(){
    // physics update continuous (no pauses)
    const prevT = t;
    const prevY = y;
    const prevV = v;

    if(t <= tFuel) v += a1*dt;
    else v -= g*dt;

    y += v*dt;
    t += dt;

    traj.push({t,y,v});

    // store paths (by phase and direction)
    if(prevT <= tFuel){
      pathFuel.push({y: prevY});
      pathFuel.push({y: y});
    } else {
      // after fuel-out
      if(!apexMarked && v >= 0){
        // green ascent after fuel-out until apex
        pathCoastUp.push({y: prevY});
        pathCoastUp.push({y: y});
      } else {
        // green descent
        pathCoastDown.push({y: prevY});
        pathCoastDown.push({y: y});
      }
    }

    // mark fuel-out using analytic values for clean label placement (no "jump")
    if(!fuelOutMarked && t >= tFuel){
      stopEngine();
      fuelOutMarked = true;
      tFuelOut = tFuel;
      vFuelOut = a1 * tFuel;
      yFuelOut = h0 + 0.5 * a1 * tFuel * tFuel;
    }

    // apex when v crosses <=0 after fuel-out or during coast
    if(!apexMarked && fuelOutMarked && prevV > 0 && v <= 0){
      apexMarked = true;
      // interpolate for apex time where v=0
      const alpha = prevV / Math.max(1e-9, (prevV - v));
      tApex = prevT + (t - prevT) * alpha;
      yApex = prevY + (y - prevY) * alpha;

      // ensure the last green-up point ends at apex (visual continuity)
      pathCoastUp.push({y: yApex});
    }
  }

  function loop(){
    if(!running) return;

    stepPhysics();
    // update smoke using dt (seconds)
    updateSmoke(dt);
    // emit smoke only during powered ascent while running
    if(t <= tFuel && y > 0){ emitSmoke(xAsc(), y); }
    drawFrame();

    // stop on landing (for descent, allow the nose to go below ground; keep the TAIL exactly on the ground line)
    const descendingNow = apexMarked && (v < 0);
    if(descendingNow && y <= 0 && t > 0.2){
      running = false;
      playBtn.textContent = '▶ เล่น';
      y = 0; // tail on ground line
      if(fuelOutMarked) pathCoastDown.push({y: 0});
      triggerImpactFX(); // boom + flash
      drawFrame();
      return;
    }
    // Safety: if goes below ground before descent logic, clamp too
    if(!descendingNow && y <= 0 && t > 0.2){
      running = false;
      playBtn.textContent = '▶ เล่น';
      y = 0;
      triggerImpactFX();
      drawFrame();
      return;
    }
animId=requestAnimationFrame(loop);
  }

  // ===== Controls =====
  playBtn.addEventListener('click', ()=>{
    ensureAudio();
    if(!running){
      if(!started){
        started=true;
        // seed point at start
        traj.push({t:0,y:h0,v:0});
      }
      running=true;
      playBtn.textContent='⏸ หยุด';
      if(t <= tFuel) startEngine();
      animId=requestAnimationFrame(loop);
    }else{
      running=false;
      playBtn.textContent='▶ เล่น';
      stopEngine();
      if(animId) cancelAnimationFrame(animId);
      animId=null;
      drawFrame();
    }
  });

  resetBtn.addEventListener('click', reset);
  graphBtn.addEventListener('click', showGraphs);

  // Mobile fit
  function fitCanvasToWidth(){
    const w=Math.min(760, Math.max(320, Math.floor(document.body.clientWidth - 24)));
    const h=(w < 420) ? 460 : 540;
    if(canvas.width!==w || canvas.height!==h){
      canvas.width=w; canvas.height=h;
      // recompute scale if already started so it still fits
      computeFixedScale();
      drawFrame();
    }
  }
  window.addEventListener('resize', fitCanvasToWidth);

  reset();
  fitCanvasToWidth();
})();
</script>
