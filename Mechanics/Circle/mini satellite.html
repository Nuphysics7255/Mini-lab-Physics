<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mini Lab: ดาวเทียมโคจรรอบโลก</title>
  <style>
    :root{ --bg:#020617; --ink:#e2e8f0; --muted:#94a3b8 }
    body{margin:0;overflow:hidden;background:var(--bg);font-family:Inter,system-ui,sans-serif}
    #stage{position:fixed;inset:0}

    .ui{position:fixed;left:12px;top:12px;z-index:20;display:flex;flex-direction:column;gap:8px;max-width:300px;pointer-events:auto}
    .bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .card{backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);background:rgba(11,18,32,.35);color:var(--ink);border:1px solid rgba(23,32,54,.4);border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:10px}
    .pill{background:rgba(15,23,42,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(31,42,68,.5);color:#e2e8f0;border-radius:999px;padding:6px 10px;font-size:12px;cursor:pointer}
    .pill.danger{background:rgba(248,113,113,.2);border-color:rgba(248,113,113,.8);color:#fee2e2}
    .row{display:grid;grid-template-columns:1fr;gap:6px;margin:6px 0}
    .row label{font-size:12px;color:var(--muted)}
    .row input{appearance:none;width:100%;max-width:260px;background:rgba(15,23,42,.4);border:1px solid rgba(31,42,68,.5);border-radius:10px;padding:8px 10px;color:var(--ink)}
    .stats{display:grid;grid-template-columns:repeat(2,auto);gap:6px;font-family:ui-monospace, Menlo, monospace;font-size:12px}
    .stat{background:rgba(15,23,42,.35);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border:1px solid rgba(31,42,68,.5);border-radius:10px;padding:4px 8px;white-space:nowrap}

    .legend{position:fixed;right:12px;top:12px;z-index:10;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
    .legend .pill span{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}

    /* ย้าย legend มุมซ้ายล่างเฉพาะโทรศัพท์ */
    @media (max-width: 640px){
.legend{
        right:auto;
        top:auto;
        left:12px;
        bottom:70px;
        transform:scale(0.9);
      }
      .ui{max-width:min(92vw,360px)}
    }
  </style>

  <!-- three.js import map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="stage"></div>

  <div class="ui">
    <div class="card">
      <div class="bar" style="margin-bottom:8px;align-items:center">
        <div class="pill" style="cursor:default;color:#bfdbfe">Mini Lab: ดาวเทียมโคจรรอบโลก</div>
        <button id="btnPlay" class="pill">เล่น/หยุด</button>
        <button id="btnReset" class="pill">รีเซ็ต</button>
        <button id="btnMin" class="pill danger">ซ่อน</button>
      </div>
      <div id="panelBody">
        <div class="row">
          <label for="orbitR">r = ระยะจากจุดศูนย์กลางโลกถึงดาวเทียม</label>
          <input id="orbitR" type="range" min="6471000" max="42164000" step="100000" value="6771000">
        </div>
        <div class="stats" style="grid-template-columns:repeat(3,auto)">
          <div class="stat" id="lblR">r=— m</div>
          <div class="stat" id="lblV">v=— m/s</div>
          <div class="stat" id="lblT">T=— s</div>
        </div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="pill">
      <span style="background:#22c55e"></span>V &nbsp;
      <span style="background:#ef4444"></span>F
    </div>
  </div>

  <!-- three.js app -->
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setSize(innerWidth, innerHeight);
    document.getElementById('stage').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 2000);
    camera.position.set(8,5,12);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff,0.25));
    const sun = new THREE.DirectionalLight(0xffffff,1.5);
    sun.position.set(20,10,10);
    scene.add(sun);

    const starGeo = new THREE.BufferGeometry();
    const starCount = 1500;
    const starPos = new Float32Array(starCount*3);
    for(let i=0;i<starCount;i++){
      const r = 220 + Math.random()*380;
      const th = Math.acos(2*Math.random()-1);
      const ph = Math.random()*Math.PI*2;
      starPos[i*3]   = r*Math.sin(th)*Math.cos(ph);
      starPos[i*3+1] = r*Math.cos(th);
      starPos[i*3+2] = r*Math.sin(th)*Math.sin(ph);
    }
    starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
    scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({size:1,color:0xffffff})));

    const earthTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg');
    const Rscene = 2;
    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(Rscene,64,32),
      new THREE.MeshPhongMaterial({map:earthTex})
    );
    scene.add(earth);

    const sat = new THREE.Group();
    sat.scale.set(0.5,0.5,0.5);
    const body = new THREE.Mesh(
      new THREE.CylinderGeometry(0.4,0.4,1.2,32),
      new THREE.MeshStandardMaterial({color:0xaaaaaa,metalness:0.8,roughness:0.3})
    );
    const head = new THREE.Mesh(
      new THREE.ConeGeometry(0.4,0.6,32),
      new THREE.MeshStandardMaterial({color:0xdddddd,metalness:0.9,roughness:0.2})
    );
    head.position.y = 0.9;
    const gridTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/checker.png');
    gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;
    gridTex.repeat.set(6,2);
    const panelMat = new THREE.MeshStandardMaterial({
      map:gridTex,color:0x224466,metalness:1,roughness:0.2,
      emissive:0x112244,emissiveIntensity:0.35
    });
    const panelL = new THREE.Mesh(new THREE.BoxGeometry(2,0.05,0.6), panelMat.clone());
    panelL.position.set(-1.2,0,0);
    const panelR = new THREE.Mesh(new THREE.BoxGeometry(2,0.05,0.6), panelMat.clone());
    panelR.position.set(1.2,0,0);
    sat.add(body,head,panelL,panelR);
    scene.add(sat);

    const satLight = new THREE.PointLight(0x00ffff, 1, 5);
    satLight.position.set(0,1,0);
    sat.add(satLight);

    const satLightOrange = new THREE.PointLight(0xff8800, 1, 5);
    satLightOrange.position.set(0,-1,0);
    sat.add(satLightOrange);

    const bulb = new THREE.Mesh(
      new THREE.SphereGeometry(0.1,16,16),
      new THREE.MeshBasicMaterial({color:0xff8800})
    );
    bulb.position.copy(satLightOrange.position);
    sat.add(bulb);

    const G  = 6.67430e-11;
    const M  = 5.972e24;
    const Re = 6.371e6;

    const elR  = document.getElementById('orbitR');
    const lblR = document.getElementById('lblR');
    const lblV = document.getElementById('lblV');
    const lblT = document.getElementById('lblT');

    const btnPlay = document.getElementById('btnPlay');
    const btnReset = document.getElementById('btnReset');
    const btnMin  = document.getElementById('btnMin');
    const panelBody = document.getElementById('panelBody');

    function fmt(x,u){
      if(!isFinite(x)) return '—';
      const a = Math.abs(x);
      const s = (a>=1e9||a<1e-3)
        ? x.toExponential(3)
        : x.toLocaleString(undefined,{maximumFractionDigits:3});
      return u ? `${s} ${u}` : s;
    }

    let omega = 0;
    let orbitRadiusScene = 6;

    function recalc(){
      const r_m = parseFloat(elR.value)||Re;
      const mu = G*M;
      const v = Math.sqrt(mu/r_m);
      const T = 2*Math.PI*Math.sqrt((r_m**3)/mu);
      omega = Math.sqrt(mu/(r_m**3));

      lblR.textContent = `r=${fmt(r_m,'m')}`;
      lblV.textContent = `v=${fmt(v,'m/s')}`;
      lblT.textContent = `T=${fmt(T,'s')}`;

      orbitRadiusScene = 4 + ((r_m - Re) / 2e6);
      orbitRadiusScene = Math.max(4.2, Math.min(10.5, orbitRadiusScene));
      updateOrbit3D();
      updateVectors();
    }

    ['change','input'].forEach(ev=>{
      elR.addEventListener(ev,recalc);
    });

    let orbitLine;
    function updateOrbit3D(){
      if(orbitLine) scene.remove(orbitLine);
      const pts=[];
      const N=128;
      for(let i=0;i<=N;i++){
        const a=i/N*Math.PI*2;
        pts.push(new THREE.Vector3(
          orbitRadiusScene*Math.cos(a),
          0,
          orbitRadiusScene*Math.sin(a)
        ));
      }
      const geo=new THREE.BufferGeometry().setFromPoints(pts);
      const mat=new THREE.LineDashedMaterial({
        color:0x93c5fd,transparent:true,opacity:0.25,
        dashSize:0.2,gapSize:0.1
      });
      orbitLine=new THREE.LineLoop(geo,mat);
      orbitLine.computeLineDistances();
      scene.add(orbitLine);
    }

    const clock=new THREE.Clock();
    let theta=0;
    let running=true;
    const timeScale=1200*0.7;

    btnPlay.addEventListener('click',()=>{ running=!running; });
    btnReset.addEventListener('click',()=>{ theta=0; recalc(); updateVectors(); });

    let panelHidden=false;
    btnMin.addEventListener('click',()=>{
      panelHidden = !panelHidden;
      panelBody.style.display = panelHidden ? 'none' : 'block';
      btnMin.textContent = panelHidden ? 'แสดง' : 'ซ่อน';
      document.getElementById('btnShowPanel').style.display = panelHidden ? 'block' : 'none';
    });

    let showVec=true;
    let arrowV=null, arrowF=null;
    let labelV=null, labelF=null;

    function makeLabelSprite(text,color){
      const cvs=document.createElement('canvas');
      const s=128;
      cvs.width=cvs.height=s;
      const ctx=cvs.getContext('2d');
      ctx.font='bold 96px Inter,system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.strokeStyle='rgba(0,0,0,.6)';
      ctx.lineWidth=10;
      ctx.strokeText(text,s/2,s/2+6);
      ctx.fillStyle=color;
      ctx.fillText(text,s/2,s/2+6);
      const tex=new THREE.CanvasTexture(cvs);
      const mat=new THREE.SpriteMaterial({map:tex,transparent:true});
      const spr=new THREE.Sprite(mat);
      spr.scale.set(0.7,0.7,0.7);
      return spr;
    }

    function updateVectors(){
      if(!showVec) return;
      const pos = sat.position.clone();
      const vDir = new THREE.Vector3(-Math.sin(theta), 0, Math.cos(theta)).normalize();
      const fDir = pos.clone().multiplyScalar(-1).normalize();
      const vLen = Math.min(orbitRadiusScene*0.5, 2.0);
      const fLen = Math.min(orbitRadiusScene*0.5, 2.0);

      if(!arrowV){
        arrowV=new THREE.ArrowHelper(vDir, pos, vLen, 0x22c55e, 0.35, 0.2);
        scene.add(arrowV);
      }else{
        arrowV.setDirection(vDir);
        arrowV.setLength(vLen,0.35,0.2);
        arrowV.position.copy(pos);
      }

      if(!arrowF){
        arrowF=new THREE.ArrowHelper(fDir, pos, fLen, 0xef4444, 0.35, 0.2);
        scene.add(arrowF);
      }else{
        arrowF.setDirection(fDir);
        arrowF.setLength(fLen,0.35,0.2);
        arrowF.position.copy(pos);
      }

      const vHead = pos.clone().add(vDir.clone().multiplyScalar(vLen));
      const fHead = pos.clone().add(fDir.clone().multiplyScalar(fLen));

      if(!labelV){
        labelV = makeLabelSprite('v','#86efac');
        scene.add(labelV);
      }
      if(!labelF){
        labelF = makeLabelSprite('F','#fca5a5');
        scene.add(labelF);
      }
      labelV.position.copy(vHead);
      labelF.position.copy(fHead);
    }

    function updatePanelGlints(){
      const sdir = sun.position.clone().normalize();
      const nL = new THREE.Vector3(-1,0,0).applyQuaternion(sat.quaternion);
      const nR = new THREE.Vector3( 1,0,0).applyQuaternion(sat.quaternion);
      const glL = Math.max(0, nL.dot(sdir));
      const glR = Math.max(0, nR.dot(sdir));
      panelL.material.emissiveIntensity = 0.25 + glL*0.9;
      panelR.material.emissiveIntensity = 0.25 + glR*0.9;
      const sparkle = 0.1*Math.max(glL,glR)*Math.abs(Math.sin(clock.elapsedTime*6.0));
      panelL.material.roughness = 0.2 - sparkle*0.15;
      panelR.material.roughness = 0.2 - sparkle*0.15;
    }

    function animate(){
      requestAnimationFrame(animate);
      const dt=clock.getDelta();
      if(running){ theta+=omega*timeScale*dt; }
      sat.position.set(
        orbitRadiusScene*Math.cos(theta),
        0,
        orbitRadiusScene*Math.sin(theta)
      );
      sat.lookAt(0,0,0);
      earth.rotation.y+=0.002;

      const blinkSpeed=2.0;
      const blink=Math.sin(clock.elapsedTime*Math.PI*blinkSpeed);
      satLightOrange.intensity = blink>0 ? 1.2 : 0.05;
      bulb.material.color.set(blink>0 ? 0xffaa33 : 0x552200);

      updatePanelGlints();
      updateVectors();
      controls.update();
      renderer.render(scene,camera);
    }

    recalc();
    animate();

    addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
  </script>

  <button
    id="btnShowPanel"
    class="pill"
    style="position:fixed;left:12px;bottom:12px;z-index:22;display:none"
    onclick="document.querySelector('.ui').style.display='flex'; document.getElementById('panelBody').style.display='block'; document.getElementById('btnMin').textContent='ซ่อน'; this.style.display='none'">
    แสดงแผง
  </button>

  <a
    class="pill"
    style="position:fixed;right:12px;bottom:12px;z-index:10;text-decoration:none"
    href="https://www.facebook.com/resolvephysics"
    target="_blank">
    ศึกษาเพิ่มเติมที่เพจคลายปมฟิสิกส์
  </a>
</body>
</html>
