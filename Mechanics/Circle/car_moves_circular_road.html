<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>รถบนถนนวงกลม — ฟิสิกส์สมจริง + สูตร + แบบฝึกหัด</title>
<style>
  :root{
    --ink:#0f2541; --muted:#475569; --line:#e5e7eb; --accent:#0ea5e9;
    --success:#10b981; --danger:#ef4444; --warn:#f59e0b; --bg:#f6f7fb;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,Inter,"Noto Sans Thai",Segoe UI,Roboto,Arial}

  /* ===== Layout ===== */
  .wrap{
    display:grid;
    grid-template-columns:1fr 360px;    /* ซ้าย: จอทดลอง, ขวา: แผงควบคุม */
    grid-template-rows:auto auto auto;
    grid-template-areas:
      "sim settings"
      "sim actions"
      "sim results";
    gap:16px;
    max-width:1280px;
    margin:18px auto;
    padding:0 14px;
  }
  @media (max-width:950px){
    .wrap{
      grid-template-columns:1fr;
      grid-template-areas:
        "settings"
        "sim"
        "actions"
        "results";
    }
  }

  .panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 6px 16px #0001;
    padding:14px;
  }
  .settings{grid-area:settings;}
  .sim{grid-area:sim;}
  .actions{grid-area:actions;}
  .results{grid-area:results;}

  .row{display:grid;grid-template-columns:1fr 110px;gap:10px;align-items:center;margin:8px 0}
  label{font-size:14px;color:var(--muted)}
  input[type="number"]{width:100%;padding:8px;border:1px solid var(--line);border-radius:10px}
  input[type="range"]{width:100%}
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  button{
    padding:9px 14px;border:1px solid var(--line);background:#fff;border-radius:10px;cursor:pointer;font-weight:600
  }
  button.primary{background:var(--accent);color:white;border-color:var(--accent)}
  button.success{background:var(--success);color:#fff;border-color:var(--success)}
  button.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
  button.warning{background:var(--warn);color:#111827;border-color:var(--warn)}
  .out{font-size:13px;line-height:1.65;margin-top:8px;padding:10px;border-radius:10px;background:#f8fafc;border:1px dashed var(--line)}
  .hint{font-size:12px;color:#64748b;margin-top:8px}

  /* ปรับขนาด canvas: desktop 80%, มือถือ 100% */
  canvas{
    width:80%;
    aspect-ratio:1/1;
    height:auto;
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    display:block;
    margin:0 auto;
  }
  @media (max-width:950px){
    canvas{
      width:100%;
    }
  }

  /* กล่องไฮไลต์สีฟ้าอ่อน */
  .hi-blue{
    background:#eff6ff;
    border:1px solid #bfdbfe;
    border-radius:8px;
    padding:6px 8px;
    margin:4px 0;
  }

  /* slider v */
  .settings-slider{margin-top:0;}
  .mobile-vslider{
    display:none;
    margin-top:10px;
  }
  @media (max-width:950px){
    .settings-slider{display:none !important;}     /* ซ่อนสไลเดอร์ v ในแผงตั้งค่า */
    .mobile-vslider{display:block;}               /* แสดงสไลเดอร์ v ใต้จอทดลอง */
  }

  /* Modal (ใช้ร่วมกัน) */
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .modal.show{display:flex}
  .card{max-width:980px;width:100%;background:#fff;border-radius:16px;border:1px solid var(--line);padding:18px;overflow:auto;max-height:92vh}
  .card h3{margin:0 0 10px}
  .closebar{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .pill{display:inline-block;background:#eef6ff;color:#0b5ed7;border:1px solid #cfe2ff;border-radius:999px;padding:2px 10px;font-size:12px;margin-right:8px}
  .block{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0}
  .callout{background:#f0fdf4;border:1px solid #bbf7d0}
  .danger{background:#fef2f2;border:1px solid #fecaca}
  .warn{background:#fffbeb;border:1px solid #fde68a}
  .qa{display:grid;gap:10px}
  .choice{padding:10px;border:1px solid var(--line);border-radius:10px;cursor:pointer;background:#fff}
  .choice:hover{background:#f9fafb}
  .choice.correct{border-color:var(--success);background:#ecfdf5}
  .choice.wrong{border-color:var(--danger);background:#fef2f2}
  .score{font-weight:700;color:var(--accent)}
</style>
</head>
<body>

<div class="wrap">
  <!-- แผงตั้งค่า -->
  <div class="panel settings">
    <h3 style="margin:6px 0 8px">รถเคลื่อนที่บนถนนโค้ง</h3>

    <div class="row"><label>มวล m (kg)</label><input id="m" type="number" step="0.1" min="0.1" value="1000"></div>
    <div class="row"><label>รัศมี r (m)</label><input id="r" type="number" step="0.1" min="5" value="60"></div>

    <div class="row">
      <label>สัมประสิทธิ์เสียดทานสถิต µ<sub>s</sub></label>
      <input id="mus" type="number" step="0.01" min="0" max="1.5" value="0.5">
    </div>
    <div class="out" id="muk">µ<sub>k</sub> (จลน์) = <b>0.40</b></div>

    <div class="row"><label>ความเร็ว v (m/s)</label><input id="vnum" type="number" step="0.1" min="0" value="10"></div>
    <!-- สไลเดอร์ v สำหรับจอใหญ่ -->
    <div class="settings-slider">
      <input id="vslider" type="range" min="0" max="60" step="0.1" value="10">
    </div>
  </div>

  <!-- จอทดลอง -->
  <div class="panel sim">
    <canvas id="cv"></canvas>
    <!-- สไลเดอร์ v สำหรับมือถือ (ใต้จอทดลอง) -->
    <div class="mobile-vslider">
      <input id="vsliderMobile" type="range" min="0" max="60" step="0.1" value="10">
    </div>
  </div>

  <!-- ปุ่ม -->
  <div class="panel actions">
    <div class="btns">
      <button id="togglePlay" type="button" class="danger">หยุด</button>
      <button id="reset"      type="button">รีเซ็ต</button>
      <button id="toggleVec"  type="button">แสดงเวกเตอร์</button>
      <button id="howto"      type="button" class="warning">วิธีคำนวณ</button>
      <button id="formulas"   type="button" class="primary">สูตรสำคัญ</button>
      <button id="quiz"       type="button">แบบฝึกหัด</button>
    </div>
  </div>

  <!-- สรุปผล -->
  <div class="panel results">
    <div class="out" id="stats">—</div>
    <div class="hint">
      <b>หมายเหตุ</b>: สมมติให้ µ<sub>k</sub> = 0.8 µ<sub>s</sub>. เพื่อให้เห็นภาพชัด รถในภาพวิ่งเร็วขึ้น
      <b>1.5×</b> จากค่าที่ป้อน
    </div>
    <div class="hint" style="margin-top:6px">
      ศึกษาเพิ่มเติมที่
      <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener noreferrer">
        เพจคลายปมฟิสิกส์
      </a>
    </div>
  </div>
</div>

<!-- Modal รวม -->
<div class="modal" id="modal">
  <div class="card">
    <div class="closebar">
      <h3 id="modalTitle">หัวข้อ</h3>
      <button id="closeModal" type="button">ปิด</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- MathJax -->
<script id="MathJax-script" async
 src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<script>
/* ================= Canvas (CSS px) ================= */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d', {alpha:true});
function fitCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const css = cv.clientWidth || 300;
  cv.width  = Math.round(css * dpr);
  cv.height = Math.round(css * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0); // draw using CSS px
  return { css, ctr:{x:css/2,y:css/2} };
}
addEventListener('resize', fitCanvas);

/* ================ UI refs ================ */
const mEl = document.getElementById('m');
const rEl = document.getElementById('r');
const musEl = document.getElementById('mus');
const vNum = document.getElementById('vnum');
const vSlMain   = document.getElementById('vslider');
const vSlMobile = document.getElementById('vsliderMobile');
const mukEl = document.getElementById('muk');
const stats = document.getElementById('stats');
const togglePlayBtn = document.getElementById('togglePlay');
const resetBtn      = document.getElementById('reset');
const howtoBtn      = document.getElementById('howto');
const formulasBtn   = document.getElementById('formulas');
const quizBtn       = document.getElementById('quiz');
const modal         = document.getElementById('modal');
const closeModal    = document.getElementById('closeModal');
const modalTitle    = document.getElementById('modalTitle');
const modalBody     = document.getElementById('modalBody');
const toggleVecBtn  = document.getElementById('toggleVec');

const g=9.81; let running=true; let rafId=null;
let showVectors = false;

/* ================ Scaling / Road ================ */
const roadWidth_m = 10;
function meterToPx(r_m, cssSize){
  const usable = cssSize - 28; // margin
  const need_m = 2*(r_m + roadWidth_m/2);
  return (usable/need_m) * 0.82;
}

/* helper แปลงค่ากายภาพเป็นความยาวลูกศร (px) */
function scaleLen(value, refMax, maxLen){
  if(value <= 0 || refMax <= 0) return 0;
  const ratio = Math.min(1, value / refMax);
  const minLen = maxLen * 0.25;      // ให้ลูกศรสั้นสุดยังพอมองเห็น
  return minLen + (maxLen - minLen) * ratio;
}

/* ================ Car state ================ */
const CAR_SIZE = { w_m: 4.0, h_m: 6.8 }; // รถใหญ่ 2×
let car;
function defaults(){
  mEl.value   = 1000;
  rEl.value   = 60;
  musEl.value = 0.5;
  setV(10);
  updateMu();
}
function initCar(){
  car = {
    mode:'circle',
    theta:Math.PI*0.35,
    pos:{x:0,y:0},
    vel:{x:0,y:0},
    speed:+vNum.value,
    heading:0
  };
}
defaults(); initCar();

/* sync v ทั้งหมด */
function setV(val){
  const v = +val || 0;
  vNum.value = v.toFixed(1).replace(/\.0$/,'');
  if(vSlMain)   vSlMain.value   = v;
  if(vSlMobile) vSlMobile.value = v;
  if(car) car.speed = v;
}
if(vSlMain)   vSlMain.addEventListener('input', ()=>setV(vSlMain.value));
if(vSlMobile) vSlMobile.addEventListener('input', ()=>setV(vSlMobile.value));
vNum.addEventListener('input', ()=>setV(vNum.value));

/* show mu_k under mu_s */
function updateMu(){
  const muS = Math.max(0, +musEl.value||0);
  const muK = 0.8*muS;
  mukEl.innerHTML = `µ<sub>k</sub> (จลน์) = <b>${muK.toFixed(2)}</b>`;
}
[mEl,rEl,musEl].forEach(el=>el.addEventListener('input',updateMu));
updateMu();

/* ================ Buttons ================ */
togglePlayBtn.onclick = ()=>{
  running = !running;
  togglePlayBtn.textContent = running ? 'หยุด' : 'เล่น';
  togglePlayBtn.classList.toggle('danger', running);
  togglePlayBtn.classList.toggle('success', !running);
  if(running) rafId = requestAnimationFrame(loop);
  else cancelAnimationFrame(rafId);
};
resetBtn.onclick = ()=>{
  cancelAnimationFrame(rafId);
  defaults(); initCar();
  running = true;
  togglePlayBtn.textContent='หยุด';
  togglePlayBtn.classList.add('danger');
  togglePlayBtn.classList.remove('success');
  rafId = requestAnimationFrame(loop);
};

toggleVecBtn.onclick = ()=>{
  showVectors = !showVectors;
  toggleVecBtn.textContent = showVectors ? 'ซ่อนเวกเตอร์' : 'แสดงเวกเตอร์';
  toggleVecBtn.classList.toggle('primary', showVectors);
};

/* Modal helpers */
function openModal(title, html){
  modalTitle.textContent = title;
  modalBody.innerHTML = html;
  modal.classList.add('show');
  if(window.MathJax) MathJax.typesetPromise([modalBody]);
}
closeModal.onclick = ()=> modal.classList.remove('show');
modal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('show'); });

/* วิธีคำนวณ (ใช้ค่าปัจจุบัน) */
howtoBtn.onclick = ()=>{
  const m   = +mEl.value;
  const r   = +rEl.value;
  const muS = +musEl.value;
  const muK = 0.8*muS;
  const v   = +vNum.value;
  const Fc   = m*v*v/r;
  const Fmax = muS*m*g;
  const vmax = Math.sqrt(muS*g*r);
  const muReq= (v*v)/(g*r);

  openModal('วิธีคำนวณ (อิงค่าปัจจุบัน)', `
  <div class="block">
    <ol>
      <li>แรงสู่ศูนย์กลางที่ต้องใช้: \\(F_c=\\dfrac{mv^2}{r}=\\dfrac{${m.toFixed(1)}\\cdot${v.toFixed(2)}^2}{${r.toFixed(1)}}=${Fc.toFixed(1)}\\,\\text{N}\\)</li>
      <li>แรงเสียดทานสถิตสูงสุด: \\(f_{s,max}=\\mu_s m g=(${muS.toFixed(2)})(${m.toFixed(1)})(${g.toFixed(2)})=${Fmax.toFixed(1)}\\,\\text{N}\\)</li>
      <li>เงื่อนไขไม่ไถล: ต้องมี \\(F_c\\le f_{s,max}\\) หรือเทียบในรูปสัมประสิทธิ์ \\(\\mu_s\\ge \\dfrac{v^2}{gr}= ${muReq.toFixed(2)}\\)</li>
      <li>ขนาดความเร็วสูงสุดที่ยังไม่ไถล: \\(v_{max}=\\sqrt{\\mu_s g r}=${vmax.toFixed(2)}\\,\\text{m/s}\\)</li>
      <li>ถ้าไถลแล้วใช้เสียดทานจลน์: ใช้ค่า \\(\\mu_k=${muK.toFixed(2)}\\) ให้แรงต้าน \\(f_k=\\mu_k m g\\) และความเร่ง(หน่วง) \\(a=-\\mu_k g\\)</li>
    </ol>
  </div>
  <div class="block callout"><b>วิเคราะห์เกี่ยวกับขนาดความเร็ว</b><br>
  - ถ้า \\(v\\le v_{max}\\Rightarrow\\) <span style="color:var(--success)">ไม่ไถล</span><br>
  - ถ้า \\(v>v_{max}\\Rightarrow\\) <span style="color:var(--danger)">ไถล</span> และขนาดความเร็วลดลงเชิงเส้นตาม \\(a=-\\mu_k g\\)</div>
  `);
};

/* สูตรสำคัญ + วิธีใช้ */
formulasBtn.onclick = ()=>{
  openModal('สูตรสำคัญ & การใช้งาน', `
  <div class="block"><span class="pill">สูตรพื้นฐาน</span>
    \\[
      F_c=\\frac{mv^2}{r},\\quad f_{s,max}=\\mu_s m g
    \\]
    \\[
      v_{max}=\\sqrt{\\mu_s g r}
    \\]
    \\[
      \\mu_{\\text{ต้องการ}}=\\frac{v^2}{g r}
    \\]
  </div>
  <div class="block">
    <b>การใช้งาน</b>
    <ul>
      <li><u>หาขนาดความเร็วสูงสุดที่ไม่ไถล</u>:\\(v_{max}=\\sqrt{\\mu_s g r}\\)</li>
      <li><u>เช็คไถล/ไม่ไถล </u>:ถ้า \\(F_c\\le f_{s,max}\\) ไม่ไถล</li>
      <li><u>พื้นผิวฝืดพอจะต้านการไถลได้ไหม</u>:หา \\(\\mu_{req}=v^2/(gr)\\)ก่อน  ถ้า \\(\\mu_s\\ge\\mu_{req}\\) ไม่ไถล</li>
      <li><u>ไถลแล้วจะมีความหน่วง </u>: \\(a=-\\mu_k g\\) ให้พอรู้ไว้(ปกติข้อสอบไม่เคยออก) </li>
    </ul>
  </div>
  <div class="block warn"><b>ข้อสังเกต</b>: โมเดลไม่รวมแรงลม การเอียงถนน หรือการถ่ายน้ำหนัก เพื่อให้เห็นแนวคิดหลักของแรงเสียดทานกับการเลี้ยวโค้ง</div>
  `);
};

/* แบบฝึกหัด */
let score=0;
quizBtn.onclick = ()=>{
  score=0;
  openModal('แบบฝึกหัด', `
  <div class="block"><span class="pill">คะแนน</span> <span class="score" id="score">0</span> / 3</div>

  <div class="block qa" data-q="1">
    <div><b>ข้อ 1.</b> รถมวล \\(1200\\,\\text{kg}\\) เลี้ยวรัศมี \\(50\\,\\text{m}\\) บนถนน \\(\\mu_s=0.6\\). ความเร็วสูงสุดไม่ไถลเท่าไร?</div>
    <div class="choice" data-a="C">A) \\(15.0\\,\\text{m/s}\\)</div>
    <div class="choice" data-a="B">B) \\(17.2\\,\\text{m/s}\\)</div>
    <div class="choice" data-a="C">C) \\(19.3\\,\\text{m/s}\\)</div>
    <div class="choice" data-a="D">D) \\(21.6\\,\\text{m/s}\\)</div>
    <div class="explain" style="display:none"></div>
  </div>

  <div class="block qa" data-q="2">
    <div><b>ข้อ 2.</b> รถวิ่งที่ \\(20\\,\\text{m/s}\\) บนโค้งรัศมี \\(40\\,\\text{m}\\). ต้องการ \\(\\mu_s\\) อย่างน้อยเท่าไรจึงไม่ไถล?</div>
    <div class="choice" data-a="A">A) \\(0.95\\)</div>
    <div class="choice" data-a="B">B) \\(1.02\\)</div>
    <div class="choice" data-a="C">C) \\(0.82\\)</div>
    <div class="choice" data-a="D">D) \\(0.51\\)</div>
    <div class="explain" style="display:none"></div>
  </div>

  <div class="block qa" data-q="3">
    <div><b>ข้อ 3.</b> ถ้า \\(\\mu_s=0.5\\) และ \\(\\mu_k=0.8\\mu_s\\). เมื่อไถล ความเร่งหน่วงมีค่าเท่าไร?</div>
    <div class="choice" data-a="A">A) \\(3.43\\,\\text{m/s}^2\\)</div>
    <div class="choice" data-a="B">B) \\(3.92\\,\\text{m/s}^2\\)</div>
    <div class="choice" data-a="C">C) \\(4.90\\,\\text{m/s}^2\\)</div>
    <div class="choice" data-a="D">D) \\(5.88\\,\\text{m/s}^2\\)</div>
    <div class="explain" style="display:none"></div>
  </div>
  `);

  modalBody.addEventListener('click', quizHandler);
  if(window.MathJax) MathJax.typesetPromise([modalBody]);
};

function quizHandler(e){
  const node = e.target.closest('.choice'); if(!node) return;
  const qa = node.closest('.qa'); if(qa.dataset.done) return;
  const qid = qa.dataset.q;

  const correct = { "1":"C", "2":"B", "3":"B" }[qid];
  const isCorrect = node.dataset.a === correct;

  qa.dataset.done = "1";
  node.classList.add(isCorrect ? 'correct' : 'wrong');
  if(isCorrect) score++;

  const ex = qa.querySelector('.explain');
  const explainHTML = {
    "1": `ใช้ \\(v_{max}=\\sqrt{\\mu_s g r}=\\sqrt(0.6\\cdot9.81\\cdot50)=19.3\\,\\text{m/s}\\Rightarrow\\) ตอบ C`,
    "2": `ต้องมี \\(\\mu_s\\ge \\dfrac{v^2}{gr}=\\dfrac{20^2}{9.81\\cdot40}=1.02\\Rightarrow\\) ตอบ B`,
    "3": `เมื่อไถล: \\(\\mu_k=0.4\\Rightarrow a=0.4\\cdot9.81=3.92\\,\\text{m/s}^2\\Rightarrow\\) ตอบ B`
  }[qid];

  ex.style.display = 'block';
  ex.className = 'block explain ' + (isCorrect ? 'callout' : 'danger');
  ex.innerHTML = `<b>เฉลย:</b> ${explainHTML}`;

  if(window.MathJax) MathJax.typesetPromise([ex]);
  const scoreEl = modalBody.querySelector('#score');
  if(scoreEl) scoreEl.textContent = score;
}

/* ================ Drawing helpers ================ */
function drawRoad(pxPerM, ctr, rpx){
  const inner = rpx - roadWidth_m*pxPerM/2;
  const outer = rpx + roadWidth_m*pxPerM/2;

  /* สนามหญ้าด้านในวงกลม — ปรับสีเขียวให้อ่อนลง */
  ctx.fillStyle = '#dcfce7';
  ctx.beginPath();
  ctx.arc(ctr.x, ctr.y, inner, 0, Math.PI*2);
  ctx.fill();

  /* ถนนเป็นวงแหวนสีเทา */
  ctx.fillStyle='#e7e7e7';
  ctx.beginPath();
  ctx.arc(ctr.x,ctr.y,outer,0,Math.PI*2);
  ctx.arc(ctr.x,ctr.y,inner,0,Math.PI*2,true);
  ctx.fill();

  ctx.lineWidth=2.5; ctx.strokeStyle='#0f2541';
  ctx.beginPath(); ctx.arc(ctr.x,ctr.y,outer,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(ctr.x,ctr.y,inner,0,Math.PI*2); ctx.stroke();

  ctx.setLineDash([12,12]); ctx.strokeStyle='#fff'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.arc(ctr.x,ctr.y,rpx,0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);

  /* พุ่มไม้สีเขียวแสดงจุดศูนย์กลางของวงกลม */
  const br = 10; // รัศมีพุ่มหลัก
  ctx.save();
  ctx.translate(ctr.x, ctr.y);

  // วงหลักตรงกลาง
  ctx.fillStyle = '#15803d';
  ctx.beginPath();
  ctx.arc(0, 0, br, 0, Math.PI*2);
  ctx.fill();

  // ใบพุ่มด้านบนซ้าย/ขวา/ล่าง
  ctx.fillStyle = '#16a34a';
  const o = 7;
  [ {x:-o,y:-o}, {x:o,y:-o}, {x:-o,y:o}, {x:o,y:o} ].forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x, p.y, br*0.7, 0, Math.PI*2);
    ctx.fill();
  });

  // เส้นขอบบาง ๆ
  ctx.strokeStyle = '#14532d';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 0, br+1, 0, Math.PI*2);
  ctx.stroke();

  ctx.restore();
}

function drawCar(pxPerM, screenPos, heading){
  const carW = CAR_SIZE.w_m*pxPerM, carH = CAR_SIZE.h_m*pxPerM;
  const x = screenPos.x;
  const y = screenPos.y;
  ctx.save(); ctx.translate(x,y); ctx.rotate(heading); ctx.translate(-carW/2, -carH/2);

  // ลำแสงไฟหน้า
  const L = 10*pxPerM, a = Math.PI/7, tipX=carW/2, tipY=carH;
  const p0={x:tipX,y:tipY}, p1={x:tipX-L*Math.sin(a),y:tipY+L*Math.cos(a)}, p2={x:tipX+L*Math.sin(a),y:tipY+L*Math.cos(a)};
  const grd=ctx.createLinearGradient(p0.x,p0.y,(p1.x+p2.x)/2,(p1.y+p2.y)/2);
  grd.addColorStop(0,'rgba(249,115,22,0.55)'); grd.addColorStop(1,'rgba(249,115,22,0)');
  ctx.fillStyle=grd; ctx.beginPath(); ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.closePath(); ctx.fill();

  // ตัวถัง + ขอบ
  ctx.fillStyle='#f7b500'; ctx.fillRect(0,0,carW,carH);
  ctx.strokeStyle='#0f2541'; ctx.lineWidth=4; ctx.strokeRect(0,0,carW,carH);

  // ไฟหน้า
  ctx.fillStyle='#f97316';
  ctx.beginPath(); ctx.ellipse(carW*0.32,carH-8,carW*0.15,carH*0.06,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(carW*0.68,carH-8,carW*0.15,carH*0.06,0,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawArrowFromDir(x1,y1,dir,len,color,label){
  if(len <= 0) return; // ถ้าความยาว 0 ไม่ต้องแสดงลูกศร

  const dx = dir.x, dy = dir.y;
  const x2 = x1 + dx*len;
  const y2 = y1 + dy*len;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle   = color;
  ctx.lineWidth   = 3.2;

  // เส้นหลัก
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  // หัวลูกศร
  const angle = Math.atan2(y2-y1, x2-x1);
  const ah = 10;
  const a1 = angle + Math.PI/8;
  const a2 = angle - Math.PI/8;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2 - ah*Math.cos(a1), y2 - ah*Math.sin(a1));
  ctx.lineTo(x2 - ah*Math.cos(a2), y2 - ah*Math.sin(a2));
  ctx.closePath();
  ctx.fill();

  // ป้าย
  if(label){
    const lx = x1 + dx*(len + 12);
    const ly = y1 + dy*(len + 12);
    ctx.font = '13px system-ui, "Noto Sans Thai"';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, lx, ly);
  }

  ctx.restore();
}

/* ================ Simulation loop ================ */
let prevT = performance.now();
function loop(now){
  if(!running) return;
  const dt = Math.min(0.03, (now - prevT)/1000); prevT = now;

  const info = fitCanvas();
  const css = info.css;
  const ctr = info.ctr;

  const m   = Math.max(0.1, +mEl.value||1000);
  const r   = Math.max(1,   +rEl.value||60);
  const muS = Math.max(0,   +musEl.value||0.5);
  const muK = 0.8*muS;
  const v   = Math.max(0,   +vNum.value||0);

  const pxPerM = meterToPx(r, css);
  const rpx = r*pxPerM;
  ctx.clearRect(0,0,css,css);
  drawRoad(pxPerM, ctr, rpx);

  const v_disp = v*1.5; // ทำให้ภาพวิ่งไวขึ้น

  // --- อัปเดตไดนามิกส์ + เก็บข้อมูลสำหรับเวกเตอร์ ---
  let posM = {x:0,y:0};
  let heading = 0;
  let carScreen = null;
  let vDirNorm = {x:0,y:0};
  let speedWorld = 0;

  const vMax = Math.sqrt(muS*g*r);

  if(car.mode==='circle'){
    if(v>vMax){
      posM = {x:r*Math.cos(car.theta), y:r*Math.sin(car.theta)};
      car.pos = {...posM};
      car.vel = {x:-Math.sin(car.theta)*v_disp, y:Math.cos(car.theta)*v_disp};
      car.mode='slip';
    }else{
      car.theta += (v_disp/r)*dt;
      posM = {x:r*Math.cos(car.theta), y:r*Math.sin(car.theta)};
      vDirNorm = {x:-Math.sin(car.theta), y:Math.cos(car.theta)};
      speedWorld = v;
      heading = Math.atan2(vDirNorm.y, vDirNorm.x) - Math.PI/2;
      car.heading = heading;

      carScreen = {
        x: ctr.x + posM.x*pxPerM,
        y: ctr.y + posM.y*pxPerM
      };
      drawCar(pxPerM, carScreen, heading);
    }
  }
  if(car.mode==='slip'){
    const speedDisp = Math.hypot(car.vel.x, car.vel.y);
    if(speedDisp>1e-4){
      const ax = -(car.vel.x/speedDisp)*(muK*g);
      const ay = -(car.vel.y/speedDisp)*(muK*g);
      car.vel.x += ax*dt; car.vel.y += ay*dt;
      if(Math.hypot(car.vel.x,car.vel.y)<1e-3){car.vel.x=0;car.vel.y=0;}
    }
    car.pos.x += car.vel.x*dt; car.pos.y += car.vel.y*dt;
    posM = {...car.pos};

    const speedDisp2 = Math.hypot(car.vel.x, car.vel.y);
    if(speedDisp2>1e-6){
      vDirNorm = {x:car.vel.x/speedDisp2, y:car.vel.y/speedDisp2};
      speedWorld = speedDisp2/1.5; // ย้อนกลับจาก v_disp
      heading = Math.atan2(car.vel.y, car.vel.x) - Math.PI/2;
      car.heading = heading;
    }else{
      vDirNorm = {x:0,y:0};
      speedWorld = 0;
      heading = car.heading || (-Math.PI/2);
    }

    carScreen = {
      x: ctr.x + posM.x*pxPerM,
      y: ctr.y + posM.y*pxPerM
    };
    drawCar(pxPerM, carScreen, heading);
  }

  // --- ค่าที่สรุปแสดงผล ---
  const fs_req = m*v*v/r;
  const fs_max = muS*m*g;
  const fk_now = muK*m*g;
  const isSlip = (car.mode!=='circle');

  const statusColor = isSlip ? 'var(--danger)' : 'var(--success)';
  const statusText  = isSlip ? 'slip (ไถล)' : 'ไม่ไถล (เกาะถนน)';
  const statusHTML  = `<span style="color:${statusColor};font-weight:700">${statusText}</span>`;
  const vHTML       = `<span style="color:${statusColor};font-weight:700">${v.toFixed(2)}</span>`;

  let actualLine, needLine, whyLine;

  if(!isSlip){
    actualLine =
      `<i>แรงเสียดทานจริงขณะนี้</i>:<br>` +
      `<i>f</i><sub>s</sub> = m v² / r = <b>${fs_req.toFixed(1)}</b> N`;
    needLine = '';
    whyLine =
      `เพราะ <i>f</i><sub>s,req</sub> ≤ <i>f</i><sub>s,max</sub> = <b>${fs_max.toFixed(1)}</b> N ` +
      `⇒ <span style="color:var(--success)">ไม่ไถล</span>`;
  }else{
    actualLine =
      `<i>แรงเสียดทานจริงขณะนี้</i>:<br>` +
      `<i>f</i><sub>k</sub> = μ<sub>k</sub> m g = <b>${fk_now.toFixed(1)}</b> N (ต้านทิศการเคลื่อนที่)`;
    needLine =
      `<i>แรงเสียดทานสถิต ที่ "ต้องใช้" เพื่อเลี้ยวโค้งนี้</i>:<br>` +
      `<i>f</i><sub>s,req</sub> = m v² / r = <b>${fs_req.toFixed(1)}</b> N`;
    whyLine =
      `แต่ <i>f</i><sub>s,req</sub> > <i>f</i><sub>s,max</sub> = <b>${fs_max.toFixed(1)}</b> N ` +
      `⇒ <span style="color:var(--danger)">แรงสถิตไม่พอ → ไถล</span>`;
  }

  const fsBlock = `
    <div class="hi-blue">
      <i>แรงเสียดทานสถิตสูงสุดบนพื้นนี้</i>:<br>
      <i>f</i><sub>s,max</sub> = μ<sub>s</sub> m g = <b>${fs_max.toFixed(1)}</b> N
    </div>
  `;

  const vmaxBlock = `
    <div class="hi-blue">
      <i>ความเร็วสูงสุดที่ยังไม่ไถล</i>:<br>
      v<sub>max</sub> = √(μ<sub>s</sub> g r) = <b>${vMax.toFixed(2)}</b> m/s
    </div>
  `;

  stats.innerHTML = `
    สถานะ: ${statusHTML}, v = ${vHTML} m/s
    <div class="out" style="margin-top:6px">
      ${actualLine}<br><br>
      ${needLine ? needLine + '<br><br>' : ''}
      ${fsBlock}
      ${vmaxBlock}
      <span style="display:inline-block;margin-top:6px">${whyLine}</span>
    </div>
  `;

  // --- เวกเตอร์ v (สีเขียว) และ f_s (สีแดง) ---
  if(showVectors && carScreen){
    const maxArrowLen = css * 0.18;   // ความยาวสูงสุดของลูกศร ตามขนาดจอ

    // เวกเตอร์ความเร็ว: ยาวตาม speedWorld, ถ้า v=0 ไม่ต้องแสดง
    if(speedWorld > 0 && (Math.abs(vDirNorm.x) + Math.abs(vDirNorm.y) > 0)){
      const vLenPx = scaleLen(speedWorld, 60, maxArrowLen); // 60 m/s = max slider
      if(vLenPx > 0){
        const vLabel = isSlip
          ? 'v'                                  // ไถล แสดงเฉพาะ v
          : `v = ${speedWorld.toFixed(1)} m/s`;  // ไม่ไถล แสดงค่าด้วย
        drawArrowFromDir(carScreen.x, carScreen.y, vDirNorm, vLenPx, '#22c55e', vLabel);
      }
    }

    // เวกเตอร์แรงเสียดทานสถิต: ชี้จากรถไปศูนย์กลาง, ยาวตาม f_s (เฉพาะตอนยังเกาะโค้ง)
    if(!isSlip){
      const dxC = ctr.x - carScreen.x;
      const dyC = ctr.y - carScreen.y;
      const distC = Math.hypot(dxC, dyC);
      if(distC > 1e-3){
        const fDir = {x:dxC/distC, y:dyC/distC};
        const fMag = fs_req;          // แรงที่ต้องใช้เป็นแรงสู่ศูนย์กลาง
        const fLenPx = scaleLen(fMag, fs_max, maxArrowLen);
        // ถ้า f = 0 (v=0) หรือ fs_max = 0 จะได้ fLenPx = 0 → ไม่แสดงลูกศร
        if(fLenPx > 0){
          const fLabel = `fₛ = ${fMag.toFixed(0)} N`;
          drawArrowFromDir(carScreen.x, carScreen.y, fDir, fLenPx, '#ef4444', fLabel);
        }
      }
    }
    // ถ้าไถลแล้ว: ตามเงื่อนไข ให้แสดงเฉพาะเวกเตอร์ v (ไม่มีขนาด) ซึ่งจัดการด้านบนแล้ว
  }

  rafId = requestAnimationFrame(loop);
}

/* ============ start ============ */
fitCanvas();
togglePlayBtn.textContent='หยุด';
togglePlayBtn.classList.add('danger');
running = true;
rafId = requestAnimationFrame(loop);
</script>
