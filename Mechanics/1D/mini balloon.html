<!DOCTYPE html>

<html lang="th">
<head><script>
window.MathJax = {
  tex: { inlineMath: [['\\(', '\\)']] }
};
</script><script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Mini Lab : ปล่อยวัตถุจากบอลลูน</title>
<style>
  :root{
    --bg:#ffffff; --ink:#0f172a; --muted:#475569;
    --panel:#f8fafc; --line:#cbd5e1;
    --blue:#0ea5e9; --green:#16a34a; --gray:#334155;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,"Noto Sans Thai",Roboto,Arial}
  header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center}
  .title{margin:0;font-size:20px;color:#2563eb;font-weight:800}
  .wrap{display:grid;grid-template-columns:1fr 320px;gap:14px;padding:14px}
  canvas{width:100%;height:auto;max-height:calc(74vh + 60px);background:#fff;border:1px solid var(--line);border-radius:14px;display:block}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .btn{border:none;border-radius:12px;padding:11px 12px;font-weight:800;color:#fff;cursor:pointer}
  .btn:active{transform:translateY(1px)}
  .start{background:var(--blue)}
  .release{background:var(--green)}
  .reset{background:var(--gray)}
  .ctrl{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .ctrl label{font-size:13px;color:var(--muted);display:flex;justify-content:space-between;gap:10px;font-weight:700}
  input[type="range"]{width:100%}
  .note{margin-top:12px;font-size:13px;color:var(--muted);line-height:1.5}
  .tagline{margin-top:12px;font-size:13px}
  .pageLink{color:#2563eb;font-weight:900;text-decoration:underline}
  @media (max-width:980px){
    .wrap{grid-template-columns:1fr}
  }
  @media (max-width:640px){
    .grid3{grid-template-columns:1fr}
    canvas{max-height:none}
  }
</style>
</head>
<body>
<header>
<h1 class="title">Mini Lab : ปล่อยวัตถุจากบอลลูน</h1>
</header>
<div class="wrap">
<canvas height="790" id="view" width="1200"></canvas>
<section class="panel">
<div class="grid3">
<button class="btn start" id="btnStart">เริ่ม</button>
<button class="btn release" id="btnRelease">ปล่อย</button>
<button class="btn reset" id="btnReset">รีเซ็ต</button>
</div>
<div class="ctrl">
<label>ความเร็วต้นบอลลูน (m/s) <span id="lblVb0">3.0</span></label>
<input id="slVb0" max="10" min="0" step="0.1" type="range" value="3"/>
</div>
<div class="note">
      บอลลูนเคลื่อนที่ด้วยความเร็วคงที่<br/>
      กำหนดให้ \( g = 10 \,\mathrm{m/s^2} \)
    </div>
<div class="tagline">ศึกษาเพิ่มเติมที่ <a class="pageLink" href="https://www.facebook.com/resolvephysics" rel="noopener" target="_blank">เพจคลายปมฟิสิกส์</a></div>
</section>
</div>
<script>
const canvas = document.getElementById('view');
const ctx = canvas.getContext('2d');
const $ = id => document.getElementById(id);

const ui = {
  btnStart: $('btnStart'),
  btnRelease: $('btnRelease'),
  btnReset: $('btnReset'),
  slVb0: $('slVb0'),
  lblVb0: $('lblVb0')
};

let W = canvas.width, H = canvas.height;
let SCALE = 60;
let IS_MOBILE = false;
let FONT_ADJ = 0;
let GROUND_Y = H - 90;

const S = {
  vb0: 3,
  g: 10,
  t: 0,
  running: false,
  paused: false,
  dropped: false,
  y: 0,
  v: 0,
  t_release: null,
  ydrop: null,
  u: null,
  trailUp: [],
  trailDown: []
};

function resizeCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 1200;
  IS_MOBILE = window.matchMedia && window.matchMedia("(max-width: 520px)").matches;
  FONT_ADJ = IS_MOBILE ? -7 : 0;

  const baseH = cssW * (3/5);
  const cssH = (baseH + 70) * (IS_MOBILE ? 1.30 : 1.00);

  SCALE = IS_MOBILE ? 36 : 60;

  canvas.style.height = cssH + 'px';
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);

  W = cssW;
  H = cssH;
  GROUND_Y = H - 70;
}

function yb(t){ return S.vb0 * t; }   // บอลลูนความเร็วคงที่
function vb(t){ return S.vb0; }       // ไม่มีความเร่ง
function worldToPixY(y){ return GROUND_Y - y * SCALE; }

function syncFromUI(){
  S.vb0 = +ui.slVb0.value;
  ui.lblVb0.textContent = S.vb0.toFixed(1);
}

function refreshStartBtn(){
  if(!S.running){
    ui.btnStart.textContent = 'เริ่ม';
    return;
  }
  ui.btnStart.textContent = S.paused ? 'เริ่ม' : 'หยุด';
}

function reset(){
  syncFromUI();
  S.t = 0;
  S.running = false;
  S.paused = false;
  S.dropped = false;
  S.y = yb(0);
  S.v = vb(0);
  S.t_release = null;
  S.ydrop = null;
  S.u = null;
  S.trailUp = [];
  S.trailDown = [];
  draw();
  refreshStartBtn();
}

function update(dt){
  if(!S.running || S.paused) return;

  S.t += dt;

  if(!S.dropped){
    S.y = yb(S.t);
    S.v = vb(S.t);
  }else{
    const tau = S.t - S.t_release;
    const y = S.ydrop + S.u * tau - 0.5 * S.g * tau * tau;
    const v = S.u - S.g * tau;
    S.y = y;
    S.v = v;

    if(v >= 0) S.trailUp.push([S.t, y]);
    else S.trailDown.push([S.t, y]);

    if(y <= 0){
      S.y = 0;
      S.running = false;
      S.paused = false;
      refreshStartBtn();
    }
  }
}

function drawGround(){
  const y = GROUND_Y;
  ctx.strokeStyle = '#94a3b8';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, y);
  ctx.lineTo(W, y);
  ctx.stroke();

  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  for(let i=0;i<W;i+=24){
    ctx.beginPath();
    ctx.moveTo(i,y);
    ctx.lineTo(i+12,y+12);
    ctx.stroke();
  }
}

function drawBalloon(yPix){
  const cx = W * 0.25, cy = yPix - 140;
  ctx.save();
  ctx.translate(cx, cy);

  ctx.fillStyle = '#94a3b8';
  ctx.beginPath();
  ctx.ellipse(0,0,80,110,0,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = '#64748b';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-20,90); ctx.lineTo(-10,125);
  ctx.moveTo(20,90); ctx.lineTo(10,125);
  ctx.stroke();

  ctx.fillStyle = '#cbd5e1';
  const bx=-30, by=125, bw=60, bh=60;
  ctx.fillRect(bx,by,bw,bh);

  const px = bx + bw*0.40;
  const py = by + 6;

  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle='#ef4444';
  ctx.beginPath();
  ctx.moveTo(px-10, py-6);
  ctx.lineTo(px+10, py-6);
  ctx.lineTo(px+6,  py-18);
  ctx.lineTo(px-6,  py-18);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle='#0f172a';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(px, py+9);
  ctx.lineTo(px, py+28);
  ctx.moveTo(px, py+28);
  ctx.lineTo(px-8, by+bh);
  ctx.moveTo(px, py+28);
  ctx.lineTo(px+8, by+bh);
  ctx.moveTo(px+2, py+16);
  ctx.lineTo(px+30, py+14);
  ctx.stroke();

  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.arc(px+30, py+14, 3.5, 0, Math.PI*2); ctx.fill();

  ctx.restore();
  return {cx, cy, bx:-25, by:125, bw:50, bh:32};
}

function drawDashedCircle(x,y,r,color){
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

function drawTrail(arr, xOffset, color){
  if(arr.length < 2) return;
  ctx.save();
  ctx.setLineDash([8,6]);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  const x = W * 0.25 + 70 + xOffset;
  for(let i=0;i<arr.length;i++){
    const y = worldToPixY(arr[i][1]);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.restore();
}

function drawInfo(){
  ctx.fillStyle = '#0f172a';
  ctx.font = `bold ${18 + FONT_ADJ}px ui-sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`v_balloon = ${S.vb0.toFixed(1)} m/s`, 24, 34);
  ctx.fillText(`g = 10 m/s²`, 24, 60);

  if(S.dropped){
    ctx.fillStyle = '#16a34a';
    ctx.fillText(`u = ${S.u.toFixed(1)} m/s`, 24, 88);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawGround();

  const balloonYPix = worldToPixY(yb(S.t));
  const balloon = drawBalloon(balloonYPix);

  const objCenterX = W*0.25 + 40;
  let objX = objCenterX, objYPix = worldToPixY(S.y);

  if(!S.dropped){
    const bxPixX = (W*0.25) + balloon.bx + balloon.bw/2;
    const byPixY = (balloon.cy + balloon.by + balloon.bh/2);
    objX = bxPixX + 35;
    objYPix = byPixY;
  }

  drawTrail(S.trailUp, -10, '#0ea5e9');
  drawTrail(S.trailDown, 10, '#0ea5e9');

  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(objX,objYPix,10,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(objX,objYPix,10,0,Math.PI*2);
  ctx.stroke();

  if(S.dropped){
    const ydropPix = worldToPixY(S.ydrop);
    drawDashedCircle(objCenterX, ydropPix, 10, '#0f172a');
  }

  if(!S.running && S.dropped && S.y <= 0){
    const yGroundPix = worldToPixY(0);
    ctx.strokeStyle = '#ef4444';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(objCenterX, yGroundPix, 10, 0, Math.PI*2);
    ctx.stroke();
  }

  drawInfo();
}

ui.btnStart.addEventListener('click', () => {
  syncFromUI();
  if(!S.running){
    S.running = true;
    S.paused = false;
  }else{
    S.paused = !S.paused;
  }
  refreshStartBtn();
});

ui.btnRelease.addEventListener('click', () => {
  if(!S.running){
    S.running = true;
    S.paused = false;
  }
  if(!S.dropped){
    S.dropped = true;
    S.t_release = S.t;
    S.ydrop = yb(S.t);
    S.u = vb(S.t); // ไม่มีการขว้างเพิ่ม ใช้ความเร็วบอลลูน ณ ขณะปล่อย
    S.trailUp.push([S.t, S.ydrop]);
  }
  refreshStartBtn();
});

ui.btnReset.addEventListener('click', reset);
ui.slVb0.addEventListener('input', () => {
  syncFromUI();
  if(!S.running) draw();
});

window.addEventListener('resize', () => {
  resizeCanvas();
  draw();
});

let last = null;
function loop(ts){
  if(last == null) last = ts;
  const dt = Math.min(0.05, (ts - last) / 1000);
  last = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

resizeCanvas();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
