<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
<title>PulleyLab Mini — รอกเดี่ยวเคลื่อนที่ + รอกเดี่ยวตายตัว</title>
<style>
  :root{
    --bg:#f6f7fb; --panel:#ffffff; --ink:#0f172a; --muted:#475569; --line:#e5e7eb;
    --accent:#0ea5e9; --accent2:#22c55e; --red:#ef4444; --blue:#2563eb; --gold:#f59e0b; --glass:#ffffffd9;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Inter,Roboto,Arial}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{display:grid;grid-template-columns:320px 1fr;gap:12px;max-width:1200px;margin:0 auto;padding:12px;height:100dvh}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 6px 20px rgba(2,6,23,.06)}
  .side{padding:14px;display:flex;flex-direction:column;gap:12px}
  .side h2{margin:0 0 6px 0;font-size:18px}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
  input[type="number"],input[type="range"]{width:100%}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end}
  .btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff;border-color:transparent}
  .btn.green{background:var(--accent2);color:#fff;border-color:transparent}
  .btn:active{transform:translateY(1px)}
  .stat{background:#f8fafc;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;font-size:13px}
  .stat b{font-size:14px}
  .scene{position:relative;overflow:hidden}
  .hud{position:absolute;inset:8px 8px auto auto;display:flex;flex-direction:column;gap:6px;z-index:20}
  .tag{background:var(--glass);border:1px solid var(--line);backdrop-filter:saturate(1.2) blur(2px);border-radius:10px;padding:6px 10px;font-size:12px}
  .footer{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;padding:8px 12px}
  .footer a{font-weight:600}
  #stage{width:100%;height:100%;display:block;touch-action:none}

  /* กลุ่ม m และ g (เดสก์ท็อป: เรียงลง, มือถือ: อยู่บรรทัดเดียวกัน) */
  .row-mg{display:block;gap:0}
  .row-mg > div{margin-bottom:8px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(2,6,23,.22);display:none;align-items:center;justify-content:center;z-index:99}
  .modal{width:min(880px,92vw);max-height:88vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 60px rgba(2,6,23,.25)}
  .modal .head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .modal .head h3{margin:0;font-size:18px}
  .modal .body{padding:14px 16px}
  .pill{display:inline-block;background:#eef6ff;border:1px solid #dbeafe;color:#1d4ed8;border-radius:999px;padding:4px 10px;font-size:12px;margin-right:6px}
  .card{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin:10px 0;background:#fafafa}
  .ok{color:#10b981;font-weight:600}
  .bad{color:#ef4444;font-weight:600}
  .close{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer}
  .choices{display:grid;grid-template-columns:1fr;gap:6px;margin-top:8px}
  .score{font-weight:700;margin-left:8px}

  @media (max-width: 920px){
    .wrap{display:block;height:auto}
    .scene{margin-top:10px;min-height:260px}

    .row-mg{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    /* มือถือ: ย้ายป้ายไปล่างจอการทดลอง + ป้ายใสไม่มีกรอบ */
    .hud{
      inset:auto 8px 8px 8px;   /* bottom:8px; left/right:8px; top:auto */
      align-items:center;
    }
    .hud .tag{
      background:transparent;
      border:none;
      backdrop-filter:none;
      box-shadow:none;
      padding:4px 8px;
    }
  }

.g-label {
  margin-top: 6px;
  font-size: 14px;
  color: #555;
}
</style>
<!-- MathJax -->
<script>
window.MathJax = { tex: { inlineMath: [['\\(','\\)'], ['$', '$']], displayMath: [['\\[','\\]']] }, svg: { fontCache: 'global' } };
</script>
<script defer="" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<div class="wrap">
<aside class="panel side">
<h2>Mini Lab</h2>
<div>
<label>มวลของกล่อง m (kg)</label>
<input id="mass" min="1" step="1" type="number" value="20"/><div class="g-label">กำหนดค่า g = 10 N/kg (ใช้ค่าคงที่ในการทดลอง)</div>
</div>
<div class="row">
<button class="btn primary" id="reset">รีเซ็ต (x=0)</button>
</div>
<div class="footer">
<span>© PulleyLab</span>
<a href="https://www.facebook.com/resolvephysics" rel="noopener" target="_blank">ศึกษาเพิ่มเติมที่เพจ คลายปมฟิสิกส์</a>
</div>
</aside>
<!-- จอการทดลอง -->
<main class="panel scene" id="scenePanel">
<div class="hud">
<div class="tag">Mini Lab: <b>รอกเบา</b> • <b>เชือกเบา</b> • <b>ดึงด้วยความเร็วคงที่</b></div>
</div>
<canvas id="stage"></canvas>
</main>
</div>
<script>
(function(){
  var canvas=document.getElementById('stage');
  var ctx=canvas.getContext('2d');

  function rr(x,y,w,h,r){
    if(r===undefined) r=6;
    var rr=Math.min(r, Math.abs(w)/2, Math.abs(h)/2);
    ctx.beginPath();
    ctx.moveTo(x+rr,y);
    ctx.lineTo(x+w-rr,y);
    ctx.arcTo(x+w,y,x+w,y+rr,rr);
    ctx.lineTo(x+w,y+h-rr);
    ctx.arcTo(x+w,y+h,x+w-rr,y+h,rr);
    ctx.lineTo(x+rr,y+h);
    ctx.arcTo(x,y+h,x,y+h-rr,rr);
    ctx.lineTo(x,y+rr);
    ctx.arcTo(x,y,x+rr,y,rr);
  }

  var scene=document.getElementById('scenePanel');
  var side=document.querySelector('.side');
  var footerEl=side.querySelector('.footer');
  var originalParent=scene.parentNode;
  var originalNext=scene.nextSibling;

  var isMobile=false;
  var worldScale=1;        // ใช้ย่อภาพเฉพาะมือถือ

  function moveSceneForLayout(){
    isMobile = window.innerWidth <= 920;
    if(isMobile){
      if(scene.parentNode!==side){
        side.insertBefore(scene, footerEl);
      }
    }else{
      if(scene.parentNode!==originalParent){
        originalParent.insertBefore(scene, originalNext);
      }
    }
  }

  function fit(){
    moveSceneForLayout();
    var W=canvas.parentElement.clientWidth;
    var H=canvas.parentElement.clientHeight;
    isMobile = window.innerWidth <= 920;

    if(isMobile){
      // ย่อภาพทั้งฉากให้เล็กลง แต่ไม่ยืด
      var baseW = 800;
      var baseH = 560;
      var availW = Math.max(280, Math.floor(W));
      var scale = availW / baseW;
      worldScale = scale;
      canvas.width  = availW;
      canvas.height = baseH * scale;
    }else{
      worldScale = 1;
      canvas.width = Math.max(800,Math.floor(W));
      canvas.height= Math.max(560,Math.floor(H));
    }
    updateGeometry(); draw();
  }
  window.addEventListener('resize',fit);

  var massEl=document.getElementById('mass');
  var resetBtn=document.getElementById('reset');

  var PX_PER_M=100, IMA=2;
  var beam={x:80,y:60,w:300,h:20};
  var fixedPulley={r:38};
  var movPulley={r:38};
  var load={x:0,y:0,w:80,h:60};
  var handle={x:0,y:0,dragging:false};
  var movPulleyStartCy=0, showVectors=true;
  var showGhost=true;
  var startHandleY=0, pullX_px=0, startY=0;

  // เก็บตำแหน่งเริ่มต้นไว้ใช้วาดร่องรอย
  var ghostState={
    mov:{cx:0,cy:0},
    load:{x:0,y:0,w:0,h:0},
    handle:{x:0,y:0},
    fixed:{cx:0,cy:0}
  };

  function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
  function meters(px){return px/PX_PER_M;}

  // helper ฟอนต์ ให้ตัวอักษรไม่เล็กลงเวลาย่อ worldScale
  function fontInter(px){
    return (px / worldScale).toFixed(1) + 'px Inter, system-ui, sans-serif';
  }
  function fontEmoji(px){
    return (px / worldScale).toFixed(1) + 'px system-ui, Apple Color Emoji, Segoe UI Emoji';
  }

  function computeForces(){
    var m=parseFloat(massEl.value);
    if(!(m>0)) m=0.01;
    var g=10;
    var eta=1;
    var AMA=eta*IMA;
    var T=(m*g)/AMA;
    return {m:m,g:g,eta:eta,AMA:AMA,T:T};
  }

  function shapeLoadByMass(){
    var m=parseFloat(massEl.value);
    if(!(m>0)) m=0.01;
    load.h=clamp(40 + 0.8*m, 40, 140);
    load.w=clamp(64 + 0.3*m, 64, 120);
  }

  function reset(){
    pullX_px=0;
    fixedPulley.cx=beam.x+beam.w-fixedPulley.r-30;
    fixedPulley.cy=beam.y+beam.h+60;
    shapeLoadByMass();
    load.x=beam.x+beam.w/2-load.w/2;
    load.y=fixedPulley.cy+160;
    movPulley.cx=load.x+load.w/2;
    movPulley.cy=load.y-movPulley.r-10;
    movPulleyStartCy=movPulley.cy;
    handle.x=fixedPulley.cx+fixedPulley.r;
    handle.y=movPulley.cy;
    startHandleY=handle.y;

    // เก็บตำแหน่งเริ่มต้นสำหรับร่องรอยเดิม
    ghostState.mov={cx:movPulley.cx, cy:movPulley.cy};
    ghostState.load={x:load.x, y:load.y, w:load.w, h:load.h};
    ghostState.handle={x:handle.x, y:handle.y};
    ghostState.fixed={cx:fixedPulley.cx, cy:fixedPulley.cy};

    computeForces(); updateGeometry(); draw();
  }

  function maxRisePx(){
    var baseLoadY=fixedPulley.cy+160;
    return Math.max(0, (baseLoadY - movPulley.r - 10) - fixedPulley.cy);
  }

  function updateGeometry(){
    shapeLoadByMass();
    var riseMax=maxRisePx();
    pullX_px=clamp(pullX_px,0,2*riseMax);
    handle.y=startHandleY+pullX_px;
    var rise=pullX_px/2;
    var baseLoadY=fixedPulley.cy+160;
    load.y=baseLoadY-rise;
    movPulley.cx=load.x+load.w/2;
    movPulley.cy=load.y-movPulley.r-10;

    // ห้ามรอกตัวกลางสูงกว่ารอกตายตัว
    if(movPulley.cy<fixedPulley.cy){
      movPulley.cy=fixedPulley.cy;
      load.y=movPulley.cy+movPulley.r+10;
    }
    load.x=movPulley.cx-load.w/2;
  }

  function drawBeam(){
    ctx.fillStyle='#111827';
    ctx.fillRect(beam.x,beam.y,beam.w,beam.h);
  }

  // ปรับให้ปลายเชือกสีน้ำตาลแตะขอบล่างคาน (ไม่จม)
  function drawBlackSupports(){
    var ropeColor = '#a16207';
    var black = '#111827';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    // เชือกตั้งด้านซ้ายของรอกเคลื่อนที่ → แตะเพดานพอดี
    ctx.strokeStyle = ropeColor;
    ctx.beginPath();
    ctx.moveTo(movPulley.cx - movPulley.r, beam.y + beam.h);
    ctx.lineTo(movPulley.cx - movPulley.r, movPulley.cy);
    ctx.stroke();

    // เสาแขวนรอกตายตัว
    ctx.strokeStyle = black;
    ctx.beginPath();
    ctx.moveTo(fixedPulley.cx, beam.y + beam.h/2);
    ctx.lineTo(fixedPulley.cx, fixedPulley.cy);
    ctx.stroke();

    // เชือกจากรอกเคลื่อนที่ลงกลางกล่อง
    ctx.strokeStyle = black;
    ctx.beginPath();
    ctx.moveTo(movPulley.cx, movPulley.cy);
    ctx.lineTo(load.x + load.w/2, load.y);
    ctx.stroke();
  }

  function drawPulley(cx,cy,r){
    ctx.fillStyle='#e5e7eb';ctx.strokeStyle='#111827';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  }

  function drawRope(){
    ctx.lineWidth=4; ctx.lineCap='round';
    var rM=movPulley.r,rF=fixedPulley.r;
    var xR=movPulley.cx+rM, yM=movPulley.cy;
    var xFL=fixedPulley.cx-rF, xFR=fixedPulley.cx+rF, yF=fixedPulley.cy;
    ctx.strokeStyle='#a16207';
    // ครึ่งวงกลมรอกเคลื่อนที่
    ctx.beginPath();ctx.arc(movPulley.cx,yM,rM,Math.PI,0,true);ctx.stroke();
    // เชือกเฉียงขึ้นไปหารอกตายตัว
    ctx.beginPath();ctx.moveTo(xR,yM);ctx.lineTo(xFL,yF);ctx.stroke();
    // ครึ่งวงกลมรอกตายตัว
    ctx.beginPath();ctx.arc(fixedPulley.cx,yF,rF,Math.PI,0,false);ctx.stroke();
    // เชือกลงมือดึง
    ctx.beginPath();ctx.moveTo(xFR,yF);ctx.lineTo(handle.x,handle.y-22);ctx.stroke();
    drawSpringScale(handle.x,handle.y-22, 40, 22);
  }

  function drawSpringScale(x,y,h,hookDrop){
    ctx.fillStyle='#ffffff'; ctx.strokeStyle='#111827'; ctx.lineWidth=2;
    rr(x-14, y, 28, h, 6); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y+h);
    ctx.lineTo(x, y+h+hookDrop-6);
    ctx.arc(x, y+h+hookDrop-2, 4, Math.PI*1.1, Math.PI*0.9, true);
    ctx.stroke();
    ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x-8, y+h-10); ctx.lineTo(x+8, y+h-10); ctx.stroke();
    ctx.fillStyle='#0f172a'; ctx.font=fontInter(11); ctx.textAlign='center';
    ctx.fillText('T', x, y+14);
    ctx.font=fontEmoji(18); ctx.textAlign='center';
    ctx.fillText('🤚', x, y+h+hookDrop+10);
  }

  function drawLoad(){
    ctx.fillStyle='#22c55e'; ctx.fillRect(load.x,load.y,load.w,load.h);
    var hx=load.x+load.w/2, hy=load.y, off=7;
    ctx.strokeStyle='#111827'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(hx, hy+off);
    ctx.lineTo(hx, hy+off-6);
    ctx.arc(hx, hy+off-10, 4, 0, Math.PI, true);
    ctx.stroke();

    ctx.fillStyle='#0f172a'; ctx.font=fontInter(12);
    var mVal=parseFloat(massEl.value);
    if(!(mVal>0)) mVal=0.01;
    ctx.fillText('m = '+mVal.toFixed(2)+' kg', load.x+8, load.y+16);
  }

  function drawArrows(){
    ctx.lineWidth=2; ctx.font=fontInter(12);
    if(pullX_px<=0)return;
    var rx=handle.x+22, rTop=startHandleY, rBot=handle.y;
    var x_m=meters(pullX_px);
    ctx.strokeStyle='#ef4444'; ctx.fillStyle='#ef4444';
    ctx.beginPath();ctx.moveTo(rx,rTop);ctx.lineTo(rx,rBot);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx-4,rBot-8);ctx.lineTo(rx,rBot);ctx.lineTo(rx+4,rBot-8);ctx.fill();
    ctx.textAlign='left'; ctx.fillText('x = '+x_m.toFixed(3)+' m',rx+6,(rTop+rBot)/2);

    var rise_px=Math.abs(movPulley.cy - movPulleyStartCy);
    var rise_m=meters(rise_px);
    var lx=movPulley.cx-22;
    ctx.beginPath();ctx.moveTo(lx,movPulleyStartCy);ctx.lineTo(lx,movPulley.cy);ctx.stroke();
    var headY=movPulley.cy, dy=(movPulley.cy<movPulleyStartCy)?8:-8;
    ctx.beginPath();ctx.moveTo(lx-4,headY+dy);ctx.lineTo(lx,headY);ctx.lineTo(lx+4,headY+dy);ctx.fill();
    ctx.fillStyle='#ef4444'; ctx.textAlign='left';
    ctx.fillText('ขึ้น = '+rise_m.toFixed(3)+' m', movPulley.cx-100, movPulley.cy-50);
  }

  function drawVectors(){
    if(!showVectors) return;
    var fg=computeForces();
    var m=fg.m, g=fg.g, T=fg.T;
    var k=0.006*PX_PER_M*0.3;
    var mg=m*g, Lmg=mg*k, cx=load.x+load.w/2, cy=load.y+load.h/2;
    ctx.strokeStyle='#065f46'; ctx.fillStyle='#065f46'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, cy+Lmg); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-5, cy+Lmg-10); ctx.lineTo(cx, cy+Lmg); ctx.lineTo(cx+5, cy+Lmg-10); ctx.fill();
    ctx.font=fontInter(12);
    ctx.fillText('mg = '+mg.toFixed(2)+' N', cx+8, cy+Math.max(16, Lmg/2));
    var hx=handle.x, hy=handle.y, LT=T*k;
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(hx, hy+LT); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hx-5, hy+LT-10); ctx.lineTo(hx, hy+LT); ctx.lineTo(hx+5, hy+LT-10); ctx.fill();
    ctx.textAlign='left'; ctx.fillText('T = '+T.toFixed(2)+' N', hx+8, hy+Math.max(16, LT/2));
  }

  // วาดร่องรอยเดิมของเชือก "ทั้งเส้น" ซ้าย-ขวา
  function drawGhostLayer(){
    if(!showGhost) return;
    ctx.save();
    ctx.setLineDash([6,5]);
    ctx.lineWidth=3;
    ctx.strokeStyle='rgba(148,163,184,.75)';

    var rM=movPulley.r, rF=fixedPulley.r;

    // 1) เชือกตั้งด้านซ้ายของรอกเคลื่อนที่
    ctx.beginPath();
    ctx.moveTo(ghostState.mov.cx - rM, beam.y + beam.h);
    ctx.lineTo(ghostState.mov.cx - rM, ghostState.mov.cy);
    ctx.stroke();

    // 2) ครึ่งวงกลมรอกเคลื่อนที่
    ctx.beginPath();
    ctx.arc(ghostState.mov.cx, ghostState.mov.cy, rM, Math.PI, 0, true);
    ctx.stroke();

    // 3) เชือกเฉียงจากรอกเคลื่อนที่ไปหารอกตายตัว
    var xR = ghostState.mov.cx + rM;
    var xFL = ghostState.fixed.cx - rF;
    var xFR = ghostState.fixed.cx + rF;
    var yM = ghostState.mov.cy;
    var yF = ghostState.fixed.cy;

    ctx.beginPath();
    ctx.moveTo(xR, yM);
    ctx.lineTo(xFL, yF);
    ctx.stroke();

    // 4) ครึ่งวงกลมรอกตายตัว
    ctx.beginPath();
    ctx.arc(ghostState.fixed.cx, yF, rF, Math.PI, 0, false);
    ctx.stroke();

    // 5) เชือกลงมาที่มือดึงเดิม
    ctx.beginPath();
    ctx.moveTo(xFR, yF);
    ctx.lineTo(ghostState.handle.x, ghostState.handle.y - 22);
    ctx.stroke();

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    if(isMobile){
      ctx.scale(worldScale, worldScale);
    }

    drawBeam();
    drawGhostLayer();
    drawPulley(fixedPulley.cx,fixedPulley.cy,fixedPulley.r);
    drawPulley(movPulley.cx,movPulley.cy,movPulley.r);
    drawBlackSupports();
    drawRope();
    drawLoad();
    drawArrows();
    drawVectors();

    ctx.restore();

    computeForces();
  }

  function hitHandle(px,py){
    return Math.hypot(px-handle.x,py-(handle.y+22))<=26 || Math.hypot(px-handle.x,py-(handle.y+50))<=28;
  }

  function onPointerDown(e){
    var rect=canvas.getBoundingClientRect();
    var clientX=e.clientX;
    var clientY=e.clientY;
    if(clientX==null && e.touches && e.touches.length){
      clientX=e.touches[0].clientX;
      clientY=e.touches[0].clientY;
    }
    var x=(clientX-rect.left)/(isMobile?worldScale:1);
    var y=(clientY-rect.top)/(isMobile?worldScale:1);
    if(hitHandle(x,y)){handle.dragging=true;startY=y;e.preventDefault();}
  }
  function onPointerMove(e){
    if(!handle.dragging)return;
    var rect=canvas.getBoundingClientRect();
    var clientY=e.clientY;
    if(clientY==null && e.touches && e.touches.length){
      clientY=e.touches[0].clientY;
    }
    var y=(clientY-rect.top)/(isMobile?worldScale:1);
    pullX_px=(y-startY);
    updateGeometry(); draw();
  }
  function onPointerUp(){handle.dragging=false;}

  canvas.addEventListener('mousedown',onPointerDown);
  canvas.addEventListener('mousemove',onPointerMove);
  window.addEventListener('mouseup',onPointerUp);
  canvas.addEventListener('touchstart',onPointerDown,{passive:false});
  canvas.addEventListener('touchmove',onPointerMove,{passive:false});
  window.addEventListener('touchend',onPointerUp);

  [massEl].forEach(function(el){
    el.addEventListener('input',function(){computeForces();updateGeometry();draw();});
  });
  resetBtn.addEventListener('click',function(){reset();});

  reset(); fit();
  if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise(); }
})();
</script>
</body>
</html>
