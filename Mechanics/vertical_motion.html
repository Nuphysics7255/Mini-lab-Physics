<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mini Lab: การโยนวัตถุในแนวดิ่ง</title>

<!-- MathJax (มาตรฐานสมการเป็น LaTeX / MathJax) -->
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(','\\)'], ['$', '$']], displayMath: [['\\[','\\]']] },
    svg: { fontCache: 'global' }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
  :root{
    --ink:#0f172a;
    --muted:#64748b;

    /* มาตรฐานเพจ: สีปุ่ม */
    --play:#38bdf8;     /* ฟ้า */
    --reset:#9ca3af;    /* เทา */

    --card:#ffffff;
    --line:#e5e7eb;

    --grid:#dbeafe;     /* เส้นกริดอ่อน */
    --gridBold:#bfdbfe;

    --orange:#f59e0b;
    --red:#ef4444;
    --blue:#2563eb;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,"Noto Sans Thai",sans-serif;
    color:var(--ink);
    background:#fff;
  }
  .wrap{
    width:min(1100px, 100%);
    margin:0 auto;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  h2{
    margin:0;
    font-size:20px;
    color:var(--blue);
    text-align:left;
  }

  .layout{
    display:grid;
    grid-template-columns: 1.4fr 1fr;
    gap:12px;
    align-items:start;
  }
  @media (max-width: 860px){
    .layout{grid-template-columns:1fr}
    /* มือถือ: ให้แผง Controls (เฉพาะ u,g,y0,tf) อยู่บนจอทดลอง */
    .layout{display:flex; flex-direction:column; gap:0;}
    .panel.controls{order:0}
    .panel.controls #actionControls{display:block}
    #mobileActionsAnchor{display:block; order:2; margin-top:0;}
    .panel:first-child{order:1}
    .panel.controls #paramControls{display:block}
    .labBox{height:416px;} /* 80% ของ 520px */
    /* ลดขนาดเฉพาะป้ายกรอบ y,u,t,g */
    #lblInfo{transform:none;}
 
    .wrap{padding:0;}
    .panel.labPanel{padding:0; border:none; border-radius:0; box-shadow:none;}
    .panel.labPanel .labBox{border-radius:0; border-left:none; border-right:none;}
    .labBox{margin-bottom:0;}
  
    body{overflow-x:hidden;}
    .wrap{width:100%; max-width:100vw; padding:0 10px 0 10px;}
    .panel{max-width:100%;}
    .labBox{max-width:100%;}
    #actionControls{max-width:100%;}
    .btnRow{max-width:100%;}
    .btn{max-width:100%;}

  }

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:12px;
    box-shadow: 0 1px 8px rgba(15,23,42,.06);
  }

  .labBox{
    position:relative;
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    background:#fff;
    height:520px;
  }
  canvas#lab{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
    background:
      linear-gradient(to right, transparent 0, transparent 19px, var(--grid) 20px),
      linear-gradient(to bottom, transparent 0, transparent 19px, var(--grid) 20px);
    background-size:20px 20px;
  }
  .labBox::before{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
    background:
      linear-gradient(to right, transparent 0, transparent 99px, var(--gridBold) 100px),
      linear-gradient(to bottom, transparent 0, transparent 99px, var(--gridBold) 100px);
    background-size:100px 100px;
    opacity:.55;
  }

  .label{
    position:absolute;
    padding:6px 10px;
    border-radius:12px;
    border:1px solid rgba(37,99,235,.25);
    background:transparent;
    color:var(--blue);
    font-weight:600;
    font-size:16px;
    user-select:none;
    cursor:grab;
    backdrop-filter: blur(2px);
    touch-action:none;
  }
  .label:active{cursor:grabbing}
  .label.orange{ color:var(--orange); border-color:rgba(245,158,11,.35) }
  .label.red{ color:var(--red); border-color:rgba(239,68,68,.35) }

  /* ป้ายข้อมูลรวม (y,u,t,g,y0,Sy) — ไม่มีกรอบ */
  .infoLabel{
    position:absolute;
    padding:0;
    border:none;
    background:transparent;
    color:var(--blue);
    font-weight:700;
    font-size: 14px;
    line-height:1.35;
    user-select:none;
    cursor:grab;
    touch-action:none;
    backdrop-filter:none;
  }
  .infoLabel:active{cursor:grabbing}


  .infoLineBlue{ color: var(--blue); }
  .infoLineGray{ color:#334155; } /* เทาเข้ม */
  .infoLineGray mjx-container{ color:#334155; }


  .controls h3{
    margin:0 0 8px 0;
    font-size:16px;
    color:var(--ink);
  }
  .grid2{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:8px;
  }
  .row{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  label{
    font-size:12px;
    color:var(--muted);
  }
  input[type="number"], input[type="text"]{
    width:100%;
    padding:10px 10px;
    border-radius:12px;
    border:1px solid var(--line);
    font-size:14px;
    outline:none;
    background:#fff;
  }
  input[readonly]{background:#f8fafc}
  .timeRow{
    display:grid;
    grid-template-columns: 1fr auto auto;
    gap:8px;
    align-items:end;
  }

  .btnRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:none;
    border-radius:999px;
    padding:10px 12px;
    font-weight:700;
    cursor:pointer;
    box-shadow: 0 2px 0 rgba(15,23,42,.08);
    user-select:none;
  }
  .btn:active{transform:translateY(1px)}
  .btn.play{background:var(--play); color:#fff}
  .btn.reset{background:var(--reset); color:#111827}
  .btn.graph{background:#e0f2fe; color:#075985; border:1px solid #bae6fd}

  .btn.small{
    padding:10px 12px;
    min-width:44px;
    justify-content:center;
  }
  .hint{
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    line-height:1.35;
  }

  .modalBack{
    position:fixed; inset:0;
    background:rgba(15,23,42,.45);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:50;
  }
  .modal{
    width:min(1100px, 100%);
    max-height: min(92vh, 920px);
    overflow:auto;
    background:#fff;
    border-radius:18px;
    border:1px solid rgba(255,255,255,.35);
    box-shadow: 0 20px 60px rgba(15,23,42,.25);
    position:relative;
  }
  .modalTop{
    position:sticky;
    top:0;
    z-index:2;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 12px;
    background:#fff;
    border-bottom:1px solid var(--line);
  }
  .modalTitle{
    font-weight:800;
    color:var(--ink);
  }
  .closeBtn{
    position:fixed;
    right:16px;
    top:16px;
    z-index:60;
    border:none;
    border-radius:999px;
    padding:10px 12px;
    cursor:pointer;
    background:#fff;
    box-shadow: 0 10px 30px rgba(15,23,42,.18);
    display:none;
  }
  .closeBtn span{font-weight:900}
  .modalBack.show{display:flex}
  .modalBack.show + .closeBtn{display:inline-flex}

  .contentPad{padding:14px}
  .graphGrid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
    align-items:start;
  }
  @media (max-width: 860px){
    .graphGrid{grid-template-columns:1fr}
  }
  .graphCard{
    border:1px solid var(--line);
    border-radius:16px;
    padding:10px;
    background:#fff;
  }
  .graphCard h4{
    margin:0 0 8px 0;
    font-size:14px;
    color:var(--ink);
  }
  canvas.plot{
    width:100%;
    height:360px;
    display:block;
    border-radius:12px;
    background:#fff;
  }


  .pageLink{
    margin-top:8px;
    font-size:14px;
  }
  .pageLink a{
    color:var(--blue);
    font-weight:800;
    text-decoration:none;
  }
  .pageLink a:hover{text-decoration:underline}
  @media (min-width: 861px){#mobileActionsAnchor{display:none}}
</style>
</head>

<body>
  <div class="wrap">
    <h2>Mini Lab: การโยนวัตถุในแนวดิ่ง</h2>

    <div class="layout">
      <div class="panel labPanel">
        <div class="labBox">
          <canvas id="lab"></canvas>
          <div id="lblInfo" class="infoLabel" style="left:14px; top:14px;"></div>
</div>

        <div id="pageLinkHome"><div class="pageLink">
          👉 ศึกษาเพิ่มเติมที่ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener">เพจคลายปมฟิสิกส์</a>
        </div></div>
      </div>


      <div id="mobileActionsAnchor"></div>
      <div class="panel controls">
        <h3>Controls</h3>
        <div id="paramControls">


        <div class="grid2">
          <div class="row">
            <label>\(u\) (m/s)</label>
            <input id="uIn" type="number" value="20" step="0.1" />
          </div>
          <div class="row">
            <label>ความเร่งเนื่องจากสนามโน้มถ่วง \(g\) (m/s\(^2\))</label>
            <input id="gIn" type="number" value="10" step="0.1" min="0" />
          </div>
          <div class="row">
            <label>\(y_0\) (m)</label>
            <input id="y0In" type="number" value="0" step="0.1" />
          </div>
          <div class="row">
            <label>\(t_f\) (s)</label>
            <input id="tfOut" type="text" value="-" readonly />
          </div>
        </div>

        <div style="height:10px"></div>

        </div>
        <div id="actionControls">

        <div class="timeRow">
          <div class="row">
            <label>\(t\) (s)</label>
            <input id="tIn" type="number" value="0" step="1" />
          </div>
          <button id="minusBtn" class="btn small reset" title="-1 s">−</button>
          <button id="plusBtn" class="btn small play" title="+1 s">+</button>
        </div>

        <div class="btnRow">
          <button id="playPauseBtn" class="btn play">▶️ เล่น</button>
          <button id="resetBtn" class="btn reset">🔄 รีเซ็ต</button>
          <button id="graphBtn" class="btn graph">📈 ดูกราฟ</button>
        </div>
        </div>
      </div>
    </div>
  </div>

  <div id="modalBack" class="modalBack" aria-hidden="true">
    <div id="modal" class="modal" role="dialog" aria-modal="true">
      <div class="modalTop">
        <div class="modalTitle" id="modalTitle">Modal</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button id="toGraph" class="btn graph">📈 ดูกราฟ</button>
        </div>
      </div>
      <div id="modalBody" class="contentPad"></div>
    </div>
  </div>
  <button id="closeBtn" class="closeBtn" title="Close"><span>❌</span></button>


<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const clamp = (x, a, b) => Math.max(a, Math.min(b, x));

  const state = { u:20, g:10, y0:0, t:0, tf:0, showV:true, showGvec:true, showSy:true, visited:new Set(), running:false, lastTs:null, startMarker:false };

  const lab = $("lab");
  const ctx = lab.getContext("2d");

  const uIn = $("uIn"), gIn = $("gIn"), y0In = $("y0In"), tIn = $("tIn"), tfOut = $("tfOut");
  const plusBtn = $("plusBtn"), minusBtn = $("minusBtn"), playPauseBtn = $("playPauseBtn"), resetBtn = $("resetBtn");

    const lblInfo = $("lblInfo");

  
  // Mobile: move action controls (checkboxes + play/reset/graph/formula/exercise) below the lab
  const actionControls = $("actionControls");
  const mobileActionsAnchor = $("mobileActionsAnchor");
  const controlsPanel = document.querySelector(".panel.controls");

  function placeActions(){
    const isMobile = window.matchMedia("(max-width: 860px)").matches;
    if (!actionControls || !mobileActionsAnchor || !controlsPanel) return;

    if (isMobile){
      // Put actions under the lab
      if (actionControls.parentElement !== mobileActionsAnchor){
        mobileActionsAnchor.appendChild(actionControls);
    scheduleSafeResize();
  }
    } else {
      // Put actions back inside the controls panel (after param controls)
      if (actionControls.parentElement !== controlsPanel){
        controlsPanel.appendChild(actionControls);
      }
    }
  }
  window.addEventListener("resize", placeActions);

const modalBack = $("modalBack"), closeBtn = $("closeBtn"), modalTitle = $("modalTitle"), modalBody = $("modalBody");
  const graphBtn = $("graphBtn");
  const toGraph = $("toGraph");

  function computeTf(u, g, y0){
    if (g <= 0) return Infinity;
    const disc = u*u + 2*g*y0;
    if (disc < 0) return 0;
    return (u + Math.sqrt(disc)) / g;
  }
  function yOf(t){ return state.y0 + state.u*t - 0.5*state.g*t*t; }
  function vOf(t){ return state.u - state.g*t; }

  function resize(){
    const r = lab.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    lab.width = Math.floor(r.width * dpr);
    lab.height = Math.floor(r.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    draw();
  }

  // ---- Mobile robustness: avoid 0-size canvas after DOM reflow ----
  function safeResize(retries=12){
    const r = lab.getBoundingClientRect();
    // If canvas is not laid out yet (width/height = 0), retry shortly
    if ((r.width < 2 || r.height < 2) && retries > 0){
      requestAnimationFrame(()=>safeResize(retries-1));
      return;
    }
    resize();
  }

  function scheduleSafeResize(){
    // multiple ticks to survive mobile reflow / font loading
    requestAnimationFrame(()=>safeResize());
    setTimeout(()=>safeResize(), 60);
    setTimeout(()=>safeResize(), 180);
  }

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", ()=>{
    placeActions();
    relocateUI();
    setTimeout(scheduleSafeResize, 80);
  });

    function relocateUI(){
    const mobile = window.matchMedia("(max-width: 860px)").matches;

    // move page link to bottom on mobile
    const pageLink = document.querySelector(".pageLink");
    const pageHome = document.getElementById("pageLinkHome");
    const wrap = document.querySelector(".wrap");
    if (pageLink && pageHome && wrap){
      if (mobile){
        if (pageLink.parentElement !== wrap){
          wrap.appendChild(pageLink);
    scheduleSafeResize();
  }
        pageLink.style.marginTop = "8px";
        pageLink.style.marginBottom = "0";
      } else {
        if (pageLink.parentElement !== pageHome){
          pageHome.appendChild(pageLink);
        }
        pageLink.style.marginTop = "8px";
      }
    }
    const anchor = document.getElementById("mobileActionsAnchor");
    const action = document.getElementById("actionControls");
    const controlsPanel = document.querySelector(".panel.controls");
    if (!anchor || !action || !controlsPanel) return;
    if (mobile){
      // ย้าย time/checkbox/buttons ไปไว้ใต้จอทดลอง (ตามที่สั่งในมือถือ)
      if (action.parentElement !== anchor){
        anchor.appendChild(action);
        action.style.display = "";
      }
    } else {
      // กลับไปอยู่ในแผง Controls (สำหรับจอคอม)
      if (action.parentElement !== controlsPanel){
        controlsPanel.appendChild(action);
        action.style.display = "";
      }
    }
  }
  window.addEventListener("resize", relocateUI);

  // initial placement for mobile/desktop
  placeActions();
  relocateUI();
  scheduleSafeResize();

  function getScale(){
    const tf = state.tf;
    const tPeak = state.g>0 ? state.u/state.g : 0;
    const yPeak = Math.max(state.y0, yOf(clamp(tPeak, 0, tf)));
    const yMax = Math.max(2, yPeak*1.15 + 1);
    return {yMin:0, yMax};
  }
  function getCss(varName){
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }
  function drawArrow(x0,y0,x1,y1,color,w){
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = w;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x0,y0);
    ctx.lineTo(x1,y1);
    ctx.stroke();
    const ang = Math.atan2(y1-y0, x1-x0);
    const head = 10;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x1 - head*Math.cos(ang - Math.PI/6), y1 - head*Math.sin(ang - Math.PI/6));
    ctx.lineTo(x1 - head*Math.cos(ang + Math.PI/6), y1 - head*Math.sin(ang + Math.PI/6));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function draw(){
    const W = lab.getBoundingClientRect().width;
    const H = lab.getBoundingClientRect().height;
    ctx.clearRect(0,0,W,H);

    // ground line aligned to grid (20px) and moved up a bit
    const grid = 20;
    const groundY = Math.floor((H - 40 - 3*grid) / grid) * grid;

    ctx.save();
    ctx.strokeStyle = "#94a3b8";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();
    ctx.restore();

    const {yMin, yMax} = getScale();
    const padTop = 24;
    const usableH = Math.max(60, groundY - padTop);
    const yToPix = (y) => {
      const yy = clamp(y, yMin, yMax);
      const t = (yy - yMin) / (yMax - yMin || 1);
      return padTop + (1 - t) * usableH;
    };


    const x = W*0.55;

    const times = Array.from(state.visited).sort((a,b)=>a-b);
    if (!state.running){
    ctx.save();
    ctx.strokeStyle = "rgba(148,163,184,.9)";
    ctx.setLineDash([2,2]);
    ctx.lineWidth = 2;
    for (const tt of times){
      const yy = yOf(tt);
      const rHist = 10;
      let ypix = yToPix(Math.max(0, yy));
      if (yy <= 0) ypix = groundY - rHist;
      ctx.beginPath();
      ctx.arc(x, ypix, rHist, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();
    }


    // วงกลมจางๆ ที่ตำแหน่งเริ่มต้น (แสดงเมื่อกดเล่นแล้ว)
    if (state.startMarker){
      const yStartRaw = yOf(0);
      const yStart = Math.max(0, yStartRaw);
      const rStart = 9; // เท่ากับรัศมีวัตถุ
      let yStartPix = yToPix(yStart);
      if (yStart <= 0) yStartPix = groundY - rStart;
      ctx.save();
      ctx.fillStyle = "rgba(148,163,184,.25)"; // เทาอ่อนทึบ
      ctx.beginPath();
      ctx.arc(x, yStartPix, rStart, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    const ycur = Math.max(0, yOf(state.t));
    const R = 9;
    let ypix = yToPix(ycur);
    // prevent the ball from sinking into the ground: stop when the surface touches the ground line
    if (ycur <= 0) ypix = groundY - R;

    ctx.save();
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.arc(x, ypix, R, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    const vNow = vOf(state.t);
    if (state.showV){
  const v = vNow;
  const eps = 1e-6;

  // วาดลูกศรเฉพาะเมื่อ |v| > 0 แต่ "ป้ายค่า v" ต้องแสดงเสมอเมื่อมีการติ๊กแสดง v
  let tipX = x, tipY = ypix;
  let dir = -1;

  if (Math.abs(v) > eps){
    const scaleV = 6;
    const len = 0.70 * clamp(Math.abs(v)*scaleV, 14, 120);
    dir = (v >= 0) ? -1 : +1; // v>0 ชี้ขึ้น, v<0 ชี้ลง
    const x0 = x, y0p = ypix;
    tipX = x0;
    tipY = y0p + dir*len;

    drawArrow(x0, y0p, tipX, tipY, getCss("--orange"), 3);
  }

  // ป้ายค่า v (ตัวเลข + หน่วย) สีส้ม: อยู่ใกล้ปลายลูกศร
  // กรณีจุดสูงสุด v=0: ไม่ต้องแสดงลูกศร แต่ยังแสดงป้ายค่า v=0 ได้
  const vv = (Math.abs(v) <= eps) ? 0 : Math.abs(v);
  const txt = `v = ${vv.toFixed(2)} m/s`;

  // ตำแหน่งป้าย: ถ้ามีลูกศร ใช้ปลายลูกศร; ถ้าไม่มี ใช้ใกล้ลูกบอล
  const tx = (Math.abs(v) > eps) ? (tipX + 10) : (x + 12);
  const ty = (Math.abs(v) > eps) ? (tipY + (dir < 0 ? -10 : 22)) : (ypix - 10);

  ctx.save();
  ctx.font = "800 14px system-ui, Noto Sans Thai, sans-serif";
  ctx.fillStyle = getCss("--orange");
  // ทำสโตรกสีขาวบาง ๆ ให้ตัวอักษรอ่านง่ายบนพื้นหลังกริด
  ctx.strokeStyle = "rgba(255,255,255,.92)";
  ctx.lineWidth = 4;
  ctx.lineJoin = "round";
  ctx.strokeText(txt, tx, ty);
  ctx.fillText(txt, tx, ty);
  ctx.restore();
}


    if (state.showSy){
      // เวกเตอร์การกระจัด S_y จากตำแหน่งเริ่มต้น (t=0) ไปตำแหน่งปัจจุบัน
      const y0raw = yOf(0);
      const y0clamped = Math.max(0, y0raw);
      let ypix0 = yToPix(y0clamped);
      if (y0clamped <= 0) ypix0 = groundY - R;

      const Sy = Math.max(0, yOf(state.t)) - y0clamped;

      const xSy = x + 42; // เลี่ยงทับลูกบอล
      const yStart = ypix0;
      const yEnd = ypix;
      if (Math.abs(yEnd - yStart) > 1){
        drawArrow(xSy, yStart, xSy, yEnd, "rgba(100,116,139,.95)", 3);
      }
      // ป้ายกำกับ S_y (ใส ไม่มีพื้นหลัง) สีเทา
      const yMid = (yStart + yEnd)/2;
      ctx.save();
      ctx.fillStyle = "rgba(100,116,139,.95)";
      ctx.font = "700 14px system-ui, Noto Sans Thai, sans-serif";
      ctx.fillText(`Sᵧ = ${Math.abs(Sy).toFixed(2)} m`, xSy + 10, yMid - 6);
      ctx.restore();
    }


  
    // --- overlay v label after S_y arrow so it stays on top (mobile/desktop) ---
    if (state.showV){
      const v = vOf(state.t);
      const eps = 1e-6;

      // compute tip used for label placement (same logic as main v block)
      let tipX = x, tipY = ypix;
      let dir = -1;
      if (Math.abs(v) > eps){
        const scaleV = 6;
        const len = 0.70 * clamp(Math.abs(v)*scaleV, 14, 120);
        dir = (v >= 0) ? -1 : +1;
        tipX = x;
        tipY = ypix + dir*len;
      }
      const vv = (Math.abs(v) <= eps) ? 0 : Math.abs(v);
      const txt = `v = ${vv.toFixed(2)} m/s`;
      const tx = (Math.abs(v) > eps) ? (tipX + 10) : (x + 12);
      const ty = (Math.abs(v) > eps) ? (tipY + (dir < 0 ? -10 : 22)) : (ypix - 10);

      ctx.save();
      ctx.font = "800 14px system-ui, Noto Sans Thai, sans-serif";
      ctx.fillStyle = getCss("--orange");
      ctx.strokeStyle = "rgba(255,255,255,.92)";
      ctx.lineWidth = 4;
      ctx.lineJoin = "round";
      ctx.strokeText(txt, tx, ty);
      ctx.fillText(txt, tx, ty);
      ctx.restore();
    }

if (state.showGvec){
      const x0 = x - 40, y0p = ypix - 30;
      const x1 = x0, y1 = y0p + 56;
      drawArrow(x0, y0p, x1, y1, getCss("--red"), 3);
      ctx.save();
      ctx.fillStyle = getCss("--red");
      ctx.font = "900 14px system-ui, Noto Sans Thai, sans-serif";
      const gTxt = `g = ${Math.abs(state.g).toFixed((Math.abs(state.g)%1<1e-9)?0:2)} m/s²`;
      ctx.fillText(gTxt, x0 + 10 - 100, y0p + 16 - 25);
      ctx.restore();
    }
  }

    function updateLabels(){
    const yRaw = yOf(state.t);
    const y = Math.max(0, yRaw);
    const v = vOf(state.t);
    const Sy = y - state.y0;

    // รวมป้าย u,g,t,y,y0,Sy ไว้ในป้ายเดียว (ไม่มีกรอบ) + แยกสีตามที่สั่ง
    lblInfo.innerHTML =
      `<span class="infoLineBlue">\\(u = ${state.u.toFixed(2)}\\,\\mathrm{m/s}\\)</span><br>` +
      `<span class="infoLineBlue">\\(t = ${state.t.toFixed(2)}\\,\\mathrm{s}\\)</span><br>` +
      `<span class="infoLineGray">\\(y = ${y.toFixed(2)}\\,\\mathrm{m}\\)</span><br>` +
      `<span class="infoLineGray">\\(y_0 = ${state.y0.toFixed(2)}\\,\\mathrm{m}\\)</span><br>` +
      `<span class="infoLineGray">\\(S_y = ${Sy.toFixed(2)}\\,\\mathrm{m}\\)</span>`;

    if (window.MathJax?.typesetPromise){
      MathJax.typesetPromise([lblInfo]).catch(()=>{});
    }
  }

  function recalc(){
    state.u = Number(uIn.value || 0);
    state.g = Math.max(0, Number(gIn.value || 0));
    state.y0 = Number(y0In.value || 0);

    state.tf = computeTf(state.u, state.g, state.y0);
    if (!isFinite(state.tf) || state.tf < 0) state.tf = 0;

    state.t = clamp(Number(tIn.value || 0), 0, state.tf);
    tIn.value = state.t.toFixed(0);

    tfOut.value = state.tf.toFixed(2);

    updateLabels();
    draw();
  }

  function step(dt){
    const prevInt = Math.round(state.t);
    state.visited.add(prevInt);

    let next = Math.round(state.t) + dt;
    next = clamp(next, 0, Math.floor(state.tf + 1e-9));
    state.t = next;
    tIn.value = String(next);

    updateLabels();
    draw();
  }

  function setRunning(r){
    state.running = r;
    if (r) state.startMarker = true;
    state.lastTs = null;
    if (playPauseBtn){
      playPauseBtn.textContent = state.running ? "⏸ หยุด" : "▶️ เล่น";
    }
    if (state.running){
      requestAnimationFrame(tick);
    }
  }

  function tick(ts){
    if (!state.running) return;
    if (state.lastTs == null) state.lastTs = ts;
    const dt = Math.min(0.05, (ts - state.lastTs)/1000); // seconds
    state.lastTs = ts;

    const prevInt = Math.floor(state.t + 1e-9);
    state.t = state.t + dt;
    if (state.t >= state.tf){
      state.t = state.tf;
      setRunning(false);
    }
    const curInt = Math.floor(state.t + 1e-9);
    if (curInt !== prevInt){
      // keep t input as integer while running
      tIn.value = String(curInt);
    } else {
      tIn.value = String(Math.round(state.t));
    }

    updateLabels();
    draw();
    requestAnimationFrame(tick);
  }


  function getPoint(e){
    if (e.touches && e.touches[0]) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
    return {x:e.clientX, y:e.clientY};
  }
  function makeDraggable(el){
    let dragging = false;
    let startX=0, startY=0, originL=0, originT=0;

    const onDown = (e) => {
      dragging = true;
      el.style.cursor = "grabbing";
      const p = getPoint(e);
      startX = p.x; startY = p.y;
      const rect = el.getBoundingClientRect();
      const parent = el.parentElement.getBoundingClientRect();
      originL = rect.left - parent.left;
      originT = rect.top - parent.top;
      e.preventDefault();
    };
    const onMove = (e) => {
      if (!dragging) return;
      const p = getPoint(e);
      const dx = p.x - startX;
      const dy = p.y - startY;
      const parent = el.parentElement.getBoundingClientRect();
      const newL = clamp(originL + dx, 6, parent.width - el.offsetWidth - 6);
      const newT = clamp(originT + dy, 6, parent.height - el.offsetHeight - 6);
      el.style.left = newL + "px";
      el.style.top = newT + "px";
      e.preventDefault();
    };
    const onUp = () => {
      dragging = false;
      el.style.cursor = "grab";
    };

    el.addEventListener("pointerdown", onDown);
    window.addEventListener("pointermove", onMove, {passive:false});
    window.addEventListener("pointerup", onUp);
  }

  function openModal(title, bodyHTML){
    modalTitle.textContent = title;
    modalBody.innerHTML = bodyHTML;
    modalBack.classList.add("show");
    closeBtn.style.display = "inline-flex";
    modalBack.setAttribute("aria-hidden","false");
    document.body.style.overflow="hidden";

    if (window.MathJax?.typesetPromise){
      MathJax.typesetPromise([modalBody]).catch(()=>{});
    }

    if (title.includes("กราฟ")){
      setTimeout(()=>drawGraphs(), 0);
    }
  }
  function closeModal(){
    modalBack.classList.remove("show");
    closeBtn.style.display = "none";
    modalBack.setAttribute("aria-hidden","true");
    document.body.style.overflow="";
  }

  modalBack.addEventListener("click", (e)=>{ if (e.target === modalBack) closeModal(); });
  closeBtn.addEventListener("click", closeModal);
  window.addEventListener("keydown", (e)=>{ if (e.key === "Escape") closeModal(); });

  function graphHTML(){
    return `
      <div class="graphGrid">
        <div class="graphCard">
          <h4>กราฟ \\(y\\)–\\(t\\)</h4>
          <canvas id="plotYT" class="plot"></canvas>
        </div>
        <div class="graphCard">
          <h4>กราฟ \\(v\\)–\\(t\\)</h4>
          <canvas id="plotVT" class="plot"></canvas>
        </div>
      </div>
      <div style="margin-top:10px; color: var(--muted); font-size:12px;">
        ช่วงเวลา \\(0 \\le t \\le t_f\\) โดย \\(t_f\\) คือเวลาที่วัตถุกลับถึงระดับพื้น \\(y=0\\)
      </div>
    `;
  }

  function drawGraphs(){
    const c1 = $("plotYT");
    const c2 = $("plotVT");
    if (!c1 || !c2) return;

    drawPlot(c1, (t)=>Math.max(0, yOf(t)), 0, state.tf, "y (m)");
    drawPlot(c2, (t)=>vOf(t), 0, state.tf, "v (m/s)");
  }

  function drawPlot(canvas, f, t0, t1, yLabel){
    const r = canvas.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.floor(r.width*dpr);
    canvas.height = Math.floor(r.height*dpr);
    const p = canvas.getContext("2d");
    p.setTransform(dpr,0,0,dpr,0,0);

    const W = r.width, H = r.height;
    p.clearRect(0,0,W,H);

    const padL=46, padR=14, padT=16, padB=34;
    const w = W-padL-padR, h=H-padT-padB;

    const N = 240;
    let ymin=Infinity, ymax=-Infinity;
    const pts = [];
    for (let i=0;i<=N;i++){
      const t = t0 + (t1-t0)*i/N;
      const y = f(t);
      pts.push({t,y});
      ymin = Math.min(ymin,y);
      ymax = Math.max(ymax,y);
    }
    if (ymin === ymax){ ymax = ymin + 1; }

    p.save();
    p.strokeStyle = "#94a3b8";
    p.lineWidth = 1.5;
    p.beginPath();
    p.moveTo(padL, padT);
    p.lineTo(padL, padT+h);
    p.lineTo(padL+w, padT+h);
    p.stroke();
    p.restore();

    p.save();
    p.fillStyle = "#334155";
    p.font = "12px system-ui, Noto Sans Thai, sans-serif";
    const yTicks = 4;
    for (let k=0;k<=yTicks;k++){
      const ty = ymin + (ymax-ymin)*k/yTicks;
      const ypix = padT + h - (ty-ymin)/(ymax-ymin)*h;
      p.strokeStyle = "rgba(148,163,184,.35)";
      p.lineWidth = 1;
      p.beginPath();
      p.moveTo(padL, ypix);
      p.lineTo(padL+w, ypix);
      p.stroke();
      p.fillText(ty.toFixed(1), 8, ypix+4);
    }
    const xTicks = 4;
    for (let k=0;k<=xTicks;k++){
      const tt = t0 + (t1-t0)*k/xTicks;
      const xpix = padL + (tt-t0)/(t1-t0 || 1)*w;
      p.strokeStyle = "rgba(148,163,184,.35)";
      p.beginPath();
      p.moveTo(xpix, padT);
      p.lineTo(xpix, padT+h);
      p.stroke();
      p.fillText(tt.toFixed(1), xpix-10, padT+h+22);
    }
    p.fillText("t (s)", padL+w-26 - 15, padT+h+22);
    const yLabY = (typeof yLabel==="string" && yLabel.trim().startsWith("v")) ? (14 + 10 - 5) : (14 + 10);
    p.fillText(yLabel, 68 - 15, yLabY);
    p.restore();

    p.save();
    p.strokeStyle = "#0f172a";
    p.lineWidth = 2.5;
    p.beginPath();
    pts.forEach((pt, i)=>{
      const x = padL + (pt.t-t0)/(t1-t0 || 1)*w;
      const y = padT + h - (pt.y-ymin)/(ymax-ymin)*h;
      if (i===0) p.moveTo(x,y); else p.lineTo(x,y);
    });
    p.stroke();
    p.restore();

    const tcur = clamp(state.t, t0, t1);
    const ycur = f(tcur);
    const xcur = padL + (tcur-t0)/(t1-t0 || 1)*w;
    const ycurPix = padT + h - (ycur-ymin)/(ymax-ymin)*h;

    p.save();
    p.fillStyle = "#f97316";
    p.beginPath();
    p.arc(xcur, ycurPix, 4.5, 0, Math.PI*2);
    p.fill();
    p.restore();
  }


  [uIn,gIn,y0In,tIn].forEach(el=> el.addEventListener("input", ()=>{
    // Dotted history circles should appear only when the user adjusts time (not during play).
    setRunning(false);
    if (el === tIn){
      // record the previous integer time as a "history" marker
      state.visited.add(Math.round(state.t));
    } else {
      // changing parameters resets the history markers
      state.visited.clear();
      state.startMarker = false;
    }
    recalc();
  }));

  plusBtn.addEventListener("click", ()=>{ setRunning(false); step(+1); });
  minusBtn.addEventListener("click", ()=>{ setRunning(false); step(-1); });

  playPauseBtn.addEventListener("click", ()=>{
    if (state.running){
      setRunning(false);
    } else {
      // restart from 0 if at the end
      if (Math.abs(state.t - state.tf) < 1e-9) { state.t = 0; tIn.value = "0"; state.visited.clear(); }
      setRunning(true);
    }
  });

  resetBtn.addEventListener("click", ()=>{
    setRunning(false);
    state.visited.clear();
    state.startMarker = false;
    state.t = 0;
    tIn.value = "0";
    recalc();
  });


  graphBtn.addEventListener("click", ()=>openModal("ดูกราฟ", graphHTML()));

  toGraph.addEventListener("click", ()=>openModal("ดูกราฟ", graphHTML()));

  [lblInfo].forEach(makeDraggable);

  relocateUI();
  recalc();
  resize();
})();
</script>
</body>
</html>
