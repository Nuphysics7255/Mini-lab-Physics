<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>การทดลองสมดุลของคาน</title>
<style>
  :root{
    --ink:#0f172a; --muted:#64748b; --line:#e5e7eb; --bg:#ffffff;
    --accent:#2563eb; --ok:#16a34a; --warn:#dc2626;
    --wood1:#8B5A2B; --wood2:#A9744F; --wood3:#C68E5E;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation}
  html,body{height:100svh}
  body{
    margin:0; font-family:system-ui, Inter, 'Noto Sans Thai', sans-serif;
    color:var(--ink); background:var(--bg);
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  header{
    padding:8px 12px; border-bottom:1px solid var(--line);
    display:flex; gap:6px; align-items:center; flex-wrap:wrap;
    flex:0 0 auto;
  }
  header h1{font-size:16px; margin:0}

  main.app{
    flex:1 1 auto;
    display:grid;
    grid-template-rows:minmax(270px, calc(72% - 150px)) auto auto;
    gap:6px;
    padding:6px;
    max-width:1200px;
    margin:0 auto;
    width:100%;
    min-height:0;
  }

  .stage{
    position:relative;
    width:100%;
    height:100%;
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    background:linear-gradient(#f8fafc, #ffffff);
    touch-action:none;
  }

  .btnbar{
    border:1px solid var(--line);
    border-radius:12px;
    padding:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:center;
    align-items:center;
  }

  .controls{display:grid; grid-template-columns:1fr 1fr; gap:6px; min-height:0}
  @media (max-width:900px){
    main.app{ grid-template-rows:minmax(162px, 37.8%) auto auto; } /* สั้นลง 35% + เพิ่มอีก 10% */
    .controls{ grid-template-columns:1fr; }
  }

  .card{border:1px solid var(--line); border-radius:12px; padding:8px}
  .btn{
    appearance:none; border:1px solid var(--line); border-radius:10px;
    background:#fff; padding:6px 10px; font-size:13px; cursor:pointer;
  }
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  label{font-size:12px; color:var(--muted); display:flex; align-items:center; justify-content:space-between; gap:6px}
  input[type="range"]{width:100%}
  .num{width:80px; padding:4px 6px; border:1px solid var(--line); border-radius:8px; font-size:13px}
  .mass-list{display:flex; flex-wrap:wrap; gap:6px}
  .mass-card{border:1px solid var(--line); border-radius:10px; padding:6px 8px; display:flex; align-items:center; gap:8px}
  .mass-name{font-weight:700; font-size:13px; color:#0f172a; display:flex; align-items:center; gap:6px}
  .dot{width:10px; height:10px; border-radius:50%}
  .tag{font-size:12px; color:#475569}
  .support{cursor:grab}

  .stepper{display:none; gap:4px; align-items:center}
  .stepper .sbtn{
    width:28px; height:28px; border-radius:8px;
    border:1px solid var(--line); background:#fff; cursor:pointer;
    font-size:16px; line-height:1;
  }
  @media (max-width:900px){
    .stepper{display:flex;}
    .support-hint{display:none !important;}
  }

  footer.study{
    position:fixed;
    left:0; right:0; bottom:6px;
    text-align:center;
    font-size:16px;
    z-index:50;
    pointer-events:auto;
  }
  footer.study a{color:#2563eb; text-decoration:none; font-weight:600}
  @media (max-width:900px){
    footer.study{display:none !important;} /* ตัดข้อความในมือถือ */
  }

  /* ===== SNAP FX ===== */
  .tick{
    fill:var(--ok);
    font-size:28px;
    font-weight:800;
    opacity:0;
    animation: tickPop 0.45s ease-out forwards;
    pointer-events:none;
  }
  @keyframes tickPop{
    0%{opacity:0; transform:translateY(6px) scale(0.7)}
    30%{opacity:1; transform:translateY(0) scale(1.15)}
    100%{opacity:0; transform:translateY(-8px) scale(1)}
  }
  .snap-glow{
    animation: glow 0.4s ease-out;
  }
  @keyframes glow{
    0%{filter:drop-shadow(0 0 0 rgba(22,163,74,0))}
    50%{filter:drop-shadow(0 0 10px rgba(22,163,74,.85))}
    100%{filter:none}
  }
</style>
</head>

<body>
  <header>
    <h1>การทดลองสมดุลของคาน</h1>

    <div style="display:flex;align-items:center;gap:10px;margin-left:12px;flex-wrap:wrap">
      <label>โหมด:
        <select id="selMode" class="num" style="width:auto">
          <option value="light" selected>คานเบา</option>
          <option value="uniform">คานมีมวล (สม่ำเสมอ)</option>
          <option value="custom">คานมีมวล (ไม่สม่ำเสมอ)</option>
        </select>
      </label>
      <label>ความยาว L (m): <b id="lblL">1.60</b>
        <input class="num" type="number" id="inL" min="0.50" max="3.00" step="0.05" value="1.60" />
      </label>
      <label>xₚ (m): <b id="lblXp">0.80</b>
        <input class="num" type="number" id="inXp" min="0" max="1.60" step="0.01" value="0.80" />
      </label>
      <label id="lbMb" style="display:none">m_b (kg): <b id="lblMb">0.50</b>
        <input class="num" type="number" id="inMb" min="0" max="5.00" step="0.05" value="0.50" />
      </label>
      <label id="lbXb" style="display:none">x_b (m): <b id="lblXb">0.80</b>
        <input class="num" type="number" id="inXb" min="0" max="1.60" step="0.01" value="0.80" />
      </label>
    </div>
  </header>

  <main class="app">
    <section class="stage">
      <svg id="svg" viewBox="0 0 1200 700" width="100%" height="100%">
        <g id="ruler"></g>

        <!-- เงาคานตำแหน่งเดิม (เส้นปะ) -->
        <g id="ghostLayer"></g>

        <g id="rig" transform="translate(200,310)">
          <defs>
            <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="var(--wood1)"/>
              <stop offset="40%" stop-color="var(--wood2)"/>
              <stop offset="100%" stop-color="var(--wood3)"/>
            </linearGradient>
          </defs>

          <rect id="beam" x="0" y="20" width="1200" height="24" rx="10" fill="url(#woodGrad)" stroke="#3f2a16"/>
          <g id="beamTicks"></g>
          <circle id="beamCM" cx="400" cy="32" r="6" fill="#ef4444" stroke="#fff" stroke-width="2"/>
          <g id="masses"></g>

          <!-- เอฟเฟกต์ติ๊ก/วาบเขียว (อยู่ใน rig เพื่อหมุนไปกับคาน) -->
          <g id="fxInRig"></g>
        </g>

        <g id="supportsLayer"></g>
        <g id="forcesLayer"></g>
        <g id="momentSum"></g>
        <g id="infoLayer"></g>
      </svg>
    </section>

    <section class="btnbar" aria-label="controls-under-stage">
      <button class="btn primary" id="btnPlay" type="button">เล่น</button>
      <button class="btn" id="btnReset" type="button">รีเซ็ต</button>
      <button class="btn" id="btnAddMass" type="button">+ เพิ่มมวล</button>
      <button class="btn" id="btnAddSupport" type="button">+ เพิ่มจุดหมุน</button>
      <button class="btn" id="btnForces" type="button">แสดงเวกเตอร์แรง</button>
      <button class="btn" id="btnMoments" type="button">แสดงโมเมนต์</button>
    </section>

    <section class="controls">
      <div class="card">
        <div class="list-row"><strong>ก้อนมวลที่แขวน</strong><span class="tag">ลากเพื่อย้าย • ดับเบิลแตะเพื่อลบ</span></div>
        <div id="massItems" class="mass-list" style="margin-top:6px"></div>
      </div>
      <div class="card">
        <div class="list-row">
          <strong>จุดหมุน</strong>
          <span class="tag support-hint">ลาก • แตะเพื่อเลือก • ดับเบิลแตะเพื่อลบ</span>
        </div>
        <div id="supportItems" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px; margin-top:8px"></div>
      </div>
    </section>
  </main>

  <footer class="study">
    ศึกษาเพิ่มเติมที่ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener">เพจคลายปมฟิสิกส์</a>
  </footer>

<script>
(()=>{
  const isMobile = () => window.matchMedia('(max-width:900px)').matches;

  // ===== Parameters =====
  const g = 9.81;
  let L = 1.6; // m
  const BEAM_W = 1200; // px
  let PX_PER_M = BEAM_W / L;
  const RIG_TX = 0, RIG_TY = 310;
  const BEAM_Y = 20, BEAM_H = 24;

  // Modes
  let mode = 'light';
  let mb = 0.5;
  let xbM = L/2;

  // Dynamic state
  let playing=false, theta=0, omega=0; const c=1.4; let lastT=0;

  // Supports
  let supports = [{id:1, xM:L/2}], activeSupportId=1, supSeq=1;
  function activeSupport(){ return supports.find(s=>s.id===activeSupportId) || supports[0]; }
  function xpM(){ return activeSupport().xM; }
  function xpPX(){ return xpM()*PX_PER_M; }

  // Masses
  let masses=[], idSeq=1;

  // DOM
  const svg = document.getElementById('svg');
  const rig = document.getElementById('rig');
  const beamTicks = document.getElementById('beamTicks');
  const ruler = document.getElementById('ruler');
  const ghostLayer = document.getElementById('ghostLayer');
  const supportsLayer = document.getElementById('supportsLayer');
  const forcesLayer = document.getElementById('forcesLayer');
  const momentSum = document.getElementById('momentSum');
  const infoLayer = document.getElementById('infoLayer');
  const beamCM = document.getElementById('beamCM');
  const fxInRig = document.getElementById('fxInRig');

  const massItems = document.getElementById('massItems');
  const supportItems = document.getElementById('supportItems');

  const selMode = document.getElementById('selMode');
  const inL = document.getElementById('inL'); const lblL = document.getElementById('lblL');
  const inXp = document.getElementById('inXp'); const lblXp = document.getElementById('lblXp');
  const inMb = document.getElementById('inMb'); const lblMb = document.getElementById('lblMb'); const lbMb = document.getElementById('lbMb');
  const inXb = document.getElementById('inXb'); const lblXb = document.getElementById('lblXb'); const lbXb = document.getElementById('lbXb');
  const btnPlay=document.getElementById('btnPlay'), btnReset=document.getElementById('btnReset');
  const btnAddMass=document.getElementById('btnAddMass'), btnAddSupport=document.getElementById('btnAddSupport');
  const btnForces=document.getElementById('btnForces'), btnMoments=document.getElementById('btnMoments');

  let lastBalanced=false;
  const COLORS=['#2563eb','#f59e0b','#10b981','#ef4444','#8b5cf6','#14b8a6','#e11d48','#f97316'];
  const SUBS='₀₁₂₃₄₅₆₇₈₉'; const sub=n=>String(n).split('').map(ch=>/\d/.test(ch)?SUBS[ch]:ch).join('');
  const fmt=n=>(+n).toFixed(2); const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  let showForces=false, showMoments=false;

  // ===== Drawing =====
  function drawRuler(){
    ruler.innerHTML='';
    const yApex = RIG_TY + BEAM_Y + BEAM_H;
    const triH = 22;
    const yLine = yApex + triH + 14;
    const xStart=RIG_TX, xEnd=RIG_TX+BEAM_W;
    ruler.appendChild(el('line',{x1:xStart,y1:yLine,x2:xEnd,y2:yLine,stroke:'#e5e7eb'}));
    for(let m=0;m<=L+1e-9;m+=0.05){
      const X=xStart+m*PX_PER_M;
      const major=Math.abs((m/0.1)-Math.round(m/0.1))<1e-6;
      const h=major?12:7;
      ruler.appendChild(el('line',{x1:X,y1:yLine,x2:X,y2:yLine+h,stroke:'#cbd5e1'}));
      if(major) ruler.appendChild(el('text',{x:X,y:yLine+22,'text-anchor':'middle','font-size':16,fill:'#64748b'},m.toFixed(1)));
    }
  }
  function drawBeamTicks(){
    beamTicks.innerHTML='';
    for(let m=0;m<=L+1e-9;m+=0.1){
      const x=m*PX_PER_M;
      beamTicks.appendChild(el('line',{x1:x,y1:BEAM_Y,x2:x,y2:BEAM_Y+BEAM_H,stroke:'#00000022'}));
    }
  }

  // เงาคานตำแหน่งเดิมเป็นเส้นปะสีเทา (เฉพาะตอนคานหมุน)
  function drawGhostBeam(angleDeg){
    ghostLayer.innerHTML='';
    if(Math.abs(angleDeg) < 0.05) return;

    const g0 = el('g', { transform: `translate(${RIG_TX},${RIG_TY})` });
    g0.appendChild(el('rect', {
      x: 0, y: BEAM_Y,
      width: BEAM_W, height: BEAM_H,
      rx: 10,
      fill: 'none',
      stroke: '#94a3b8',
      'stroke-width': 2,
      'stroke-dasharray': '8 6',
      opacity: 0.9
    }));
    ghostLayer.appendChild(g0);
  }

  function drawSupports(){
    supportsLayer.innerHTML='';
    const yApex = RIG_TY + BEAM_Y + BEAM_H; const h=22, half=16;

    // "จุดหมุน" โตขึ้นอีก 2px
    const PIVOT_FS = 18;

    supports.forEach((s,idx)=>{
      const xWorld=RIG_TX+s.xM*PX_PER_M;
      const pts=`${xWorld-half},${yApex+h} ${xWorld+half},${yApex+h} ${xWorld},${yApex}`;
      const poly=el('polygon',{points:pts,fill:'#111',class:'support',cursor:'grab'});
      supportsLayer.appendChild(poly);
      supportsLayer.appendChild(el('text',{x:xWorld,y:yApex+h+16,'text-anchor':'middle','font-size':16,fill:'#334155'},`S${idx+1}`));
      enableSupportDrag(poly,s);
    });

    const sAct=activeSupport();
    if(sAct){
      const xW=RIG_TX+sAct.xM*PX_PER_M;
      supportsLayer.appendChild(el('text',{
        x:xW, y:RIG_TY+BEAM_Y-6,
        'text-anchor':'middle',
        'font-size':PIVOT_FS,
        fill:'#16a34a',
        'font-weight':'700'
      },'จุดหมุน'));
    }
  }

  function drawMass(ms){
    const gNode=el('g',{ 'data-id':ms.id, cursor:'grab'});
    const hit = el('rect',{opacity:0, fill:'#000', 'pointer-events':'all'});
    const hook=el('line',{stroke:'#0f172a','stroke-width':2});
    const rect=el('rect',{rx:6,fill:ms.color,stroke:'#0f172a22'});
    const txt=el('text',{'text-anchor':'middle','font-size':16,fill:'#fff'});
    gNode.appendChild(hit);
    gNode.appendChild(hook);
    gNode.appendChild(rect);
    gNode.appendChild(txt);
    updateMassNode(gNode,ms);
    enableMassDrag(gNode,ms);
    return gNode;
  }

  function updateMassNode(gNode,ms){
    const X=clamp(ms.x,0,BEAM_W);
    const hit=gNode.children[0], hook=gNode.children[1], rect=gNode.children[2], txt=gNode.children[3];

    // กล่องมวลโตขึ้น 1.4 เท่า
    const size = Math.round(34 * 1.4);
    const rx   = 9;
    const half = size/2;

    hook.setAttribute('x1',X); hook.setAttribute('x2',X);
    hook.setAttribute('y1',BEAM_Y); hook.setAttribute('y2',BEAM_Y+BEAM_H);

    rect.setAttribute('x',X-half);
    rect.setAttribute('y',BEAM_Y+BEAM_H);
    rect.setAttribute('width',size);
    rect.setAttribute('height',size);
    rect.setAttribute('rx',rx);

    // ตัวอักษร m ในกล่องโตขึ้นอีก 5px (จาก 16 → 21)
    txt.setAttribute('font-size', 21);
    txt.setAttribute('x',X);
    txt.setAttribute('y',BEAM_Y+BEAM_H+half);
    txt.setAttribute('dominant-baseline','middle');
    txt.textContent='m'+sub(ms.id);

    // ทำให้ลากง่ายขึ้นบนมือถือ
    const pad = isMobile() ? 24 : 18;
    hit.setAttribute('x', X-(half+pad));
    hit.setAttribute('y', (BEAM_Y+BEAM_H) - pad);
    hit.setAttribute('width', size + pad*2);
    hit.setAttribute('height', size + pad*2);
    hit.setAttribute('rx', rx+6);
  }

  function renderMassList(){
    massItems.innerHTML='';
    masses.forEach(ms=>{
      const row=document.createElement('div'); row.className='mass-card';
      row.innerHTML = `
        <span class="mass-name"><span class="dot" style="background:${ms.color}"></span>มวล #${ms.id}</span>
        <span class="tag">m (kg)</span>
        <div class="stepper" data-stepper="${ms.id}">
          <button class="sbtn" type="button" data-dec="${ms.id}">−</button>
          <button class="sbtn" type="button" data-inc="${ms.id}">+</button>
        </div>
        <input class="num" type="number" step="0.05" min="0" value="${fmt(ms.m)}" data-mid="${ms.id}" />
        <span class="tag">x (m)</span>
        <input class="num" type="number" step="0.01" min="0" max="${fmt(L)}" value="${fmt(ms.x/PX_PER_M)}" data-x-mid="${ms.id}" />
      `;
      massItems.appendChild(row);
    });
  }

  massItems.addEventListener('click', (e)=>{
    const inc = e.target.getAttribute('data-inc');
    const dec = e.target.getAttribute('data-dec');
    if(!inc && !dec) return;
    const id = +(inc||dec);
    const ms = masses.find(m=>m.id===id);
    if(!ms) return;
    const step = 0.05;
    if(inc) ms.m = Math.max(0, ms.m + step);
    if(dec) ms.m = Math.max(0, ms.m - step);
    renderMassList();
    computeAndRender();
  });

  massItems.addEventListener('change',e=>{
    const mid=e.target.getAttribute('data-mid');
    const xmid=e.target.getAttribute('data-x-mid');
    if(mid){
      const ms=masses.find(m=>m.id===+mid); if(!ms) return;
      ms.m=Math.max(0,parseFloat(e.target.value)||0);
      e.target.value=fmt(ms.m);
      computeAndRender();
      return;
    }
    if(xmid){
      const ms=masses.find(m=>m.id===+xmid); if(!ms) return;
      let xm=parseFloat(e.target.value); if(isNaN(xm)) return;
      xm=clamp(xm,0,L);
      ms.x=xm*PX_PER_M;
      e.target.value=fmt(xm);
      computeAndRender();
      return;
    }
  });

  // ===== SNAP FX helpers =====
  function hapticSnap(){
    try{
      if(!isMobile()) return;
      if(navigator && typeof navigator.vibrate === 'function'){
        navigator.vibrate([12]); // สั่นสั้น ๆ
      }
    }catch(_){}
  }
  function showTickAtMass(ms){
    // วาง tick ในพิกัดของ rig (หมุนไปกับคาน)
    const x = clamp(ms.x, 0, BEAM_W);
    const y = BEAM_Y + BEAM_H + 20;
    const t = el('text', { x: x + 14, y: y, class: 'tick' }, '✔');
    fxInRig.appendChild(t);
    setTimeout(()=>{ try{ t.remove(); }catch(_){ } }, 520);
  }

  // คำนวณตำแหน่งสมดุลจริงของ "มวลที่กำลังลาก" โดยถือว่ามวลอื่นคงที่
  function equilibriumXForDraggedMass(ms){
    const xp = xpM();
    const other = masses
      .filter(m=>m !== ms)
      .reduce((sum,m)=> sum + (m.m*g)*((m.x/PX_PER_M) - xp), 0);

    // รวมคานถ้ามีมวล (โหมด uniform/custom)
    let beamTerm = 0;
    if(mode!=='light' && mb>0){
      beamTerm = (mb*g)*(xbM - xp);
    }

    const denom = ms.m * g;
    if(denom <= 0) return null;

    // ต้องการให้: other + beamTerm + ms.m*g*(x - xp) = 0
    // => x = xp - (other + beamTerm)/(ms.m*g)
    return xp - (other + beamTerm) / denom;
  }

  // ดูดนิ่ม ๆ ภายใน ±0.02 m แล้วทำให้ค่าโมเมนต์ทวน/ตาม เท่ากันเป๊ะ
  function snapSmooth(ms, gNode){
    const xEq = equilibriumXForDraggedMass(ms);
    if(xEq == null) return;

    const dx = Math.abs(xEq - (ms.x/PX_PER_M));
    if(dx > 0.02) return; // เงื่อนไขช่วงดูด

    const start = ms.x;
    const end = clamp(xEq * PX_PER_M, 0, BEAM_W);
    const t0 = performance.now();
    const D = 180;

    function ease(p){ return 1 - Math.pow(1-p,3); }

    // วาบเขียว
    gNode.classList.add('snap-glow');
    setTimeout(()=>gNode.classList.remove('snap-glow'), 420);

    function frame(t){
      const p = Math.min(1, (t - t0) / D);
      ms.x = start + (end-start)*ease(p);
      updateMassNode(gNode, ms);
      // อัปเดต UI/ผลรวมขณะดูด
      renderMassList();
      computeAndRender();

      if(p < 1) requestAnimationFrame(frame);
      else{
        // จบ → ติ๊ก + สั่น
        showTickAtMass(ms);
        hapticSnap();
      }
    }
    requestAnimationFrame(frame);
  }

  function enableMassDrag(gNode,ms){
    let dragging=false, moved=false, lastTap=0;
    let start={x:0,y:0};

    gNode.addEventListener('pointerdown',e=>{
      dragging=true; moved=false;
      start.x=e.clientX||0; start.y=e.clientY||0;
      gNode.setPointerCapture(e.pointerId);
    });

    gNode.addEventListener('pointermove',e=>{
      if(!dragging) return;
      const tol = isMobile() ? 1 : 3;
      const dx=Math.abs((e.clientX||0)-start.x), dy=Math.abs((e.clientY||0)-start.y);
      if(dx>tol||dy>tol) moved=true;

      const pt=svg.createSVGPoint();
      pt.x=e.clientX; pt.y=e.clientY;
      const p=pt.matrixTransform(rig.getScreenCTM().inverse());

      ms.x=clamp(p.x,0,BEAM_W);
      updateMassNode(gNode,ms);

      renderMassList();
      computeAndRender();
    });

    const end=e=>{
      dragging=false;
      // SNAP เมื่อปล่อย (ดูดนิ่ม + เอฟเฟกต์)
      snapSmooth(ms, gNode);
      try{gNode.releasePointerCapture(e.pointerId)}catch(_){}
    };
    gNode.addEventListener('pointerup',end);
    gNode.addEventListener('pointercancel',()=>{dragging=false});

    gNode.addEventListener('click',()=>{
      if(moved) return;
      const now=Date.now();
      if(now-lastTap<300){
        masses=masses.filter(m=>m.id!==ms.id);
        gNode.remove();
        renderMassList();
        computeAndRender();
        lastTap=0;
      } else lastTap=now;
    });
    gNode.addEventListener('dblclick',()=>{
      masses=masses.filter(m=>m.id!==ms.id);
      gNode.remove();
      renderMassList();
      computeAndRender();
    });
  }

  function enableSupportDrag(poly,s){
    let dragging=false, lastTap=0;
    const onMove=e=>{
      if(!dragging) return;
      const pt=svg.createSVGPoint();
      pt.x=e.clientX; pt.y=e.clientY;
      const p=pt.matrixTransform(svg.getScreenCTM().inverse());
      const clamped=clamp(p.x-RIG_TX,0,BEAM_W);
      s.xM=clamped/PX_PER_M;
      if(s.id===activeSupportId){ syncXpUI(); }
      drawSupports();
      computeAndRender();
    };
    const onUp=e=>{
      dragging=false;
      try{poly.releasePointerCapture(e.pointerId)}catch(_){}
      svg.removeEventListener('pointermove',onMove);
      window.removeEventListener('pointerup',onUp);
    };
    poly.addEventListener('pointerdown',e=>{
      dragging=true;
      poly.setPointerCapture(e.pointerId);
      svg.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
    });
    poly.addEventListener('click',()=>{
      if(dragging) return;
      const now=Date.now();
      if(now-lastTap<300){
        if(supports.length>1){
          supports=supports.filter(x=>x.id!==s.id);
          if(activeSupportId===s.id && supports.length){ activeSupportId=supports[0].id; }
          renderSupportList(); computeAndRender();
        }
        lastTap=0;
      } else {
        lastTap=now;
        activeSupportId=s.id;
        syncXpUI();
        renderSupportList();
        computeAndRender();
      }
    });
    poly.addEventListener('dblclick',()=>{
      if(supports.length>1){
        supports=supports.filter(x=>x.id!==s.id);
        if(activeSupportId===s.id && supports.length){ activeSupportId=supports[0].id; }
        renderSupportList(); computeAndRender();
      }
    });
  }

  function renderSupportList(){
    supportItems.innerHTML='';
    supports.forEach((s,idx)=>{
      const row=document.createElement('div');
      row.className='card';
      row.innerHTML=`
        <div class="list-row">
          <strong>จุดหมุนที่ ${idx+1}</strong>
          <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#334155">
            <input type="radio" name="selSupport" ${s.id===activeSupportId?'checked':''} data-sel="${s.id}"> ใช้งาน
          </label>
        </div>
        <div class="list-row" style="margin-top:6px">
          <span class="tag">x = ${fmt(s.xM)} m</span>
        </div>
      `;
      supportItems.appendChild(row);
    });
  }
  supportItems.addEventListener('click',e=>{
    const sel=e.target.getAttribute('data-sel');
    if(sel){
      activeSupportId=+sel;
      syncXpUI();
      renderSupportList();
      computeAndRender();
    }
  });

  function syncXpUI(){
    const x=xpM();
    lblXp.textContent=fmt(x);
    inXp.max=L;
    inXp.value=fmt(x);
  }

  // ===== Physics =====
  function downwardForces(){
    const list=[];
    if(mode!=='light' && mb>0) list.push({F:mb*g,x:xbM,tag:'beam'});
    for(const ms of masses) list.push({F:ms.m*g,x:ms.x/PX_PER_M,tag:'m#'+ms.id});
    return list;
  }
  function computeReactions(){
    const downs = downwardForces();
    const W = downs.reduce((s,a)=>s+a.F,0);
    if(supports.length===0) return [];
    if(supports.length===1) return [{id:supports[0].id, R:W}];
    const s1 = supports[0], s2 = supports[1];
    const x1 = s1.xM, x2 = s2.xM;
    const rhs = downs.reduce((s,a)=> s + a.F*(a.x - x1), 0);
    let R2 = rhs / Math.max(1e-9, (x2 - x1));
    let R1 = W - R2;
    if (R1 < 0 && R2 >= 0) { R1 = 0; R2 = W; }
    else if (R2 < 0 && R1 >= 0) { R2 = 0; R1 = W; }
    else if (R1 < 0 && R2 < 0)  { R1 = 0; R2 = 0; }
    return [{id:s1.id, R:R1}, {id:s2.id, R:R2}];
  }

  function autoPivotFromReactions(){
    const reacts=computeReactions();
    if(!reacts.length) return;
    let best=reacts[0], bestVal=Math.max(0,best.R);
    for(const r of reacts){
      const v=Math.max(0,r.R);
      if(v>bestVal){ best=r; bestVal=v; }
    }
    if(best.id!==activeSupportId){
      activeSupportId=best.id;
      syncXpUI();
    }
  }

  function calcMomentSums(){
    const xRef = xpM();
    let cw = 0, ccw = 0;
    const add = (Fy, x) => {
      const M = Fy * (x - xRef);
      if (M >= 0) ccw += M; else cw += -M;
    };
    if (mode !== 'light' && mb > 0) add(-mb * g, xbM);
    masses.forEach(ms => add(-ms.m * g, ms.x / PX_PER_M));
    const reacts = computeReactions();
    reacts.forEach(r => {
      const s = supports.find(x => x.id === r.id); if (!s) return;
      const N = Math.max(0, r.R); if (N > 0) add(+N, s.xM);
    });

    // เกณฑ์สมดุลเดิม (ใช้งานง่าย)
    const balanced = Math.abs(ccw - cw) < 0.02;
    return { cw, ccw, balanced };
  }

  function drawForcesAndMoments(){
    infoLayer.innerHTML='';
    forcesLayer.innerHTML='';

    const FORCE_ARROW_DY = 30; // ลูกศรแรงลง 30px
    const yTop = RIG_TY + BEAM_Y + FORCE_ARROW_DY;
    const yUnder = RIG_TY + BEAM_Y + BEAM_H + FORCE_ARROW_DY;
    const xp = xpM();

    // ฟอนต์ปรับตามสเปก
    const MOM_FS = isMobile() ? 26 : 21;    // M โต
    const MG_FS  = 26;                       // mg โตขึ้นอีก 10px
    const N_FS   = 26;                       // N1 N2 โตขึ้นอีก 10px

    // ป้าย M ของลิ่มขยับขึ้นรวม 60px (30 + อีก 30)
    const WEDGE_M_EXTRA_UP = 60;

    if(showForces){
      const reacts = computeReactions();
      reacts.forEach((r, idx)=>{
        const s = supports.find(x=>x.id===r.id); if(!s) return;
        const xw = RIG_TX + s.xM*PX_PER_M;
        const N = Math.max(0, r.R);

        if(N>0){
          const len = 26 + 40*Math.min(1, N/(10*g));
          const y1 = yUnder; const y2 = yUnder - len; const yHead = y2 - 10;

          forcesLayer.appendChild(el('line',{x1:xw,y1:y1,x2:xw,y2:y2,stroke:'#111','stroke-width':2}));
          forcesLayer.appendChild(el('polygon',{points:`${xw-6},${y2} ${xw+6},${y2} ${xw},${yHead}`,fill:'#111'}));

          const label = `N${sub(idx+1)}=${fmt(N)} N`;
          forcesLayer.appendChild(el('text',{x:xw,y:yHead-35,'text-anchor':'middle','font-size':N_FS,fill:'#111'},label));

          if(showMoments){
            const M = N*(s.xM - xp); const dir = M>=0?'ตาม':'ทวน';
            forcesLayer.appendChild(
              el('text',{x:xw+8,y:(yHead-12-WEDGE_M_EXTRA_UP),'text-anchor':'start','font-size':MOM_FS,fill:'#111'},
                `M${sub(idx+1)}=${fmt(Math.abs(M))} N·m (${dir})`)
            );
          }
        }else{
          const label = `N${sub(idx+1)}=0.00 N`;
          forcesLayer.appendChild(el('text',{x:xw,y:yUnder-36,'text-anchor':'middle','font-size':N_FS,fill:'#111'},label));
          if(showMoments){
            forcesLayer.appendChild(
              el('text',{x:xw+8,y:(yUnder-14-WEDGE_M_EXTRA_UP),'text-anchor':'start','font-size':MOM_FS,fill:'#111'},
                `M${sub(idx+1)}=0.00 N·m`)
            );
          }
        }
      });

      if(mode!=='light' && mb>0){
        const xw = RIG_TX + xbM*PX_PER_M;
        const y2 = yTop + 22; const yHead = y2 + 10;
        forcesLayer.appendChild(el('line',{x1:xw,y1:yTop,x2:xw,y2:y2,stroke:'#475569','stroke-width':2}));
        forcesLayer.appendChild(el('polygon',{points:`${xw-6},${y2} ${xw+6},${y2} ${xw},${yHead}`,fill:'#475569'}));
        if(showMoments){
          const M=mb*g*(xbM-xp); const dir=M>=0?'ตาม':'ทวน';
          forcesLayer.appendChild(el('text',{x:xw+8,y:yTop-6,'text-anchor':'start','font-size':MOM_FS,fill:'#475569'},`M=${fmt(Math.abs(M))} N·m (${dir})`));
        }
      }

      masses.forEach(ms=>{
        const xM = ms.x/PX_PER_M; const xw = RIG_TX + ms.x;
        const y2 = yUnder + 30; const yHead = y2 + 10;

        forcesLayer.appendChild(el('line',{x1:xw,y1:yUnder,x2:xw,y2:y2,stroke:ms.color,'stroke-width':2}));
        forcesLayer.appendChild(el('polygon',{points:`${xw-6},${y2} ${xw+6},${y2} ${xw},${yHead}`,fill:ms.color}));

        const mg = ms.m*g;

        // ป้าย mg ขยับตามที่ทำไว้เดิม + mg font โต
        let dx = 0, dyMg = 30;
        if(ms.id===1){ dx = -60; dyMg = 30; }
        else if(ms.id===2){ dx = 0; dyMg = 60; }
        else if(ms.id===3){ dx = 0; dyMg = 30; }

        const mgX = xw - 17 + dx;
        const mgY = yHead + 5 + dyMg;
        forcesLayer.appendChild(
          el('text',{x:mgX,y:mgY,'text-anchor':'start','font-size':MG_FS,fill:ms.color},
            `m${sub(ms.id)}g=${fmt(mg)} N`)
        );

        if(showMoments){
          // ป้าย M1 M2 ของมวลลงล่าง 25px
          const M=mg*(xM-xp); const dir=M>=0?'ตาม':'ทวน';
          forcesLayer.appendChild(
            el('text',{x:mgX,y:mgY+18+25,'text-anchor':'start','font-size':MOM_FS,fill:ms.color},
              `M${sub(ms.id)}=${fmt(Math.abs(M))} N·m (${dir})`)
          );
        }
      });
    }
  }

  function drawMomentSums(){
    momentSum.innerHTML = '';
    const {cw, ccw, balanced} = calcMomentSums();
    const fs = isMobile() ? 26 : 21; // mx moment โตขึ้น (คอม +5, มือถือ +10 -> เราใช้ใหญ่กว่าฐานแล้ว)
    const xRight = RIG_TX + BEAM_W - 20, yTop = 26;

    momentSum.appendChild(el('text', {x:xRight, y:yTop, 'text-anchor':'end', 'font-size':fs, fill:'#334155'}, `∑Mทวน = ${fmt(ccw)} N·m`));
    momentSum.appendChild(el('text', {x:xRight, y:yTop + (isMobile()?30:22), 'text-anchor':'end', 'font-size':fs, fill:'#334155'}, `∑Mตาม = ${fmt(cw)} N·m`));

    if (balanced) {
      const rx = xRight - (isMobile()?200:170);
      const ry = yTop + (isMobile()?40:30);
      const rw = (isMobile()?190:160);
      const rh = (isMobile()?34:26);

      momentSum.appendChild(el('rect', {x:rx, y:ry, width:rw, height:rh, rx:8, fill:'#dcfce7', stroke:'#16a34a'}));
      momentSum.appendChild(el('text', {x:rx + rw/2, y:ry + (isMobile()?22:17), 'text-anchor':'middle', 'font-size':fs, fill:'#16a34a', 'font-weight':'700'}, 'สมดุล'));
      if(!lastBalanced) playChime();
      lastBalanced=true;
    } else lastBalanced=false;
  }

  function drawMassInfo(){
    // ข้อความ m, x ในรูป โตขึ้นอีก 10px (ใช้ 26/31)
    infoLayer.innerHTML='';
    const fs = isMobile() ? 31 : 26;
    let y=28; const x=16; const xp=xpM();
    masses.forEach(ms=>{
      const m=fmt(ms.m); const xm=fmt(ms.x/PX_PER_M); const R=fmt(Math.abs(ms.x/PX_PER_M - xp));
      const label=`m${sub(ms.id)}=${m} kg , x${sub(ms.id)}=${xm} m , R${sub(ms.id)}=${R} m`;
      infoLayer.appendChild(el('text',{x:x,y:y,'text-anchor':'start','font-size':fs,fill:ms.color,'font-weight':'700'},label));
      y+=fs+6;
    });
  }

  // ===== Compute/Render loop =====
  function computeAndRender(){
    autoPivotFromReactions();
    drawRuler();
    drawBeamTicks();
    drawSupports();
    beamCM.setAttribute('cx', xbM*PX_PER_M);
    beamCM.setAttribute('cy', BEAM_Y+BEAM_H/2);

    const bal = calcMomentSums();
    const angleDeg = (bal && bal.balanced) ? 0 : (theta*180/Math.PI);

    // แสดงเงาคานเส้นปะเมื่อคานหมุน
    drawGhostBeam(angleDeg);

    rig.setAttribute('transform', `translate(${RIG_TX},${RIG_TY}) rotate(${angleDeg}, ${xpPX()}, ${BEAM_Y+BEAM_H/2})`);

    drawForcesAndMoments();
    drawMomentSums();
    renderMassList();
    drawMassInfo();
  }

  function tiltOnce(dir){
    const ANG = 18 * Math.PI/180;
    const D = 500;
    const t0 = performance.now();
    function easeOut(p){ return 1 - Math.pow(1-p,3); }
    function frame(t){
      if(!playing) return;
      const bal = calcMomentSums();
      if(bal && bal.balanced){ theta = 0; playing = false; btnPlay.textContent='เล่น'; computeAndRender(); return; }
      const p = Math.min(1, (t - t0)/D);
      theta = dir * ANG * easeOut(p);
      computeAndRender();
      if(p < 1 && playing) requestAnimationFrame(frame);
      else { playing = false; btnPlay.textContent='เล่น'; computeAndRender(); }
    }
    requestAnimationFrame(frame);
  }

  // ===== UI wiring =====
  selMode.addEventListener('change', ()=>{
    mode = selMode.value;
    if(mode==='light'){
      lbMb.style.display='none'; lbXb.style.display='none'; mb=0; xbM=L/2;
    } else if(mode==='uniform'){
      lbMb.style.display=''; lbXb.style.display='none'; xbM=L/2;
    } else {
      lbMb.style.display=''; lbXb.style.display='';
    }
    computeAndRender();
  });

  inL.addEventListener('change', ()=>{
    const oldPPM = PX_PER_M;
    L = clamp(parseFloat(inL.value)||L, 0.5, 3.0);
    PX_PER_M = BEAM_W / L;
    lblL.textContent = fmt(L);
    inXp.max=L; inXb.max=L;

    masses.forEach(ms=>{ const xm = ms.x / oldPPM; ms.x = clamp(xm * PX_PER_M, 0, BEAM_W); });
    supports.forEach(s=>{ s.xM = clamp(s.xM, 0, L); });
    xbM = clamp(xbM, 0, L);
    if(xpM()>L && supports.length){ activeSupportId = supports[0].id; supports[0].xM = L/2; }
    computeAndRender();
  });

  inXp.addEventListener('change', ()=>{ const v = clamp(parseFloat(inXp.value)||xpM(), 0, L); activeSupport().xM = v; lblXp.textContent = fmt(v); computeAndRender(); });
  inMb.addEventListener('change', ()=>{ mb = Math.max(0, parseFloat(inMb.value)||0); lblMb.textContent = fmt(mb); computeAndRender(); });
  inXb.addEventListener('change', ()=>{ xbM = clamp(parseFloat(inXb.value)||xbM, 0, L); lblXb.textContent = fmt(xbM); computeAndRender(); });

  btnAddMass.addEventListener('click', ()=>{
    const id = idSeq++; const color = COLORS[(id-1)%COLORS.length];
    const ms = {id, m:0.5, x: xpPX()+Math.random()*40-20, color};
    masses.push(ms);
    document.getElementById('masses').appendChild(drawMass(ms));
    computeAndRender();
  });

  btnAddSupport.addEventListener('click', ()=>{
    if(supports.length>=2) return;
    const id = ++supSeq;
    supports.push({id, xM: clamp(xpM()+0.2, 0, L)});
    activeSupportId = id;
    renderSupportList();
    computeAndRender();
  });

  btnForces.addEventListener('click', ()=>{ showForces = !showForces; btnForces.classList.toggle('primary', showForces); computeAndRender(); });
  btnMoments.addEventListener('click', ()=>{ showMoments = !showMoments; btnMoments.classList.toggle('primary', showMoments); computeAndRender(); });

  btnPlay.addEventListener('click', ()=>{
    if(playing){ playing=false; btnPlay.textContent='เล่น'; return; }
    const sums = calcMomentSums();
    if(sums.balanced){ computeAndRender(); return; }
    const dir = (sums.ccw > sums.cw) ? -1 : +1;
    playing = true; btnPlay.textContent='หยุด';
    tiltOnce(dir);
  });

  btnReset.addEventListener('click', ()=>{ theta=0; omega=0; playing=false; btnPlay.textContent='เล่น'; computeAndRender(); });

  // ===== init =====
  renderSupportList();
  computeAndRender();

  // ===== Sound =====
  function playChime(){
    try{
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      const o=ac.createOscillator(); const gN=ac.createGain();
      o.type='sine'; o.frequency.setValueAtTime(880, ac.currentTime);
      gN.gain.setValueAtTime(0, ac.currentTime);
      gN.gain.linearRampToValueAtTime(0.2, ac.currentTime+0.02);
      gN.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.40);
      o.connect(gN).connect(ac.destination); o.start(); o.stop(ac.currentTime+0.45);
    }catch(err){}
  }

  // ===== svg helper =====
  function el(tag, attrs = {}, text){
    const E = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for(const k in attrs) E.setAttribute(k, attrs[k]);
    if(text != null) E.textContent = text;
    return E;
  }
})();
</script>
</body>
</html>
