<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>รอกวางบนเชือก — เวกเตอร์แรง + องค์ประกอบแรง</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{
      margin:0;
      font-family:system-ui,"Noto Sans Thai",sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      padding:10px;
      background:#fff;
    }

    /* ✅ ห่อจอทดลอง+แผงควบคุม เพื่อย้ายแผงไปขวาเฉพาะจอคอม */
    #stageWrap{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
    }

    canvas{
      border:1px solid #e2e8f0;
      border-radius:10px;
      background:#fff;
      max-width:100%;
    }

    #panel{
      background:#f8fafc;
      border:1px solid #e2e8f0;
      border-radius:10px;
      padding:8px 12px;
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      justify-content:center;
      font-size:14px;
    }

    label{display:flex;gap:6px;align-items:center;}
    input[type=number]{width:80px;}
    .warn{color:#b91c1c;font-size:13px;}
    a{color:#2563eb;text-decoration:underline;}
    button{cursor:pointer;}

    /* ✅ stepper (+/-) */
    .stepper{
      display:inline-flex;
      align-items:stretch;
      gap:6px;
    }
    .stepper button{
      width:28px;
      height:28px;
      border-radius:8px;
      border:1px solid #cbd5e1;
      background:#fff;
      color:#0f172a;
      font-weight:700;
      line-height:1;
      padding:0;
      user-select:none;
      touch-action:manipulation;
    }
    .stepper button:active{transform:translateY(1px);}
    .stepper input[type=number]{
      height:28px;
      padding:0 8px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      background:#fff;
      font-size:14px;
    }

    #formulaBox{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:99;
    }
    #formulaInner{
      background:#fff;
      border:3px solid #f97316;
      border-radius:16px;
      box-shadow:0 18px 45px rgba(0,0,0,0.15);
      max-width:420px;
      width:90%;
      padding:16px 16px 14px;
    }
    #formulaInner h4{
      margin:0 0 6px;
      font-size:16px;
      color:#0f172a;
    }
    #formulaInner p{
      margin:4px 0;
      font-size:14px;
      line-height:1.45;
    }
    #closeFormula{
      display:inline-block;
      margin-top:10px;
      background:#ef4444;
      border:none;
      color:#fff;
      padding:6px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
    }
    #formulaBtn{
      background:#f97316;
      border:1px solid #ea580c;
      color:#fff;
      padding:6px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
    }
    #vectorBtn{
      background:#0f766e;
      border:1px solid #0f766e;
      color:#fff;
      padding:6px 14px;
      border-radius:999px;
      font-size:13px;
    }
    #vectorBtn.off{
      background:#e2e8f0;
      color:#0f172a;
      border-color:#cbd5f5;
    }

    /* ✅ Mobile: ให้ปุ่มสูตรสำคัญไปอยู่ "ขวา" ของปุ่มแสดงเวกเตอร์แรง (เปลี่ยนลำดับเฉพาะมือถือ) */
    .itM{order:1;}
    .itm{order:2;}
    .itFormula{order:3;}   /* default (จอคอม/ทั่วไป) */
    .itVector{order:4;}
    .itComp{order:5;}
    .itMsg{order:6;}

    @media (max-width: 640px){
      .itVector{order:3;}
      .itFormula{order:4;} /* ✅ สูตรสำคัญอยู่ด้านขวาของแสดงเวกเตอร์แรง */
    }

    /* ✅ Desktop: ย้ายแผงควบคุมไปด้านขวาของจอทดลอง */
    @media (min-width: 900px){
      #stageWrap{
        flex-direction:row;
        align-items:flex-start;
        justify-content:center;
        gap:14px;
      }
      #panel{
        width:320px;
        max-width:320px;
        flex-direction:column;
        align-items:stretch;
        justify-content:flex-start;
      }
      #panel label{
        justify-content:space-between;
      }
      #panel .stepper{
        justify-content:flex-end;
      }
    }
  </style>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {inlineMath: [['\\(','\\)'], ['$', '$']]},
      svg: {fontCache: 'global'}
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" defer></script>
</head>
<body>
  <h3>ความสัมพันธ์ระหว่างมุมและแรงตึงเชือกในระบบรอก</h3>

  <!-- ✅ wrap -->
  <div id="stageWrap">
    <canvas id="cv" width="640" height="420"></canvas>

    <div id="panel">
      <label class="itM">มวล M (kg)
        <span class="stepper">
          <button type="button" class="stepBtn" data-target="MVal" data-dir="-1" aria-label="ลดค่า M">−</button>
          <input type="number" id="MVal" value="2" step="0.1" min="0.1">
          <button type="button" class="stepBtn" data-target="MVal" data-dir="1" aria-label="เพิ่มค่า M">+</button>
        </span>
      </label>

      <label class="itm">มวล m (kg)
        <span class="stepper">
          <button type="button" class="stepBtn" data-target="mVal" data-dir="-1" aria-label="ลดค่า m">−</button>
          <input type="number" id="mVal" value="2" step="0.1" min="0.1">
          <button type="button" class="stepBtn" data-target="mVal" data-dir="1" aria-label="เพิ่มค่า m">+</button>
        </span>
      </label>

      <button id="formulaBtn" class="itFormula">สูตรสำคัญ 📘</button>
      <button id="vectorBtn" class="off itVector">แสดงเวกเตอร์แรง</button>

      <label class="itComp">
        <input type="checkbox" id="compChk">
        แสดงองค์ประกอบของแรง
      </label>

      <span id="msg" class="warn itMsg"></span>
    </div>
  </div>

  <p style="font-size:14px;">
    ศึกษาเพิ่มเติมที่
    <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener noreferrer">
      เพจคลายปมฟิสิกส์
    </a>
  </p>

  <!-- กล่องสูตร -->
  <div id="formulaBox">
    <div id="formulaInner">
      <h4>สูตรสำคัญในการคำนวณ</h4>
      <p id="fT"></p>
      <p id="fBal"></p>
      <p id="fTheta"></p>
      <p style="font-size:13px;color:#475569;margin-top:8px;">
        หมายเหตุ:กรณีรอกเบา เชือกเบา ไม่ฝืด => มุมและแรง T จะเท่ากันทั้ง 2 ฝั่ง
      </p>
      <button id="closeFormula">ปิด ✕</button>
    </div>
  </div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const mInput = document.getElementById('mVal');
const MInput = document.getElementById('MVal');
const msg = document.getElementById('msg');
const formulaBox = document.getElementById('formulaBox');
const formulaBtn = document.getElementById('formulaBtn');
const closeFormula = document.getElementById('closeFormula');
const fT = document.getElementById('fT');
const fBal = document.getElementById('fBal');
const fTheta = document.getElementById('fTheta');
const vectorBtn = document.getElementById('vectorBtn');
const compChk = document.getElementById('compChk');

let showVectors = false;
let showComponents = false;

const g = 9.81;

// จุดยึดบน
const leftTop = {x:90, y:50};
const rightTop = {x:550, y:50};
const baseRightPulleyR = 14;
// ✅ รอกขวาโตขึ้นจากเดิม 1.3× → คูณ 1.1 อีกที = 1.43×
const rightPulleyR = baseRightPulleyR * 1.43;
const rightPulleyDown = 10;
const midX = 310;
const midR = 16;

// ชดเชย
const rightPulleyShiftX = -5;
const rightRopeOffsetY = -20;
const rightBlackBarOffsetY = -50;

// สเกลแรง
const FORCE_SCALE = 4.2;
const MIN_ARROW = 25;
const MAX_ARROW = 110;

function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1,y2-y1); }

let L0 = null;
function initBaseLength(){
  const m0 = parseFloat(mInput.value);
  const M0 = parseFloat(MInput.value);
  const Muse = Math.min(M0, 2*m0*0.999);
  const theta = Math.acos(Muse/(2*m0));
  const leftRopeY = leftTop.y + 4;
  const dx = (rightTop.x + rightPulleyShiftX - rightPulleyR) - midX;
  const dy = dx / Math.tan(theta);
  const midY_on_rope = rightTop.y + dy;
  const tangentL = {x:rightTop.x + rightPulleyShiftX - rightPulleyR, y:rightTop.y};
  const AB = dist(leftTop.x, leftRopeY, midX, midY_on_rope);
  const BC = dist(midX, midY_on_rope, tangentL.x, tangentL.y);
  const arcLen = Math.PI/2 * rightPulleyR;
  const CD = 120;
  L0 = AB + BC + arcLen + CD;
}
initBaseLength();

function drawArrow(ctx, x1, y1, x2, y2, color, label){
  const headLen = 8;
  const dx = x2 - x1;
  const dy = y2 - y1;
  const angle = Math.atan2(dy, dx);

  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - Math.PI/6), y2 - headLen * Math.sin(angle - Math.PI/6));
  ctx.lineTo(x2 - headLen * Math.cos(angle + Math.PI/6), y2 - headLen * Math.sin(angle + Math.PI/6));
  ctx.lineTo(x2, y2);
  ctx.fill();

  if (label){
    ctx.font = "12px system-ui";
    ctx.fillText(label, x2 + 4, y2 - 4);
  }
}

function drawArrowHead(ctx, x, y, angle, color){
  const headLen = 7;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - headLen * Math.cos(angle - Math.PI/6), y - headLen * Math.sin(angle - Math.PI/6));
  ctx.lineTo(x - headLen * Math.cos(angle + Math.PI/6), y - headLen * Math.sin(angle + Math.PI/6));
  ctx.lineTo(x, y);
  ctx.fill();
}

function clampLen(len){
  return Math.max(MIN_ARROW, Math.min(MAX_ARROW, len));
}

function boxSizeFromMass(mass, base){
  return base + Math.min(mass * 6, 40);
}

function draw(){
  let m = parseFloat(mInput.value);
  let M = parseFloat(MInput.value);
  if (m <= 0) m = 0.1;

  let over = false;
  if (M > 2*m){
    M = 2*m*0.999;
    over = true;
  }

  const theta = Math.acos(M/(2*m));

  const leftRopeY = leftTop.y + 4;

  // จุดตัดเชือก
  const dx = (rightTop.x + rightPulleyShiftX - rightPulleyR) - midX;
  const dy = dx / Math.tan(theta);
  const midY_on_rope = rightTop.y + dy;
  const midCenterY = midY_on_rope - midR;

  // รอกบนขวา
  const rightPulleyCenter = {
    x: rightTop.x + rightPulleyShiftX,
    y: rightTop.y + rightPulleyDown
  };
  const tangentL = {x:rightPulleyCenter.x - rightPulleyR, y:rightTop.y};
  const bottomOfRightPulley = {x:rightPulleyCenter.x, y:rightPulleyCenter.y + rightPulleyR};

  // ความยาวปลายเชือก
  const AB = dist(leftTop.x, leftRopeY, midX, midY_on_rope);
  const BC = dist(midX, midY_on_rope, tangentL.x, tangentL.y);
  const arcLen = Math.PI/2 * rightPulleyR;
  let CD = L0 - (AB + BC + arcLen);
  if (CD < 30) CD = 30;

  // กล่อง m
  const ropeX_at_rightSide = bottomOfRightPulley.x + rightPulleyR;
  const mBoxY = bottomOfRightPulley.y + CD + rightRopeOffsetY;
  const mBoxX = ropeX_at_rightSide;

  const MBoxSize = boxSizeFromMass(M, 63);
  const mBoxSize = boxSizeFromMass(m, 55);

  ctx.clearRect(0,0,cv.width,cv.height);

  // คานซ้าย
  ctx.lineWidth = 8;
  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.moveTo(leftTop.x - 40, leftTop.y);
  ctx.lineTo(leftTop.x + 40, leftTop.y);
  ctx.stroke();

  // คานขวา
  ctx.beginPath();
  ctx.moveTo(rightTop.x - 40, rightTop.y + rightBlackBarOffsetY);
  ctx.lineTo(rightTop.x + 40, rightTop.y + rightBlackBarOffsetY);
  ctx.stroke();

  // เชือกซ้าย
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#3169a7";
  ctx.beginPath();
  ctx.moveTo(leftTop.x, leftRopeY);
  ctx.lineTo(midX, midY_on_rope);
  ctx.stroke();

  // จุดตัด → รอกขวา (เดิม +15px ตอนนี้ลด 6px → +9px)
  {
    const fromX = midX;
    const fromY = midY_on_rope;
    const toX = tangentL.x;
    const toY = tangentL.y;
    const vx = toX - fromX;
    const vy = toY - fromY;
    const len = Math.hypot(vx, vy) || 1;
    const extra = 9;   // ✅ ลดให้สั้นลง
    const extX = toX + (vx/len)*extra;
    const extY = toY + (vy/len)*extra;
    ctx.beginPath();
    ctx.moveTo(fromX, fromY);
    ctx.lineTo(extX, extY);
    ctx.stroke();
  }

  // เชือกโค้งอ้อมรอกขวา (ใช้รัศมีใหม่ที่โตขึ้น)
  ctx.beginPath();
  ctx.arc(rightPulleyCenter.x, rightPulleyCenter.y, rightPulleyR, Math.PI, Math.PI/2, true);
  ctx.stroke();

  // เชือกตั้งลงจากผิวขวารอกบน
  ctx.beginPath();
  ctx.strokeStyle = "#3169a7";
  ctx.moveTo(ropeX_at_rightSide, bottomOfRightPulley.y + rightRopeOffsetY);
  ctx.lineTo(ropeX_at_rightSide, mBoxY);
  ctx.stroke();

  // รอกบนสุด
  ctx.fillStyle = "#6b7280";
  ctx.beginPath();
  ctx.arc(rightPulleyCenter.x, rightPulleyCenter.y, rightPulleyR, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;
  ctx.stroke();

  // เชือกดำจากรอกบนลงเพดาน
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(rightPulleyCenter.x, rightPulleyCenter.y);
  ctx.lineTo(rightPulleyCenter.x, rightTop.y + rightBlackBarOffsetY);
  ctx.stroke();

  // รอกกลาง
  ctx.fillStyle = "#6b7280";
  ctx.beginPath();
  ctx.arc(midX, midCenterY, midR, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // เชือกลงหา M (ขยับขึ้น 50px)
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(midX, midCenterY);
  const MBoxY = midCenterY + 40;
  ctx.lineTo(midX, MBoxY);
  ctx.stroke();

  // กล่อง M
  ctx.fillStyle = "#f2b995";
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.rect(midX - MBoxSize/2, MBoxY, MBoxSize, MBoxSize);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#000";
  ctx.textAlign="left";
  ctx.font="14px system-ui";
  ctx.fillText("M = " + M.toFixed(2) + " kg", midX - MBoxSize/2 + 15, MBoxY + MBoxSize/2 + 4);

  // กล่อง m
  ctx.fillStyle = "#f5b400";
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.rect(mBoxX - mBoxSize/2, mBoxY, mBoxSize, mBoxSize);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#000";
  ctx.textAlign="left";
  ctx.font="14px system-ui";
  ctx.fillText("m = " + m.toFixed(2) + " kg", mBoxX - mBoxSize/2 + 15, mBoxY + mBoxSize/2 + 4);

  // เส้นดิ่งประกลาง
  ctx.setLineDash([6,6]);
  ctx.strokeStyle = "#8aa4c3";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(midX, midCenterY - 70);
  ctx.lineTo(midX, midCenterY + 70);
  ctx.stroke();
  ctx.setLineDash([]);

  // ป้ายมุมเล็ก
  const thetaDeg = (theta * 180 / Math.PI).toFixed(1);
  ctx.fillStyle = "#000";
  ctx.font = "12px system-ui";
  ctx.textAlign = "left";
  ctx.fillText("θ = " + thetaDeg + "°", midX + 12, (midY_on_rope - 6) - 40);

  // คำนวณแรง
  const T = m * g;
  const Mg = M * g;
  const mg = m * g;

  ctx.fillStyle = "#000";
  ctx.textAlign="left";
  ctx.font="14px system-ui";
  ctx.fillText("T = m g = " + T.toFixed(2) + " N", 20, 380);

  msg.textContent = over ? "M > 2m → ปรับให้ใกล้ 2m เพื่อให้สมดุลบนเชือกได้" : "";

  let leftT_tipX = null;
  let leftT_tipY = null;

  if (showVectors){
    // T ซ้าย
    const vxL = leftTop.x - midX;
    const vyL = (leftTop.y + 4) - midY_on_rope;
    const lenL = Math.hypot(vxL, vyL) || 1;
    const Tlen = clampLen(T * FORCE_SCALE);
    const txL1 = midX;
    const tyL1 = midY_on_rope;
    const txL2 = midX + (vxL/lenL)*Tlen;
    const tyL2 = midY_on_rope + (vyL/lenL)*Tlen;
    drawArrow(ctx, txL1, tyL1, txL2, tyL2, "#ef4444", "T");
    leftT_tipX = txL2;
    leftT_tipY = tyL2;

    // T ขวา
    const toX = tangentL.x + ((tangentL.x-midX)/Math.hypot(tangentL.x-midX, tangentL.y-midY_on_rope))*9; // ให้ตรงกับเชือกที่สั้นลง
    const toY = tangentL.y + ((tangentL.y-midY_on_rope)/Math.hypot(tangentL.x-midX, tangentL.y-midY_on_rope))*9;
    const vxR = toX - midX;
    const vyR = toY - midY_on_rope;
    const lenR = Math.hypot(vxR, vyR) || 1;
    const txR2 = midX + (vxR/lenR)*Tlen;
    const tyR2 = midY_on_rope + (vyR/lenR)*Tlen;
    drawArrow(ctx, midX, midY_on_rope, txR2, tyR2, "#ef4444", "T");

    // T ที่กล่อง m
    const Tlen_m = clampLen(T * FORCE_SCALE);
    drawArrow(ctx, mBoxX, mBoxY, mBoxX, mBoxY - Tlen_m, "#ef4444", "T");

    // mg กล่อง m
    const mBottomY = mBoxY + mBoxSize;
    const mgLen = clampLen(mg * FORCE_SCALE);
    drawArrow(ctx, mBoxX, mBottomY, mBoxX, mBottomY + mgLen, "#f97316", "mg");

    // Mg กล่อง M
    const MBottomY = MBoxY + MBoxSize;
    const MgLen = clampLen(Mg * FORCE_SCALE);
    drawArrow(ctx, midX, MBottomY, midX, MBottomY + MgLen, "#f97316", "Mg");

    // องค์ประกอบ
    if (showComponents && leftT_tipX !== null){
      const baseX = midX;
      const baseY = midY_on_rope;
      const tipX = leftT_tipX;
      const tipY = leftT_tipY;

      const TxLen = Math.abs(tipX - baseX);
      const TyLen = Math.abs(tipY - baseY);

      // Tx สองข้าง
      ctx.setLineDash([3,3]);
      ctx.strokeStyle = "#fca5a5";
      ctx.lineWidth = 2;
      // ซ้าย
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(baseX - TxLen, baseY);
      ctx.stroke();
      // ขวา
      ctx.beginPath();
      ctx.moveTo(baseX, baseY);
      ctx.lineTo(baseX + TxLen, baseY);
      ctx.stroke();
      ctx.setLineDash([]);

      // ปลายซ้าย
      drawArrowHead(ctx, baseX - TxLen, baseY, Math.PI, "#ef4444");
      ctx.fillStyle = "#ef4444";
      ctx.font = "12px system-ui";
      ctx.fillText("Tx", (baseX - TxLen) + 4, baseY - 6);

      // ปลายขวา
      drawArrowHead(ctx, baseX + TxLen, baseY, 0, "#ef4444");
      ctx.fillText("Tx", (baseX + TxLen) - 22, baseY - 6);

      // Ty สองเส้นคู่กัน สูงเท่าหัว T
      const offset = 2.5;
      const tyTopY = tipY;
      ctx.setLineDash([3,3]);
      ctx.strokeStyle = "#fca5a5";
      ctx.lineWidth = 2;
      // ซ้าย
      ctx.beginPath();
      ctx.moveTo(baseX - offset, baseY);
      ctx.lineTo(baseX - offset, tyTopY);
      ctx.stroke();
      // ขวา
      ctx.beginPath();
      ctx.moveTo(baseX + offset, baseY);
      ctx.lineTo(baseX + offset, tyTopY);
      ctx.stroke();
      ctx.setLineDash([]);

      // ลูกศรขึ้น 2 ตัว
      drawArrowHead(ctx, baseX - offset, tyTopY, -Math.PI/2, "#ef4444");
      drawArrowHead(ctx, baseX + offset, tyTopY, -Math.PI/2, "#ef4444");

      // ✅ ป้าย 2Ty ขยับมาซ้าย 15px จากกลาง
      ctx.fillStyle = "#ef4444";
      ctx.font = "12px system-ui";
      ctx.fillText("2Ty", baseX - 15, tyTopY - 6);
    }
  }

  updateFormulaBox(m, M, T, theta);
}

function updateFormulaBox(m, M, T, theta){
  fT.innerHTML = `แรงตึงเชือก: \\(T = m g = ${m.toFixed(2)}\\times 9.81 \\approx ${T.toFixed(2)}\\,\\text{N}\\)`;
  fBal.innerHTML = `สมดุลที่รอกบน: \\(2T\\cos\\theta = Mg\\) ⇒ \\(\\cos\\theta = \\dfrac{M}{2m} = \\dfrac{${M.toFixed(2)}}{2\\times ${m.toFixed(2)}}\\)`;
  const thetaDeg = (theta * 180 / Math.PI).toFixed(2);
  fTheta.innerHTML = `ดังนั้น \\(\\theta = \\cos^{-1}\\left(\\dfrac{M}{2m}\\right) \\approx ${thetaDeg}^\\circ\\)`;
  if (window.MathJax && window.MathJax.typesetPromise) {
    window.MathJax.typesetPromise();
  }
}

mInput.addEventListener('input', draw);
MInput.addEventListener('input', draw);

/* ✅ ปุ่ม + / - ให้ stepUp/stepDown และสั่ง redraw */
document.querySelectorAll('.stepBtn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    const id = btn.getAttribute('data-target');
    const dir = parseInt(btn.getAttribute('data-dir'), 10) || 0;
    const inp = document.getElementById(id);
    if (!inp) return;

    // ใช้ stepUp/stepDown ตาม step ที่กำหนดใน input
    try{
      if (dir > 0) inp.stepUp(1);
      else inp.stepDown(1);
    }catch(e){
      // fallback เผื่อบางเบราว์เซอร์แปลก
      const step = parseFloat(inp.step) || 1;
      const cur = parseFloat(inp.value) || 0;
      const next = cur + (dir>0 ? step : -step);
      inp.value = String(next);
    }

    // trigger draw
    inp.dispatchEvent(new Event('input', {bubbles:true}));
  }, {passive:true});
});

formulaBtn.addEventListener('click', ()=>{
  formulaBox.style.display = 'flex';
  if (window.MathJax && window.MathJax.typesetPromise) {
    window.MathJax.typesetPromise();
  }
});
closeFormula.addEventListener('click', ()=>{ formulaBox.style.display = 'none'; });
formulaBox.addEventListener('click', (e)=>{
  if (e.target === formulaBox) formulaBox.style.display = 'none';
});

vectorBtn.addEventListener('click', ()=>{
  showVectors = !showVectors;
  if (showVectors){
    vectorBtn.classList.remove('off');
  } else {
    vectorBtn.classList.add('off');
  }
  draw();
});

compChk.addEventListener('change', ()=>{
  showComponents = compChk.checked;
  draw();
});

draw();
</script>
