<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title> mini lab สมดุล 3 แรงของกล่องแขวนด้วยเชือกเบา ถูกดึงด้วยแรง F </title>

<script>
window.MathJax = {
  tex: {inlineMath: [['$','$'], ['\\(','\\)']]},
  svg: {fontCache: 'global'}
};

<style>
  :root{
    --ink:#0f172a; --muted:#64748b; --bg:#ffffff; --bar:#9ca3af;
    --wood:#b0815a; --rope:#000000; --Tcolor:#7c3aed; --Fcolor:#0b4aa6; --Wcolor:#d01c1c;
    --panel:#f8fafc; --line:#e5e7eb; --accent:#2563eb; --ok:#16a34a; --bad:#dc2626; --surface:#ffffff;

    --btnGray:#9ca3af;
    --btnGrayText:#0f172a;

    --btnQuiz:#d9fbe5;     /* เขียวอ่อน */
    --btnQuizText:#065f46; /* เขียวเข้มอ่านง่าย */
  }

  html,body{
    height:100%;
    background:var(--bg);
    color:var(--ink);
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,'Noto Sans Thai',sans-serif
  }
  .wrap{max-width:1100px;margin-inline:auto;padding:12px}

  .grid{
    display:grid;
    grid-template-columns:370px 1fr;
    gap:14px;
    align-items:start; /* ให้การ์ดทั้งสองชิดบนเสมอ */
  }

  @media (max-width:1000px){
    .grid{grid-template-columns:1fr;grid-auto-rows:min-content 1fr}
  }

  /* จอคอม: ย้ายแผงควบคุมไปฝั่งขวา + บังคับให้ "จอทดลอง" อยู่แถวเดียวกันระดับเดียวกับแผง */
  @media (min-width:1001px){
    .grid{
      grid-template-columns:1fr 370px;
      grid-template-areas:"scene panel";
    }
    #sceneCard{grid-area:scene;}
    #panel{grid-area:panel;}
  }

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}
  .row{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap}
  input[type=number]{width:120px;padding:6px 8px;border:1px solid var(--line);border-radius:10px}
  input[type=range]{width:240px}
  .btn{
    background:var(--accent);color:#fff;border:none;border-radius:12px;
    padding:9px 14px;cursor:pointer;box-shadow:0 2px 6px rgba(37,99,235,.25)
  }
  .btn.secondary{background:#475569}
  .btn.ghost{background:#fff;color:#1f2937;border:1px solid var(--line);box-shadow:none}

  /* ปุ่มต่อเวกเตอร์แบบหางต่อหัว = สีเทา */
  .btn.gray{
    background:var(--btnGray);
    color:var(--btnGrayText);
    box-shadow:none;
    border:1px solid var(--line);
  }

  /* ปุ่มแบบฝึกหัด = สีเขียวอ่อน */
  .btn.quiz{
    background:var(--btnQuiz);
    color:var(--btnQuizText);
    box-shadow:none;
    border:1px solid #bbf7d0;
    font-weight:600;
  }

  .muted{color:var(--muted)}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px}
  label.radio{display:inline-flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer}

  /* ช่องปรับแรง F: ปุ่ม + - */
  .numstep{display:inline-flex;align-items:center;gap:8px}
  .stepBtn{
    width:34px;height:34px;border-radius:10px;border:1px solid var(--line);
    background:#fff;color:#111827;cursor:pointer;line-height:1;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:18px;
    box-shadow:none;
    user-select:none;
  }
  .stepBtn:active{transform:translateY(1px)}
  .numstep input[type=number]{width:120px}

  /* ช่องติ๊ก (แทนปุ่ม toggleComp/toggleTmag) — ไม่ต้องมีสี */
  .ck{display:inline-flex;align-items:center;gap:8px}
  .ck input{transform:scale(1.05)}
  .ck span{color:var(--ink)}

  svg{text-rendering:geometricPrecision;-webkit-font-smoothing:antialiased}

  /* ปรับจอการทดลอง (SVG) ให้คุมความสูงด้วย CSS */
  #scene{width:100%;height:560px;display:block}

  /* มือถือ: แนวตั้งให้สั้นลงเหลือครึ่ง + ตัวอักษรในจอการทดลองโตขึ้น 30% */
  @media (max-width:1000px) and (orientation:portrait){
    #scene{height:280px}
    #scene text{font-size:1.3em !important}
  }

  /* ตัดการแสดงผลลัพธ์บนจอคอม */
  @media (min-width:1001px){
    #resultsSection{display:none}
  }
  /* มือถือ: ตัด "ค่าผลลัพธ์" ออก */
  @media (max-width:1000px){
    #resultsSection{display:none}
  }

  /* มือถือ: ตัดข้อความ/เส้น (โหมดควบคุม, พารามิเตอร์, เส้นคั่น) ตามรูป */
  @media (max-width:1000px){
    #panel .tag{display:none !important;}
    #panel hr{display:none !important;}
  }

  /* ป้ายต่อเวกเตอร์: โปร่งแสง + ลากได้ */
  #Farrow{cursor:grab; touch-action:none; pointer-events:stroke;}
  .draggable-label{cursor:grab; touch-action:none; user-select:none;}
  .draggable-label.dragging{cursor:grabbing;}
  #Farrow.dragging{cursor:grabbing;}
  #chain{cursor:grab; touch-action:none;}
  #chain.dragging{cursor:grabbing;}
  #chainRect{cursor:inherit;}

  /* Exercises modal */
  .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:50}
  .modal{width:min(920px,96vw);max-height:90vh;background:var(--surface);border-radius:16px;overflow:auto;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .modal header{padding:14px 18px;background:linear-gradient(135deg,#4f46e5,#22c55e);color:#fff;position:sticky;top:0}
  .modal header h3{margin:0;font-size:20px}
  .modal .content{padding:16px}
  .qcard{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px;background:#fff}
  .qtitle{font-weight:600;margin-bottom:6px}
  .opts{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px}
  .opt{display:flex;gap:8px;align-items:flex-start;padding:8px;border:1px solid var(--line);border-radius:10px;background:#f9fafb;cursor:pointer}
  .opt input{margin-top:3px}
  .exp{margin-top:10px;border-left:4px solid #c7d2fe;background:#eef2ff;padding:10px;border-radius:10px}
  .score{font-weight:700}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px}
  .good{background:#dcfce7;color:#166534}
  .bad{background:#fee2e2;color:#991b1b}
  .controls{display:flex;gap:10px;justify-content:flex-end;padding:12px;border-top:1px solid var(--line);background:#f8fafc;position:sticky;bottom:0}
  .footer{margin-top:10px;font-size:14px;color:var(--muted)}
  .footer a{color:#0b63d1;text-decoration:underline}

  .study-link-inline{margin-top:14px;padding-bottom:120px;font-size:14px;color:var(--muted)}
  .study-link-inline a{color:#0b63d1;text-decoration:underline}

  @media (max-width:1000px){
    .wrap{padding:10px;overflow-x:hidden}
    .card{padding:10px}
    .row{gap:8px}
    input[type=number]{width:100px;max-width:100%}
    input[type=range]{width:min(100%,220px)}
    .btn{padding:9px 12px;font-size:14px}
    #mobileInputsUnderScene, #mobileUnderScene{width:100%;overflow-x:hidden}
    #mobileInputsUnderScene .row, #mobileUnderScene .row{width:100%}
  }

  /* มือถือ: โซนย้าย input/ปุ่มไปอยู่ใต้จอทดลอง */
  #mobileInputsUnderScene{display:none}
  #mobileUnderScene{display:none}
  @media (max-width:1000px){
    #mobileInputsUnderScene{display:block}
    #mobileUnderScene{display:block}
  }
</style>
</head>

<body>
<div class="wrap">
  <h2 style="margin:6px 0 10px 0;"><span style="color:#2f6fd6;font-weight:800;">mini lab สมดุล 3 แรงของกล่องแขวนด้วยเชือกเบา ถูกดึงด้วยแรง F </span></h2>

  <div class="grid">
    <!-- Controls -->
    <div class="card" id="panel">
      <div id="modeBlock">
        <div class="row"><span class="tag">โหมดควบคุม</span></div>
        <div class="row" id="modeRadiosRow">
          <label class="radio"><input type="radio" name="mode" id="modeF" checked> ปรับแรง F</label>
          <label class="radio"><input type="radio" name="mode" id="modeTheta"> ปรับมุม θ</label>
        </div>
      </div>

      <!-- ปรับแรง F -->
      <div class="row" id="rowF">
        <label>ขนาดแรง F (N)</label>
        <div class="numstep">
          <button class="stepBtn" id="Fminus" type="button">−</button>
          <input id="F" type="number" step="0.5" value="10.0"/>
          <button class="stepBtn" id="Fplus" type="button">+</button>
        </div>
        <label>มุมแรง F (°)</label>
        <input id="FangleInput" type="number" step="0.1" value="0.0"/>
      </div>

      <div class="row" id="rowTheta" style="display:none">
        <label>มุม θ (°)</label>
        <input id="thetaDegInput" type="number" step="0.1" value="20.0"/>
        <input id="thetaSlider" type="range" min="0" max="75" step="0.1" value="20.0"/>
      </div>

      <hr/>
      <div class="row"><span class="tag">พารามิเตอร์</span></div>
      <div class="row">
        <label>น้ำหนักวัตถุ mg (N)</label>
        <input id="mgInput" type="number" step="1" value="40"/>
      </div>
<!-- reset row -->
      <div class="row" style="gap:10px" id="topRow">
        <button class="btn" id="reset">รีเซ็ต</button>
        
      </div>

      <!-- bottom actions -->
      <div id="bottomActionsHome">
        <div class="row" style="gap:10px" id="bottomActions">
          <button class="btn gray" id="toggleChain">ต่อเวกเตอร์แบบหางต่อหัว</button>
          
          <label class="ck">
            <input type="checkbox" id="chkComp">
            <span>แยกองค์ประกอบของแรง T</span>
          </label>
          <label class="ck">
            <input type="checkbox" id="chkFComp">
            <span>แยกองค์ประกอบของแรง F</span>
          </label>
          <label class="ck">
            <input type="checkbox" id="chkTmag">
            <span>แสดงขนาดของแรง T</span>
          </label>
        </div>
      </div>

      <!-- results (ถูกซ่อนไว้แล้วด้วย CSS) -->
      <div id="resultsSection">
        <hr/>
        <div class="row"><span class="tag">ค่าผลลัพธ์</span></div>
        <div class="row"><div>θ (จากแนวดิ่ง): <strong id="thetaDegOut">–</strong>°</div></div>
        <div class="row"><div>T (N): <strong id="Tval">–</strong></div></div>
      </div>
    </div>

    <!-- Scene -->
    <div class="card" id="sceneCard">
      <svg id="scene" viewBox="0 0 1000 560" aria-label="สามแรงสมดุล">
        <g id="fbd">
          <!-- ✅ เพดานสีเทา: ขยับไปทางซ้าย 30px (x: 70 -> 40) -->
          <rect id="ceiling" x="40" y="30" width="200" height="20" fill="#9ca3af" rx="3"></rect>

          <line id="ref" x1="95" y1="50" x2="95" y2="260" stroke="#999" stroke-dasharray="6 6"></line>
          <line id="rope" x1="95" y1="50" x2="280" y2="260" stroke="#000" stroke-width="3"></line>
          <rect id="block" x="250" y="260" width="80" height="60" fill="#b0815a" stroke="#6b4b34" stroke-width="2" rx="4"></rect>

          <!-- vectors -->
          <g id="Tarrow" fill="var(--Tcolor)" stroke="var(--Tcolor)"></g>
          <g id="Farrow" fill="var(--Fcolor)" stroke="var(--Fcolor)"></g>
          <g id="Weight" fill="var(--Wcolor)" stroke="var(--Wcolor)"></g>

          <!-- F components -->
          <g id="FxComp" fill="none" stroke="var(--Fcolor)"></g>
          <g id="FyComp" fill="none" stroke="var(--Fcolor)"></g>
          <text id="FxLabel" class="draggable-label" font-size="16" fill="var(--Fcolor)"></text>
          <text id="FyLabel" class="draggable-label" font-size="16" fill="var(--Fcolor)"></text>

          <!-- T components -->
          <g id="TxComp" fill="none" stroke="var(--Tcolor)"></g>
          <g id="TyComp" fill="none" stroke="var(--Tcolor)"></g>
          <text id="TxLabel" class="draggable-label" font-size="16" fill="var(--Tcolor)"></text>
          <text id="TyLabel" class="draggable-label" font-size="16" fill="var(--Tcolor)"></text>

          <!-- labels/main -->
          <text id="labelT" class="draggable-label" x="0" y="0" font-size="20" fill="var(--Tcolor)">T</text>
          <text id="labelF" class="draggable-label" x="0" y="0" font-size="20" fill="var(--Fcolor)">F</text>
          <text id="labelW" class="draggable-label" x="0" y="0" font-size="20" fill="var(--Wcolor)">mg</text>
          <path id="thetaArc" d="" fill="none" stroke="#555" stroke-width="2"></path>
          <text id="thetaTxt" class="draggable-label" x="0" y="0" font-size="18" fill="#555">θ</text>
          <path id="fAngleArc" d="" fill="none" stroke="var(--Fcolor)" stroke-width="2"></path>
          <text id="fAngleTxt" class="draggable-label" x="0" y="0" font-size="18" fill="var(--Fcolor)">φ</text>
        </g>

        <!-- right: head-to-tail chain (โปร่งแสง + ลากได้) -->
        <g id="chain" transform="translate(520,60)">
          <rect id="chainRect" x="0" y="0" width="440" height="440" fill="rgba(255,255,255,0.55)" stroke="rgba(229,231,235,0.9)" rx="10"></rect>
          <text id="chainTitle" x="110" y="20" font-size="16" fill="#475569">ต่อเวกเตอร์แบบหางต่อหัว</text>
          <g id="chainArrows">
            <g id="chainT" fill="var(--Tcolor)" stroke="var(--Tcolor)"></g>
            <g id="chainF" fill="var(--Fcolor)" stroke="var(--Fcolor)"></g>
            <g id="chainW" fill="var(--Wcolor)" stroke="var(--Wcolor)"></g>
          </g>
          <g id="chainLabels" font-size="16">
            <text id="cLT" fill="var(--Tcolor)"></text>
            <text id="cLF" fill="var(--Fcolor)"></text>
            <text id="cLW" fill="var(--Wcolor)"></text>
            <text id="cTheta" fill="#555"></text>
          </g>
        </g>
      </svg>

      <div id="mobileInputsUnderScene"></div>
      <div id="mobileUnderScene"></div>
      <div class="study-link-inline">ศึกษาเพิ่มเติมที่ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener">เพจคลายปมฟิสิกส์</a></div>
    </div>
  </div>

  <div class="footer">
    ศึกษาเพิ่มเติมได้ที่ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener">เพจ คลายปมฟิสิกส์</a>
  </div>
</div>


<script>
(function(){
  /* ===== Simulation refs ===== */
  const sceneSvg = document.getElementById('scene');

  const rope = document.getElementById('rope');
  const block = document.getElementById('block');
  const Farrow = document.getElementById('Farrow');
  const Warrow = document.getElementById('Weight');
  const Tarrow = document.getElementById('Tarrow');
  const labelT = document.getElementById('labelT');
  const labelF = document.getElementById('labelF');
  const labelW = document.getElementById('labelW');
  const thetaArc = document.getElementById('thetaArc');
  const thetaTxt = document.getElementById('thetaTxt');
  const fAngleArc = document.getElementById('fAngleArc');
  const fAngleTxt = document.getElementById('fAngleTxt');
  const thetaDegOut = document.getElementById('thetaDegOut');
  const Tval = document.getElementById('Tval');

  const modeF = document.getElementById('modeF');
  const modeTheta = document.getElementById('modeTheta');
  const rowF = document.getElementById('rowF');
  const rowTheta = document.getElementById('rowTheta');
  const modeBlock = document.getElementById('modeBlock');
  const modeRadiosRow = document.getElementById('modeRadiosRow');

  const thetaDegInput = document.getElementById('thetaDegInput');
  const thetaSlider = document.getElementById('thetaSlider');

  const chain = document.getElementById('chain');
  const cT = document.getElementById('chainT');
  const cF = document.getElementById('chainF');
  const cW = document.getElementById('chainW');
  const cLT = document.getElementById('cLT');
  const cLF = document.getElementById('cLF');
  const cLW = document.getElementById('cLW');
  const cTheta = document.getElementById('cTheta');

  const inputMg = document.getElementById('mgInput');
  const inputF = document.getElementById('F');
  const inputFangle = document.getElementById('FangleInput');

  const reset = document.getElementById('reset');
  const toggleChain = document.getElementById('toggleChain');

  const chkComp = document.getElementById('chkComp');
  const chkFComp = document.getElementById('chkFComp');
  const chkTmag = document.getElementById('chkTmag');


  const Fminus = document.getElementById('Fminus');
  const Fplus  = document.getElementById('Fplus');

  const topRow = document.getElementById('topRow');
  const bottomActions = document.getElementById('bottomActions');
  const home = document.getElementById('bottomActionsHome');
  const mobileUnderScene = document.getElementById('mobileUnderScene');
  const mobileInputsUnderScene = document.getElementById('mobileInputsUnderScene');

  const pivot = {x:95, y:50};
  const pxPerMeter = 260;
  const blockSize = {w:80, h:60};
  const FORCE_SCALE_PX_PER_N = 5; // 5 px = 1 N

  // Components groups
  const FxComp = document.getElementById('FxComp');
  const FyComp = document.getElementById('FyComp');
  const FxLabel = document.getElementById('FxLabel');
  const FyLabel = document.getElementById('FyLabel');
  const TxComp = document.getElementById('TxComp');
  const TyComp = document.getElementById('TyComp');
  const TxLabel = document.getElementById('TxLabel');
  const TyLabel = document.getElementById('TyLabel');

  let showComp = false;
  let showFComp = false;
  let showTMag = false;

  // เก็บตำแหน่งปลายลูกศร F ล่าสุด เพื่อให้จับที่ปลายลูกศรลากปรับขนาด/มุมได้
  let fTipHit = null;
  let draggingF = false;
  let fDragAnchor = null; // จุดฐานของลูกศร F ตอนเริ่มลาก เพื่อลดอาการภาพวิ่งไปมา

  chain.style.display = 'none';

  function getG(){ return 10; }

  function drawArrow(g, x1, y1, x2, y2, width, dashPattern){
    g.innerHTML = '';
    const dx=x2-x1, dy=y2-y1; const len=Math.hypot(dx,dy)||1;
    const ux=dx/len, uy=dy/len;

    const shaft = document.createElementNS('http://www.w3.org/2000/svg','line');
    shaft.setAttribute('x1',x1); shaft.setAttribute('y1',y1);
    shaft.setAttribute('x2',x2); shaft.setAttribute('y2',y2);
    shaft.setAttribute('stroke-width',width);
    if (dashPattern){ shaft.setAttribute('stroke-dasharray', dashPattern); }
    g.appendChild(shaft);

    const size = 8 + width*1.2;
    const hx = x2 - ux*size, hy = y2 - uy*size;
    const left = [hx - uy*(size*0.6), hy + ux*(size*0.6)];
    const right= [hx + uy*(size*0.6), hy - ux*(size*0.6)];

    const head = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    head.setAttribute('points', `${x2},${y2} ${left[0]},${left[1]} ${right[0]},${right[1]}`);
    g.appendChild(head);
  }


  /* ===== Draggable labels on main experiment ===== */
  const labelOffsets = {};
  const labelBases = {};
  let draggingLabel = null;

  function setLabelPos(el, x, y){
    if (!el) return;
    const id = el.id;
    labelBases[id] = {x, y};
    const off = labelOffsets[id] || {dx:0, dy:0};
    el.setAttribute('x', x + off.dx);
    el.setAttribute('y', y + off.dy);
  }

  function makeLabelDraggable(el){
    if (!el) return;
    el.addEventListener('pointerdown', (e)=>{
      if (!el.textContent || el.getAttribute('visibility') === 'hidden') return;
      const id = el.id;
      const p = svgPointFromEvent(e);
      const off = labelOffsets[id] || {dx:0, dy:0};
      draggingLabel = {el, id, startX:p.x, startY:p.y, dx:off.dx, dy:off.dy};
      el.classList.add('dragging');
      try{ el.setPointerCapture(e.pointerId); }catch(_){}
      e.preventDefault();
      e.stopPropagation();
    });
  }

  function resetLabelOffsets(){
    Object.keys(labelOffsets).forEach(k => delete labelOffsets[k]);
  }

  /* ===== Drag chain panel ===== */
  let chainPos = {x:520, y:60};
  let dragging = false;
  let dragStart = {cx:0, cy:0, x:0, y:0};

  function setChainTransform(x,y){
    chainPos.x = x; chainPos.y = y;
    chain.setAttribute('transform', `translate(${x},${y})`);
  }
  setChainTransform(chainPos.x, chainPos.y);

  function pxToSvgDelta(dxPx, dyPx){
    const rect = sceneSvg.getBoundingClientRect();
    const vb = sceneSvg.viewBox.baseVal;
    const sx = vb.width / (rect.width || 1);
    const sy = vb.height / (rect.height || 1);
    return {dx: dxPx * sx, dy: dyPx * sy};
  }

  function onChainPointerDown(e){
    if (chain.style.display === 'none') return;
    if (!chain.contains(e.target)) return;

    dragging = true;
    chain.classList.add('dragging');
    dragStart.cx = e.clientX;
    dragStart.cy = e.clientY;
    dragStart.x = chainPos.x;
    dragStart.y = chainPos.y;

    try{ chain.setPointerCapture(e.pointerId); }catch(_){}
    e.preventDefault();
  }

  function onChainPointerMove(e){
    if (!dragging) return;
    const dpx = e.clientX - dragStart.cx;
    const dpy = e.clientY - dragStart.cy;
    const d = pxToSvgDelta(dpx, dpy);
    setChainTransform(dragStart.x + d.dx, dragStart.y + d.dy);
    update();
  }

  function endChainDrag(){
    if (!dragging) return;
    dragging = false;
    chain.classList.remove('dragging');
  }

  chain.addEventListener('pointerdown', onChainPointerDown);
  window.addEventListener('pointermove', onChainPointerMove);
  window.addEventListener('pointerup', endChainDrag);
  window.addEventListener('pointercancel', endChainDrag);

  function update(){
    const mg = Math.max(0.01, parseFloat(inputMg.value)||0);
    const L = 1.0;

    let F = parseFloat(inputF.value)||0, theta=0;
    let fAngleDeg = parseFloat(inputFangle.value)||0;
    if (!Number.isFinite(fAngleDeg)) fAngleDeg = 0;


    // นิยามมุมแรง F: 0° = ดึงไปทางขวา, ค่าบวก = เงยขึ้น, ค่าลบ = กดลง
    // แกนคำนวณใช้ y บวกขึ้น แต่ SVG ใช้ y บวกลง จึงต้องกลับเครื่องหมายตอนวาด
    let fRad = fAngleDeg*Math.PI/180;
    let Fx = F*Math.cos(fRad);
    let Fy = F*Math.sin(fRad);

    if (modeTheta.checked){
      const thDeg = parseFloat(thetaDegInput.value)||0;
      theta = thDeg*Math.PI/180;
      // โหมดปรับมุม θ ยังคงตั้งให้ F เป็นแนวราบเหมือนเดิม เพื่อใช้ความสัมพันธ์ F = mg tanθ
      fAngleDeg = 0;
      inputFangle.value = fAngleDeg.toFixed(1);
      F = Math.tan(theta)*(mg);
      inputF.value = F.toFixed(2);
      Fx = F;
      Fy = 0;
      fRad = 0;
    } else {
      // สมดุล: T + F + mg = 0
      // T = (-Fx, mg - Fy) และเชือกต้องอยู่ในแนวเดียวกับ T
      theta = Math.atan2(Fx, mg - Fy);
      const th=(theta*180/Math.PI).toFixed(2);
      thetaDegInput.value = th;
      thetaSlider.value = Math.max(0, Math.min(75, parseFloat(th)||0));
    }

    const T = Math.hypot(Fx, mg - Fy);
    const k = FORCE_SCALE_PX_PER_N;
    const mgLen = mg * k;

    const Lpx = L*pxPerMeter;
    const end = {x:pivot.x + Math.sin(theta)*Lpx, y:pivot.y + Math.cos(theta)*Lpx};
    rope.setAttribute('x2', end.x); rope.setAttribute('y2', end.y);
    block.setAttribute('x', end.x - blockSize.w/2); block.setAttribute('y', end.y);

    const topBlock={x:end.x, y:end.y};
    const centerBlock={x:end.x, y:end.y + blockSize.h/2};

    const isFzero = Math.abs(F)<1e-9;
    if (isFzero){
      Farrow.style.display='none';
      labelF.setAttribute('visibility','hidden');
    } else {
      Farrow.style.display=null;
      labelF.setAttribute('visibility','visible');
    }

    // T arrow
    const Tlen = T*k;
    const Tx2 = topBlock.x - Math.sin(theta)*Tlen;
    const Ty2 = topBlock.y - Math.cos(theta)*Tlen;
    drawArrow(Tarrow, topBlock.x, topBlock.y, Tx2, Ty2, 3);

    // ป้าย T: ขยับขึ้น 5px และซ้าย 20px
    setLabelPos(labelT, (Tx2 + 28) - 20, (Ty2 - 6) - 5);
    labelT.textContent = showTMag ? `T = ${T.toFixed(2)} N` : `T`;

    // F — วาดตามขนาดและมุมของแรง F
    if (!isFzero){
      const Fx2 = topBlock.x + Fx*k;
      const Fy2 = topBlock.y - Fy*k + 2;
      const FstartY = topBlock.y + 2;
      drawArrow(Farrow, topBlock.x, FstartY, Fx2, Fy2, 3);
      fTipHit = {x:Fx2, y:Fy2, x0:topBlock.x, y0:FstartY};
      setLabelPos(labelF, Fx2 + 8, Fy2 + 8);
      labelF.textContent = `F = ${F.toFixed(2)} N`;

      // มุมของแรง F เทียบกับแนวราบที่ผิวบนของกล่อง
      const ar = 48;
      const baseY = topBlock.y + 2;
      const ax0 = topBlock.x + ar, ay0 = baseY;
      const ax1 = topBlock.x + ar*Math.cos(fRad), ay1 = baseY - ar*Math.sin(fRad);
      const largeArc = Math.abs(fAngleDeg) > 180 ? 1 : 0;
      const sweep = fAngleDeg >= 0 ? 0 : 1;
      if (Math.abs(fAngleDeg) < 0.05) {
        fAngleArc.setAttribute('d','');
        fAngleArc.setAttribute('visibility','hidden');
        fAngleTxt.textContent = '';
        fAngleTxt.setAttribute('visibility','hidden');
      } else {
        fAngleArc.setAttribute('d', `M ${ax0} ${ay0} A ${ar} ${ar} 0 ${largeArc} ${sweep} ${ax1} ${ay1}`);
        fAngleArc.setAttribute('visibility','visible');
        const midAng = fRad/2;
        setLabelPos(fAngleTxt, topBlock.x + (ar+16)*Math.cos(midAng), baseY - (ar+16)*Math.sin(midAng) + 6);
        fAngleTxt.textContent = `φ = ${fAngleDeg.toFixed(1)}°`;
        fAngleTxt.setAttribute('visibility','visible');
      }
    } else { Farrow.innerHTML=''; labelF.textContent=''; fTipHit=null; fAngleArc.setAttribute('d',''); fAngleArc.setAttribute('visibility','hidden'); fAngleTxt.textContent=''; fAngleTxt.setAttribute('visibility','hidden'); }

    // Components of F
    if (showFComp && !isFzero){
      const start = {x:topBlock.x, y:topBlock.y + 2};
      const xEnd = {x:start.x + Fx*k, y:start.y};
      const fEnd = {x:start.x + Fx*k, y:start.y - Fy*k};
      FxComp.style.display = null;
      FyComp.style.display = null;
      if (Math.abs(Fx) > 1e-9){
        drawArrow(FxComp, start.x, start.y, xEnd.x, xEnd.y, 3, '7 7');
        setLabelPos(FxLabel, (start.x + xEnd.x)/2 + 4, start.y - 10);
        FxLabel.textContent = `Fx = ${Fx.toFixed(2)} N`;
        FxLabel.setAttribute('visibility','visible');
      } else { FxComp.innerHTML=''; FxLabel.textContent=''; FxLabel.setAttribute('visibility','hidden'); }
      if (Math.abs(Fy) > 1e-9){
        drawArrow(FyComp, xEnd.x, xEnd.y, fEnd.x, fEnd.y, 3, '7 7');
        setLabelPos(FyLabel, xEnd.x + 10, (xEnd.y + fEnd.y)/2);
        FyLabel.textContent = `Fy = ${Math.abs(Fy).toFixed(2)} N`;
        FyLabel.setAttribute('visibility','visible');
      } else { FyComp.innerHTML=''; FyLabel.textContent=''; FyLabel.setAttribute('visibility','hidden'); }
    } else {
      FxComp.innerHTML=''; FyComp.innerHTML=''; FxLabel.textContent=''; FyLabel.textContent='';
      FxLabel.setAttribute('visibility','hidden'); FyLabel.setAttribute('visibility','hidden');
    }

    // mg
    drawArrow(Warrow, centerBlock.x, centerBlock.y, centerBlock.x, centerBlock.y + mgLen, 3);
    setLabelPos(labelW, centerBlock.x - 20, centerBlock.y + mgLen + 22);
    labelW.textContent = `mg = ${mg.toFixed(2)} N`;

    // theta arc + readout
    const r=34, a0=Math.PI/2, a1=a0-theta;
    const x0=pivot.x + r*Math.cos(a0), y0=pivot.y + r*Math.sin(a0);
    const x1=pivot.x + r*Math.cos(a1), y1=pivot.y + r*Math.sin(a1);
    thetaArc.setAttribute('d', `M ${x0} ${y0} A ${r} ${r} 0 0 ${theta>=0?0:1} ${x1} ${y1}`);
    const thx = pivot.x + r*0.9*Math.cos((a0+a1)/2), thy = pivot.y + r*0.9*Math.sin((a0+a1)/2);

    /* ✅ ป้ายมุม: (เดิม: ซ้าย 80 ลง 20) -> เพิ่ม "ไปทางซ้าย 30" และ "ลงล่าง 10" */
    setLabelPos(thetaTxt, (thx + 6) - 80 - 30, (thy - 6) + 20 + 10);
    thetaTxt.textContent = `θ = ${(theta*180/Math.PI).toFixed(2)}°`;

    if (thetaDegOut) thetaDegOut.textContent = (theta*180/Math.PI).toFixed(2);
    if (Tval) Tval.textContent = showTMag ? T.toFixed(2) : '—';

    // Components of T
    if (showComp){
      if (!isFzero){
        const Tx_len = Math.abs(Fx)*k;
        const dir = -Math.sign(Fx || 1);
        const x2 = topBlock.x + dir*Tx_len;
        drawArrow(TxComp, topBlock.x, topBlock.y, x2, topBlock.y, 4, '7 7');

        setLabelPos(TxLabel, (topBlock.x + x2)/2 - 18 - 100, topBlock.y - 8);
        TxLabel.textContent = `Tx = ${Math.abs(Fx).toFixed(2)} N`;
      } else { TxComp.innerHTML=''; TxLabel.textContent=''; }

      const Ty_len = (mg - Fy)*k;
      const y2 = topBlock.y - Ty_len;
      drawArrow(TyComp, topBlock.x, topBlock.y, topBlock.x, y2, 4, '7 7');
      setLabelPos(TyLabel, topBlock.x + 8, (topBlock.y + y2)/2);
      TyLabel.textContent = `Ty = ${(mg - Fy).toFixed(2)} N`;
    } else {
      TxComp.innerHTML=''; TyComp.innerHTML=''; TxLabel.textContent=''; TyLabel.textContent='';
    }

    // head-to-tail chain
    if (chain.style.display!=='none'){
      const CONTENT={x:20,y:40,w:400,h:360};
      function computeBBox(){
        const tdx=-Fx*k, tdy=-(mg - Fy)*k;
        const p0={x:0,y:0}, p1={x:p0.x+tdx,y:p0.y+tdy};
        const p2={x:p1.x+Fx*k,y:p1.y-Fy*k};
        const startW=(Math.abs(F)<1e-9)?p1:p2;
        const p3={x:startW.x,y:startW.y+mgLen};
        const xs=[p0.x,p1.x,(Math.abs(F)<1e-9?p1.x:p2.x),p3.x];
        const ys=[p0.y,p1.y,(Math.abs(F)<1e-9?p1.y:p2.y),p3.y];
        return {p0,p1,p2,startW,p3,minX:Math.min(...xs),maxX:Math.max(...xs),minY:Math.min(...ys),maxY:Math.max(...ys)};
      }
      const bb=computeBBox();
      const center={x:(bb.minX+bb.maxX)/2,y:(bb.minY+bb.maxY)/2};
      const target={x:CONTENT.x+CONTENT.w/2,y:CONTENT.y+CONTENT.h/2};
      const origin={x:target.x-center.x,y:target.y-center.y};

      const tdx=-Fx*k, tdy=-(mg - Fy)*k;
      const T0={x:origin.x,y:origin.y}, T1={x:origin.x+tdx,y:origin.y+tdy};
      cT.innerHTML=''; cF.innerHTML=''; cW.innerHTML='';
      drawArrow(cT, T0.x, T0.y, T1.x, T1.y, 3);

      const F0={x:T1.x,y:T1.y}, F1={x:F0.x+Fx*k,y:F0.y-Fy*k};
      if (!(Math.abs(F)<1e-9)) drawArrow(cF, F0.x, F0.y, F1.x, F1.y, 3);

      const W0=(Math.abs(F)<1e-9)?T1:F1, W1={x:W0.x,y:W0.y+mgLen};
      drawArrow(cW, W0.x, W0.y, W1.x, W1.y, 3);

      const midT={x:(T0.x+T1.x)/2,y:(T0.y+T1.y)/2};

      // ป้าย T ในกรอบต่อเวกเตอร์: ขยับไปทางซ้าย 20px เพิ่มเติม
      cLT.setAttribute('x', midT.x - 20 - 70 - 20);
      cLT.setAttribute('y', midT.y-6);
      cLT.textContent = showTMag ? `T = ${T.toFixed(2)} N` : `T`;

      if (!(Math.abs(F)<1e-9)){
        const midF={x:(F0.x+F1.x)/2,y:(F0.y+F1.y)/2};
        cLF.setAttribute('x', midF.x+6); cLF.setAttribute('y', midF.y-6);
        cLF.textContent = `F = ${F.toFixed(2)} N`;
      } else { cLF.textContent=''; }

      const midW={x:W0.x,y:(W0.y+W1.y)/2};
      cLW.setAttribute('x', midW.x+20); cLW.setAttribute('y', midW.y+6);
      cLW.textContent = `mg = ${mg.toFixed(2)} N`;

      cTheta.setAttribute('x', T0.x-12); cTheta.setAttribute('y', T0.y+18);
      cTheta.textContent = `θ = ${(theta*180/Math.PI).toFixed(2)}°`;
    }
  }

  function refreshModeUI(){
    if (modeTheta.checked){ rowTheta.style.display=''; rowF.style.display='none'; }
    else { rowTheta.style.display='none'; rowF.style.display=''; }
    update();
  }

  // มือถือ: ย้ายโหมด/อินพุต/ปุ่ม ไปใต้จอทดลอง
  const mqMobile = window.matchMedia("(max-width:1000px)");
  function arrange(){
    if (mqMobile.matches){
      if (modeRadiosRow.parentElement !== mobileInputsUnderScene){
        mobileInputsUnderScene.appendChild(modeRadiosRow);
      }
      if (rowF.parentElement !== mobileInputsUnderScene) mobileInputsUnderScene.appendChild(rowF);
      if (rowTheta.parentElement !== mobileInputsUnderScene) mobileInputsUnderScene.appendChild(rowTheta);

      if (bottomActions.parentElement !== mobileUnderScene) mobileUnderScene.appendChild(bottomActions);

      if (reset.parentElement !== bottomActions){
        bottomActions.insertBefore(reset, bottomActions.firstChild);
      }
    } else {
      const panel = document.getElementById('panel');

      if (modeRadiosRow.parentElement !== modeBlock){
        modeBlock.appendChild(modeRadiosRow);
      }

      if (rowF.parentElement !== panel) panel.insertBefore(rowF, panel.querySelector('#rowTheta'));
      if (rowTheta.parentElement !== panel) panel.insertBefore(rowTheta, panel.querySelector('hr'));

      if (bottomActions.parentElement !== home) home.appendChild(bottomActions);
      if (reset.parentElement !== topRow) topRow.insertBefore(reset, topRow.firstChild);
    }
  }
  try{ mqMobile.addEventListener('change', arrange); }catch(_){ mqMobile.addListener(arrange); }

  // input listeners
  document.getElementById('panel').addEventListener('input', (e)=>{ if(e.target.matches('input')) update(); });

  function stepF(dir){
    const step = parseFloat(inputF.step || "0.5") || 0.5;
    const cur = parseFloat(inputF.value)||0;
    const next = cur + dir*step;
    inputF.value = next.toFixed(2);
    update();
  }
  Fminus.addEventListener('click', ()=>stepF(-1));
  Fplus.addEventListener('click',  ()=>stepF( 1));

  reset.addEventListener('click', ()=>{
    inputMg.value=40;
    inputF.value=10.0;
    inputFangle.value=0.0;
    modeF.checked=true; modeTheta.checked=false;
    thetaDegInput.value=20.0; thetaSlider.value=20.0;
    showComp = false;
    showFComp = false;
    showTMag = false;
    chkComp.checked = false;
    chkFComp.checked = false;
    resetLabelOffsets();
    chkTmag.checked = false;

    refreshModeUI();
  });

  toggleChain.addEventListener('click', ()=>{
    chain.style.display=(chain.style.display==='none')?'block':'none';
    update();
  });

  chkComp.addEventListener('change', ()=>{
    showComp = !!chkComp.checked;
    update();
  });
  chkFComp.addEventListener('change', ()=>{
    showFComp = !!chkFComp.checked;
    update();
  });
  chkTmag.addEventListener('change', ()=>{
    showTMag = !!chkTmag.checked;
    update();
  });

  modeF.addEventListener('change', refreshModeUI);
  modeTheta.addEventListener('change', refreshModeUI);
  thetaDegInput.addEventListener('input', ()=>{ thetaSlider.value=thetaDegInput.value; update(); });
  thetaSlider.addEventListener('input', ()=>{ thetaDegInput.value=thetaSlider.value; update(); });



  /* ===== ลากที่ปลายลูกศร F เพื่อปรับขนาดและมุม ===== */
  function svgPointFromEvent(e){
    const pt = sceneSvg.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;
    return pt.matrixTransform(sceneSvg.getScreenCTM().inverse());
  }

  function nearFTip(e){
    if (!fTipHit || modeTheta.checked) return false;
    const p = svgPointFromEvent(e);
    return Math.hypot(p.x - fTipHit.x, p.y - fTipHit.y) <= 34;
  }

  function applyFDrag(e){
    // ใช้จุดฐานที่ล็อกไว้ตั้งแต่เริ่มลาก ไม่ใช้ฐานใหม่ที่เปลี่ยนตามการคำนวณสมดุล
    // ไม่อย่างนั้นปลายลูกศรจะไล่หนีเมาส์ ทำให้ภาพวิ่งไปมา
    const anchor = fDragAnchor || fTipHit;
    if (!anchor) return;

    const p = svgPointFromEvent(e);
    const dx = p.x - anchor.x0;
    const dySvg = p.y - anchor.y0;
    const mg = Math.max(0.01, parseFloat(inputMg.value)||0);
    const k = FORCE_SCALE_PX_PER_N;
    const mgLen = mg * k;

    // SVG y ลงเป็นบวก แต่แรง Fy ให้ขึ้นเป็นบวก จึงกลับเครื่องหมาย
    let fx = dx / k;
    let fy = -dySvg / k;

    // ให้เป็นแรงดึงไปทางขวาเป็นหลัก ถ้าลากเลยซ้ายมาก ให้คุมไว้ใกล้ศูนย์ ไม่ให้เชือกพลิก/ภาพกระโดด
    fx = Math.max(0, fx);

    // จำกัดกรณีเงยขึ้นแรงเกินน้ำหนัก เพราะสมดุลแบบเชือกดึงขึ้นตามแนวเดิมจะไม่เสถียร
    fy = Math.max(-mg*2.5, Math.min(mg*0.95, fy));

    const mag = Math.hypot(fx, fy);
    const ang = (mag < 1e-9) ? 0 : Math.atan2(fy, fx)*180/Math.PI;
    inputF.value = mag.toFixed(2);
    inputFangle.value = ang.toFixed(1);
    update();
  }

  Farrow.addEventListener('pointerdown', (e)=>{
    if (!nearFTip(e)) return;
    draggingF = true;
    // ล็อกฐานลูกศรไว้ ณ วินาทีที่เริ่มลาก เพื่อให้ลากปลาย F ได้ตรงมือ
    fDragAnchor = fTipHit ? {...fTipHit} : null;
    Farrow.classList.add('dragging');
    try{ Farrow.setPointerCapture(e.pointerId); }catch(_){}
    applyFDrag(e);
    e.preventDefault();
  });
  window.addEventListener('pointermove', (e)=>{
    if (!draggingF) return;
    applyFDrag(e);
    e.preventDefault();
  });
  function endFDrag(){
    if (!draggingF) return;
    draggingF = false;
    fDragAnchor = null;
    Farrow.classList.remove('dragging');
    update();
  }
  window.addEventListener('pointerup', endFDrag);
  window.addEventListener('pointercancel', endFDrag);


  [labelT, labelF, labelW, thetaTxt, fAngleTxt, TxLabel, TyLabel, FxLabel, FyLabel].forEach(makeLabelDraggable);
  window.addEventListener('pointermove', (e)=>{
    if (!draggingLabel) return;
    const p = svgPointFromEvent(e);
    labelOffsets[draggingLabel.id] = {
      dx: draggingLabel.dx + (p.x - draggingLabel.startX),
      dy: draggingLabel.dy + (p.y - draggingLabel.startY)
    };
    update();
    e.preventDefault();
  });
  function endLabelDrag(){
    if (!draggingLabel) return;
    draggingLabel.el.classList.remove('dragging');
    draggingLabel = null;
  }
  window.addEventListener('pointerup', endLabelDrag);
  window.addEventListener('pointercancel', endLabelDrag);

  // init
  arrange();
  refreshModeUI();
})();
</script>
</body>
