<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>รางโค้ง–ตรง–โค้ง (ไป–มาจนพลังงานหมด)</title>
<style>
  body{
    margin:0;
    font-family:system-ui,"Noto Sans Thai",sans-serif;
    background:#fff;
    display:flex;
    flex-direction:column;
    gap:8px;
    align-items:center;
    padding:10px;
  }
  #panel{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:14px;
    padding:8px 12px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    width:min(980px,100%);
  }
  input[type="number"]{width:70px;}
  canvas{
    border:1px solid #e2e8f0;
    border-radius:14px;
    background:#ffffff;
    width:min(980px,100%);
    touch-action:none;
  }
  button{
    border:1px solid #cbd5e1;
    background:#fff;
    border-radius:9999px;
    padding:4px 16px;
    cursor:pointer;
  }
  #result,#linkbox{
    width:min(980px,100%);
    font-size:0.9rem;
  }
  #linkbox a{
    color:#2563eb;
    text-decoration:underline;
  }
  /* overlay สูตรสำคัญ */
  #formulaOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.22);
    display:none;
    justify-content:center;
    align-items:flex-start;
    padding-top:60px;
    z-index:50;
  }
  #formulaBox{
    background:linear-gradient(135deg,#fff,#e0f2fe);
    border:3px solid #0ea5e9;
    border-radius:16px;
    width:min(460px,92vw);
    padding:16px 20px 14px;
    box-shadow:0 18px 35px rgba(15,23,42,0.18);
    position:relative;
  }
  #closeFormula{
    position:absolute;
    right:10px;
    top:10px;
    border:none;
    background:#0f172a;
    color:#fff;
    border-radius:9999px;
    width:26px;
    height:26px;
    cursor:pointer;
    font-weight:bold;
  }
  #formulaBox h2{
    margin-top:0;
    margin-bottom:6px;
    color:#0f172a;
  }
  .math-block{
    background:rgba(255,255,255,0.65);
    border-left:4px solid #0ea5e9;
    padding:6px 10px;
    border-radius:8px;
    margin-bottom:8px;
  }
  .calc-line{margin-bottom:4px;}
</style>
<!-- MathJax -->
<script>
window.MathJax = {
  tex: {inlineMath: [['$', '$'], ['\\(', '\\)']]}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
  <div id="panel">
    <button id="playBtn">▶ เล่น</button>
    <button id="resetBtn">↺ รีเซ็ต</button>
    <button id="formulaBtn">📘 สูตรสำคัญ</button>
    <label>ความสูงเริ่ม (m):
      <input type="number" id="hInput" min="0" max="0.5" step="0.01" value="0.50">
    </label>
    <label>μₖ BC:
      <input type="number" id="muNum" min="0" max="0.6" step="0.01" value="0.30">
    </label>
  </div>

  <canvas id="cv" width="980" height="360"></canvas>
  <div id="result">ยังไม่เริ่มทดลอง</div>
  <div id="linkbox">
    ศึกษาเพิ่มเติมที่เพจ <a href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener noreferrer">คลายปมฟิสิกส์</a>
  </div>

  <!-- overlay สูตร -->
  <div id="formulaOverlay">
    <div id="formulaBox">
      <button id="closeFormula">×</button>
      <h2>สูตรงาน–พลังงานที่ใช้</h2>
      <div class="math-block">
        จากโค้งลื่น: $$E_\text{ต้น} = m g h$$
      </div>
      <div class="math-block">
        แรงเสียดทานบน BC ทำงาน: $$W_f = \mu_k N s = \mu_k m g s$$
      </div>
      <div class="math-block">
        หยุดเมื่อ $$E_\text{ต้น} = W_f \;\Rightarrow\; mgh = \mu_k m g s \;\Rightarrow\; s = \frac{h}{\mu_k}$$
      </div>
      <div id="currentCalc" class="math-block" style="background:#fff7ed;border-left-color:#f97316;">
        <!-- จะเติมด้วย JS -->
      </div>
    </div>
  </div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

const playBtn  = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const formulaBtn = document.getElementById('formulaBtn');
const formulaOverlay = document.getElementById('formulaOverlay');
const closeFormula = document.getElementById('closeFormula');
const hInput   = document.getElementById('hInput');
const muNum    = document.getElementById('muNum');
const resultBox= document.getElementById('result');
const currentCalc = document.getElementById('currentCalc');

const pxPerM = 360;
const baseY  = 280;
const Bx = 360;
const Cx = Bx + pxPerM;
const radius = 0.5 * pxPerM;
const leftCenter  = { x: Bx, y: baseY - radius };
const rightCenter = { x: Cx, y: baseY - radius };
const g = 9.81;
// กล่องทดลองให้โตขึ้น 2 เท่า
const boxHalf = 16;

let mu = Number(muNum.value);

let state = {
  running:false,
  segment:'arcL',
  dir:1,
  angle:Math.PI,
  x:Bx,
  y:baseY,
  E:g*0.5,
  h0:0.5
};

let lastTime = 0;
let animationFrameId = null;

// helpers
function heightFromAngleLeft(theta){
  const y = leftCenter.y + radius * Math.sin(theta);
  return (baseY - y)/pxPerM;
}
function heightFromAngleRight(theta){
  const y = rightCenter.y + radius * Math.sin(theta);
  return (baseY - y)/pxPerM;
}
function angleFromHeightLeft(h){
  const h_px = h * pxPerM;
  const s = 1 - (h_px / radius);
  let th = Math.PI - Math.asin(Math.min(Math.max(s,-1),1));
  return Math.min(Math.max(th, Math.PI/2), Math.PI);
}
function angleFromHeightRight(h){
  const h_px = h * pxPerM;
  const s = 1 - (h_px / radius);
  let th = Math.asin(Math.min(Math.max(s,-1),1));
  return Math.min(Math.max(th, 0), Math.PI/2);
}
function drawBoxOnArc(cx, cy, px, py){
  const nx = cx - px;
  const ny = cy - py;
  const len = Math.hypot(nx, ny);
  const ux = nx/len, uy = ny/len;
  const gx = px + ux*boxHalf;
  const gy = py + uy*boxHalf;
  const ang = Math.atan2(uy, ux) + Math.PI/2;
  ctx.save();
  ctx.translate(gx, gy);
  ctx.rotate(ang);
  ctx.fillStyle = "#8b5a2b";
  ctx.fillRect(-boxHalf, -boxHalf, boxHalf*2, boxHalf*2);
  ctx.restore();
}
function drawBoxOnLine(px){
  const gx = px;
  const gy = baseY - boxHalf*2;
  ctx.save();
  ctx.translate(gx, gy + boxHalf);
  ctx.fillStyle = "#8b5a2b";
  ctx.fillRect(-boxHalf, -boxHalf, boxHalf*2, boxHalf*2);
  ctx.restore();
}
function drawScene(boxX, boxY, seg){
  ctx.clearRect(0,0,cv.width,cv.height);

  // เส้น 0.5 m (เส้นที่เดิม แต่ตัวเลขขยับขวา 15px)
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;
  const hX = Bx - 260;
  const hTop = leftCenter.y;
  const hBot = baseY;
  ctx.beginPath();
  ctx.moveTo(hX, hTop);
  ctx.lineTo(hX, hBot);
  ctx.moveTo(hX-12, hTop); ctx.lineTo(hX+12, hTop);
  ctx.moveTo(hX-12, hBot); ctx.lineTo(hX+12, hBot);
  ctx.stroke();
  ctx.font = "17px system-ui"; // +3 px
  ctx.fillStyle = "#000";
  ctx.fillText("0.5 m", hX - 14 + 15, (hTop+hBot)/2 + 4);

  // โค้งซ้าย
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.arc(leftCenter.x, leftCenter.y, radius, Math.PI, Math.PI/2, true);
  ctx.stroke();
  // A
  ctx.fillStyle = "#000";
  ctx.font = "19px system-ui"; // เดิม 16px → +3px
  ctx.fillText("A", leftCenter.x - radius - 18, leftCenter.y - 4);

  // BC
  ctx.strokeStyle = "#8b5a2b";
  ctx.beginPath();
  ctx.moveTo(Bx, baseY);
  ctx.lineTo(Cx, baseY);
  ctx.stroke();

  // โค้งขวา
  ctx.strokeStyle = "#000";
  ctx.beginPath();
  ctx.arc(rightCenter.x, rightCenter.y, radius, Math.PI/2, 0, true);
  ctx.stroke();

  // ป้าย B C D (D ขยับขวา 15px)
  ctx.fillStyle = "#000";
  ctx.font = "19px system-ui";
  ctx.fillText("B", Bx - 6, baseY + 22);
  ctx.fillText("C", Cx - 6, baseY + 22);
  ctx.fillText("D", rightCenter.x + radius - 6 + 15, rightCenter.y + 8);

  ctx.textAlign = "center";
  ctx.fillText("BC = 1.0 m", (Bx+Cx)/2, baseY + 42);
  ctx.textAlign = "left";

  // μ
  ctx.fillStyle = "#ef4444";
  ctx.font = "17px system-ui";
  ctx.fillText("μₖ = " + mu.toFixed(2), Bx + 6, baseY - 14);

  // กล่อง
  if(seg === 'arcL'){
    drawBoxOnArc(leftCenter.x, leftCenter.y, boxX, boxY);
  } else if(seg === 'arcR'){
    drawBoxOnArc(rightCenter.x, rightCenter.y, boxX, boxY);
  } else {
    drawBoxOnLine(boxX);
  }
}

function setHeight(h){
  h = Math.max(0, Math.min(0.5, h));
  state.h0 = h;
  state.angle = angleFromHeightLeft(h);
  state.segment = 'arcL';
  state.dir = 1;
  state.E = g * h;
  const px = leftCenter.x + radius * Math.cos(state.angle);
  const py = leftCenter.y + radius * Math.sin(state.angle);
  drawScene(px, py, 'arcL');
  resultBox.textContent = "ยังไม่เริ่มทดลอง";
}
setHeight(0.5);

// drag ปรับความสูง
let dragging = false;
cv.addEventListener('pointerdown', e=>{
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  const px = leftCenter.x + radius * Math.cos(state.angle);
  const py = leftCenter.y + radius * Math.sin(state.angle);
  if(Math.hypot(mx - px, my - py) < 25) dragging = true;
});
cv.addEventListener('pointermove', e=>{
  if(!dragging) return;
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  let ang = Math.atan2(my - leftCenter.y, mx - leftCenter.x);
  if(ang > Math.PI) ang = Math.PI;
  if(ang < Math.PI/2) ang = Math.PI/2;
  state.angle = ang;
  const h = heightFromAngleLeft(ang);
  state.h0 = h;
  state.E  = g * h;
  const px = leftCenter.x + radius * Math.cos(ang);
  const py = leftCenter.y + radius * Math.sin(ang);
  drawScene(px, py, 'arcL');
  hInput.value = h.toFixed(2);
  resultBox.textContent = "ยังไม่เริ่มทดลอง";
});
cv.addEventListener('pointerup', ()=>dragging=false);
cv.addEventListener('pointerleave', ()=>dragging=false);

// ช่องตัวเลข
hInput.addEventListener('change', ()=> setHeight(Number(hInput.value)));
muNum.addEventListener('change', ()=>{
  mu = Math.max(0, Math.min(0.6, Number(muNum.value)));
  muNum.value = mu.toFixed(2);
  const px = leftCenter.x + radius * Math.cos(state.angle);
  const py = leftCenter.y + radius * Math.sin(state.angle);
  drawScene(px, py, state.segment);
});

// แอนิเมชัน (ไปมาจน E หมด) + ปรับให้กรณี μ=0 ไม่ค้างที่ยอด
function animate(t){
  if(!state.running){
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
    return;
  }
  if(!lastTime) lastTime = t;
  const dt = Math.min(0.035, (t-lastTime)/1000);
  lastTime = t;

  let boxX, boxY, seg = state.segment;

  if(state.segment === 'arcL'){
    const h = heightFromAngleLeft(state.angle);
    let v = Math.sqrt(Math.max(0, 2*(state.E - g*h)));
    // ถ้าไม่มีแรงเสียดทาน ให้มี v เล็กน้อยเพื่อไม่ให้ค้างบนจุดสูงสุด
    if(mu === 0 && v < 0.01) v = 0.01;

    const ds_px = v * pxPerM * dt;
    const dtheta = ds_px / radius;

    if(state.dir === 1){
      state.angle -= dtheta;
      if(state.angle <= Math.PI/2){
        state.segment = 'line';
        state.x = Bx;
        state.y = baseY;
        state.dir = 1;
      }
    } else {
      const nextAngle = state.angle + dtheta;
      const nextH = heightFromAngleLeft(Math.min(nextAngle, Math.PI));
      if(state.E < g*nextH || dtheta===0){
        state.dir = 1;
        state.angle -= dtheta;
      } else {
        state.angle = nextAngle;
        if(state.angle >= Math.PI){
          state.angle = Math.PI;
          state.dir = 1;
        }
      }
    }

    boxX = leftCenter.x + radius * Math.cos(state.angle);
    boxY = leftCenter.y + radius * Math.sin(state.angle);
    seg = 'arcL';
  }
  else if(state.segment === 'line'){
    let v = Math.sqrt(Math.max(0, 2*state.E));
    if(mu > 0){
      const dE = mu * g * v * dt;
      state.E = Math.max(0, state.E - dE);
      v = Math.sqrt(Math.max(0, 2*state.E));
    }
    if(v < 0.01 && mu > 0){
      state.running = false;
      playBtn.textContent = "▶ เล่น";
      drawScene(state.x, state.y, 'line');
      const dist = (state.x - Bx)/pxPerM;
      resultBox.textContent = "หยุดห่างจาก B = " + dist.toFixed(3) + " m";
      return;
    }
    const dx = v * pxPerM * dt * state.dir;
    state.x += dx;
    if(state.x >= Cx && state.dir === 1){
      state.segment = 'arcR';
      state.angle = Math.PI/2;
      state.dir = 1;
    } else if(state.x <= Bx && state.dir === -1){
      state.segment = 'arcL';
      state.angle = Math.PI/2;
      state.dir = -1;
    }
    boxX = state.x;
    boxY = state.y;
    seg = 'line';
  }
  else if(state.segment === 'arcR'){
    const h = heightFromAngleRight(state.angle);
    let v = Math.sqrt(Math.max(0, 2*(state.E - g*h)));
    // กันค้างที่ยอดเมื่อ μ=0
    if(mu === 0 && v < 0.01) v = 0.01;

    const ds_px = v * pxPerM * dt;
    const dtheta = (v>0 ? ds_px / radius : 0);

    if(state.dir === 1){
      const nextAngle = state.angle - dtheta;
      const nextH = heightFromAngleRight(Math.max(nextAngle,0));
      if(state.E < g*nextH || dtheta===0){
        state.dir = -1;
        state.angle += dtheta;
      } else {
        state.angle = nextAngle;
        if(state.angle <= 0){
          state.angle = 0;
          state.dir = -1;
        }
      }
    } else {
      state.angle += dtheta;
      if(state.angle >= Math.PI/2){
        state.segment = 'line';
        state.x = Cx;
        state.y = baseY;
        state.dir = -1;
      }
    }

    boxX = rightCenter.x + radius * Math.cos(state.angle);
    boxY = rightCenter.y + radius * Math.sin(state.angle);
    seg = 'arcR';
  }

  drawScene(boxX, boxY, seg);
  animationFrameId = requestAnimationFrame(animate);
}

// ปุ่มเล่น
playBtn.addEventListener('click', ()=>{
  if(state.running){
    state.running = false;
    playBtn.textContent = "▶ เล่น";
  } else {
    state.segment = 'arcL';
    state.dir = 1;
    state.E = g * state.h0;
    state.angle = angleFromHeightLeft(state.h0) - 0.015;
    if(state.angle < Math.PI/2) state.angle = Math.PI/2;
    state.running = true;
    playBtn.textContent = "⏸ หยุด";
    resultBox.textContent = "กำลังเคลื่อนที่...";
    lastTime = 0;
    animationFrameId = requestAnimationFrame(animate);
  }
});

// ปุ่มรีเซ็ต
resetBtn.addEventListener('click', ()=>{
  state.running = false;
  playBtn.textContent = "▶ เล่น";
  setHeight(Number(hInput.value));
});

// ปุ่มสูตรสำคัญ
formulaBtn.addEventListener('click', ()=>{
  // คำนวณค่าปัจจุบัน
  const h = Number(hInput.value);
  const muCur = Number(muNum.value);
  let textHtml = "";
  if(muCur > 0){
    const s = h / muCur;
    textHtml += `<div class="calc-line">ตอนนี้: \\(h = ${h.toFixed(2)}\\,\\text{m}\\), \\(\\mu_k = ${muCur.toFixed(2)}\\)</div>`;
    textHtml += `<div class="calc-line">ระยะหยุดจากสูตร \\(s = \\dfrac{h}{\\mu_k} = \\dfrac{${h.toFixed(2)}}{${muCur.toFixed(2)}} = ${s.toFixed(3)}\\,\\text{m}\\)</div>`;
    if(s > 1.0){
      textHtml += `<div class="calc-line" style="color:#b91c1c;">* ระยะเกิน 1 m → จะขึ้นโค้งขวาแล้วกลับมาก่อนหยุดจริง</div>`;
    }
  } else {
    textHtml += `<div class="calc-line">ตอนนี้ \\(\\mu_k = 0\\) → ไม่มีงานของแรงเสียดทาน วัตถุจะไม่หยุดบน BC</div>`;
  }
  currentCalc.innerHTML = textHtml;
  formulaOverlay.style.display = "flex";
  // รอ MathJax แปะสูตร
  if(window.MathJax && window.MathJax.typeset){
    window.MathJax.typeset();
  }
});
closeFormula.addEventListener('click', ()=>{
  formulaOverlay.style.display = "none";
});
formulaOverlay.addEventListener('click', (e)=>{
  if(e.target === formulaOverlay){
    formulaOverlay.style.display = "none";
  }
});
</script>
</body>
</html>
