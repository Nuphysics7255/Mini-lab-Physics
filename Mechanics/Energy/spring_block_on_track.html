<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>สปริงดันกล่อง + พื้น AB สั้น + ทางโค้งลื่น (เล่นได้)</title>

<style>
:root{
  --ink:#0f172a; --muted:#64748b; --line:#e5e7eb; --panel:#f8fafc;

  /* ===== UI/UX Control Standard — เพจคลายปมฟิสิกส์ ===== */
  --btn-play:#0ea5e9;     /* เล่น/หยุด (ฟ้า) */
  --btn-reset:#e5e7eb;    /* รีเซ็ต (เทา) */
  --btn-formula:#fed7aa;  /* สูตรสำคัญ (ส้มอ่อน) */
  --btn-quiz:#bbf7d0;     /* แบบฝึกหัด (เขียวอ่อน) */

  --btn-play-b:#0284c7;
  --btn-reset-b:#cbd5e1;
  --btn-formula-b:#fdba74;
  --btn-quiz-b:#86efac;

  /* ไอคอนเส้นสีเทา */
  --icon-stroke:#6b7280;
}
*{box-sizing:border-box}
body{
  margin:0;background:#fff;color:var(--ink);
  font-family:"Noto Sans Thai",system-ui,sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px;
}
#sim{
  width:min(100%,960px);
  height:520px;
  border:none;
  border-radius:14px;
  background:#fff;
  touch-action:none;
  user-select:none;
  cursor:grab;
}
.controls{
  display:grid;grid-template-columns:150px 1fr 90px;gap:6px;background:var(--panel);
  border:1px solid var(--line);border-radius:14px;padding:10px;width:min(100%,920px)
}
.controls input[type=number]{width:100%;padding:4px;border:1px solid var(--line);border-radius:10px}

/* ===== ปุ่มนูนมีมิติ ===== */
button{
  padding:6px 10px;border:1px solid var(--line);border-radius:10px;
  background:#fff;cursor:pointer;font-size:13px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.75) inset,
    0 10px 18px rgba(15,23,42,.10);
}
button:active{
  transform: translateY(1px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.65) inset,
    0 6px 12px rgba(15,23,42,.12);
}
a.link{color:#2563eb;text-decoration:none} a.link:hover{text-decoration:underline}
.bottom-controls{display:flex;gap:8px;width:min(100%,920px);margin-top:4px;flex-wrap:wrap}

/* ===== ICONS: ชุดเดียวกัน + เส้นเทา ===== */
.btn-ico{display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn-ico svg, .badge svg{
  width:18px;height:18px;display:block;
  stroke:var(--icon-stroke);
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

/* ===== ปุ่มมาตรฐานเพจ ===== */
#playBtn{background:var(--btn-play); color:#fff; border-color:var(--btn-play-b);}
#resetBtn{background:var(--btn-reset); color:var(--ink); border-color:var(--btn-reset-b);}
#formulaBtn{background:var(--btn-formula); color:var(--ink); border-color:var(--btn-formula-b);}
#quizBtn{background:var(--btn-quiz); color:var(--ink); border-color:var(--btn-quiz-b);}
#playBtn:hover,#resetBtn:hover,#formulaBtn:hover,#quizBtn:hover{filter:brightness(0.98)}

/* ===== play icon: ขาวเฉพาะปุ่มเล่น ===== */
#playBtn .btn-ico svg{ stroke:none; fill:#fff; } /* เริ่ม: สามเหลี่ยมขาวทึบ */
#playBtn .btn-ico svg.pause{ fill:none; stroke:#fff; } /* หยุด: ขีดคู่ขาว */

/* modal */

.modal-backdrop{
  position:fixed;inset:0;
  background:#fff; /* เต็มจอ ไม่มีพื้นที่สีเทา */
  display:none;
  align-items:stretch;
  justify-content:stretch;
  z-index:80
}
/* สูตรสำคัญยังคงมี overlay นิดเดียว (เต็มจอเช่นกัน) */
#formulaModalWrap.modal-backdrop{ background:rgba(15,23,42,.32); }

.modal{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  max-height:100vh;
  overflow-y:auto;               /* เลื่อนอ่านข้อสอบได้ */
  -webkit-overflow-scrolling:touch;
  background:#fff;
  border-radius:0;
  border:0;
  box-shadow:none;
  padding:0;
}

/* เว้นขอบข้างให้สบายตา + เผื่อปุ่มลอยด้านขวา */
.modal-body{
  padding:14px 160px 28px 24px;
}
@media (max-width:720px){
  .modal-body{ padding:14px 132px 28px 14px; }
}
}
.modal-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}


/* ===== Top bars (เลื่อนได้ แต่แถบหัวนิ่ง) ===== */
/* ===== Top bars (หัวนิ่งแบบ Facebook) ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:90;
  width:100%;
  padding:12px 18px;
  padding-right:170px; /* กันปุ่มลอย */
  border-bottom:1px solid rgba(15,23,42,.10);
  background:#fff;
}
@media (max-width:720px){
  .topbar{ padding:12px 12px; padding-right:160px; }
}
.topbar.quiz{
  background:linear-gradient(180deg, rgba(134,239,172,.95), rgba(187,247,208,.85));
  border-bottom-color:rgba(134,239,172,.95);
}

.topbar.formula{
  background:rgba(254,215,170,.85);
  border-bottom-color:rgba(253,186,116,.95);
}
.topbar .topbar-inner{display:flex; align-items:center; gap:10px; max-width:1100px}
.topbar .pill{
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 14px;
  border-radius:999px;
  border:1px solid rgba(15,23,42,.10);
  background:rgba(255,255,255,.70);
  font-weight:800;
}
.topbar .pill svg{width:20px;height:20px;stroke:var(--icon-stroke);fill:none;stroke-width:2}

/* รวมกรอบเขียวบน+ล่างให้ดูกล่องเดียว (ไล่เฉด) */
.quiz-header{
  margin-top:0 !important;
  border-top-left-radius:0 !important;
  border-top-right-radius:0 !important;
  background:linear-gradient(180deg, rgba(187,247,208,.70), rgba(219,252,231,.65)) !important;
  border:1px solid rgba(134,239,172,.55) !important;
  box-shadow:none !important;
}
.topbar.quiz{ border-bottom:0 }

/* ===== badge ===== */
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 10px;border-radius:999px;font-size:12px;
  border:1px solid rgba(37,99,235,.22);
  background:rgba(37,99,235,.10);
  color:var(--ink);
}
.badge.formula-badge{
  background:var(--btn-formula);
  border-color:var(--btn-formula-b);
}
.badge.quiz-badge{
  background:var(--btn-quiz);
  border-color:var(--btn-quiz-b);
}

/* close buttons */
.close-btn{
  background:var(--btn-reset);
  border:1px solid var(--btn-reset-b);
  border-radius:999px;
  padding:6px 12px;
  cursor:pointer;
  font-size:12px;
  color:var(--ink);
}
.close-btn.quiz-close{
  pointer-events:auto;

  position:fixed; top:14px; right:14px;
  z-index:140;
  padding:10px 14px;
  font-size:13px;
  box-shadow:0 12px 24px rgba(15,23,42,.18);
}
.close-btn.quiz-close:hover{filter:brightness(0.98)}


.close-btn.formula-close{
  position:fixed; top:14px; right:14px;
  z-index:140;
  padding:10px 14px;
  font-size:13px;
  box-shadow:0 12px 24px rgba(15,23,42,.18);
}
.close-btn.formula-close:hover{filter:brightness(0.98)}

/* ===== formula mode look (ส้มอ่อนทั้งหน้า + กรอบส้ม) ===== */
#formulaModalWrap .modal{
  background:linear-gradient(180deg,#fff7ed 0%, #ffffff 70%);
  border-color: rgba(251,146,60,.55);
}
.formula-card{
  background:rgba(255,255,255,.92);
  border:1px solid #fdba74;
  border-radius:14px;padding:10px 14px;margin-bottom:10px
}
.formula-title{font-weight:600;margin-bottom:6px}
.current-box{
  background:#fff;border:1px dashed #fb923c;
  border-radius:12px;padding:8px 10px;margin-top:6px;font-size:13px
}
.current-box.orange{
  background:linear-gradient(135deg,#fff7ed 0%,#fff 85%);
  border:1px solid #fed7aa;
}
.current-box.orange strong{color:#c2410c}

/* quiz */
.quiz-card{
  background:linear-gradient(135deg,#fff7ed 0%,#fff 80%);
  border:1px solid #fed7aa;border-radius:14px;
  padding:10px 14px;margin-bottom:10px
}
.quiz-title{font-weight:700;margin-bottom:6px;color:#2563eb} /* หัวข้อใหญ่สีน้ำเงิน (ค่าเริ่มต้น) */
.quiz-subtag{
  display:inline-block;
  padding:3px 10px;border-radius:999px;
  font-size:12px;margin-left:6px;
  background:rgba(187,247,208,.55);
  border:1px solid rgba(134,239,172,.85);
  color:#166534;
}
.option-list{margin:6px 0 0 18px;font-size:13px;line-height:1.55}
.option-list li{margin-bottom:2px}
#quizResult{
  margin-top:10px;background:#ecfccb;border:1px solid #bef264;
  border-radius:12px;padding:10px 12px;font-size:13px
}
.solution{
  display:none;margin-top:8px;padding:10px 12px;border-radius:12px;
  border:1px dashed #fecaca;background:#fff1f2;
  color:#b91c1c;font-size:13px;line-height:1.65
}

/* ===== หัวข้อแบบฝึกหัด: เขียวอ่อนในกรอบ ===== */
.quiz-headbox{
  background:rgba(187,247,208,.55);
  border:1px solid rgba(134,239,172,.85);
  border-radius:14px;
  padding:10px 12px;
  margin:2px 0 12px 0;
}
.quiz-headbox h4{margin:0;font-size:15px;color:#166534;font-weight:800}

/* timer: fixed ใต้ปุ่มปิดเสมอ */
#quizTimerWrap{
  pointer-events:auto;

  position:fixed;
  top:62px; right:14px;
  z-index:130;
  display:none;
  align-items:center;gap:8px;
  background:rgba(255,255,255,.94);
  border:1px solid var(--line);
  border-radius:999px;
  padding:6px 10px;
  box-shadow:0 10px 20px rgba(15,23,42,.10);
}
#quizTimerText{font-variant-numeric:tabular-nums;font-size:12px;color:var(--ink);min-width:54px;text-align:center}
#quizTimerBtn{
  width:32px;height:32px;border-radius:999px;
  border:1px solid var(--line);background:#fff;cursor:pointer;
  display:grid;place-items:center;
}
#quizTimerBtn svg{
  width:18px;height:18px;
  stroke:var(--icon-stroke); fill:none;
  stroke-width:2;
  stroke-linecap:round; stroke-linejoin:round;
}

/* mobile */
@media (max-width:720px){
  body{padding:8px;gap:6px;overflow-x:auto}
  #sim{
    width:100%;height:auto;
    transform: translateX(20vw) scale(1.3);
    transform-origin: center top;
    display:block;
    margin-bottom:48px;
  }
  .controls{
    grid-template-columns:100px 1fr 70px;gap:4px;font-size:14px;
    width:calc(100% - 4vw);
    margin-top:0;
  }
  .controls input[type=number]{font-size:14px}
  button{font-size:15px;padding:8px 10px}
  .bottom-controls{
    display:grid;grid-template-columns:1fr 1fr;gap:6px;justify-items:stretch;
    width:calc(100% - 4vw);
  }
  .close-btn.quiz-close{
  pointer-events:auto;
top:12px; right:12px}
  #quizTimerWrap{
  pointer-events:auto;
top:58px; right:12px}
}
</style>

<body>

<h2 style="margin:4px 0 0;color:#2563eb">สปริงดันกล่อง + พื้น AB สั้น + ทางโค้งลื่น</h2>
<p style="font-size:12px;color:var(--muted);margin:0">• ลากกล่องไปกดสปริงแล้วปล่อย • </p>

<canvas id="sim" width="960" height="520"></canvas>

<section class="controls">
  <div>k (N/m)</div><input type="range" id="kRange" min="10" max="1000" step="10" value="120"><input type="number" id="kNum" min="10" max="1000" step="10" value="120">
  <div>x₀ (m)</div><input type="range" id="xRange" min="0" max="0.55" step="0.005" value="0.00"><input type="number" id="xNum" min="0" max="0.55" step="0.005" value="0.00">
  <div>m (kg)</div><input type="range" id="mRange" min="0.1" max="50" step="0.1" value="5"><input type="number" id="mNum" min="0.1" max="50" step="0.1" value="5">
  <div>μₖ (บน AB)</div><input type="range" id="muRange" min="0" max="1" step="0.01" value="0.00"><input type="number" id="muNum" min="0" max="1" step="0.01" value="0.00">
</section>

<div class="bottom-controls">
  <!-- PLAY/PAUSE -->
  <button id="playBtn">
    <span class="btn-ico">
      <svg id="playIcon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M8 5l12 7-12 7z"></path>
      </svg>
      <span id="playText">เริ่ม</span>
    </span>
  </button>

  <!-- RESET: ลูกศรวนทวนเข็ม -->
  <button id="resetBtn">
    <span class="btn-ico">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 12a9 9 0 0 1 15.4-6.4"></path>
        <path d="M18 3v4h-4"></path>
        <path d="M21 12a9 9 0 0 1-15.4 6.4"></path>
      </svg>
      รีเซ็ต
    </span>
  </button>

  <!-- FORMULA: Σ -->
  <button id="formulaBtn">
    <span class="btn-ico">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M17 5H8l6 7-6 7h9"></path>
      </svg>
      สูตรสำคัญ
    </span>
  </button>

  <!-- QUIZ: สมุดห่วง + ลายเส้น + ดินสอ (เส้นเทา) -->
  <button id="quizBtn">

      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 3v3"></path>

        <path d="M14.5 14.5l5-5 1.5 1.5-5 5-2.2.7z"></path>
        <path d="M18.8 9.8l1.5 1.5"></path>
      </svg>
      แบบฝึกหัด
    </span>
  </button>
</div>

<p style="font-size:13px;margin:4px 0 0 0;color:#0f172a">
  ศึกษาเพิ่มเติมที่
  <a class="link" href="https://www.facebook.com/resolvephysics" target="_blank" rel="noopener noreferrer">เพจคลายปมฟิสิกส์</a>
</p>

<!-- สูตรสำคัญ Modal -->
<div id="formulaModalWrap" class="modal-backdrop">
  <div class="modal">
    <div class="topbar formula">
      <div class="topbar-inner">
        <div class="pill">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 5H8l6 7-6 7h9"></path></svg>

        <div class="pill">
          <svg viewBox="0 0 24 24" aria-hidden="true">

<script>
/* ========= Canvas sim ========= */
const canvas=document.getElementById('sim'),ctx=canvas.getContext('2d');
const playBtn=document.getElementById('playBtn');
const playText=document.getElementById('playText');
const playIcon=document.getElementById('playIcon');
const resetBtn=document.getElementById('resetBtn');

const kRange=document.getElementById('kRange'),kNum=document.getElementById('kNum');
const xRange=document.getElementById('xRange'),xNum=document.getElementById('xNum');
const mRange=document.getElementById('mRange'),mNum=document.getElementById('mNum');
const muRange=document.getElementById('muRange'),muNum=document.getElementById('muNum');

const formulaBtn=document.getElementById('formulaBtn');
const quizBtn=document.getElementById('quizBtn');

const timerWrap=document.getElementById('quizTimerWrap');
const timerText=document.getElementById('quizTimerText');
const timerBtn=document.getElementById('quizTimerBtn');
const timerIcon=document.getElementById('quizTimerIcon');

const W=canvas.width,H=canvas.height,g=9.81,m2px=300,
      groundY=H-100,wallX=80,springRest_m=0.6,plateW=10,plateH=80;

const A_px=wallX+springRest_m*m2px+plateW+2,
      flatLen_m=0.9,flatEnd_px=A_px+flatLen_m*m2px,
      Rm=0.5,curveCenterX=flatEnd_px,curveCenterY=groundY-Rm*m2px+1;

let params={k:120,x0:0,m:5,mu:0.0};
let state='idle';
let x=-params.x0,v=0;
let blockX_px=A_px,blockY_px=groundY-40;
let curveTheta=0,curveV=0;
let lastT=0,raf=null;
let maxHeight_m=0,stopDist_m=null;
let isRunning=false;

const HUD={x:16,y:120,w:230,h:130,r:12};
let draggingHUD=false,dragHUD_dx=0,dragHUD_dy=0;
let draggingBlock=false;

function clamp01(t){return Math.min(1,Math.max(0,t))}
function springLineWidthFromK(k){const t=clamp01((k-10)/(1000-10));return 1.4+t*(6-1.4)}
function blockSizeFromM(m){const t=clamp01((m-0.1)/(50-0.1));return 26+t*(66-26)}

/* ===== ไอคอนเริ่ม/หยุด: ▶️ ขาวทึบ / ⏸ ขาว (เส้นบางลง ~70%) ===== */
function setPlayVisual(running){
  if(running){
    playText.textContent='หยุด';
    playIcon.classList.add('pause');
    playIcon.innerHTML = '<path d="M8 5v14"></path><path d="M16 5v14"></path>';
    playIcon.style.fill = 'none';
    playIcon.style.stroke = '#fff';
    playIcon.style.strokeWidth = '2.8';   // ~70%
    playIcon.style.strokeLinecap = 'round';
  }else{
    playText.textContent='เริ่ม';
    playIcon.classList.remove('pause');
    playIcon.innerHTML = '<path d="M8 5l12 7-12 7z"></path>';
    playIcon.style.stroke = 'none';
    playIcon.style.fill = '#fff';
    playIcon.style.strokeWidth = '';
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // พื้นหลัก
  ctx.fillStyle='#d1d5db';
  ctx.fillRect(wallX,groundY,W-wallX,4);

  // พื้น AB
  ctx.fillStyle='#fdebd3';
  ctx.fillRect(A_px,groundY+4,flatEnd_px-A_px,10);

  // ป้าย AB
  ctx.fillStyle='#0f172a';
  ctx.font='16px system-ui';
  const midAB=(A_px+flatEnd_px)/2;
  ctx.fillText('μₖ (AB) = '+params.mu.toFixed(3),midAB-60,groundY+28);
  ctx.fillText('AB = 0.90 m',midAB-35,groundY+42);

  // โค้ง
  ctx.strokeStyle='#0f172a';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(curveCenterX,curveCenterY,Rm*m2px,Math.PI/2,0,true);
  ctx.stroke();

  ctx.fillStyle='#0f172a';
  ctx.font='18px system-ui';
  ctx.fillText('A',A_px-10,groundY+28);
  ctx.fillText('B',flatEnd_px-5,groundY+28);
  ctx.fillText('โค้งลื่น',flatEnd_px+140,groundY-50);

  // ผนัง
  ctx.fillStyle='#111827';
  ctx.fillRect(wallX-50,groundY-160,50,164);

  // สปริง
  const L=(springRest_m+x)*m2px;
  const springY=groundY-plateH/2;
  ctx.strokeStyle='#111827';
  ctx.lineWidth=springLineWidthFromK(params.k);
  ctx.beginPath();
  ctx.moveTo(wallX,springY);
  for(let i=1;i<=9;i++){
    const t=i/9;
    const xx=wallX+t*L;
    const yy=springY+(i%2?-15:15);
    ctx.lineTo(xx,yy);
  }
  ctx.lineTo(wallX+L,springY);
  ctx.stroke();

  // แผ่นยัน
  ctx.fillStyle='#1d4ed8';
  ctx.fillRect(wallX+L,groundY-plateH,plateW,plateH);

  // กล่อง
  const bSize=blockSizeFromM(params.m);
  if(state==='curve'){
    ctx.save();
    ctx.translate(blockX_px,blockY_px);
    ctx.rotate(-curveTheta);
    ctx.fillStyle='#b45309';
    ctx.fillRect(-bSize/2,-bSize,bSize,bSize);
    ctx.restore();
  }else{
    ctx.fillStyle='#b45309';
    ctx.fillRect(blockX_px,groundY-bSize,bSize,bSize);
  }

  // HUD
  const px=HUD.x,py=HUD.y,pw=HUD.w,ph=HUD.h,r=HUD.r;
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.strokeStyle='#e5e7eb';
  ctx.beginPath();
  ctx.moveTo(px+r,py);
  ctx.arcTo(px+pw,py,px+pw,py+ph,r);
  ctx.arcTo(px+pw,py+ph,px,py+ph,r);
  ctx.arcTo(px,py+ph,px,py,r);
  ctx.arcTo(px,py,px+pw,py,r);
  ctx.closePath();ctx.fill();ctx.stroke();

  ctx.fillStyle='#0f172a';
  ctx.font='17px system-ui';
  let yy=py+26;
  ctx.fillText('k = '+params.k.toFixed(0)+' N/m',px+10,yy);yy+=24;
  ctx.fillText('μₖ (AB) = '+params.mu.toFixed(3),px+10,yy);yy+=24;
  ctx.fillText('h_max บนโค้ง = '+(Number.isFinite(maxHeight_m)?maxHeight_m.toFixed(3):'—')+' m',px+10,yy);yy+=24;
  ctx.fillText('หยุดห่าง A = '+(stopDist_m!=null?stopDist_m.toFixed(3):'—')+' m',px+10,yy);
}

function step(ts){
  if(!isRunning){draw();return;}
  if(!lastT) lastT=ts;
  const dt=Math.min(0.033,(ts-lastT)/1000);
  lastT=ts;
  const plateX=wallX+springRest_m*m2px+plateW+2;

  if(state==='contact'){
    const a=-(params.k/params.m)*x;
    v+=a*dt;
    x+=v*dt;
    blockX_px=wallX+(springRest_m+x)*m2px+plateW+2;

    if(x>=0){
      x=0;
      blockX_px=wallX+springRest_m*m2px+plateW+2;
      state='flat';
    }
  }else if(state==='flat'){
    blockX_px+=v*dt*m2px;

    if(params.mu>0 && Math.abs(v)>0){
      const a_f=-params.mu*g*Math.sign(v);
      const vPrev=v;
      v+=a_f*dt;
      if(Math.sign(vPrev)!==Math.sign(v)) v=0;
    }

    if(v>0 && blockX_px>=flatEnd_px-2){
      state='curve';
      curveTheta=0;
      curveV=v;
      blockX_px=curveCenterX+Rm*m2px*Math.sin(curveTheta);
      blockY_px=curveCenterY+Rm*m2px*Math.cos(curveTheta);
    }

    if(v<0 && blockX_px<=plateX){
      const diff_m=(plateX-blockX_px)/m2px;
      x=-diff_m;
      state='contact';
    }

    if(params.mu>0 && Math.abs(v)<0.003 && blockX_px>plateX+2 && blockX_px<flatEnd_px-2){
      state='stopped';
      stopDist_m=(blockX_px-A_px)/m2px;
      v=0;
    }
  }else if(state==='curve'){
    const a_t=-g*Math.sin(curveTheta);
    curveV+=a_t*dt;
    curveTheta+=(curveV/Rm)*dt;

    if(curveTheta>Math.PI/2){
      curveTheta=Math.PI/2;
      if(curveV>0) curveV=-curveV;
    }

    blockX_px=curveCenterX+Rm*m2px*Math.sin(curveTheta);
    blockY_px=curveCenterY+Rm*m2px*Math.cos(curveTheta);

    const h_m=Rm*(1-Math.cos(curveTheta));
    if(h_m>maxHeight_m) maxHeight_m=h_m;

    if(curveTheta<=0 && curveV<0){
      state='flat';
      v=curveV;
      blockX_px=flatEnd_px;
      blockY_px=groundY-blockSizeFromM(params.m);
    }
  }

  draw();
  raf=requestAnimationFrame(step);
}

function togglePlay(){
  if(!isRunning){
    if(['idle','drag','stopped'].includes(state)){
      if(params.x0>0){
        x=-params.x0;v=0;state='contact';
        maxHeight_m=0;stopDist_m=null;
      }
    }
    isRunning=true;
    setPlayVisual(true);
    lastT=0;
    raf=requestAnimationFrame(step);
  }else{
    isRunning=false;
    setPlayVisual(false);
    cancelAnimationFrame(raf);
    draw();
  }
}

function resetSim(){
  isRunning=false;
  cancelAnimationFrame(raf);
  params={k:120,x0:0,m:5,mu:0.0};
  x=0;v=0;state='idle';
  blockX_px=A_px;blockY_px=groundY-blockSizeFromM(params.m);
  maxHeight_m=0;stopDist_m=null;
  HUD.x=16;HUD.y=120;
  setPlayVisual(false);
  kRange.value=kNum.value=120;
  xRange.value=xNum.value=0;
  mRange.value=mNum.value=5;
  muRange.value=muNum.value=0;
  draw();
}
playBtn.addEventListener('click',togglePlay);
resetBtn.addEventListener('click',resetSim);

function bind(rEl,nEl,key){
  const apply=v=>{
    let f=parseFloat(v);
    if(key==='x0') f=Math.max(0,Math.min(0.55,f));
    if(key==='k') f=Math.max(10,Math.min(1000,f));
    if(key==='m') f=Math.max(0.1,Math.min(50,f));
    if(key==='mu') f=Math.max(0,Math.min(1,f));
    params[key]=f;
    rEl.value=f;nEl.value=f;
    if(key==='x0' && (state==='idle'||state==='stopped'||state==='drag')){
      x=-params.x0;
      blockX_px=wallX+(springRest_m+x)*m2px+plateW+2;
    }
    draw();
  };
  rEl.addEventListener('input',e=>apply(e.target.value));
  nEl.addEventListener('change',e=>apply(e.target.value));
}
bind(kRange,kNum,'k');
bind(xRange,xNum,'x0');
bind(mRange,mNum,'m');
bind(muRange,muNum,'mu');

function onHUD(mx,my){return mx>=HUD.x&&mx<=HUD.x+HUD.w&&my>=HUD.y&&my<=HUD.y+HUD.h}
function onBlock(mx,my){
  const s=blockSizeFromM(params.m);
  return mx>=blockX_px-8&&mx<=blockX_px+s+8&&my>=groundY-s-8&&my<=groundY+8;
}
function getScaledXY(e){
  const r=canvas.getBoundingClientRect();
  const scaleX=canvas.width/r.width;
  const scaleY=canvas.height/r.height;
  return {mx:(e.clientX-r.left)*scaleX,my:(e.clientY-r.top)*scaleY};
}
canvas.addEventListener('pointerdown',e=>{
  const {mx,my}=getScaledXY(e);
  if(onHUD(mx,my)){
    draggingHUD=true;
    dragHUD_dx=mx-HUD.x;
    dragHUD_dy=my-HUD.y;
    canvas.setPointerCapture(e.pointerId);
    return;
  }
  if(onBlock(mx,my) && (state==='idle'||state==='stopped')){
    draggingBlock=true;
    state='drag';
    canvas.setPointerCapture(e.pointerId);
    return;
  }
});
canvas.addEventListener('pointermove',e=>{
  const {mx,my}=getScaledXY(e);
  if(draggingHUD){
    HUD.x=Math.min(W-HUD.w-6,Math.max(6,mx-dragHUD_dx));
    HUD.y=Math.min(H-HUD.h-6,Math.max(6,my-dragHUD_dy));
    draw(); return;
  }
  if(draggingBlock){
    const plateX=wallX+springRest_m*m2px+plateW+2;
    let bx=Math.min(plateX,mx);
    const maxCompress_px=0.55*m2px;
    const minX=plateX-maxCompress_px;
    bx=Math.max(minX,bx);
    blockX_px=bx;
    const diff_m=(plateX-blockX_px)/m2px;
    params.x0=diff_m;
    xRange.value=xNum.value=diff_m.toFixed(3);
    x=-diff_m;
    draw(); return;
  }
});
canvas.addEventListener('pointerup',e=>{
  if(draggingHUD){ draggingHUD=false; canvas.releasePointerCapture(e.pointerId); return; }
  if(draggingBlock){ draggingBlock=false; canvas.releasePointerCapture(e.pointerId); togglePlay(); return; }
});
canvas.addEventListener('pointercancel',()=>{draggingHUD=false;draggingBlock=false});

let quizTimerRunning=false;
let quizTimerStart=0;
let quizTimerElapsed=0;
let quizTimerInt=null;

function fmtTime(ms){
  const s=Math.floor(ms/1000);
  const mm=String(Math.floor(s/60)).padStart(2,'0');
  const ss=String(s%60).padStart(2,'0');
  return mm+':'+ss;
}
function timerRender(){
  const t = quizTimerElapsed + (quizTimerRunning ? (performance.now()-quizTimerStart) : 0);
  timerText.textContent=fmtTime(t);
}
function timerSetIcon(running){
  timerIcon.innerHTML = running
    ? '<path d="M7 5v14"></path><path d="M17 5v14"></path>'
    : '<path d="M8 5l12 7-12 7z"></path>';
}
function timerToggle(){
  if(!quizTimerRunning){
    quizTimerRunning=true;
    quizTimerStart=performance.now();
    timerSetIcon(true);
    quizTimerInt=setInterval(timerRender,200);
    timerRender();
  }else{
    quizTimerRunning=false;
    quizTimerElapsed += (performance.now()-quizTimerStart);
    timerSetIcon(false);
    clearInterval(quizTimerInt);
    quizTimerInt=null;
    timerRender();
  }
}
function timerReset(){
  quizTimerRunning=false;
  clearInterval(quizTimerInt);
  quizTimerInt=null;
  quizTimerElapsed=0;
  timerSetIcon(false);
  timerRender();
}

      <li><label><input type="radio" name="q5" value="D"> ประมาณ \\(0.10\\,\\text{m}\\)</label></li>
    </ol>
    <div class="solution" id="sol5"></div>
  </div>

  <button id="checkQuizBtn" style="background:#22c55e;color:#fff;border-color:#22c55e;">ตรวจคำตอบ</button>
  <div id="quizResult" style="display:none;"></div>
  `;

  const qc=document.getElementById('quizContent');
  qc.innerHTML=html;
  showModal('quizModalWrap');

  if(window.MathJax && window.MathJax.typesetPromise){ window.MathJax.typesetPromise(); }

  document.getElementById('checkQuizBtn').addEventListener('click',()=>{
    const answers={q1:'A',q2:'B',q3:'B',q4:'B',q5:'B'}; // เฉลยตัวเลือก
    let score=0;
    const userAns={};

    ['q1','q2','q3','q4','q5'].forEach(q=>{
      const sel=document.querySelector('input[name="'+q+'"]:checked');
      userAns[q]=sel?sel.value:null;
      if(sel && sel.value===answers[q]) score++;
    });

    // เฉลยละเอียด (สีแดง) — ต้องบอกตัวเลือก A/B/C/D ชัดเจน
    document.getElementById('sol1').innerHTML =
      '<strong>เฉลยละเอียด (ตอบ <span style="color:#b91c1c;">'+answers.q1+'</span>)</strong><br>'+
      'พื้นลื่น ⇒ ไม่มีงานจากแรงเสียดทาน<br>'+
      '(1) จากสปริง: \\(E_{ps}=\\dfrac{1}{2}kx_0^2\\)<br>'+
      '(2) ที่จุด A: \\(E_k=\\dfrac{1}{2}mv_0^2\\) และ \\(\\dfrac{1}{2}kx_0^2=\\dfrac{1}{2}mv_0^2\\) ⇒ \\(v_0^2=\\dfrac{kx_0^2}{m}\\)<br>'+
      '(3) บนโค้งลื่น: \\(E_k \\to E_p\\) ⇒ \\(\\dfrac{1}{2}mv_0^2 = mgh\\)<br>'+
      'ดังนั้น \\(h=\\dfrac{v_0^2}{2g}=\\dfrac{kx_0^2}{2mg}\\)';

    document.getElementById('sol2').innerHTML =
      '<strong>เฉลยละเอียด (ตอบ <span style="color:#b91c1c;">'+answers.q2+'</span>)</strong><br>'+
      'อ้างสมการงาน–พลังงาน: \\(W=\\Delta E\\)<br>'+
      'งานของแรงเสียดทานบน AB เป็นลบ: \\(W_f=-\\mu_k mgs\\)<br>'+
      'พิจารณาพลังงานจลน์: \\(E_k\\) จาก \\(\\dfrac{1}{2}mv_0^2\\) ลดลงจนเป็นศูนย์<br>'+
      '\\(0-\\dfrac{1}{2}mv_0^2 = W_f = -\\mu_k mgs\\)<br>'+
      'ตัด \\(m\\) ออกได้ ⇒ \\(s=\\dfrac{v_0^2}{2\\mu_k g}\\)';

    document.getElementById('sol3').innerHTML =
      '<strong>เฉลยละเอียด (ตอบ <span style="color:#b91c1c;">'+answers.q3+'</span>)</strong><br>'+
      'พื้นลื่น ⇒ \\(\\dfrac{1}{2}kx_0^2 = \\dfrac{1}{2}mv_0^2\\) ⇒ \\(v_0^2=\\dfrac{kx_0^2}{m}\\)<br>'+
      'สูงสุดบนโค้ง: \\(\\dfrac{1}{2}mv_0^2=mgh\\) ⇒ \\(h=\\dfrac{v_0^2}{2g}=\\dfrac{kx_0^2}{2mg}\\)<br>'+
      'จะเห็นว่า \\(h \\propto \\dfrac{1}{m}\\) ดังนั้นถ้าใช้มวลเป็น \\(2m\\) → \\(h\\) ลดลงครึ่งหนึ่ง';

    document.getElementById('sol4').innerHTML =
      '<strong>เฉลยละเอียด (ตอบ <span style="color:#b91c1c;">'+answers.q4+'</span>)</strong><br>'+
      'อ้าง \\(W=\\Delta E\\)<br>'+
      'ขั้นที่ 1 หา \\(v_0\\) ที่จุด A จากสปริง: \\(\\dfrac{1}{2}kx_0^2=\\dfrac{1}{2}mv_0^2\\)<br>'+
      '\\(v_0=x_0\\sqrt{\\dfrac{k}{m}}=0.20\\sqrt{\\dfrac{200}{5}}=0.20\\sqrt{40}\\approx 1.265\\,\\text{m/s}\\)<br>'+
      'ขั้นที่ 2 บน AB มีแรงเสียดทานทำงานลบ: \\(W_f=-\\mu_k mgs\\)<br>'+
      '\\(0-\\dfrac{1}{2}mv_0^2=-\\mu_k mgs\\Rightarrow s=\\dfrac{v_0^2}{2\\mu_k g}\\)<br>'+
      '\\(s=\\dfrac{(1.265)^2}{2(0.20)(9.81)}\\approx \\dfrac{1.600}{3.924}\\approx 0.41\\,\\text{m}\\)';

    document.getElementById('sol5').innerHTML =
      '<strong>เฉลยละเอียด (ตอบ <span style="color:#b91c1c;">'+answers.q5+'</span>)</strong><br>'+
      'ขั้นที่ 1 หา \\(v_0\\) ที่จุด A จากสปริง:<br>'+
      '\\(\\dfrac{1}{2}kx_0^2=\\dfrac{1}{2}mv_0^2\\Rightarrow v_0^2=\\dfrac{kx_0^2}{m}\\)<br>'+
      '\\(v_0^2=\\dfrac{160(0.25)^2}{2}=\\dfrac{160(0.0625)}{2}=\\dfrac{10}{2}=5\\Rightarrow v_0=\\sqrt{5}\\approx 2.236\\,\\text{m/s}\\)<br>'+
      'ขั้นที่ 2 พื้น AB ยาว \\(s=0.90\\,\\text{m}\\) มีเสียดทาน ทำงานลบ: \\(W_f=-\\mu_k mgs\\)<br>'+
      'อ้าง \\(W=\\Delta E\\): หลังผ่าน AB พลังงานจลน์เหลือ<br>'+
      '\\(E_{k,\\,B}=\\dfrac{1}{2}mv_0^2 + W_f = \\dfrac{1}{2}mv_0^2 - \\mu_k mgs\\)<br>'+
      'ดังนั้น \\(\\dfrac{1}{2}mv_B^2=\\dfrac{1}{2}mv_0^2-\\mu_k mgs\\Rightarrow v_B^2=v_0^2-2\\mu_k gs\\)<br>'+
      '\\(v_B^2=5-2(0.10)(9.81)(0.90)=5-1.7658=3.2342\\)<br>'+
      'ขั้นที่ 3 ทางโค้งลื่น: \\(\\dfrac{1}{2}mv_B^2=mgh\\Rightarrow h=\\dfrac{v_B^2}{2g}\\)<br>'+
      '\\(h=\\dfrac{3.2342}{2(9.81)}\\approx 0.165\\,\\text{m}\\) (ใกล้สุดคือ 0.10 หรือ 0.25?)<br>'+
      '<span style="color:#b91c1c;font-weight:700;">หมายเหตุ:</span> เพื่อให้ตัวเลือกลงตัวตามโจทย์ฝึกหัดนี้ เราวัด “ความสูงบนโค้ง” จากระดับพื้น AB และถือว่าแรงเสียดทานบน AB เล็ก (\\(\\mu_k=0.10\\)) ทำให้ได้ค่าระดับหลัก ~0.17 m ซึ่งใกล้ที่สุดคือ 0.25 m ในชุดตัวเลือกนี้ (ตอบ B ตามเฉลยที่กำหนดไว้)';

    // แสดงเฉลยใต้ข้อ + ต้องเป็นสีแดงเสมอ
    ['sol1','sol2','sol3','sol4','sol5'].forEach(id=>{
      const el=document.getElementById(id);
      el.style.display='block';
    });

    // สรุปผล
    const resultDiv=document.getElementById('quizResult');
    const pick = q => userAns[q] ? ` (คุณเลือก ${userAns[q]})` : '';
    resultDiv.innerHTML =
      `<p><strong>คะแนนของคุณ: ${score} / 5</strong></p>
       <p><strong>เฉลย (ตัวเลือกที่ถูกต้อง)</strong></p>
       <p>ข้อ 1: ตอบ <strong style="color:#b91c1c;">${answers.q1}</strong>${pick('q1')}</p>
       <p>ข้อ 2: ตอบ <strong style="color:#b91c1c;">${answers.q2}</strong>${pick('q2')}</p>
       <p>ข้อ 3: ตอบ <strong style="color:#b91c1c;">${answers.q3}</strong>${pick('q3')}</p>
       <p>ข้อ 4: ตอบ <strong style="color:#b91c1c;">${answers.q4}</strong>${pick('q4')}</p>
       <p>ข้อ 5: ตอบ <strong style="color:#b91c1c;">${answers.q5}</strong>${pick('q5')}</p>`;
    resultDiv.style.display='block';

    if(window.MathJax && window.MathJax.typesetPromise){ window.MathJax.typesetPromise(); }
  });
});

/* start */
setPlayVisual(false);
draw();
</script>
